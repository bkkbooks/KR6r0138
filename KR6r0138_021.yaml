body:
  text: 大唐西明寺沙門釋道宣撰法義篇第四之四答雲法師請開講書梁昭明太子統覽近示知欲見令道義夫釋教凝深至理淵粹一相之道杳然難測不二之門寂焉無響自非深達玄宗精解妙義若斯之處豈易輕辨至於宣揚正教在乎利物耳弟子之於內義誠自好之樂之然鉤深致遠多所未悉為利之理蓋何足論諸僧並入法門遊道日廣至於法師彌不俟説云欲見餐稟良所未喻想得此意不復多云統和南釋法雲啓殿下以生知上識精義入神自然勝辨妙談出俗每一往復闔筵心醉真令諸天讚善實使釋梵雨華貧道雖幼知向方而長無成業簉之濫吹聖明而識慚無退者豈不願餐幽致敢祈仰者誠在希聞妙説今猥蒙答旨未許群情退思輕脫用深悚懼渴仰有實飢虛非假循思檢願重以祈聞唯希甘露當開用得永祛鄙吝伏願四弘本誓曲允三請殷勤謹啓重覽來示知猶欲令述義不辨為利具如前言甘露之開彌慚來説若止是略標義宗無為不爾但愧以魚目擬法師之夜光耳統和南謝敕齎水犀如意啓臣統啓應敕左右佰佛掌奉宣敕旨垂齎水犀如意一柄式是道義所須白玉照采方斯非貴珊瑚挺質匹此未珍雕剞既成先被庸薄如蒙漢帝之簪似獲趙堯之印謹仰承威神陳諸講席方使歡喜羅漢懷棄鉢之嗟王式碩儒折驪駒之辨熊飾寶刀子桓恧其大齎犛牛輕拂張敞慚其舊儀殊恩特降伏深荷躍不任下情謹啓事以聞謹啓令旨解二諦義二諦理實深玄自非虛懷無以通其弘遠明道之方其由非一舉要論之不出境智或時以境明義或時以智顯行至於二諦即是就境明義若迷其方三有不絶若達其致萬纍斯遣所言二諦者一是真諦二名俗諦真諦亦名第一義諦俗諦亦名世諦真諦俗諦以定體立名第一義諦世諦以褒貶立目若以次第言説應云一真諦二俗諦一與二合數則為三非直數過於二亦名有前後於義非便真既不因俗而有俗亦不由真而生正可得言一真一俗真者是實義即是平等更無異法能為雜間俗者即是集義此法得生浮偽起作第一義者就無生境中別立美名言此法最勝最妙無能及者世者以隔別為義生滅流動無有住相涅槃經言出世人所知名第一義諦世人所知名為世諦此即文證褒貶之理二諦立名差別不同真俗世等以一義説第一義諦以二義説正言此理德既第一義亦第一世既浮偽更無有義所以但立世名諦者以審實為義真諦審實是真俗諦審實是俗真諦離有離無俗諦即有即無即有即無斯是假名離有離無此為中道真是中道以不生為體俗既假名以生法為體南澗寺慧超咨曰浮偽起作名之為俗離於有無名之為真未審浮偽為當與真一體為當有異令旨答曰世人所知生法為體出世人所知不生為體依人作論應如是説若論真即有是空俗指空為有依此義明不得別異又咨真俗既云一體未審真諦亦有起動為當起動自動不關真諦令旨又答真理寂然無起動相凡夫惑識自橫見起動又咨未審有起動而凡夫橫見無起動而凡夫橫見令旨又答若有起動則不名橫見以無動而見動所以是橫見又咨若法無起動則唯應一諦令旨又答此理常寂此自一諦橫見起動復是一諦準應有兩不得言一又咨為有橫見為無橫見令旨又答依人為語有此橫見又咨若依人語故有橫見依法為談不應見動令旨又答法乃無動不妨橫者自見其動丹陽尹晉安王蕭綱咨曰解旨依人為辨有生不生未審浮虛之與不生只是一體為當有異令旨答曰凡情所見見其起動聖人所見見其不生依仁為論乃是異體若語相即則不成異具如向釋不復多論又咨若真不異俗俗不異真豈得俗人所見生法為體聖人所見不生為體令旨答即俗知真即真見俗就此為談自成無異約人辨見自有生不生殊又咨未審俗諦之體既云浮幻何得於真實之中見此浮幻令旨答真實之體自無浮幻惑者橫構謂之為有無傷真實體自虛玄又咨聖人所見見不流動凡夫所見自見流動既流不流異愚謂不得為一令旨答不謂流不流各是一體正言凡夫於不流之中橫見此流以是為論可得成一又咨真寂之體本自不流凡夫見流不離真體然則但有一真不成二諦令旨答體恆相即理不得異但凡見浮虛聖覩真寂約彼凡聖可得立二諦名招提寺慧琰咨曰凡夫見俗以生法為體聖人見真以不生為體未審生與不生但見其異復依何義而得辨一令旨答曰凡夫人於無搆有聖人即有辨無有無相即此談一體又咨未審此得談一一何所名令旨答正以有不異無無不異有故名為一更無異名又咨若無不異有有不異無但見其一云何為二令旨答凡夫見有聖人見無兩見既分以茲成二又咨聖人見無無可稱諦凡夫見有何得稱諦令旨答聖人見無在聖為諦凡夫審謂為有故於凡為諦棲玄寺曇宗咨曰聖人為見世諦為不見世諦令旨答曰聖人知凡人見有世諦若論聖人不復見此又咨聖人既不見世諦云何以世諦教化衆生令旨答聖人無惑自不見世諦無妨聖人知凡夫所見故曲隨物情説有二諦又咨聖人知凡見世諦即此凡夫不令旨答此凡即是世諦聖人亦不見此凡又咨聖既不見凡焉知凡見世諦令旨答聖雖自無凡亦能知有凡自謂為有故曲赴其情為説世諦司徒從事中郎王規咨曰未審真俗既不同豈得相即之義令旨答聖人所得自見其無凡人所得自見其有見自不同無妨俗不出真外又咨未審既無異質而有二義為當義離於體為當即義即體令旨答更不相出名為一體愚聖見殊自成異義又咨凡夫為但見俗亦得見真令旨答止得見俗不得見真又咨體既相即寧不覩真令旨答凡若見真不應覩俗覩俗既妄焉得見真靈根寺僧遷咨曰若第一以無過為義此是讚嘆之名真離於俗亦應是讚嘆之名令旨答曰即此體真不得言嘆第一義諦既更立美名所以是嘆又咨無勝我者既得稱讚嘆我體即真何故非嘆令旨答無勝我者所以得稱讚我體即真亦是我真故非讚嘆又咨我無過者所以得稱讚嘆我是不偽何得非讚令旨答不偽真是當體之名如人體義謂之解義正足稱其實體豈成讚嘆又咨此法無能出者焉得即是讚嘆令旨答既云無出非讚如何羅平侯蕭正立咨曰未審俗諦是生法以不令旨答曰俗諦之體正是生法又咨俗既橫見何得有生令旨答橫見為有所以有生又咨橫見為有實自無法實既無法説何為生令旨答即此生法名為橫見亦即此橫見名為生法又咨若是橫見不應有生若必有生名何橫見令旨答既云橫見實自無生但橫見為有有此橫生衡山侯蕭恭咨曰未審第一義諦既有義目何故世諦獨無義名令旨答曰世既浮俗無義可辨又咨若無義可辨何以稱諦令旨答凡俗審見故立諦名又咨若凡俗見有得受諦名亦應凡俗見有得安義字令旨答凡俗審見故諦名可立浮俗無義何得強字為義又咨浮俗雖無實義不無浮俗之義既有此浮俗何得不受義名令旨答正以浮俗故無義可辨若有義可辨何名浮俗中興寺僧懷咨曰令旨解言真不離俗俗不離真未審真是無相俗是有相相無相殊何得同體令旨答曰相與無相此處不同但凡所見有即是聖所見無以此為論可得無別又咨既是一法云何得見為兩見既有兩豈是一法令旨答理乃不兩隨物所見故得有兩又咨見既有兩豈不相違令旨答法若實兩可得相違法常不兩人見自兩就此作論焉得相乖又咨人見有兩可説兩人理既是一豈得有兩令旨答理雖不兩而約人成兩始興王第四男蕭映咨曰第一義諦其義第一德亦第一不令旨答曰義既第一德亦第一又咨直言第一已苞德義何得復加義字以致繁復令旨答直言第一在義猶昧第一見義可得盡美又咨若加以義字可得盡美何不加以德字可得盡美令旨答第一是德豈待復加但加義字則德義雙美又咨直稱第一足見其美偏加義字似有所局令旨答第一表德復加義字二美俱陳豈有所局吳平世子蕭勵咨曰通旨云第一義諦世諦褒貶立名真俗二諦定體立名尋真諦之理既妙絶言慮未審云何有定體之旨令旨答曰談其無相無真不真寄名相説以真定體又咨若真諦無體今寄言辨體未審真諦無相何不寄言辨相令旨答寄言辨體猶恐貶德若復寄言辨相則有纍虛玄又咨真諦玄虛離於言説今既稱有真豈非寄言辨相令旨答寄有此名名自是相無傷此理無相虛寂又咨未審此寄言辨體為是當理為不當理令旨答無名而説名不全當理又咨若寄言辨名名不當理未審此寄將何所説令旨答雖不當理為接引衆生須名相説宋熙寺慧令咨曰真諦以不生為體俗諦以生法為體而言不生即生生即不生為當體中相即為當義中相即令旨答云體中相即義不相即又咨義既不即體云何即令旨答凡見其有聖覩其無約見成異就體恆即又咨體既無兩何事須即令旨答若體無別兩緣見有兩見既兩異須明體即又咨若如解旨果是就人明即令旨答約人見為二二諦所以名生就人見明即此亦大妨始興王第五男蕭曄咨曰真諦稱真是實真不令旨答曰得是實真又咨菩薩會真之時為忘俗忘真不令旨答忘俗忘真故説會真又咨若忘俗忘真故説會真忘俗忘真何謂實真令旨答若存俗存真何謂實真正由兩遣故謂實真又咨若忘俗忘真而是實真亦應忘真忘俗而是實俗令旨答忘俗忘真所以見真忘真忘俗彌見非俗又咨菩薩會真既忘俗忘真今呼實真便成乖理令旨答假呼實真終自忘真兩忘稱實何謂乖理興皇寺法宣咨曰義旨云俗諦是有是無故以生法為體未審有法有體可得稱生無是無法云何得有生義令旨答曰俗諦有無相待而立既是相待故並得稱生又咨若有無兩法並稱為生生義既一則有無無異令旨答俱是凡夫所見故生義得同是有是無焉得不異又咨若有無果別應有生不生令旨答既相待立名故同一生義程鄉侯蕭祇咨曰未審第一之名是形待以不令旨答曰正是形待又咨第一無相有何形待令旨答既云第一豈得非待又咨第一是待既稱第一世諦待於第一何不名為第二若俗諦是待而不稱第二亦應真諦是待不名第一令旨答若稱第一是待於義已足無假説俗第二方成相待又咨若世諦之名不稱第二則第一之稱無所形待令旨答第一褒真既云相待世名是待直置可知光宅寺法雲咨曰聖人所知之境此是真諦未審能知之智為是真諦為是俗諦令旨答曰能知是智所知是境智來冥境得言即真又咨有智之人為是真諦為是俗諦令旨答若呼有智之人即是俗諦又咨未審俗諦之人何得有真諦之智令旨答聖人能忘於俗所以得有真智又咨此人既冥無生亦應不得稱人令旨答冥於無生不得言人寄名相説常自有人靈根寺慧令咨曰為於真諦中見有為俗諦中見有令旨答曰於真諦中橫見有俗又咨俗諦之有為實為虛令旨答是虛妄之有又咨為當見妄為當見有令旨答見於妄有又咨無名相中何得見有名相令旨答於無名相見有名相所以妄有又咨於無名相妄見為有譬如火熱惑者言冷得就熱中有冷相不若於無相而有名相亦於火中應有此冷令旨答火自常熱妄見有冷此自惑不嘗異湘宮寺慧興咨曰凡夫之惑為當但於真有迷於俗亦迷令旨答曰於真見有此是迷真既見有俗不成迷俗又咨若使解俗便成解真若不解真豈得解俗令旨答真理虛寂惑心不解雖不解真何妨解俗又咨此心不解真於真可是惑此心既解俗於俗應非惑令旨答實而為語通自是惑辨俗森羅於俗中各解莊嚴寺僧旻咨曰三十心中所得空解為是真解為是俗解令旨答可名相似解又咨未審相似為真為俗令旨答習觀無生不名俗解未見無生不名真解又咨若能照之智非真非俗亦應所照之境非真非俗若是非真非俗則有三諦令旨答所照之境既即無生無生是真豈有三諦又咨若境即真境何不智即真智令旨答未見無生故非真智何妨此智未真而習觀真境豈得以智未真而使境非真境宣武寺法寵咨曰真諦不生不滅俗諦有生有滅真俗兩義得言有異談其法體只得是一未審體從於義亦得有二不令旨答曰體亦不得合從於義又咨未審就凡聖兩見得言兩義亦就凡聖兩見得言兩體令旨答理不相異所以云一就凡聖兩見得有二體之殊又咨若使凡者見有聖人見無便應凡夫但見世諦有聖人應見太虛無令旨答太虛亦非聖人所見太虛得名由於相待既由待生並凡所見又咨凡夫所見空有得言是一不令旨答就凡為語有實異無約聖作談無不異有建業寺僧愍咨曰俗人解俗為當解俗參差而言解俗為當見俗虛假而言解俗令旨答曰只是見俗參差而言解俗又咨俗諦不但參差亦是虛妄何故解參差而不解虛妄令旨答若使凡夫解虛妄即是解真不解虛妄所以名為解俗光宅寺敬脫咨曰未審聖人見真為當漸見為當頓見令旨答曰漸見又咨無相虛懷一見此現萬相並寂未審何故見真得有由漸令旨答曰自凡之聖解有淺深真自虛寂不妨見有由漸又咨未審一得無相並忘萬有為不悉忘令旨答一得無相萬有悉忘又咨一得無相忘萬有者亦可一得虛懷窮彼真境不應漸見令旨答如來會寂自是窮真淺行聖人恆自漸見又咨若見真有漸不可頓會亦應漸忘萬有不可頓忘令旨答解有優劣故有漸見忘懷無偏故萬有並寂令旨解法身義法身虛寂遠離有無之境獨脫因果之外不可以智知不可以識識豈是稱謂所能論辨將欲顯理不容默然故隨從言説致有法身之稱天竺云達摩舍利此土謂之法身若以當體則是自性之目若以言説則是相待立名法者軌則為旨身者有體之義軌則之體故曰法身略就言説粗陳其體是常住身是金剛身重加研核其則不爾若定是金剛即為名相定是常住便成方所所謂常住本是寄名稱曰金剛本是譬説及談實體則性同無生故云佛身無為不墮法故涅槃經説如來之身非身是身無量無邊無有足迹無知無形畢竟清淨無知清淨而不可為無垢稱曰妙有而復非有離無離有所謂法身招提寺慧琰咨曰未審法身無相不應有體何得用體以釋身義令旨答無名無相乃無體可論寄以名相不無妙體又咨若寄以名相不無妙體則寄以名相不成無相令旨答既云寄以名相足明理實無相又咨若寄以名相而理實無相理既無相云何有體令旨答寄言軌物何得無體又咨亦應寄言軌物非復無相令旨答軌物義邊理非無相所言無相本談妙體又咨真實本來無相正應以此軌物何得隱斯真實強生言相令旨答真實無相非近學所窺是故接諸膚淺必須寄以言相光宅寺法雲咨曰未審法身常住是萬行得不令旨答曰名相道中萬行所得又咨既為萬行所得豈言無相若必無相豈為萬行所得令旨答無名無相何曾有得寄以名相假言有得又咨實有萬行實得佛果安可以無相全無所得令旨答問者住心謂實有萬行今謂萬行自空豈有實果可得又咨現有衆生修習萬行未審何故全謂為無令旨答凡俗所見謂之為有理而檢之實無萬行又咨經説常住以為妙有如其假説何謂妙有令旨答寄以名相故説妙有理絶名相何妙何有莊嚴寺僧旻咨曰未審法身絶相智不能知絶相絶知何得猶有身稱令旨答曰無名無相曾有何身假名相説故曰法身又咨亦應假名相説是智所照何得不可以智知不可以識識令旨答亦得寄名慧眼所見又咨若慧眼能見則可以智知若智不能知則慧眼無見令旨答慧眼無見亦無法可見又咨若云無見有何法身令旨答理絶聞見實無法身又咨若無法身則無正覺正覺既有法身豈無令旨答恆是寄言故有正覺正覺既在寄言法身何得定有宣武寺法寵咨曰未審法身之稱為正在妙本金姿丈六亦是法身令旨答曰通而為論本迹皆是別而為語止在常住又咨若止在常住不應有身若通取丈六丈六何謂法身令旨答常住既有妙體何得無身丈六亦能軌物故可通稱法身又咨若常住無纍方稱法身丈六有纍何謂法身令旨答衆生注仰妄見丈六丈六非有有何實纍又咨若丈六非有指何為身令旨答隨物見有謂有應身又咨既曰應身何謂法身令旨答通相為辨故兼本迹核求實義不在金姿靈根寺慧令咨曰未審為以極智名曰法身為以絶相故曰法身令旨答曰無名無相是集藏法身圓極智慧是實智法身又咨無名無相則無身不身既有法身何謂無相令旨答正以無相故曰法身又咨若以無相故曰法身則智慧名相非復法身令旨答既是無相智慧豈非法身又咨如其有身何名無相若是無相何得有身令旨答於無名相假説法身又咨若假説法身正在名相云何直指無相而謂法身令旨答既於無相假立名相豈得異此無相而説法身靈味寺靜安咨曰未審法身垂應以不令旨答曰法身無應又咨本以應化故稱法身若無應化何謂法身令旨答本以軌則之體名為法身應化之談非今所執又咨若無應化云何可軌既為物軌豈無應化令旨答衆生注仰蒙益故云能為軌化緣已畢何所應化又咨若能益衆生便成應化若無應化何以益物令旨答能生注仰軌則自成何勞至人俯應塵俗又咨既生注仰豈無應化若無應化注仰何益令旨答正由世尊至極神妙特深但令注仰自然蒙祐若應而後益何謂至神不應而益故成窮美若必令實應與菩薩豈殊謝敕賚看講啓梁昭明皇太子臣統啓主書管萬安奉宣敕旨以臣今講竟曲垂勞問伏以正言深奧總一群經均斗杓以命四時等太陽而照萬國臣不涯庸淺輕敢奉宣莫惻天文徒觀玉府慚悚交并寢興無置仰降中使俯賚光臨榮荷殊慈靡知啓處不任下情謹附啓事謝聞謹啓謝敕參解講啓臣統啓主書周昂奉宣敕旨垂參臣今解講伏以至理希夷微言淵奧非所能鑽仰遂以無庸叨茲宣釋將應讓齒反降教胄之恩允宜尚學翻荷説經之詔竊以挾八威之策則神物莫干服九丹之華則仙徒可役臣仰承皇威訓茲學侶奉揚聖旨洞曉群儒鼓冶異師陶鈞久滯方使惠施恧其短長公孫罷其堅白王生挫辨既盡神氣法開受屈永隱東峯中使曲臨彌光函席仰戴殊慈不知啓處不任下情謹奉啓事謝聞謹啓謝敕賚制旨大涅槃經講疏啓臣統啓後閣應敕木佛子奉宣敕旨垂賚制旨大般涅槃經講疏一部十帙合目百一卷寒鄉覩日未足稱奇採藥逢仙曾何譬喜臣伏以六爻所明至邃窮於幾象四書所總施命止於域中豈有牢籠因果辨斯寶城之教網羅真俗開茲月滿之文方當道洽大千化均百億雲彌識種雨遍身田豈復論唐帝龜書周王策府何待刊寢槃盂屏黜丘素甘露妙典先降殊恩揣己循愚不勝慶荷不任頂戴之至謹奉啓謝聞謝敕賚制旨大集經講疏啓臣統啓宣詔王慧寶奉宣敕旨垂賚制旨大集經講疏二帙十六卷甘露入頂慧水灌心似暗遇明如飢獲飽伏以非色非欲二界同坊匪文匪理三乘雲集四辨言而未極八聲闡而莫窮俯應天機垂茲聖作同真如而無盡與日月而俱懸但觀寶舂山獲珠大海臣實何能恆蒙誘被張書谷筆豈足陳心抗袖長言未申歌舞不任喜荷之至謹奉啓謝聞謹啓答廣信侯書晉安王王白仰承比往開善聽講涅槃縱賞山中遊心人外青松白霧處處可悅奇峯怪石極目忘歸加以法水晨流天華夜落往而忘反有會昔言王牽物從務無由獨往仰此高蹤寸心如結謹白與廣信侯書晉安王王白闊絶音旨每用延結風嚴寒徑願比怡和伏承淨名法席親承金口辭珍鹿苑理愜鷲山微密祕藏於斯既隆莊嚴道場自茲彌闡豈止心燈夜炳亦乃意蘂晨飛況思弘明本長內教今陪十善之車開八政之路流波若之水洗意識之塵以此春翹方為秋實王每憶華林勝集亦叨末位終朝竟夜沐浴妙言至於席罷日餘退休增省携手登臨兼展談笑仰望九層俯窺百尺金池動月玉樹含風當於此時足稱法樂今卷惟之部乘傳一隅聞慧雨滂流喜躍充遍徒挹懸河無由承稟空無所有不瑩情靈緣癡有愛自嗟難拔兼下車以來義言蓋少舊憶已盡新解未餐既慚口誦復非心辨永謝寫瓶終慚染疊況慈雲既被智海亦深影末波餘希時灑拂但睽違轉積興言盈瞼願加敬納言不定意謹白廣信縣開國侯蕭映惶恐死罪信至奉誨清言兼紙文采巨麗慰喻綢繆比日寒霜慘切伏願興居和悆民富重殷無過抑損下官智昏識暗學淺人凡遂得擁卷璇階親奉教義耳餐甘露心承制説天思淵深睿情廣奧三明一鑒釋滯義於久迷四辨既陳闡難思而頓解豈漢皇夢邇而梵響復弘雖晉帝留心而微言始見每至夕趍瓊筵晨登朱陛不曾不憶芳林勝集玄圃法座殿下曳舄寶雲或從容而問道施裾博望乍折角而解頤于時謬齒末筵預聞清論親奉話言數陪顏色至於今者講席殿下限同分陜謬頒天獎猶及下官誰不欽仁寧無戀德傾心東注恆以係仰為先下官蒙蔽久已仰慕雖聞妙義愚心難啓方欲馳鶩枌鄉訪疑下席忽逢令旨垂覓波餘尋讀戰遑俯仰慚恧庶為恩謔少泰下情正當慈雲智海翻以仰屬謝瓶慚疊實歸庸菲下官惑緣既積塵纍未消近攝衛乖方遂中途感疾不得餐承究竟闕聞末品徒自剋責終關緣運不審比日何以怡神披閲儒史無乃損悆下官每訪西郵備餐令德仰承觀囑於章華之上或聽訟於甘棠之下未嘗不文翰紛綸終朝不息清論玄談夜分乃寐春華之客登座右而升堂秋實之賓應虛左而入室文宗義府於焉總萃唯此最樂實驗茲辰下官昔遊梁苑曲蒙眷顧今者獨隔清顏久睽接仰傾心已結興言涕欷唯冀音旨時賜沾及伏願珍重尋更下承曲奉恩誨用深銘荷映死罪死罪
