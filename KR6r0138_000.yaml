front:
  text: 自大夏化行布流東漸懷信開道代有澆淳斯由情混三堅智昏四照故使澆薄之黨輕舉邪風淳正之徒時遭佞辨所以教移震旦六百餘年獨夫震虐三被殘屏禍不旋踵畢顧前良殃咎己形取笑天下且夫信為德母智實聖因肇祖道元終期正果據斯論理則內傾八慢之惑核此求情則外蕩六塵之蔽蕭然纍表非小道之登臨廓爾高升乃上仁之翔集然以時經三代弊五滓之沈淪識蒙邪正銓人法之天網是以內教經緯立法依以攝機外俗賢明垂文論以弘範昔梁鍾山之上定林寺僧祐律師學統九流義包十諦情敦慈救志存住法詳括梁晉列辟群英留心佛理構敘篇什撰弘明集一部一十四卷討顏謝之風規總周張之門律辨駮通議極情理之幽求窮較性靈誠智者之高致備于祕閣廣露塵心然智者不迷迷者非智故智士興言舉旨而通標領迷夫取悟繁詞而啓神襟若夫信解之來諒資神用契必精爽事襲玄模故信有三焉一知二見三謂愚也知謂生知佩三堅而入正聚愚謂愚叟滯四惑而溺欲塵化不可遷下愚之與上智中庸見信從善其若流哉是以法湮三代並惟寡學所纏故得師心獨斷禍集其計向若披圖八藏綜文義之成明尋繹九識達情智之迷解者則正信如皎日五翳雖掩而逾光矣余博訪前敘廣綜弘明以為江表五代三寶載興君臣士俗情無異奉是稱文國智籍文開中原周魏政襲昏明重老輕佛信毀交貿致使工言既申佞幸斯及時不乏賢剖心特達脫頴拔萃亦有人焉然則昏明互顯邪正相師據像則雲泥兩分論情則倚伏交養是以六術揚於佛代三張冒於法流皆大士之權謀至人之適化也斯則滿願行三毒之邪見淨名降六欲之魔王咸開逼引之殊途各立向背之弘轍今且據其行事決滯胥徒喻達蒙泉疏通性海至如寇謙之搆崔浩禍福皎然鄭藹之抗周君成敗俄頃姚安著論抑道在於儒流陳琳綴篇揚釋越於朝典此之諷議涅而不緇墜在諸條差難綜緝又梁周二武咸分顯晦之儀宋魏兩明同乘弘誘之略沈休文之慈濟顏之推之歸心詞釆卓然迥張物表嘗以餘景試為舉之弊於庸朽綜集牢落有漢陰博觀沙門繼贊成紀顧惟直筆即而述之命族題篇披圖藻鏡至若尋條揣義有悟賢明孤文片記撮而附列名曰廣弘明集一部三十卷有梁所撰或未討尋略隨條例銓目歷舉庶得程諸未覩廣信釋紛擬人以倫固非虛託如有隱括覽者詳焉序曰夫邪正糾紛愚智繁雜自非極聖焉能兩開所以欲主天魔猶能變為佛相況餘色有孰可言哉固知一洲萬國一化千王互興廢立不足論評是以九十六部宗上界之天根二十五諦討極計之冥本皆陳正朔號三寶於人中咸稱大濟敷四等於天下又有魯邦孔氏導禮樂於九州楚國李公開虛玄於五嶽匪稱教主皆述作於先王贊時體國各臣吏於機務斯並衢分限域謂流沙以東孔老之化及葱河以西異部之所統也辨御乖張理路天殊居然自別何以明其然耶故西宇大夏衆計立於我神東華儒道大略存於身國孰解妄想流愛纏綿於九居倒情徙滯祛除於七識致令惑網覆心莫知投向昏波漾目寧辨歸依不可效尤務須反本原夫小道大道自古常談大聖小聖由來共述至於親承面對曾未覺知雷同體附相從奔競故有剋念作聖狂哲互稱即斯為論未契端極昔皇覺之居舍衛二十五年九億編戶逆從太半素王之在赤縣門學三千子夏蔑而致疑顏回獨言莫測以斯論道又可惑焉夫以會正名聖無所不通根塵無礙於有空陶冶莫滯於性欲形不可以相得挺金姿之四八心不可以智求垂不共之二九斯止一人名佛聖也故能道濟諸有幽顯咸所歸依自餘鴻漸天衢之所未陟且自方域位殊義非叨僭若夫天無二日國無二王惟佛稱為大聖光有萬億天下故今門學日盛無國不仰其風教義聿修有識皆參其席彼孔老者名位同俗不異常人祖述先王自無教訓何得比佛以相抗乎且據陰陽八殺之略山川望祑之祠七衆委之若遺五戒捐而不顧觀此一途高尚自足投誠況有聖種賢蹤則為天人師表矣是知天上天下惟佛為尊六道四生無非苦者身心常苦義畢驅馳不思此懷妄存高大大而可大則不陷於有為既履非常固可歸於正覺有斯事類故敢序之云爾廣弘明集歸正篇第一廣弘明集歸正篇第一之一商太宰問孔子聖人一列禦寇一云吳太宰太宰嚭問孔子曰夫子聖人歟對曰丘也博識強記非聖人也又問三王聖人歟對曰三王善用智勇聖非丘所知又問五帝聖人歟對曰五帝善用仁義聖非丘所知又問三皇聖人歟對曰三皇善用時聖非丘所知太宰大駭曰然則孰為聖人乎夫子動容有間曰丘聞西方有聖者焉不治而不亂不言而自信不化而自行蕩蕩乎人無能名焉據斯以言孔子深知佛為大聖也時緣未升故默而識之有機故舉然未得昌言其致矣子書中佛為老師二老子西升經云吾師化遊天竺善入泥洹符子云老氏之師名釋迦文余尋終古三五帝皇有事西奔罕聞東逝故軒轅遊華胥之國王劭云即天竺也又陟崑崙之墟即香山也老子迹沈扶風史述於流沙而道家諸記皆西升崑丘而上天矣以事詳之並從於佛國也故伯益述山海申毒之國偎人而愛人郭璞博古者曰申毒即天毒也浮圖所興今聞之說曰地殷土中物壤琛麗民博仁智俗高理學立德厚生何負諸夏古稱愛人之國世挺賢聖之人豈虛搆哉漢顯宗開佛化法本傳三未詳作者傳云明帝永平三年上夢神人金身丈六項有日光寤已問諸臣下傅毅對詔有佛出於天竺乃遣使往求備獲經像及僧二人帝乃為立佛寺畫壁千乘萬騎繞塔三匝又於南宮清涼臺及高陽門上顯節陵所圖佛立像并四十二章經緘於蘭臺石室廣如前集牟子所顯傳云時有沙門迦攝摩滕竺法蘭位行難測志存開化蔡愔使達請滕東行不守區域隨至雒陽曉喻物情崇明信本帝問滕曰佛法出世何以化不及此答曰迦毗羅衛國者三千大千世界百億日月之中心也三世諸佛皆在彼生乃至天龍鬼神有願行者皆生於彼受佛正化咸得悟道餘處衆生無緣感佛佛不往也佛雖不往光明及處或五百年或一千年或一千年外皆有聖人傳佛聲教而化導之廣說教義文廣故略也傳云永平十四年正月一日五嶽諸山道士朝正之次自相命曰天子棄我道法遠求胡教今因朝集可以表抗之其表略曰五嶽十八山觀太上三洞弟子褚善信等六百九十人死罪上言臣聞太上無形無名無極無上虛無自然大道出於造化之前上古同尊百王不易今陛下道邁義皇德高堯舜竊承陛下棄本追末求教西域所事乃是胡神所說不參華夏願陛下恕臣等罪聽與試驗臣等諸山道士多有徹視遠聽博通經典從元皇已來太上群録太虛符祝無不綜練達其涯極或策使鬼神或吞霞飲氣或入火不燒或履水不溺或白日升天或隱形不測至於方術無所不能願得與其比校一則聖上意安二則得辨真僞三則大道有歸四則不亂華俗臣等若比對不如任聽重決如其有勝乞除虛妄敕遣尚書令宋庠引入長樂宮以今月十五日可集白馬寺道士等便置三壇壇別開二十四門南嶽道士褚善信華嶽道士劉正念恆嶽道士桓文度岱嶽道士焦得心嵩嶽道士呂惠通霍山天目五臺白鹿等十八山道士祁文信等各齎靈寶真文太上玉訣三元符録等五百九卷置於西壇茅成子許成子黃子老子等二十七家子書二百三十五卷置於中壇饌食奠祀百神置於東壇帝御行殿在寺南門佛舍利經像置於道西十五日齊訖道士等以柴荻和檀沈香為炬繞經泣曰臣等上啓太極大道元始天尊衆仙百靈今胡神亂夏人主信邪正教失蹤玄風墜緒臣等敢置經壇上以火取驗欲使開示蒙心得辨真僞便縱火焚經經從火化悉成煨燼道士等相顧失色大生怖懼將欲升天隱形者無力可能禁𠜨鬼神者呼策不應各懷愧恧南嶽道士費叔才自憾而死太傅張衍語褚信曰卿等所試無驗即是虛妄宜就西來真法褚信曰茅成子云太上者靈寶天尊是也造化之作謂之太素斯豈妄乎衍曰太素有貴德之名無言教之稱今子說有言教即為妄也信默然時佛舍利光明五色直上空中旋環如蓋遍覆大衆映蔽日光摩滕法師踊身高飛坐臥空中廣現神變于時天雨寶花在佛僧上又聞天樂感動人情大衆咸悅歎未曾有皆繞法蘭聽說法要并吐梵音歎佛功德亦令大衆稱揚三寶說善惡業皆有果報六道三乘諸相不一又說出家功德其福最高初立佛寺同梵福量司空陽城侯劉峻與諸官人士庶等千餘人出家四嶽諸山道士呂惠通等六百二十人出家陰夫人王婕妤等與諸宮人婦女二百三十人出家便立十寺七所城外安僧三所城內安尼自斯已後廣矣傳有五卷略不備載有人疑此傳近出本無角力之事案吳書明費叔才憾死故傳為實録矣後漢書郊祀志四出范曄漢書志曰佛者漢言覺也將以覺悟群生也統其教以修善慈心為主不殺生類專務清淨精進者為沙門漢言息心剔髮去家絶情洗欲而歸於無為也又以人死精神不滅隨復受形所行善惡後生皆有報應所貴行善以練其精神練而不已以至無生而得為佛也身長一丈六尺黃金色項中佩日月光變化無常無所不入故能化通萬物而大濟群生也有經書數千卷以虛無為宗包羅精粗無所不統善為宏闊勝大之言所求在一體之內所明在視聽之表歸依玄微深遠難得而測故王公大人觀生死報應之際無不懅然自失也魏書云其佛經大抵言生生之類皆因行業而起有過去當今未來三世也其修道階次等級非一皆緣淺以及深藉微以為著率在於積仁順蠲嗜欲習虛靜而成通照也云云吳主孫權論敘佛道三宗五出吳書孫權赤烏四年有康居國大丞相長子棄俗出家為沙門厥名僧會姓康氏神儀剛正遊化為任時三國鼎峙各擅威權佛法久被中原未達江表會欲道被未聞化行南國初達建鄴營立茅茨設像行道吳人初見謂為妖異有司奏聞吳主曰佛有何靈驗耶會曰佛晦靈迹垂餘千載遺骨舍利應現無方吳主曰若得舍利當為立塔經三七日遂獲舍利五色耀天剖之逾堅燒之不然光明出火作大蓮花照曜宮殿臣主驚嗟希有瑞也信情大發因為造塔度人立寺以其所住為佛陀里又以教法初興故名建初寺焉下敕問尚書令闞澤曰漢明已來凡有幾年佛教入漢既久何緣始至江東澤曰自漢明永平十年佛法初來至今赤烏四年則一百七十年矣初永平十四年五嶽道士與摩滕角力之時道士不如南嶽道士褚善信費叔才等在會自憾而死門徒弟子歸葬南嶽不預出家無人流布後遭漢政陵遲兵戎不息經今多載始得興行又曰孔丘李老得與佛比對不澤曰臣聞魯孔君者英才誕秀聖德不群世號素王制述經典訓獎周道教化來葉師儒之風澤閏今古亦有逸民知許成子原陽子莊子老子等百家子書皆修身自玩放暢山谷縱佚其心學歸淡泊事乖人倫長幼之節亦非安俗化民之風至漢景帝以黃子老子義體尤深改子為經始立道學敕令朝野悉諷誦之若以孔老二教比方佛法遠則遠矣所以然者孔老二教法天制用不敢違天諸佛設教天法奉行不敢違佛以此言之實非比對今見章醮似俗酒脯碁琴行之吳主大悅以澤為太子太傅云云宋文帝集朝宰論佛教六出高僧等傳文帝即宋高祖第三子也聰睿英博雅稱令達在位三十年嘗以暇日從容而顧問侍中何尚之吏部羊玄保曰朕少來讀經不多比日彌復無暇三世因果未辨措懷而復不敢立異者正以卿輩時秀率所敬信也茫泰謝靈運常言六經典文本在濟俗為政必求性靈真奧豈得不以佛理為指南耶近見顏延之折達性論宗炳難白黑論明佛法汪汪尤為名理並足開獎人意若使率土之濱皆敦此化則朕坐致太平矣夫復何事尚之對曰悠悠之徒多不信法以臣庸弊更荷褒拂非所敢當至如前代群英則不負明詔矣中朝已遠難復盡知渡江已來則王導周顗庾亮王濛謝尚郗超王坦王恭王謐郭文舉謝敷戴逵許詢及亡高祖兄弟及王元琳昆季范汪孫綽張玄殷覬等或宰輔之冠蓋或人倫之羽儀或置情天人之際或抗迹烟霞之表並稟志歸依措心崇信其間比對則蘭護開潛深遁崇邃皆亞迹黃中或不測之人也慧遠法師嘗云釋氏之化無所不可適道固自教源濟俗亦為要務竊尋此說有契理要若使家家奉戒則罪息刑清陛下所謂坐致太平誠如聖旨羊玄保進曰此談蓋天人之際豈臣所宜預竊謂秦楚論強兵之事孫吳盡吞併之術將無取於此也帝曰此非戰國之具良如卿言尚之對曰夫禮隱逸則戰士怠貴仁德則兵氣衰若以孫吳為志苟在吞噬亦無取堯舜之道豈惟釋教而已哉帝曰釋門有卿亦猶孔門之有季路所謂惡言不入於耳也自是文帝致意佛經及見嚴觀諸僧輒論道義屢延殿會躬御地筵同僧列飯時有沙門竺道生者秀出群品英義獨拔帝重之嘗述生頓悟義僧等皆設巨難帝曰若使逝者可興豈為諸君所屈時願延之著離識論帝命嚴法師辨其同異往返終日笑曰公等今日無愧支許之談也云云元魏孝明召佛道門人論前後七出魏書正光元年明帝加朝服大赦天下召佛道二宗門人殿前齊訖侍中劉騰宣敕請法師等與道士論議以釋弟子疑網時清通觀道士姜斌與融覺寺僧曇謨最對論帝曰佛與老子同時不斌曰老子西入化胡佛時以充侍者明是同時最曰何以知之斌曰案老子開天經是以得知最曰老子當周何王幾年而生周何王幾年西入斌曰當周定王即位三年乙卯之歲於楚國陳郡苦縣厲鄉曲仁里九月十四日夜子時生至周簡王四年丁丑歲事周為守藏吏簡王十三年遷為太史至敬王元年庚辰歲年八十五見周德陵遲與散關令尹喜西入化胡斯足明矣最曰佛以周昭王二十四年四月八日生穆王五十二年二月十五日滅度計入涅槃後經三百四十五年始到定王三年老子方生生已年八十五至敬王元年凡經四百二十五年始與尹喜西遁據此年載懸殊無乃謬乎斌曰若佛生周昭之時有何文記最曰周書異記漢法本內傳並有明文斌曰孔子既是制法聖人當時於佛逈無文記何耶最曰仁者識同管窺覽不弘遠案孔子有三備卜經謂天地人也佛之文言出在中備仁者早自披究不有此迷斌曰孔子聖人不言而知何假卜乎最曰惟佛是衆聖之王四生之首達一切含靈前後二際吉凶終始不假卜觀自餘小聖雖曉未然之理必藉蓍龜以通靈卦也侍中尚書令元乂宣敕語道士姜斌論無宗旨宜下席又問開天經何處得來是誰所說即遣中書侍郎魏收尚書郎祖瑩等就觀取經帝令議之太尉丹陽王蕭綜太傅李實衛尉許伯桃吏部尚書邢欒散騎常侍溫子升等一百七十人讀訖奏云老子止著五千文更無言說臣等所議姜斌罪當惑衆帝加斌極刑三藏法師菩提流支苦諫乃止配徙馬邑
