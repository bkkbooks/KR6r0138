body:
  text: 大唐西明寺沙門釋道宣撰四月八日讚佛詩東晉沃洲山沙門支道林三春迭云謝首夏含朱明祥祥令日泰朗朗玄夕清菩薩彩靈和眇然因化生四王應期來矯掌承王形飛天鼓弱羅騰擢散芝英緣瀾頹龍首漂蘂翳流冷芙蕖育紳葩傾柯獻朝榮芳津霧四境甘露凝玉瓶珍祥盈四八玄黃曜紫庭感隆非情想恬怕無所營玄根民靈府神條秀形名圓光朗東旦金姿豔春精含和總八音吐納流芳馨跡隨因儨浪心與太虛冥六度啟窮俗八解濯世纓慧澤融無外空同妄化情詠八日詩三首大塊揮冥樞昭昭兩儀映萬品誕遊華澄清凝玄聖釋迦乘靈會圓神秀機正交養衛恬和靈知溜性命動為務下尸寂為無中鏡真人播神化流渟良有因龍潛兜術邑漂景閻浮濱佇駕三春謝飛轡朱明旬八維披重靄九霄落芳津玄祇獻萬舞般遮奏伶倫淳白凝神宇蘭泉渙色身投步三才泰揚聲五道泯不為故為貴忘奇故奇神緬哉玄古思想託因事生相與圖靈器像也像彼形黃裳羅帕質元服拕緋青神為恭者惠跡為動者行虛堂陳樂餌蔚然起奇榮疑似垂巇微我諒作者情於焉遺所尚蕭心凝太清五月長齋詩炎精育仲氣朱離吐凝陽廣莫潛源變凱風乘和翔令月肇清齋德澤潤無疆四部欽嘉期潔己升虛堂靜晏和春暉夕惕厲秋霜蕭條詠林澤恬愉味城傍逸容研沖頤綵綵運宮商匠者握神標乘風吹玄芳淵汪道行深婉婉化理長亹亹維摩靈德音暢遊方罩牢妙傾玄絕致由近臧略略微容簡八言振道綱掇煩練陳句臨危折婉章浩若驚飈散冏若揮夜光寓言豈所託意得筌自喪霑濡妙習融靡靡輕塵亡蕭索情牖頹寥朗神軒張誰謂冥津遐一悟可以抗願為海遊師櫂柁入滄浪騰波滲漂客玄歸會道場八關齋詩序間與何驃騎期當為合八關齋以十月二十二日集同意者在吳縣土山墓下三日清晨為齋始道士白衣凡二十四人清和肅穆莫不靜暢至四日朝眾賢各去余既樂野室之寂又有掘藥之懷遂便獨住於是乃揮手送歸有望路之想靜拱虛房悟外身之真登山採集巖水之娛遂援筆染翰以尉二三之情八關齋詩三首建意營法齋里仁揳明疇相與期良晨沐浴造閑丘穆穆升堂賢皎皎清心修窈窕八關客無楗自綢繆寂默五習真亹亹糲心柔法鼓進三勸激切清訓流悽愴願弘濟闔堂皆同舟明明玄表聖應此童蒙求存誠夾室裏三界讚清休嘉祥歸宰相藹若慶雲浮三悔啟前朝雙懺暨中夕鳴禽戒朗旦備禮寢玄役蕭索庭賓離飄颻隨風適踟蹰岐路嵎揮手謝中析輕軒馳中田習習陵電擊息心投佯步零零振金策引領望征人悵恨孤思積咄矣形非我外物固已寂吟詠歸虛房守真玩幽賾雖非一往遊且以閑自釋靖壹潛蓬廬愔愔詠初九廣漠排林篠流飈灑隙牖從容遐想逸採藥登崇阜崎嶇升千尋蕭條臨萬畝望山樂榮松瞻澤哀素柳解帶長陵岐婆娑清川右冷風解煩懷寒泉濯溫手寥寥神氣暢欽若磐春藪達度冥三才恍惚喪神偶遊觀同隱丘愧無連化肘詠懷詩五首傲兀乘尸素日往復月旋弱喪困風波流浪逐物遷中路高韻溢窈窕欽重玄重玄在何許採真遊理間苟簡為我養逍遙使我閑寥亮心神瑩含虛映自然亹亹沈情去綵綵沖懷鮮踟蹰觀象物未始見牛全毛鱗有所貴所貴在忘筌端坐隣孤景眇罔玄思劬偃蹇牧神轡領略綜名書涉老咍雙玄披莊玩太初詠發清風集觸思皆恬愉俯欣質文蔚仰悲二匠徂蕭蕭柱下逈寂寂濛邑虛廓矣千載事消液歸空無無矣復何傷萬殊歸一塗道會貴冥想罔象掇玄珠悵怏濁水澄幾忘映清渠反鑒歸澄漠容與含道符心與理理密形與物物疎蕭索人事去獨與神明居晞陽熙春圃悠緬歎時往感物思所託蕭條逸韻上尚想天台峻髣髴巖䃈仰冷風灑蘭林管籟奏清響霄崖育靈藹神疎含潤長丹沙映翠瀨芳芝曜五爽苕苕重岫深寥寥石室朗中有尋化士外身解世網抱朴鎮有心揮玄拂無想隗隗形崖頹冏冏神宇敞宛轉無造化縹瞥隣人象願投若人蹤高步振策杖閑邪託靜室寂寥虛且真逸想流巖阿曚曨望幽人慨矣玄風濕皎皎離染沌時無問道睡行歌將何因靈溪無驚浪四岳無埃塵余將遊其嵎解駕掇飛輪芳泉代甘醴山果兼時珍脩林暢輕跡石宇庇微身崇虛習本照損無歸昔神曖曖煩情故零零仲氣新近非域中客遠非世外臣惔怕為無為孤哉自有隣坤基葩簡秀乾光流易頴神理速不疾道會無陵逞超超介石人握玄攬機領余生一何散分不諮天挺沈無冥到韻變不揚蔚炳冉冉年往逡悠悠化期永翹首希玄津想登故未正生塗雖十三日已造死境願得無身理道高冲默靖述懷詩二首翔鸞鳴崑崿逸志騰冥虛惚恍迴靈翰色肩棲南嵎濯足虧流瀾採練銜神疏高吟漱芳醴頡頏登神梧蕭蕭椅明翩眇眇育清軀長想玄運夷傾首俟靈符河清誠可期戢翼令人劬總角敦大道弱冠弄雙玄逡巡釋長羅高步尋帝先妙損階玄老忘懷浪濠川達觀無不可吹累皆自然窮理憎靈薪昭昭神火傳熙怡安冲漠優遊樂靜閑膏腴無爽味婉孌非雅弦恢心委形度亹亹隨化遷詠大德詩遐想存玄哉沖風一何敞品物緝榮熙生塗連惚怳既喪大澄真物誘則智蕩昔聞庖丁子揮戈任神往苟能嗣冲音攝生猶指掌乘彼來物間投此默照朗邁度推卷舒忘懷附罔象交樂盈胸衿神會流俯仰大同羅萬殊蔚若充甸網寄旅海軀鄉委化同天壤詠禪思道人孫長樂作道士坐禪之像并而讚之可謂因俯對以寄誠心求參焉於衡軛圖巖林之絕勢想伊人之在茲余精其制作美其嘉文不能默已聊著詩一首以繼于左其辭曰雲岑竦太荒落落英峊布迴壑佇蘭泉秀嶺攢嘉樹蔚薈微游𤢌崢嶸絕蹊路中有冲希子端坐摹太素自強敏天行弱志欲無去玉質陵風霜淒淒厲清趣指心契寒松綢繆諒歲暮會衷兩息間綿綿進禪務投一滅官知攝二由神遇承蜩累危丸累十亦凝注懸心無氣地妙研革麁慮冥懷夷震驚怕然肆幽度曾筌攀六淨空同泯七住逝虛乘有來永為有待馭詠山居五岳磐神基四瀆涌蕩津動求目方智默守標靜仁苟不宴出處託好有常因尋元存終古洞往想逸民玉潔其巖下金聲漱沂濱捲華藏紛霧振褐拂埃塵跡從道蠖屈道與騰龍伸峻無單豹伐分非首陽真長嘯歸林嶺蕭條任陶均念佛三昧詩集序晉廬山釋慧遠序曰夫稱三昧者何專思寂想之謂也思專則志一不分想寂則氣虛神朗氣虛則智恬其照神朗則無幽不徹斯二乃是自然之玄符會一而致用也是故靖恭閑守而感物通靈御心惟正動必入微此假修以凝神積功以移性猶或若夫尸居坐忘冥懷至極智落宇宙而闇蹈大方者哉請言其始菩薩初登道位甫闚玄門體寂無為而無弗為及其神變也則令脩短革常度巨細互相圍三光迴景以移照天地卷舒而入懷矣又諸三昧其名甚眾功高易進念佛為先何者窮玄極寂尊號如來體神合變應不以方故令入斯定者昧然忘知即所緣以成鑒明則內照交映而萬像生焉非耳目之所至而聞見行焉於是覩夫淵凝虛鏡之體則悟靈根湛一清明自然察夫玄音之叩心聽則塵累每消滯情融朗非天下之至妙孰能與於此哉以茲而觀一覿之感乃發久習之流覆豁昏俗之重迷若以匹夫眾定之所緣固不得語其優劣居可知也是以奉法諸賢咸思一揆之契感寸陰之頹影懼來儲之未積於是洗心法堂整襟清向夜分忘寢夙宵惟勤庶夫貞詣之功以通三乘之志臨津濟與九緣同往仰援超步拔茅之興俯引弱進垂策其後以此覽眾篇之揮翰豈徒文詠而已哉念佛三昧四言瑯瑘王齊之妙用在幽涉有覽無神由昧徹識以照麁積微自引因功本虛泯彼三觀亡此豪餘其一空漢河始理玄通微融然忘適乃廓靈暉心悠緬域得不踐機用之以沖會之以希其二神資天凝圓映朝雲與化而感與物斯群應不以方受者自分寂爾淵鏡金水塵紛其三慨自一生夙之慧識託崇淵人庶藉冥力思轉豪功在深在測至哉之念注心西極薩陀波倫讚密哉達人功玄曩葉龍潛九澤文明未接運通其會神疎其轍感夢魂交啟茲聖哲薩陀波倫入山求法讚激響窮山憤發幽誠流音在耳欣躍晨征奉命宵遊百慮同冥叩心在誓化乃降靈薩陀波倫始悟欲供養大師讚歸塗將啟靈關再闢神功難圖待損而益信道忘形歡不期適非伊哲人孰探玄策曇無竭菩薩讚亹亹淵匠道玄數盡譬彼大百川俱引涯不俟津塗無旋軫三流開源於焉同泯諸佛讚妙哉正覺體神以無動不際有靜不隣虛化而非變象而非摹映彼真性鏡此群麁法樂辭十二章齊王元長天長命自短世促道悠悠禪衢闊遠駕愛海亂輕舟累塵曾未極心樹豈能籌情埃何用洗正水有清流右歌本起百神肅以虔三靈晨且越恒曜揜芳霄薰風動蘭月丹榮藻玉墀翠羽文朱闕皓毳非虛來交輪豈徒發右歌靈瑞韶年春已仲明星夜未央千祀鍾休曆萬國命嘉祥金容涵夕景翠鬢佩晨光表塵維淨覺汎俗乃輪皇右歌下生襲氣變離宮重柝警層殿曼響感心神修容展驩宴生老終以縈病死行當薦方為淨國遊豈結危城戀右歌在宮春枝多病夭秋葉少欣榮心骸終委滅親愛暫時生長風吹北壟迅景急東瀛知三既情暢得一乃身貞右歌四遊飛策辭國門端儀偃郊樹慈愛徒相思中閨空怨慕風隸乖往塗駿足獨歸路舉袂謝時人得道且還去右歌出國明心弘十力寂慮通四禪青禽承逸軌文驪鏡重川鷲巖標遠勝鹿野究清玄不有希世寶何以導蒙泉右歌得道亭亭霄月流朏朏晨霜結川上不徘徊條間函渝滅靈智湛常然俯應有盈缺感運復來儀且厭人間紲右歌雙樹春山玉所府檀林芳所棲引火歸炎燧挹水自清隄菴園無異轍祇館有同躋比肩非今古接武豈燕齊右歌賢眾昔余輕歲月茲也重光陰閨中屏鉛黛闕下挂纓簪禪悅兼芳旨法憙忘清琴一異非能辨寵辱誰為心右歌學徒峻宇臨層穹苕苕疎遠風騰芳清漢裏響梵高雲中金華紛苒若瓊樹欝青葱貞心延淨境邃業嗣天宮右歌供具影響未嘗隔晦明殊復親弘慈迫已遠睿后扇高塵區中禔景福㝢外沐深仁萬祀流國祚億兆慶唐民右歌福應栖玄寺聽講畢遊邸園共七韻應司徒教齊王融道勝業茲遠心閑地能隙桂燎欝初裁蘭墀坦將闢虛檐對長嶼高軒臨廣液芳草列成行嘉樹紛如積流風轉還逕清煙泛喬石日泊山照紅松映水華碧暢哉人外賞遲遲春將夕述三教詩梁武帝少時學周孔弱冠窮六經孝義連方冊仁恕滿丹青踐言貴去伐為善在好生中復觀道書有名與無名妙術鏤金版真言隱上清密行遺陰德顯證在長齡晚年開釋卷猶月映眾星苦集始覺知因果方昭明不毀惟平等至理歸無生分別根難一執著性易驚窮源無二聖測善非三英大椿徑億尺小草裁云萌大雲降大雨隨分各受榮心相起異解報應有殊形差別豈作意深淺固物情梁昭明太子開善寺法會栖烏猶未翔命駕出山莊詰屈登馬嶺迴互入羊腸稍看原藹藹漸見岫蒼蒼落星埋遠樹新霧起朝陽陰池宿早雁寒風催夜霜茲地信閑寂清曠惟道場玉樹琉璃水羽帳欝金床紫柱珊瑚地神幢明月璫牽蘿下石隥攀桂陟松梁㵎斜日欲隱煙生樓半藏千祀終何邁百代歸我皇神功照不極叡鏡湛無方法輪明暗室慧海度慈航塵根久未洗希霑垂露光簡文望同泰寺浮圖遙看官佛圖帶璧復垂珠燭銀踰漢女寶鐸邁昆吾日起光芒散風吟宮徵殊露落盤恒滿桐生鳳引雛飛幡雜晚虹音絳畫鳥狎晨鳧梵世陵空下應真蔽景趨帝馬咸千轡天衣盡六銖意樂開長表多寶現全軀能令苦海渡復使慢山踰願能同四忍長當出九居王訓奉和副君坐飛觀城傍屬大林王門雖八達露塔復千尋重櫨出漢表曾栱冐雲心崑山雕潤玉麗水瑩明金懸盤同露掌插鳳似飛禽月落檐西暗日去柱東侵反流開睿屬搦翰動神衿願託牢舟友長免愛河深王臺卿奉和朝光正晃朗踊塔標千丈儀鳳異靈烏金盤代仙掌積栱承雕桷高檐挂珠網寶地若池沙風鈴如積響刻削生千變丹青圖萬象煙霞時出沒神仙乍來往晨霧半層生飛幡接雲上遊蜺不敢息翔鵾詎能仰讚善資哲人流詠歸明兩願假舟航末彼岸誰云廣庾信奉和𨔴𨔴陵太清照殿比東京長影臨雙闕高層出九城栱積行雲礙幡搖度鳥驚鳳飛如始泊蓮合似初生輪重對月滿鐸韻擬鸞聲畫水流泉注圖雲色半輕露晚盤猶滴珠朝火更明雖連博望苑還接銀沙城天香下桂殿仙梵入伊笙庶聞八解樂方遣六塵情簡文夜望浮圖上相輪光中辨垂鳳霧裏見飛鸞定用方諸水持添承露盤簡文賦詠五陰識支澆淳混神因因形復依色欲浪逐情飄愛網隨心織鑄金雖改狀斬籌方未極鴿觀既無辨猿攀此焉息劉綽賦詠百論捨罪福尋因途乃異及捨趣猶并苦極降歸樂樂極苦還生豈非輪轉愛皆錄封著情一一知心相渴樂法流清簡文蒙華林戒庸夫耽世樂俗士重虛名三空既難了八風恒易傾伊余久齊物本自一枯榮弱齡愛箕頴由來重伯成非為樂肥遁特是厭逢迎執珪守蕃國主器作元貞昔日書銀字久自恧宗英斯焉佩金璽何由廣德聲居高常慮缺持滿每憂盈茲言信非矯丹心良可明舟航奉睿訓接引降皇情心燈朗暗室牢舟出愛瀛是節高秋晚𣲽寥天氣清交門光景麗祈年雲霧生紅蕖間青瑣紫露濕丹楹葉疎行逕出泉溜遶山鳴綠衿依浦戍絳顙拂林征庶蒙八解蓋方使六塵輕脫聞時可去非吝捨重城簡文蒙預懺直疏并和五首皇情矜幻俗聖德愍重昏制書開攝受絲綸廣慧門時英滿君國法侶盛天園俱銷五道縛共蕩四生怨三修祛愛馬六念靜心猿庭深林彩艶地寂鳥聲喧上風吹法鼓垂鈴鳴畫軒新梅含未發落桂聚還翻早煙藏石隥寒潮浸水門一朝蒙善誘方願遣籠樊梁武帝和玉泉漏向盡金門光未成云云王筠應詔并序奉和皇太子懺悔詩仍上皇宸極聖旨即疏降同所用十韻私心慶躍得未曾有捃採餘韻更題鄙拙一聖智比明帝德光四海荷負誠攸屬度脫實斯在懺說齊蒙愚推心屏欺紿名僧引定慧朝纓列元凱還迷依善導反心由真宰和鈴混吹音勝幡縈雪彩早蒲欲抽葉新篁向舒䈚翹懃諒懇到歸誠信兼倍睿艶似煙霞闌干若珠琲善誘雖欲繼舍豪愧文彩昭明太子講席將訖賦三十韻依次用法苑稱嘉柰茲園美脩竹靈覺相招影神仙共栖宿慧義比瑤瓊薰染猶蘭菊理玄方十算功深似九築華水警銀舟方衢列金軸微言絕已久煩勞多累蓄因茲闡慧雲欲使心塵伏八水潤燋芽三明啟群目寶鐸旦參差名香晚芬郁暫捨六龍敬微祛二鼠蹙意樹發空花心蓮吐輕馥喻斯滄海變譬彼菴羅熟妙智方縟錦深辭同霧縠善學同梵爪真言異錮腹逶迤合蓋城葳蕤布金郁珠華蔭八溪玉流通九谷青禽乍下上雲雁飛翻覆高談屬勝時寡聞終自恧日麗鴛鴦瓦風度蜘蛛屋落蘤散遠香霏雲卷遙族曠濟同象園中乘如佇獨後焰難堅明初心易驚縮應當離華水無令乖漆木投巖不足貴棘林安可宿器月希留影心灰庶方撲視愛同採蜂遊善如原菽八邑仙人山四寶神龍澳藥樹永繁稠禪枝詎彫槭以茲悅聞道庶此優馳逐欲追露寶車脫屣親推轂簡文旦出興業寺講沐芳肅朝帶駕言祇淨宮羽旗承去影鐃吹雜還風吳戈夏服箭驥馬綠沈弓水照柳初碧煙含桃半紅由來六塵縛宿昔五纏矇見鶴徒知謬察象理難同方知恧四辯奚用語三空梁元帝和劉尚書侍五明集帝德洽區宇垂衣彰太平黃唐慚懋實子姒恧嘉聲治定陳五禮功成奏六英汲引留宸鑒舟航動睿情諸王惟一法無生信不生因因從此見果果自斯明元良仰副后含一震鴻名歸藏踰啟筮魯史冠春卿日宮佳氣滿月殿善風清綺錢敝西觀緹幔卷南榮金門練朝鼓玉壺休夜更宮槐留曉合城烏侵曙鳴露光枝上動霞影水中輕虛薄今何事徒知戀法城昭明太子鍾山解講陸倕和終南隣漢闕高掌跨周京復此虧天嶺穹隆距帝城當衢啟珠館臨下構山楹南望窮淮漵北眺盡滄溟步擔時中宿飛階或上征網戶圖雲氣龕室畫仙靈副君憐世網廣命萃人英道筵終後說鑾轡出郊坰雲峯響流吹松野映風旌睿心嘉杜若神藻茂琳瓊多謝先成敏空頒後乘榮蕭子顯奉和嵩岳基舊宇盤嶺跨南京叡心重禪室遊駕陟曾城金輅徐既動龍驂躍且鳴塗方後塵合地逈前笳清邐迤因臺榭參差憩羽旌高隨閬風極勢與元天并氣歇連松遠雲升秋野平徘徊臨井邑表裏見淮瀛折果尊常住渴慧在無生暫留石山軌欲知芳杜情鞠躬荷嘉慶瞻道聞頌聲劉孝綽和御鶴翔伊水策馬出王田我后遊祇鷲比事實光前翠蓋承朝景珠旗曳曉煙樓帳榮巖谷緹組曜林阡況在登臨地復及秋風年喬柯變夏葉幽㵎潔涼泉停鑾對寶坐辯論悅人天淹塵資海滴昭暗仰燈然法朋一已散笳劍儼將旋邂逅逢優渥託乘侶才賢摛辭雖並命遺恨獨終篇劉孝儀奉和韶樂臨東序時駕出西園雖窮禮遊盛終為塵俗喧豈如弘七覺揚鑾啟四門夜氣清簫管曉陣爍郊原山風亂彩眊初景麗文轅林開俞騎騁逕曲羽旄屯煙壁浮青翠石瀨響飛奔迴情下重閣降道放真源談空匹泉涌綴藻邁絃繁輕生逢過誤並作輦龍鵷顧己同偏爵何用挹衢樽八關齋夜賦四城門更作四首庾集五第一賦韻東城門病伏枕愛危光痾纏生易折無因雪岸草慮反邙山穴徐防消渴腠腸腑疼蹇嬰枝節如何促齡內憂苦無暫缺孔燾南城門老虛蕉誠易犯危藤復將囓一隨柯已微當年信長訣諸葛嵦已同白駒去復類紅花熱妍容一旦罷孤燈行自設君西城門死緩心雖已殊滅景寧優劣一隨業風盡終歸虛妄設王卿五陰誠為假六趣寧有截零落竟同歸憂思空相結李鏡遠北城門沙門俗幻生影空憂繞心塵噎於茲排四纏去矣求三涅殿下下學背流心方從窈冥別已悲境相空復作泡雲滅中庶府君第二賦韻東城門病空痾誠易愈有病故難痊徒知餌五色終當悲九泉王臺卿已無雪山草沈痗竟誰憐復悲淪苦海何由果淨天諸葛嵦南城門老昔類紅蓮草自翫淥池邊今如白花樹還悲明鏡前殿下壯心欲何在餘日乃西遷清罇不復樂蓬鬢豈還妍徐防西城門死高堂信逆旅壞業理常牽玉匣方委櫬金臺不復延中庶府君挽聲隨逕遠蘿影帶松懸詎能留十念唯應逐四緣君北城門沙門經行林樹下求道志能堅既有神通力振錫遠乘煙李鏡遠一登四弘誓至道莫能先不貪曠劫壽無論延促年孔壽第三東城門病纏痾緬百年自傷無五福長縈畫篋蛇不值仙人鹿殿下習染迷畫瓶臥起求栖宿羅襦豈再歡臨岐方土木中庶府君南城門老少年愛紈綺衰暮慚羅縠徒傷歲冉冉陳詩非郁郁王臺卿鶴髮辭軒冕鮐背烹葵菽松柏稍相依歡愛幾時睦李鏡遠西城門死追念平生時遨遊上苑囿一沒松柏下春光徒倏昱孔燾結根素因假枝葉緣骨肉自應螻蟻驅值此風刀逐諸葛嵦北城門沙門俗璽厭纏絲因田抽善穀長披忍辱鎧去此纖羅服徐防願引三塗眾俱令十使伏珠月猶沈首金錍未挑目君第四東城門病紫紈未可得漳濱徒再離一逢犬馬病賁育罷驅馳李鏡遠已無九轉術復闕萬金奇不看授鹽掌唯夢蓮花池君南城門老盛年歌吹日顧步惜容儀一朝衰朽至星星白髮垂孔燾已傷萬事盡復念九門枝乘軒意何在獨鏡坐如斯中庶府君西城門死一息於今罷平生詎可規天長曉露促千齡誰復知殿下華堂一相捨松帳杳難窺萬祀藏珠應千年罷玉羈徐防北城門沙門深心不可染正道亦難欹方除五欲累長辭三雅巵王少卿依空慮難靜習善路猶彌沒身竟靡託單盂詎待貲諸葛嵦正月八日然燈應令藕樹交無極華雲衣數重織竹能為象縛荻巧成龍落灰然蘂盛垂油濕畫峯天宮儻若見燈王願可逢簡文遊光宅應令陪遊入舊豐雲氣欝青葱紫陌垂清柳輕槐拂惠風八泉光綺樹四柱曖臨空翠網隨煙碧丹華共日紅方欣大雲溥慈波流淨宮梁簡文於幽縶中援筆自序云有梁正士簡陵蕭綱立身行己終始若一風雨如晦鷄鳴不已非欺暗室豈況三光數至於此命也如何又為連珠三首一曰吾聞有古富而今貧可稱多而賑寡是以度索樓下獨有衰神松柏橋南空餘白社二曰吾聞言可覆也仁能育物是以欲輕其死有德必昌兵踐於義無思不服三曰吾聞道行則五福俱泰運閉則六極所鍾是以麟出而悲豈唯孔子途窮則慟寧止嗣宗又為詩曰恍忽煙霞散颼飂松柏陰幽山白楊古野路黃塵深終無千月命安用九丹金闕里長蕪沒蒼天空照心十月弑於永福省年四十九崩崩時太清五年也宋謝靈運臨終詩龔勝無遺生季業有窮盡嵇叟理既迫霍子命亦殞凄凄後霜柏納納衝風菌邂逅竟既時脩短非所慜恨我君子志不得巖上泯送心正覺前斯痛久已忍唯願乘來生怨親同心朕沈隱侯臨終表臣約言臣抱疾彌留迄今即化形神欲離月已十數窮楚極毒無言以喻平日健時不言若此舉刀坐劍比此為輕仰惟深入法門厲茲苦節內矜外恕寔本人情伏願聖心重加推廣微臣臨塗無復遺恨雖漸也善庶等鳴哀謹啟陳沙門釋智愷臨終詩千月本難滿三時理易傾石火無恒焰電光寧久明遺文空滿笥徒然昧後生泉路方幽噎寒隴向淒清一隨朝露盡惟有夜松聲陳江總入攝山栖霞寺一首五言壬寅年十月十八日入攝山栖霞寺登崖極峭頗暢懷抱至德元年癸卯十月二十六日又再遊此寺布法師施菩薩戒甲辰年十月二十五日奉送金像還山限以時務不得恣情淹留乙巳年十一月十六日更獲禮拜仍停山中宿永夜留連棲神竦聽但交臂不停薪指俄謝率製此篇以記即目俾後來賞者知余此志焉靜心抱氷雪暮齒迫桑榆太息波川迅悲哉人世拘歲聿皆採穫冬晚具嚴枯濯流濟八水開襟入四衢茲山靈妙合當與天地俱石瀨乍深淺崖煙遞有無缺碑橫古𡑞盤木臥荒途行行備履歷步步轔崴紆高僧迹共遠勝地心相符樵隱各有得丹青獨不渝寺猶有朗詮二師居士明僧紹治中蕭眎素圖像遺風佇芳桂比德喻生芻寄言長往客悽然傷鄙夫至德二年十一月十二日界德施山齋三宿決定罪福懺悔四知無矯志三施啟幽心通簡避人物偃息還山林曲𡼏停騶響交枝落幰陰池臺聚凍雪欄牖噪歸禽石釆無新故峯形詎古今大車何杳杳奔馬遂駸駸何以修六念虔誠在一音未泛慈舟遠徒令願海深五言攝山栖霞寺山房夜坐簡徐祭酒周尚書并同遊群彥江令公澡身事珠戒非是學金丹月磴時橫枕雲崖宿解鞍梵宇調心易禪庭數息難石磵氷流靜山窓葉去寒君思北闕駕我惜東都冠翻愁夜鍾盡同志不盤桓徐孝克仰同令君攝山栖霞寺山房夜坐六韻戒檀青石路靈相紫金峯影進歸依鴿餐迎守護龍晨朝宣寶偈寒夜斂疎鍾鷄蘭靜含握仁智獨從容五禪清慮表七覺蕩心封願言於此處携手屢相逢陳主同江僕射遊攝山棲霞寺御製時宰磻溪心非關狎竹林鷲岳青松曉鷄峯白日沈天逈浮雲細山空明月深摧殘枯樹影零落古藤陰霜村夜烏去風路寒猿吟自可尋出俗詎是欲抽簪遊攝山棲霞寺禎明元年太歲丁未四月十九日癸亥入攝山展慧布法師憶謝靈運集還故山入石壁中尋曇隆道人有詩一首十一韻今此拙作仍學康樂體江令公𮦠霂時雨霽清和孟夏肇栖宿綠野中登頓丹霞杪敬仰高人德抗志塵物表三空豁已悟萬有一何小始終情所寄冥期諒不少荷衣步林泉麥氣涼昏曉乘風面泠泠音零候月臨皎皎煙崖憩古石雲路排征鳥披逕憐森沈攀條惜杳裊平生忘是非朽謝豈矜矯五淨自此涉七塵庶無擾靜臥栖霞寺房望徐祭酒江令公絕俗俗無侶修心心自齋連崖夕氣合虛宇宿雲霾臥藤新接戶欹石久成階樹聲非有意禽戲似忘懷故人市朝狎心期林壑乖唯憐對芳杜可以為吾儕徐祭酒孝克仰和令君上宰明四空迴車八道中洞涼容麥氣巖光對月宮香來詎經火花散不隨風㵎松無異聒禪桂兩分叢虛薄誠為累何因偶會同暫此乖山北猶可向牆東禎明二年仲冬攝山栖霞寺布法師某爾時終余以此月十七日宿昔入山仰為師氏營涅槃懺還途有此作可不同一貫生死亦一條況斯滅盡者豈是俗中要人道離群愴冥期出世遙留連入㵎曲宿昔步巖椒石溜氷便斷松霜日自銷向崖雲靉靆出谷霧飄颻勿言無大隱歸來即市朝庚寅年二月十二日遊虎丘山精舍縱棹憐迴曲尋山靜見聞每從芳杜性須與俗人分貝塔涵流動花臺編嶺芬蒙籠出檐桂散縵繞窓雲情幽豈徇物志遠易驚群何由狎魚鳥不願屈玄纁江令集云廬山遠法師未出家善弩射嘗於鶴窟射得鶴雛後復伺鶴母見將射之鶴不動詳觀之已死於窠中疑其愛子致死破視心腸皆寸絕法師於是放弩發菩提心宋初有法瓊尼南方人不知因緣所出辟穀食棗栗不著綿帛戒德甚尊嚴禪定多所感通會稽恭子張使君莅廣州便供養之隨使君還吳又隨出西自剋亡日捨命後勿關殮但以乞烏鳥至破岡如期而終使君依旨送林野間停舟七日七夕鳥獸不敢侵乃收殯焉亡祖親使君之第四女也就瓊尼受戒勅余記錄之陳江令往虎窟山寺塵中喧慮積物外眾情捐茲地信爽塏墟壟曖阡眠藹藹車徒邁飄飄旌眊懸細松斜繞逕峻嶺半藏天古樹無枝葉荒郊多野煙分花出黃鳥挂石下新泉蓊欝均雙樹清虛類八禪栖神紫臺上縱意白雲邊徒然嗟小藥何由齊大年治中王冏奉和美境多勝迹道場實茲地造化本靈奇人功兼製置房廊相映屬堦閤並殊異高明留睿賞清靜穆神思豫遊窮嶺歷藉此芳春至野花奪人眼山鶯紛可喜風景共鮮華水石相輝媚像法無塵染真僧絕名利陪遊既伏心聞道方刻意記室參軍陸𭁸奉和鷄鳴動睟駕㮈苑睠晨遊朱鑣陵九達青蓋出層樓歲華滿芳岫虹采被春州葆吹臨風遠旌羽映光浮喬枝隱修逕曲澗聚輕流徘徊花草合瀏湸鳥聲遒金盤響清梵涌塔應鳴桴慧雲方靡靡法水正悠悠實歸徒荷教信解愧難詶前臣刑獄參軍孔燾聖情想區外脂駕出西南前驅聞鳳管後乘躍龍驂爰遊非逸豫幽谷有靈龕兼覿息心者宴坐臨清潭禪食寧須稼雲衣不待蠶蘋荇緣㵎壑蘿葛蔓松楠鶯林響初囀春畦翠欲含惑心隨教遣法味與恩覃庶憑八解力永滅六塵貪州民前吏刑獄參軍王臺卿我王宗勝道駕言從所之輜軒轉朱轂驪馬躍青絲清渠影高蓋遊樹拂行旗賓徒紛雜沓景物共依遲飛梁通㵎道架宇接山基叢華臨逈砌分流繞曲墀誰言非勝境雲山獨在茲塵情良易遣道性故難緇承恩奉教義方當弘受持西曹書佐鮑至從駕虎窟山寺神心睠物序訪道絕塵囂林疎蓋影出風去管聲遙息徒依勝境稅駕止山椒年還節已仲野綠氣方韶短葉生喬樹疎華發早條遠峯帶雲沒流煙雜雨飄復茲承乏者頒名廁末僚願藉連河㵎庶影慧燈昭一知衣內寶方悲慈地饒陳從事何處士春日從將軍遊山寺蘭庭厭俗賞柰苑矚年華始入香山路仍逢火宅車慈門數片葉道樹一林華雖悟危藤鼠終悲在篋蛇別才法師於湘還郢北三首乘盃事將遠捧袂忽無聊南楚長沙狹西浮郢路遙離亭華已散別戍鳥新嬌明日分千里相思非一條敬詶解法師所贈道林俗之表慧遠廬之阿買山節高世乘杯且度河法雨時時落香雲片片多若為將羽化來濟在塵羅通士人篇龍宮既入道鳳闕且辭榮禪龕八想淨義窟四塵輕香蓋法雲起華燈慧火明自然忘有著非止悟無生陳沈炯從遊天中天寺應令福界新開草名僧共下延楊枝生拱樹錫杖呪飛泉石座應朝講山龕擬夜禪當非舍衛國賣地取金錢同庾中庶肩吾周處士弘讓遊明慶寺鷲嶺三層塔菴園一講堂馴烏逐飯磬狎獸繞禪床摘菊山無酒然松夜有香幸得同高勝於此瑩心王從駕經大慈照寺詩序北齊盧思道皇帝以上叡統天大明御極彈壓九代驅駕百王至德上通深仁下漏威稜西被聲教東漸布政合宮考儀大室張樂洞野會計苗山天不愛寶神靡遺貺鱗羽効異山澤薦祉華裔率從幽顯咸帙八政惟序六符告平猶且棲志窅冥凝神空寂俯陋區域顧遺形有救精民於苦器拯慾界於危城身心登淨樂之境生靈仰調御之力中宮厚德載物正位儷天道冠邵陵業踰莘姒慧雲朝起四生佇其寸合慈燈夜爇九服照其餘光乃睠參墟實惟唐舊山川周衛襟帶嚴逈東郊勝地爰搆寶坊儼若化成曖如踊出既而景躔西陸氣中南呂商颷振野白露戒寒聖主御辯巡方順時育物六龍進駕七聖齊軫翠華揚斾雕玉徐輪問百年而駐輦朝萬靈以案節熊渠欣飛之輩入參中壘虎殿金門之侶逈望屬車將屆下都遘茲淨域並悅鷲山之觀共喜龍宮之遊接足洒心俱展誠敬課虛引寂仍發詠歌雖事比擊轅義同叩角亦所以雍容盛烈述讚休美豈若臯朔文辭甫陳男祝王谷蟲篆纔譬女工作者二十六人其詞云爾玄風冠東戶內範軼西陵大川開寶匣福地下金繩繡栭高可映畫栱疊相承日馭非難假雲師本易憑陽室疑停燧陰軒類鑿氷逈題飛星沒長楣宿露凝旌門曙光轉輦道夕雲蒸山祇効靈物水若薦休徵虛薄叨恩紀微駈竊自凌優游徒可恃周賚永難勝五苦詩周沙門釋亡名生苦可患身為患生時憂共生心神恒獨苦寵辱橫相驚朝光非久照夜燭幾時明終成一聚土強覓千年名老苦少時欣日益老至苦年侵紅顏既罷豔白髮寧久吟階庭惟仰杖朝府不勝簪甘肥與妖麗徒有壯時心病苦拔劍平四海橫戈却萬夫一朝床枕上迴轉仰人扶壯色隨肌減呻吟與痛俱綺羅雖滿目愁眉獨向隅死苦可惜陵雲氣忽隨朝露終長辭白日下獨入黃泉中池臺既已沒墳壟向應空惟當松柏裏千年恒動風愛離誰忍心中愛分為別後思幾時相握手嗚噎不能辭雖言萬里隔猶有望還期如何九泉下更無相見時五盛陰附先去非長別後來非久親新墳將舊塜相次似魚鱗茂陵誰辯漢驪山詎識秦千年與昨日一種併成塵定知今世土還是昔時人焉能取他骨復持埋我身遊明慶寺詩地靈居五淨山幽寂四禪月宮臨鏡石華讚繞峯蓮霞暉間旛影雲氣合爐煙逈松高偃蓋瀑水細分泉含風萬籟響裛露百華鮮宿昔尋真趣結友亟留連山庭步靃靡㵎沚濯潺湲因斯事熏習便得息攀緣何言遂雲雨懷此悵悠然徒有南登望會逐東流旋詠懷詩陳張君祖運形不標異瀓懷恬無欲坐可栖王侯門可迴金轂風來詠逾清鱗萃淵不觸斯乃玄中子所以矯逸足何必翫幽閑清衿表離俗百齡苟未遐昨辰亦非促羲騰望舒映曩今迭相燭一世皆逆旅安悼電往速區區雖非黨兼忘混礫玉怪神罔叢穢要在夷心曲靈飈起情浪飛雲騰逆鱗苟擢南陽秀固集三造賓緬懷結寂夜味藻詠終晨近佇時無遘誰與拂流塵眇情奇極眄蕭條獨遨神相忘東溟裏何晞西潮津我崇道無廢長謠想義人遙遯播荊衡杖策憩南郢遭動委浪迹遇靖恬夷性柎卷從老話揮綸與莊詠遐眺獨緬想蕭神飈塵正時無喜惠偶絕韻將誰聽習子茂芳標有欣微音令頴敷凌霜蒨葩熙三春盛拂翮期霄翔豈與桑榆競我混不材姿遺情忘彫映雖非嶧陽椅聊以敲磬贈沙門竺法頵三首沙門竺法頵遠還西山作詩以贈因亦嘲之省其二經聊為之讚欝欝華陽岳絕雲枕飛峯峭壁溜靈泉秀嶺森青松懸巖廓崢嶸幽谷正寥籠丹崖栖奇逸碧室禪六通泊寂清神氣綿眇矯妙蹤止觀著無無還淨滯空空外物豈大悲獨往非玄同不見舍利弗受屈維摩公至人如影響靈慧陶億剎應方恢權化兆類蒙慈悅冥冥積塵寐永在巖底閉廢聰無通炤遺形不洞滅明哉如來降豁矣啟潛穴幽精淪朽壤孰若阿維察遙謝晞玄疇何為自矜潔邈邈慶城標峨峨浮雲嶺峻蓋十二嶽獨秀閻浮境丹流環方基瑤堂臨峭頂㵎滋甘泉液崖蔚芳芝頴翹翹美化倫眇眇凌巖正肅拱望妙覺呼吸晞齡永苟能夷冲心所憩靡不靜萬物可逍遙何必栖形影勉尋大乘軌練神超勇猛道樹經讚峨峨王舍國欝欝靈竹園中有神化長空觀體善權私呵晞光景豈識真迹端恢恢道明玄解發至神歡飄忽凌虛起無云受慧難三昧經讚迹超十二燒戒由三昧成賢行極妙住道志慧以明九本既殊動四禪不同冥淵哉不起滅始自無從生借問導氣倫安測泥洹靈詩序省贈法頵詩經通妙遠亹亹清綺雖云言不盡意殆亦幾矣夫詩者志之所之意迹之所寄也志妙玄解神無不暢夫未能冥達玄通者惡得不有仰鑽之詠哉吾想茂德之形容雖栖守殊塗標寄玄同仰代答之未足盡美亦各言其志也其辭曰庾僧淵答真朴運既判萬象森已形精靈感冥會變化靡不經波浪生死徒彌綸始無名捨本而逐末悔吝生有情胡不絕可欲反宗歸無生達觀均有無蟬蛻豁朗明逍遙眾妙津栖凝於玄冥大慈順變通化育曷常停幽閑自有所豈與菩薩并摩詰風微指權道多所成悠悠滿天下孰識秋露情張君祖茫茫混成始豁矣四天朗三辰環須彌百億同一像靈和陶煙熅會之有妙長大慈濟群生冥感如影響蔚蔚沙彌眾粲粲萬心仰誰不欣大乘兆定於玄曩三法雖成林居士亦有黨不見虬與龍灑鱗凌霄上冲心超遠寄浪懷邈獨往眾妙常所晞維摩余所賞苟未體善權與子同髴髣悠悠誠滿域所遺在廢想庾僧淵答遙望華陽嶺紫霄籠三辰瓊巖朗璧室玉潤灑靈津丹谷挺樛樹季頴奮暉薪融飈衝天籟逸響互相因鸞鳳翔迴儀虬龍灑飛鱗中有冲𭳉士耽道玩妙均高尚凝玄寂萬物忽自賓栖峙遊方外超世絕風塵翹想晞眇蹤矯步尋若人咏嘯舍之去榮麗何足珍濯志八解淵遼朗豁冥神研機通微妙遺覺忽忘身居士成有黨顧眄非疇親借問守常徒何以知反真煬帝謁方山靈巖寺隋后梵宮既隱隱靈岫亦沈沈平郊送晚日高峯落遠陰逈旛飛曙嶺疎鍾響晝林蟬鳴秋氣近泉吐石溪深抗迹禪枝地發念菩提心奉和方山靈巖寺應教諸葛頴名山鎮江海梵宇駕風煙畫栱臨松蓋鑿牖對峯蓮雷出階基下雲歸梁棟前靈光辨晝夜輕衣數劫年一陪香作食長用福為田正月十五日於通衢建燈夜升南樓一首隋煬帝法輪天上轉梵聲天上來燈樹千光照華焰七枝開月影凝流水春風含夜梅幡動黃金地鍾發琉璃臺奉和通衢建燈應教諸葛頴芳衢澄夜景法炬爛參差逐輪時徙焰桃華生落枝飛煙繞定室浮光映瑤池重閣登臨罷歌管乘空移捨舟登陸示慧日道場玉清玄壇德眾一首隋煬帝天淨宿雲卷日舉長川旦颯灑林華落逶迤風柳散孤鶴逝追群啼鶯遠相喚蓮舟水處盡畫輪途始半江各自遙東西並興歎已熏禪慧力復籍金丹扞有異三川遊曾非四門觀於焉履妙道超然登彼岸隋著作王胄臥疾閩越述淨名意余臥疾閩海彌留旬朔善友顒法師勸余以淨名妙典調伏身心力疾粗陳其意敬簡法師云爾客行萬餘里渺然滄海上五嶺常炎欝百越多山瘴兼以勞形神遂此嬰疲恙桐雷邈已遠砭石良難訪抱影私自怜霑衿獨惆悵毘城有長者生平夙所尚復藉大因緣勉以深迴向心路資調伏於焉念實相水沫本難摩乾城空有狀是生非至理是我皆虛妄求之不可得誰其受業障信矣大醫王茲力誠無量薛道衡展敬上鳳林寺淨土連幽谷寶塔對危峯林栖丹穴鳳地邇白沙龍獨巖樓逈出複道閣相重洞開朝霧斂石濕曉雲濃高篠低雲蓋風枝響和鍾簷陰翻細柳㵎影落長松珠柱浮明月蓮座吐芙蓉隱淪徒有意心迹未相從梁開善寺藏法師奉和武帝三教詩一首心源本無二學理共歸真四執迷叢藥六味增苦辛資緣良雜品習性不同循至覺隨物化一道開異津大士流權濟訓義乃星陳周孔尚忠孝立行肇君親老氏貴裁欲存生由外身出言千里善芬為窮世珍坦空非即有三明似未臻近識封岐路分鑣疑異塵安知悟云漸究極本同倫我皇體斯會妙鑒出機神眷言總歸轡迴照引生民顧惟慚宿殖邂逅逢嘉辰願陪入明解歲暮有攸因太宗文皇帝謁并州興國寺二首迴鑾遊福地極目翫芳晨梵鍾交二響法日轉雙輪寶剎遙承露天華近足春未珮蘭猶小無絲柳尚新圓光低月殿碎影亂風筠對此留餘想超然離俗塵文帝詠佛殿前幡唐后拂霞疑轉電騰虛狀寫虹屈申煙霧裏低舉白雲中紛披乍依逈掣曳或從風念茲輕薄質無翅強搖空常州弘善寺宣法師三首奉和竇使君同恭法師詠高僧二首竺佛圖澄大誓憫塗炭乘機入生死中州法既弘葛陂暴亦止乳孔光一室掌鏡徹千里道盛呪蓮華災生吟棘子埋石緣雖謝流沙化方始釋僧肇般若惟絕鑒涅槃固無名先賢未始覺之子唱希聲秦王嗟理詣童壽揖詞清徽音聞廬岳精難動中京適驗方袍裏奇才復挺生秋日遊東山寺尋殊曇二法師木落樹𢸳燥水清流㵳寂屬此悲哉氣復茲羈旅慼奚用寫繁憂山泉恣遊歷萬丈窺深㵎千尋仰絕壁傍嶺竹參差緣崖藤羃歷行行極幽邃去去逾空寂果值息心侶喬枝方挂錫圍遶悉旃檀純良豈砂礫妙法誠無比深經解怨敵心歡即頂禮道存仍目擊慧力幸已逢疑網於焉析豈直祛煩惱方期拯沈溺帝謁大慈恩寺一首并和唐今上日宮開百仞月殿聳千尋華蓋飛圓影幡紅曳曲陰霞綺遙瓏帳叢珠細網林寥廓煙雲表超然物外心大慈恩寺沙門和皇風扇祇樹至德茂禪林仙華曜日綵神幡曳遠陰綺殿籠霞影飛閣出雲心細草希慈澤恩光重更深
