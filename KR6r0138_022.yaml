body:
  text: 大唐西明寺沙門釋道宣撰法義篇第四之五佛知不異眾生知義沈休文佛者覺也覺者知也凡夫之與佛地立善知惡未始不同也但佛地所知者得善之正路凡夫所知者失善之邪路凡夫得正路之知與佛之知不異也正謂以所善非善故失正路耳故知凡夫之知與佛之知不異由於所知之事異知不異也凡夫之所知不謂所知非善在於求善而至於不善若積此求善之心會得歸善之路或得路則至于佛也此眾生之為佛性寔在其知性常傳也六道相續作佛義沈約一切種智與五道六趣眾生共有受知之分無分異也問曰受知非知耶答曰非也問此以何為體答曰相續不滅是也相續不滅所以能受知若今生陶練之功漸積則來果所識之理轉精轉精之知來應以至於佛而不斷不絕也若今生無明則來果所識轉闇轉闇之知亦來應以至於六趣也受知之具隨緣受知知之美惡不關此受知之具也問曰知非知既聞命矣受知受知自是相續不滅知自然因緣中來與此受知之具從理而相關答曰有此相續不滅自然因果中來有因有果何得無善無惡乎因緣義沈約凡含靈之性莫不樂生求生之路參差不一一爾流遷塗徑各異一念之間眾緣互起一因一果內有差忒好生之性萬品斯同自然所稟非由緣立固知樂生非因緣因緣非樂生也雖復俱宅形骸而各是一物一念既召眾緣眾緣各隨念起善惡二念誠有不同俱資外助事由一揆譬諸非水非土穀牙不生因緣性識其本既異因果不惑雖則必然善惡獨起亦有受礙雖云獨起起便成因內因外緣寔由乎此論形神沈約凡人一念之時七尺不復關所念之地凡人一念聖人則無念不盡聖人無已七尺本自若空以若空之七尺總無不盡之万念故能與凡夫異也凡人一念忘彼七尺之時則目廢於視足廢於踐當其忘目忘足與夫無目無足亦何以異哉凡人之暫無本實有無未轉瞬有已隨之念與形乖則暫忘念與心謝則復合念在七尺之一處則他處與異人同則與非我不異但凡人之暫無其無甚促聖人長無其無甚遠凡之與聖其路本同一念而暫忘則是凡品萬念而都忘則是大聖以此為言則形神幾乎或人疑因果相主毫分不差善惡之來皆有定業而六度所修咸資力致若修此力致復有前因因熟果成自相感召則力致之功不復得立六度所修幾於廢矣釋迦邁九劫勇猛所成勇猛之因定於無始本不資九安得稱起余以為因果情照本是二物先有情照却有因果情照既動而因果隨之未有情照因果何託因識二塗用合本異其本既異厥體不同情照別起於理非礙六度九劫差不足疑也神不滅論沈約含生之類識鑒相懸等級參差千累萬沓昆蟲則不逮飛禽飛禽則不逮犬馬昺明昭著不得謂之不然又人品以上賢愚殊性不相窺涉不相曉解燕北越南未足云匹其愚者則不辯菽麥悖者則不知愛敬自斯以上性識漸弘班固九品曾未概其萬一何者賢之與愚蓋由知與不知也愚者所知則少賢者所知則多而萬物交加群方緬曠情性曉昧理趣深玄由其塗求其理既有曉昧之異遂成高下之差自此相傾品級彌峻窮其原本盡其宗極互相推仰應有所窮其路既窮無微不盡又不得謂不然也且五情各有分域耳目各有司存心運則形忘目用則耳廢何則情靈淺弱心慮雜擾一念而兼無由可至既不能兼紛糺遞襲一念未成他端互起互起眾端復同前不相兼之由由於淺惑惑淺為病病於滯有不淺不惑出於兼忘以此兼忘得此兼照自凡夫至于正覺始惑於不惑不兼至能兼又不得謂不然也又昆蟲夭促含靈靡二或朝生夕殞或不識春秋自斯而進脩短不一既有其短豈得無長虛用損年善攝增壽善而又善焉得無之又不得謂之不然也生既可夭則壽不可無夭夭既無矣則生不可極形神之別斯既然矣然形既可養神寧獨異神妙形麁較然有辯養形可至不朽養神安得有窮養神不窮不生不滅始末相校豈無其人自凡及聖含靈義等但事有精麁故人有凡聖聖既長存在凡獨滅本同末異義不兼通大聖貽訓豈惑斯哉難范縝神滅論沈約來論云形即是神神即是形又云人體是一故神不得二若如雅論此二物不得相離則七竅百體無處非神矣七竅之用既異百體所營不一神亦隨事而應則其名亦應隨事而改神者對形之名而形中之形各有其用則應神中之神亦應各有其名矣今舉形則有四支百體之異屈申聽受之別各有其名各有其用言神惟有一名而用分百體此深所未了也若形與神對片不可差何則形之名多神之名寡也若如來論七尺之神神則無處非形形則無處非神矣刀則惟刃是利非刃則不受利名故刃是舉體之稱利是一處之目刀之與利既不同矣形之與神豈可妄合耶又昔日之刀今鑄為劍劍利即是刀利而刀形非劍形於利之用弗改而質之形已移與夫前生為甲後生為丙天人之道或異往識之神猶傳與夫劍之為刀刀之為劍有何異哉又一刀之質分為二刀形形已分矣而各有其利今取一牛之身而割之為兩則飲齕之生即謝任重之用不分又何得以刀之與利譬形之與神耶來論謂刀之與利即形之有神刀則舉體是一利形則舉體是一神神用於體則有耳目手足之別手之用不為足用耳之用不為眼用而利之為用無所不可亦可斷蛟蛇亦可截鴻雁非一處偏可割東陵之瓜一處偏可割南山之竹若謂利之為用亦可得分則足可以執物眼可以聽聲矣若謂刀背亦有利兩邊亦有利但未鍛而銛之耳利若遍施四方則利體無處復立形方形直並不得施利利之為用正在一邊毫毛處耳神之與形舉體若合又安得同乎刀若舉體是利神用隨體則分若使刀之與利其理若一則胛下亦可安眼背上亦可施鼻可乎不可也若以此譬為盡耶則不盡若謂本不盡耶則不可以為譬也若形即是神神即是形二者相資理無偏謝則身亡之日形亦應消而今有知之神亡無知之形在此則神本非形形本非神又不可得強令如一也若謂總百體之質謂之形總百體之用謂之神今百體各有其分則眼是眼形耳是耳形眼形非耳形耳形非眼形則神亦隨百體而分則眼有眼神耳有耳神耳神非眼神眼神非耳神也而偏枯之體其半已謝已謝之半事同木石譬彼僵尸永年不朽則此半之神亦應與此半同滅半神既滅半體猶存形神俱謝彌所駭惕若夫二負之尸經億載而不毀單開之體尚餘質於羅浮神形若合則此二士不應神滅而形存也來論又云歘而生者歘而滅者漸而生者漸而滅者請借子之衝以攻子之城漸而滅謂死者之形骸始乎無知而至于朽爛也若然則形之與神本為一物形既病矣神亦告病形既謝矣神亦云謝漸之為用應與形俱形始亡未朽為漸神獨不得以始末為漸耶來論又云生者之形骸變為死者之骨骼案如來論生之神明生之形骸既化為骨骼矣則生之神明獨不隨形而化乎若附形而化則應與形同體若形骸即是骨骼則死之神明不得異生之神明矣向所謂死定自未死也若形骸非骨骼則生神化為死神生神化為死神即是三世安謂其不滅哉神若隨形形既無知矣形既無知神本無質無知便是神亡神亡而形在又不經通若形雖無知神尚有知形神既不得異則向之死形翻復非枯木矣因緣無性論序陳沙門釋真觀泉亭令德有朱三議者非惟外學通敏亦是內信淵明常自心重大乘口誦般若忽著自然之論便成有性之執或是示同邪見或是實起倒心交復有損正真過傷至道聊裁後論以祛彼執雖復辭無足採而理或可觀若與余同志希共詳覽也性法自然論朱世卿寓茲先生喟然歎曰夫萬法萬性皆自然之理也夫惟自然故不得而遷貿矣故善人雖知善之不足憑也善人終不能一時而為惡惡人復以惡之不足誡也惡人亦不能須臾而為善又體仁者不自知其為善體愚者不自覺其為惡皆自然而然也坐右之賓假是大夫忽然作色而謂曰固哉先生之說也違大道而謬聖人之言先生曰大道誰主聖人何言大夫曰大道無主而無所不主聖人無言而無所不言先生曰請言其所言言性命之所由致乎請說其所主主善惡之報應乎大夫曰何為其不然也蓋天地扶大道之功以載育聖人合天地之德以設教序仁義五德以檢其心說詩書六藝以訓其業此聖人之言也若積善之家必有餘慶積不善之家必有餘殃故曰聖人無親常與善人六極序而降行懲五福陳而善心勸三世為將覩覆敗之權七葉修善有興隆之性陳賞寵而不侯邴昌疎而紹國斯道家之効也何先生言皆自然之理而不可遷貿者哉先生笑而應曰世所謂將繩之人繩盡而不知遷若大夫之徒是也敬課管陋為吾子陳之蓋二儀著而六子施百姓育而五材用用此句者隔萬法而盡然焉人為生最靈膺自然之秀氣稟妍蚩盈減之質懷哀樂喜怒之情挺窮達脩短之命封愚智善惡之性夫哀樂喜怒伏之於情感物而動窮達脩短藏之於命事至而後明妍蚩盈減著之於形有生而表見愚智善惡封之於性觸用而顯徹此八句者總人事而竭焉皆由自然之數無有造為之者夫有造為之者必勞有出入之者必漏有酬酢之者必謬此三者非造物之功也故墨子曰使造化三年成一葉天下之葉少哉蓋聖人設權巧以成教借事似以勸威見強勇之暴寡怯也懼刑戮之弗禁乃陳禍淫之威傷敦善之不勸也知性命之不可易序福善以獎之故聽其言也似若勿爽徵其事也萬不一驗子以本枝繁植斯履道之所致蒸嘗莫主由遺行之所招身居逸樂為善士之明報體事窮苦是惡人之顯戮孫叔少不埋蛇長無令尹之貴邴吉前無陰德終闕丞相之尊若然則天道以重華文命答𩨬叟之極愚以商均丹朱酬堯舜之至聖太伯三世無翫兵之咎而假嗣於仲虞漢祖七葉不聞篤善之行遂造配天之業箕稱享用五福身抱夷滅之痛孔云慶鍾積善躬事旅人之悲顏冠七十之上有不秀之旨冉在四科之初致斯人之嘆而商臣累王荊南冒頓世居塞北首山無解顏之鬼汨水有抱怨之魂康成以姓改鄉不濟小聖之禍王褒哀變隴木適受非妄之災二生居衛乘舟之痛誰罪三仁在亳剖心之酷何辜若乃側近邦畿密爾世代非墳籍所載在耳目之前者至有腹藏孟門之險心庫豺虺之毒役慮唯以害他為念行己必用利我為先錐刀推其尖銳谿訝其難滿而則百兩外榮千鍾內實優偃綺羅坐列甘膩鳴金綰玉富逸終身自有懷百璧而為衿鎣明珠而成性心不能行啟蟄之殺手不忍折方長之條懷殊材而莫採蓄美志而誰眄偏糅於冗雜之中見底於鄉閭之末抱飢寒而溘死與麋鹿而共埋享嘗寂寞孀孩無寄名字不聞湮沈電滅如斯可恨豈一人哉是知桀跖之凶殘無懼來禍之將及閔曾之篤行勿擬後慶之當臻故鶡冠子曰夫命者自然者也賢者未必得之不肖者亦未必失之斯之謂矣大夫曰若子引百家之言則列子之為名者必廉廉斯貧為名者必讓讓斯賤若然者則貧賤者立名之士所營而至也則富貴者貪競之徒所求而得也何名自然之數哉先生曰此乃一隅之說非周於理者也夫富貴自有貪競富貴非貪競所能得貧賤自有廉讓貧賤非廉讓所欲邀自有富貴而非貪求貧賤而不廉讓且子罕言命道藉人弘故性命之理先聖之所憚說善惡報應天道有常而關哉譬如溫風轉華寒飈颺雪有委溲糞之下有參玉階之上風颷無心於厚薄而華霰有穢淨之殊途天道無心於愛憎而性命有窮通之異術子聞于公待封而封至嚴母望喪而喪及若見善人便言其後必昌若覩惡人便言其後必亡此猶終身守株而冀狡兔之更獲耳大夫於是斂容而謝曰若僕者所執偏述而昧通途守狹近而矢遐曠今承音旨渙然蒙啟譬猶疎蜀伏尸歷萬古而忽悟中山沈醉未千朝而遽醒請事斯語以銘諸紳或問曰朱子託憑虛之談暢方寸之底論情指事深有趣焉但詳之先典有所未達夫人哀樂喜怒之情苞善惡之性資待之方不足於是爭奪之事斯興才識均者不能相御天生仁聖寔使司牧樂者聖人之所作禮者先王之所制三千之儀以檢其迹五音之和以導其心設爵以勸善懸刑以懲惡纖毫不漏酬酢如響玉帛云乎非無為所薦鼓鍾斯合豈自然而諧千科滿目靡非力用所構百貫參差悉由智思而造吾子湯武之臣隷周孔之學徒出入戶牖伏膺名教而云善人知善之不足憑也惡人知惡之不足誡也善不能招慶禍不能報惡是何背理之談也且𦒡翔蠕動猶知去就況人為最靈而同一自然之物此豈高厚之詩何取譬之非類情所未達敬待清酬答曰昔盧敖北遭荒土自傷足跡之未曠河宗東窺溟海方歎秋水之不多吾子習近成性未易可與談遠大者也今子以屈申俯仰心慮所為彫鏤剪琢身手所作禮樂者聖人之所作聖人者天地之所生請為吾子近取諸身則可以遠通諸物子以耳聞眼見足蹈手握意謂孰使之然身有痾疾冷熱皆不自知哀樂喜怒興廢安在何地有識者自知識之所在者乎有智者自知智之所存者乎若識遍身中傷身則識裂若智隨事起事謝則智滅果識不知識智不知智於是推近以達遠觸類而長之故知禮樂不自知其所由而制聖人不自知其所由而生兩像亦不知其所由而立矣於是殊形異慮委積充盈靜動合散自生自滅動靜者莫有識其主生滅者不自曉其根蓋自然之理著矣所謂非自然者乃大自然也是有為者乃大無為也子云天生聖人是使司牧何故唐虞疊聖加以五臣文武重光益以十亂豈天道之不能一其終始將末代貽咎於天地大舜大堯非欲生不肖之子龍逢比干豈樂身就誅割孔子歷聘栖遑卒云執鞭不憚顏稱回何敢死終使慈父請車彼三聖三仁可謂妙取捨矣天能令東海亢旱不如理孝婦之怨地能使高城復塹未若救杞梁之殞故榮落死生自然定分若聖與仁不能自免深味鄙句理存顯然因緣無性論陳真觀法師請疑公子致言於通敏先生曰夫二儀始判則庶類是依七曜既懸則兆民斯仰但生前死後繫象之所未明古往今來賢聖於焉莫究而希玄君子互騁鑽求慕理名人競加穿鑿㝢茲所說則盛辨自然假氏所明則高陳報應雖自然鋒鏑克勝於前報應干戈敗績於後而愚心難啟暗識易迷二理交加未知孰是通敏先生乃抵掌而對曰省二君之清論實各擅於偏隅自然則依傍於老莊報應則祖述於周孔可謂楚則已失而齊亦未為得也今為吾子揚搉而陳之夫三墳五典善惡之理未彰八索九丘幽明之路猶擁況復漆園傲吏怳忽狂生獨稱造化之宗偏據自然之性乃為一時之矯俗非關契理之玄謀今請問自然之本為何所趣有因果耶無因果乎若謂自然尚論因果則事同牟盾兩言相食愚人所笑智者所悲直置已傾不煩多難若謂永無報應頓絕因果則君臣父子斯道不行仁義孝慈此言何用便當造惡招慶為善致殃亦應鑽火得氷種豆生麥未見聲和響戾形曲影端者也若以放勳上聖而誕育於丹朱重華至德而出生於瞽叟便為自然而然者竊為足下不取焉夫至親之道乃曰天性而各隨行業曾不相關堯舜樹德於往生故稟茲靈智𩨬叟興惡乎前世故致此頑嚚而復共結重緣還相影發乃欲因凡顯聖以智化愚若無瞽叟之凶豈知克諧之美自非放勳之聖誰化慢遊之惡故阿難調達並為世尊之弟羅睺善星同是如來之胤而阿難常親給侍調達每興害逆羅睺則護珠莫犯善星則破器難收以此而觀諒可知矣若云各有自性不可遷貿者此殊不然至如鷹化為鳩本心頓盡橘變成枳前味永消昔富今貧定性之理難奪先貴後賤賦命之言何在呂望屠牛之士終享太師伊尹負鼎之人卒登丞相戴淵四隣所患後著高名周處三害之端晚稱令德闍王無間之罪翻然改圖育王莫大之愆忽能尊善若依自性之理豈容得有斯義善人唯應修善不可片時起惡惡人恒自起惡無容一念生善是則榮枯寵辱皆守必然愚智尊卑永無悛革豈其然乎決不然也又若以修德之人翻感憂戚行善之者反致沈淪以為自然之命亦不然也若行善而望報去善更遙修德以邀名離德逾遠若必挺珪璋之性懷琬琰之心本無意於名聞曾不欣乎富貴而英聲必孱雅慶方臻或可未值知音便同散木不逢別玉遂等沈泥暫且龍潛無虧鳳德豈容區區於天壤擾擾於世間自可固窮無煩殞穫至如太伯高讓而流芳千祀仲尼窮厄而傳名萬代顏稱早世特是命業不長冉致斯疾當由病因未斷二子伏誅彌顯衛靈之惡三仁受戮方見殷紂之愆首山之餓不免求名之責汨水之沈尚貽懷怨之咎且夫決定之業非神力之所救必應受報豈聖智而能禳並起昔因非今造也若謂屠割為務而永壽百齡盜竊居懷而豐財巨億以為定性而然者亦所未喻也斯由曩生片善感此命財今世重殃未招果報以其為罪既大受苦宜多所以且緩其誅宜縱其惡一朝禍盈釁積則便覆巢碎卵長歸鬲子泥犁永處無間地獄故書云惡不積無以滅身此之謂矣亦有見招果報事接見聞至如王莽篡逆則懸首斬臺董卓凶殘則曝屍都市晉侯殺趙朔感陷廁之悲齊主害彭生有墜車之痛夏祚顛覆桀之罪也殷宗殄喪紂之過焉故知因果之義陸離難准業報之理參差不定所謂生報現報及後報也請疑公子曰若以自然之計於義不可則報應之辨在言為得而前旨復云二君所述皆非契理未知此意可得而聞耶通敏先生曰子既慇懃屢請余亦僶俛相答但自省庸陋未申其要妙耳尋法本非有非有則無生理自非無非無則無滅無生無滅諸法安在非有非無萬物何寄蕩乎清淨推求之路斯斷夷然平等取捨之逕無從豈有報應之理可求善惡之想可得直以凡品眾生未了斯致故橫興諍論強生分別所謂渴人逐焰水在河池眼病見華空曾無樹但為引接近情祛其重惑微示因果略顯業緣使定性執除自然見弭若達乎正理悟此真法亦復何所而有何所而無哉於是二三君子相視心驚欣然領悟退席敬伏而言曰今者可謂朝聞夕死虛往實歸積滯皆傾等秋風之落葉繁疑並散譬春日之銷氷謹當共捨前迷同遵後業矣齊三部一切經願文魏收三有分區四生稟性共遊火宅俱淪欲海所以法王當洲渚之運覺者應車乘之期導彼沈迷歸茲勝地自寶雲西映法河東瀉甘露橫流隨風感授皇家統天尊道崇法拔群品於有待驅眾生於不二所以刻檀作繢構石彫金遍於萬國塵沙數等復詔司存有事緇素精誠踰於皮骨句偈盡於龍宮金口所宣總勒繕寫各有三部合若干卷用此功德心若虛空以平等施無思不洽藉我願力同登上果周經藏願文王褒年月日某和南云云蓋聞九河疏迹策縕靈丘四徹中繩書藏群玉亦有青丘紫府三皇刻石之文綠檢黃繩六甲靈飛之字豈若如來祕藏譬彼明珠諸佛所師同夫淨鏡鹿苑四諦之法尼園八犍之文香山巨力豈云能負以歲在昭陽龍集天井奉為云云奉造一切經藏始乎生滅之教訖於泥洹之說論議希有短偈長行青首銀函玄文玉匣凌陽餌藥止觀仙字關尹望氣裁受玄言未有龍樹利根看題不遍斯陀淺行同座未聞盡天竺之音窮貝多之葉灰分八國文徙罽賓石盡六銖書還大海仰願過去神靈乘茲道力得無生忍具足威儀又願國祚遐長臣民休慶四方內附萬福現前六趣怨親同登正覺寶臺經藏願文隋煬帝菩薩戒弟子楊廣和南仰惟如來應世聲教被物慇懃微密結集法藏帝釋輪王既被付囑菩薩聲聞得楊大化度脫無量以迄于今至尊拯溺百王混一四海平陳之日道俗無虧而東南愚民餘熸相煽爰受廟略重清海濱役不勞師以時寧復深慮靈像尊經多同煨燼結鬘繩墨湮滅溝渠是以遠命眾軍隨方收聚未及朞月輕舟總至乃命學司依名次錄并延道場義府覃思證明所由用意推比多得本類莊嚴修葺其舊惟新寶臺四藏將十萬軸因發弘誓永事流通仍書願文悉連卷後頻屬朝覲著功始畢今止寶臺正藏親躬受持其次藏以下則慧日法雲道場日嚴弘善靈剎此外京都寺塔諸方精舍而梵宮互有小大僧徒亦各眾寡並隨經部多少斟酌付授者既其懇至受者亦宜殷重長存法本遠布達摩必欲傳文來入寺寫勿使零落兩失無作前佛後佛諒同金口即教當教寧殊玉諜須彌山上眾聖共持金剛海底天龍盡護散在閻浮亦復如是追念繕造之者厥誠至隆心手勤到何量功德捨撤淨財豈可稱計所資甘雨用沃焦芽能生諸佛本是般若人能弘道非道弘人恕己深思即是自為今陳此意乃似執著若不開警則不深固自行化他備在經律顧循菲識誠愧通方因果相推何殊眼見豈不知獨善且最勝無為第一樂內典法奧自關眾僧何事區區橫相負荷但慶憑宿植生長王宮謁陛趨庭勗存遠大出受蕃寄每用祇兢非唯禮樂政刑一遵成旨而舟航運出彌奉弗墜無容棄稷卨而同園綺變菩薩而作聲聞越用乖方既其不可篤信受付竊敢當仁然五種法師俱得六根清淨而如說修行涅槃最近徒守經律不依佛戒口便說空心滯於有無上醫玉隨病逗藥開乳唅蘇為方既異甜冷苦熱取療亦殊譬前後教門別赴機性根莖枝葉受潤終齊總會津梁無不入道猶如問孝問仁孔酬雖別治身治國老意無乖殊途同歸一致百慮內外相融義同泯合何處有學毘曇而不成聖執黎耶即能悟真師子嚴鎧反貽毀於蠃貝象足至底翻取誚於蜂房心同劍戟諍踰水火經意論意都不如斯通經通論何因若此恐施甘露更成毒藥儻均味海則致醍醐聖御紺寶天飛金輪雲動納萬善於仁壽總一乘於普會開發含識濟渡群生今所傳經遍于宇內眾聖潛力必運他方共登菩提早證常樂則是弟子之申順弘誓於無窮平等坦然通遣唱白達識體之念隨喜也請御制經序表沙門玄奘言奘以貞觀元年往遊西域求如來之祕藏尋釋迦之遺旨總獲六百五十七部並以載於白馬以貞觀十八年方還京邑尋蒙勅旨令於弘福道場披尋翻譯今以翻出菩薩藏等經伏願垂恩以為經序惟希勅旨方布中夏并撰西域傳一部總一十二卷謹令舍人李敬一以將恭進無任悚息之至謹奉表以聞謹言勅答玄奘法師前表省書具悉來旨法師夙標高志行出塵表汎寶舟而登彼岸搜妙道而闢法門弘闡大猷盪滌眾罪是故慈雲欲卷舒之而蔭四空慧日將昏朗之而照八極舒朗之者其惟法師乎朕學淺心拙在物猶迷況佛教幽微豈能仰測請為經題者非己所聞又云新撰西域記者當自披覽勅奘尚重請經題序啟本闕三藏聖教序太宗文皇帝蓋聞二儀有像顯覆載以含生四時無形潛寒暑以化物是以窺天鑑地庸愚皆識其端明陰洞陽賢哲罕窮其數然而天地包乎陰陽而易識者以其有像也陰陽處乎天地而難窮者以其無形也故知像顯可徵雖愚不惑形潛莫覩在智猶迷況乎佛道崇虛乘幽控寂弘濟萬品典御十方舉威靈而無上抑神力而無下大之則彌於宇宙細之則攝於毫釐無滅無生歷千劫而不古若隱若顯運百福而長今妙道凝玄遵之莫知其際法流湛寂挹之莫測其源故知蠢蠢凡愚區區庸鄙投其旨趣能無疑惑者哉然則大教之興基於西土騰漢庭而晈夢照東域而流慈昔者分形分跡之時言未馳而成化當常現常之世民仰德而知遵及乎晦影歸真遷儀越世金容掩色不鏡三千之光麗象開圖空端四八之相於是微言廣被拯含類於三途遺訓遐宣導群生於十地然而真教難仰莫能一其指歸曲學易遵邪正於焉紛糺所以空有之論或習俗而是非大小之乘乍沿時而隆替有玄奘法師者沙門之領袖也幼懷貞慜早悟三空之心長契神情先苞四忍之行松風水月未足比其清華仙露明珠詎能方其朗潤故以智通無累神測未形超六塵而逈出敻千古而無對凝心內境悲正法之陵遲栖慮玄門慨深文之訛謬思欲分條析理廣彼前聞截偽續真開茲後學是以翹心淨土往遊西域乘危遊邁杖策孤征積雪晨飛途間失地驚砂夕起空外迷天萬里山川撥煙霞而進影百重寒暑躡霜雨而前蹤誠重勞輕求深願達周遊西宇十有七年窮歷道邦詢求正教雙林八水味道餐風鹿苑鷲峯瞻奇仰異承至言於先聖受真教於上賢探賾妙門精窮奧業一乘五律之道馳驟於心田八藏三篋之文波濤於口海爰自所歷之國總將三藏要文凡六百五十七部譯布中夏宣揚勝業引慈雲於西極注法雨於東陲聖教缺而復全蒼生罪而還福濕火宅之乾焰共拔迷途朗愛水之昏波同臻彼岸是知惡因業墜善以緣昇昇墜之端惟人所託譬夫桂生高嶺雲露方得泫其華蓮出淥波飛塵不能污其葉非蓮性自潔而桂質本貞良由所附者高則微物不能累所憑者淨則濁類不能沾夫以卉木無知猶資善而成善況乎人倫有識不緣慶而求慶方冀茲經流施將日月而無窮斯福遐敷與乾坤而永大謝勅齎經序啟沙門玄奘言竊聞六爻探賾局於生滅之場百物正名未涉真如之境猶且遠徵羲冊覩奧不測其神遐想軒圖歷選並歸其美伏惟皇帝陛下玉臺降質金輪御天廓先王之九州掩百千之日月斥列代之區域納恒沙之法界遂使給園精舍並入隄封貝葉靈文咸歸冊府玄奘往因振錫聊謁崛山經途萬里怙天威如咫尺匪乘千葉詣雙林如食頃搜揚三藏盡龍宮之所儲研究一乘窮鷲嶺之遺旨並以載乎白馬來獻紫宸尋蒙下詔賜使翻譯玄奘識乖龍樹謬忝傳燈之榮才異馬鳴深愧瀉瓶之敏所譯經論紕舛尤多遂荷天恩留神構序文超象繫之表若聚日之放千光理括眾妙之門同法雲之濡百草一音演說億劫罕逢無以微生親承梵響踊躍歡喜如聞受記無任忻荷之極謹奉表詣闕陳謝以聞謹言勅答謝啟朕才謝珪璋言慚博達至於內典尤所未閑昨製序文深為鄙拙惟恐穢翰墨於金簡標瓦礫於珠林忽得來書謬承褒讚循環省慮彌益厚顏善不足稱空勞致謝皇太子臣治述聖記三藏經序夫顯揚正教非智無以廣其文崇闡微言非賢莫能定其旨蓋真如聖教者諸法之玄宗眾經之軌䠱也綜括宏遠奧旨遐深極空有之精微體生滅之機要詞茂道曠尋之者不究其源文顯義幽履之者莫測其際故知聖慈所被業無善而不臻妙化所敷緣無惡而不剪開法網之網紀弘六度之正教拯群有之塗炭啟三藏之祕扃是以名無翼而長飛道無根而永固道名流慶歷遂古而鎮常赴感應身經塵劫而不朽晨鍾夕梵交二音於鷲峯慧日法流轉雙輪於鹿苑排空寶蓋接翔雲而共飛莊野春林與天花而合彩伏惟皇帝陛下上玄資福垂拱而治八荒德被黔黎斂衽而朝萬國恩加朽骨石室歸貝葉之文澤及昆蟲金匱流梵說之偈遂使阿耨達水通神甸之八川耆闍崛山接嵩華之翠嶺竊以法性凝寂靡歸心而不通智地玄奧感懇誠而遂顯豈謂重昏之夜燭慧炬之光火宅之朝降法雨之澤於是百川異流同會於海萬區分義總成乎實豈與湯武校其優劣堯舜比其聖德者哉玄奘法師者夙懷聰令立志夷簡神清齠齓之年體拔浮華之世凝情定室匿迹幽巖栖息三禪巡遊十地超六塵之境獨步迦維會一乘之旨隨機化物以中華之無質尋印度之真文遠涉恒河終期滿字頻登雪嶺更獲半珠問道往還十有七載備通釋典利物為心以貞觀十九年二月六日奉勅於弘福寺翻譯聖教要文凡六百五十七部引大海之法流洗塵勞而不竭傳智燈之長焰皎幽闇而恒明自非久植勝緣何以顯揚斯旨所謂法相常住齊三光之明我皇福臻同二儀之固伏見御製眾經序照古騰今理含金石之聲文抱風雲之潤治輒以輕塵足岳墜露添流略舉大綱以為斯記皇太子答沙門玄奘謝聖教序書治素無才學性不聰敏內典諸文殊未觀覽所作論序鄙拙尤繁忽見來書褒揚讚述撫躬自省慚悚交并勞師遠臻深以為愧金剛般若經注序亮若夫大塊均形役智從物情因習改性與慮遷然則達鑒窮覽皎乎先覺照慧炬以出重昏拔愛河而升彼岸與夫輪轉萬劫蓋染六塵流遁以徇無涯踳駁而趨捷徑豈同日而言也頴川庾初孫早弘篤信以為般若所明歸於正道顯大乘之名相標不住之宗極出乎心慮之表絕於言象之外是以結髮受持多歷年所雖妙音演說成誦不虧而靈源邃湛或有未悟嗟迷方之弗遠睠砥途而太息屬有慧淨法師博通奧義辯同炙輠理究連還庾生入室研幾伏膺善誘乘此誓願仍求註述法師懸鏡忘疲衢罇自滿上憑神應之道傍盡心機之用敷暢微言宣揚至理曩日舊疑渙焉氷釋今茲妙義朗若霞開為像法之梁棟變群生之耳目詞鋒秀上映鷲岳而相高言泉激壯赴龍宮而競遠且夫釋教西興道源東注世閱賢智才兼優洽精該睿旨罕見其人今則妙門重闡籍甚當世想此玄宗欝為稱首歲惟閹茂始創懷油月躔仲呂爰茲絕筆緇俗攸仰軒蓋成陰扣鍾隨其小大鳴劍發其光彩一時學侶專門受業同涉波瀾遞相傳授方且顧蔑林遠俯視安生獨步高衢對揚正法遼東真本望懸金而不刊指南所寄藏群玉而無朽豈不盛哉豈不盛哉金剛般若經集註序司元大夫隴西李儼字仲思撰夫以觀鳥垂文振宏規於八體泣麟敷典渙洪波於九流循其轍者不踰乎寰域涉其源者僅歸乎仁義孰若至聖乘時能仁昭法剖秋毫於十地總沙界而詮道釋春氷於一乘冠塵劫而流化若迺是相非相是空非空窅乎不測廓焉無象假名言以立體包權實而為用窮不照之照引重昏於夢境運無知之知導群迷於朽宅究其實相則般若為之宗矣自真容西謝像教東流香城徙築於綿區寶臺移構於中壤鱗萃羽集者咸徇其法雲褰霧廓法已悟其真至矣哉無得而稱也然此梵本至秦弘始有羅什三藏於長安城創譯一本名舍衛國暨於後魏宣武之世有流支三藏於洛陽城重翻一本名舍婆提江南梁末有真諦三藏又翻一本名祇樹林隋初開皇有佛陀耶舍三藏又翻一本名祇陀林大唐有玄奘三藏又翻一本名誓多林雖分軫揚鏕同歸至極而筌詞析義頗亦殊途然流支翻者兼帶天親釋論三卷又翻金剛仙論十卷隋初耶舍又翻無著釋論兩卷比校三論文義大同然新則理隱而文略舊則工顯而義周兼有秦世羅什晉室謝靈運隋代曇琛皇朝慧淨法師等並器業韶茂博雅洽聞耽味茲典俱為注釋研考祕賾咸騁異義時有長安西明寺釋道世法師字玄惲德鏡玄流道資素蓄伏膺聖教雅好斯文以解詁多門尋覈勞止未若參綜厥美一以貫之爰掇諸家而為集註開題科簡同銘斯部勒成三卷號為集註般若兼出義疏三卷玄義兩卷現行要用文理周悉庶使靈山積壤干天之峻彌高巨海納川浴日之波逾廣披文者畢窮其理講導者洞盡其性學侶無疲於倍功談客有同於兼採金口妙義掩二曜以長懸玉軸微言貫三才而靡絕豈止聲芬鷲嶺字韞龍宮而已哉與翻經大德等書太常博士柳宣歸敬偈歸敬曰昔能仁示現王宮假歿雙樹微言既暢至理亦弘剎土蒙攝受之恩懷生沾昭蘇之慧自佛樹西蔭覺影東臨漢魏寔為濫觴符姚盛其風彩自是名僧間出達士連鑣慧日長懸法輪恒馭開鑿之功始自騰顯弘闡之力仍資什安別有善開遠適羅浮圖澄近現趙魏粗言圭角未可縷陳莫不辯空有於一乘論苦集於四諦假銓明有終未離於有為息言明道方契證於凝寂猶執玄以求玄是玄非玄理因玄以忘玄或是玄義雖冥會幽塗事絕言象然攝生歸寂終籍筌蹄亦既立言是非鋒起如彼戰爭干戈競發負者屏氣勝者先鳴故尚降魔制諸外道自非辯才無畏答難有方則物輩喧張我等恥辱是故專心適道一意總持建立法幢祇植法鼓旗鼓既正則敵者殘摧法輪既轉能威不伏若使望風旗靡對難含膠而能闡弘三寶無有是處尚藥呂奉御入空有之門馳正見之路聞持擬於昔賢洞微侔於往哲其辭辨其義明其德真其行著已沐八解之流又悟七覺之分影響成教若淨名之詣菴園聞道必求猶善才之歸無竭意在弘宣佛教立破因明之疏若其是也必須然其所長如其非也理合指其所短今現僧徒雲集並是採石他山朝野俱聞呂君請益莫不側聽瀉瓶皆望盪滌掉悔之源銷屏疑忿之聚有太史令李淳風者聞而進曰僕心懷正路行屬歸依以實際為大覺玄軀無為是調御法體然皎日麗天寔助上玄運用賢僧闡法實裨天師妙道是所信受是所安心但不敢以黃葉為金山雉成鳳南郭濫吹淄澠混流耳或有異議豈僕心哉豈僕心哉然鶴林已後歲將二千正法既過末法初踐玄理欝而不彰覺道浸將湮落玄奘法師頭陀法界遠達迦維目擊道樹金流仍覩七處八會毘城鷲嶺身入彼鄉娑羅寶階目驗虛實至如歷覽王舍檀特恒河如斯等輩未易具言也加之西域名僧莫不面論波若東域疑義悉皆質之彼師毘尼之藏既奉持而不捨毘曇明義亦洞觀而為常蘇妬路既得之於聲明耨多羅亦剖斷於疑滯法無大小莫不韞之胸懷理無深淺悉能決之敏慮故三藏之名振旦之所推定摩訶之號乃羅衛之所共稱名實之際何可稱道然呂君學識該博義理精通言行樞機是所詳悉至於陀羅佛於稟自生知無礙辯才寧由伏習但以因明義隱所見不同猶觸象各得其形共器飯有異色呂君既已執情道俗企望指定秋霜已降側聽鍾鳴法雲既敷雷震希發但龍象蹴蹋非驢所堪猶緇服壼奧白衣不踐脫如龍種抗說無垢釋疑則苾芻悉曇亦優婆能盡輒附微志請不為煩若有滯疑望諮三藏裁決以所承稟傳示四眾則正道克昌覆障永絕紹隆三寶其在茲乎過此已往非復所悉弟子柳宣白答博士柳宣譯經釋明濬還述頌還述曰頃於望表預屬歸敬之詞其文煥乎何偉麗也詳其致誠哉豈不然歟悲夫愛海滔天邪山概日封人我者顛墜其何已恃慢結者漂淪而不窮至於六十二見爭翳薈而自處九十五道競扶服而無歸如來以本願大悲忘緣俯應內圓四智外顯六通運十力以伏天魔飛七辯而摧外道竭茲愛海濟稟識於三空殄彼邪山驅肖形於八正指因示果反本還源大矣哉悲智妙用無德而稱矣昔道樹登庸被聲教於百億堅林寢迹振遺烈於三千自佛日西傾餘光東照周感夜隕之瑞漢通宵夢之徵騰蘭炳惠炬於前澄什嗣傳燈於後其於譯經弘法神異濟時高論降邪安禪肅物緝頹綱者接武維絕細者肩隨莫不夷夏欽風幽明翼化聯華靡替可略而詳惟今三藏法師蘊靈秀出含章而體一味瓶瀉以贍五乘悲去聖之逾遠憫來教之多闕緬思圓義許道以身心口自謀形影相弔振衣擎錫尋波討源出玉關而遠遊指金河而一息稽疑梵宇探幽洞微旋化神州揚真殄謬遺筌闕典大備茲辰方等圓宗彌廣前烈所明勝義妙絕環中之中真性真空極踰方外之外以有取也有取喪其真統無求之無求蠧其實拂二邊之跡忘中道之相累遣未易洎其深重空何以臻其極要矣妙矣至哉大哉契之於心然後以之為法在心為法形言為教法有自明共相教乃遮詮表詮粹旨沖宗豈造次所能覼縷法師凝神役智詳正始末緝熙玄籍大啟幽關祕希聲應扣擊之大小廓義海納朝宗之巨細於是殊方碩德異域高僧伏膺問道蓄疑請益固已飲和滿腹莫測其淺深聆音駭聽孰知其遠近至於因明小道現比蓋微斯乃指初學之方隅舉立論之標幟至若靈樞祕鍵妙本成功備諸奧冊非此所云也呂奉御以風神爽拔早擅多能器宇該通夙彰博物弋獵開墳之典鉤深壞壁之書觸類而長應諸數術振風颷於辯囿摛光華於翰林驤首雲中先鳴日下五行資其筆削六位佇其高談一覽太玄應問便釋再尋象戲立試即成實晉代茂先漢朝曼倩方今蔑如也既而翱翔群略綽有餘功而能敬慕大乘夙敦誠信比因友生戲爾忽復屬想因明不以師資率己穿鑿比決諸疏指斥求非諠議於朝形於造次考其志也固已難加覈其知也誠為可惑此論以一卷成部五紙成卷研機三疏向已一周舉非四十自無一是自既無是而能言是疏本無非而能言非言非不非言是不是言是不是是是而恒非言非不非非非而恒是非非恒是不為非所非是是恒非不為是所是以茲貶失致惑病諸且據生因了因執一體而亡二義能了所了封一名而惑二體又以宗依宗體留依去體以為宗喻體喻依去體留依而為喻緣斯兩系妄起多疑迷一極成謬生七難但以鑽窮二論師已一心滯文句於上下誤字音之平去復以數論為聲論舉生成為滅成豈唯差離合之宗因蓋亦違倒順之前後又採鄙俚訛韻以擬梵本囀音雖廣援七種而只當一囀然非彼七所目乃是第八呼聲舛雜乖訛何從而至又案勝論立常極微數乃無窮體唯極小復漸和合生諸子微數則倍減於常微體又倍增於父母迄乎終已體遍大千究其所窮數唯成一呂公所引易繫辭云太極生二儀二儀生四象四象生八卦八卦生萬物云此與彼言異義同今案太極無形肇生有象元資一氣終成萬物豈得以多生一而例一生多引類欲顯博聞義乖復何所託設引大例生義似同若釋同於邪見深累如何自免豈得苟要時譽混正同邪非身之讐奚至於此凡所紕紊胡可勝言特由率己致斯狼狽根既不正枝葉自傾逐誤生疑隨疑設難曲形直影其可得乎試舉二三冀詳大意深疵繁緒委答如別尋夫呂公達鑒豈孟浪而至此哉示顯真俗雲埿難易楚越因彰佛教弘遠正法凝深譬洪爐非掬雪所投渤澥豈膠舟能越也太史令李君者靈府沈祕襟期遠邈專精九數綜涉六爻博考圖典瞻觀雲物鄙衛宏之失度陋竈之未工神無滯用望實斯在既屬呂公餘論復致間言以實際為大覺玄軀無為是調御法體此乃信薰修容有分證稟自然終不可成良恐言似而意違詞近而旨遠然天師妙道幸以再斯且寇氏天師崔君特廌共貽伊咎夫復何言雖謂不混於淄澠蓋已自濫金鍮耳惟公逸宇寥廓學殫墳素庇身以仁義應物以樞機肅肅焉汪汪焉擢勁節以干雲談清瀾而鎮地騰芳文苑職處儒林捃摭九疇之宗研詳二載之說至於經禮三百曲禮三千莫不義符指掌事如俯拾罇爼咸推其准的法度必待其雌黃遂令相鼠之詩絕聞於野魚麗之詠盈耳於朝惟名與實盡善盡美矣而誠敬之重稟自夙成弘護之心實惟素蓄屬斯諠議同恥疚懷故能投刺含膠允光大義非夫才兼內外照實隣幾豈能激揚清濁濟俗匡真耳昔什公門下服道者三千今此會中同聽者如市貧道猥以庸陋叨廁末筵雖慶朝聞然慚夕惕詳以造疏三德並是貫達五乘牆仞罕窺辭峯難仰既屬商羊鼓舞而霈澤必霑詞雷迅發恐無暇掩耳僉議古人曰一枝可以戢羽何煩乎鄧林黃洿足以沈鱗豈俟於滄海故不以愚懦垂逼課虛辭弗獲免粗陳梗概雖文不足取而義或可觀顧己庸疎彌增悚恧指述還答餘無所申釋明濬白重請三藏聖教序啟釋玄奘伏奉墨勅猥垂獎喻祇奉綸言精守震越玄奘業行空疎謬參法侶幸屬九瀛有截四海無虞憑皇靈以遠征恃國威而訪道窮遐冒險雖勵愚誠纂異懷荒寔資朝化所獲經論奉勅翻譯見成卷軸未有詮序伏惟陛下叡思雲敷天華景爛理包繫象調逸咸英跨千古以飛聲掩百王而騰實竊以神力無方非神思不足詮其理聖教玄遠非聖藻何以序其源故乃冒犯威嚴敢希題目宸睠冲邈不垂矜許撫躬累息相顧失圖玄奘聞日月麗天既分暉於戶牖江河紀地亦流潤於巖崖雲和廣樂不祕響於聾昧金璧奇珍豈韜彩於愚瞽敢緣斯理重以干祈伏乞雷雨曲垂天文俯照配兩儀而同久與二曜而俱懸然則鷲嶺微言假神筆而弘遠鷄園奧義託英詞而宣暢豈止區區梵眾獨荷恩榮亦使蠢蠢迷生方超塵累而已謹奉表奏以聞謹言勅遂許焉謂駙馬高履行曰汝前請朕為汝父作碑今氣力不如昔願作功德為法師作序不能作碑汝知之貞觀二十二年幸玉華宮追奘至問翻何經論答正翻瑜伽上問何聖所作明何等義具答已令取論自披閱遂下勅新翻經論寫九本頒與雍洛相兗荊楊等九大州奘又請經題上乃出之名大唐三藏聖教序於明月殿命弘文館學士上官儀對群僚讀之謝皇太子聖教序述啟釋玄奘玄奘聞七曜摛光憑高天而散景九河灑潤因厚地以通流是知相資之美處物既然演法依人理在無惑伏惟皇太子殿下發揮睿藻再述天文讚美大乘莊嚴實相珠迴玉轉霞爛錦舒將日月而聯華與咸英而合韻玄奘輕生多幸沐浴殊私不任銘佩奉啟陳謝謹啟僧行篇第五序曰夫論僧者六和為體謂戒見利及三業也是以道洽幽明德通賢聖開物成務則福被人天導解律儀則化垂空有並由式敬六和揚明三寶內蕩四魔之弊外傾八慢之幢遂使三千圍內咸稟僧規六萬遐年俱遵聲教非僧弘御孰振斯哉然則道涉窊隆岠百六之陽九塵隨信毀懷利用之安危通人不滯其開抑鄙夫有阻於時頌故使眾雜邪正布逼引之康莊心包明昧顯登機之衢術是知滿願之侶乘小道而攝生天熱之倫寄邪徒而化物擊揚覈於適道弘喻在於權謀未俟威容惟存離著若斯言之備則通於理行者也或不達者妄起異端若見左行謬僻濫惘彌甚莫思己之煩惑專憚彼之乖儀於即雷同荷冒坑殘夷滅下凡之例抱怨酷而消亡上聖之徒悼兇悖之安忍自古君人之帝殷鑒興亡之經開吞舟之宏網布容養之寬政闡仁風於㝢內坐致太平弘出處之成規饗茲大齎餘則察察糺舉背烹鮮之格言收羅咎失挹凝脂之密令及後禍作殃扇隄防莫開掩泣向隅斯須糜潰為天下之所笑也故集諸政績布露賢明或抗詔而立讜言或興論以詳正議或褒仰而崇高尚或銜哀而暢誄詞茲道可尋備于後列廣弘明集僧行篇第五之初諸僧誄行狀道士支曇諦誄東晉丘道護晉義熙七年五月某日道士支曇諦卒春秋六十有五嗚呼哀哉法師肇胤西域本生康居因族以國氏既伏膺師訓乃從法姓支徙于吳興郡烏程縣都鄉千秋里資金商之貞氣藉陽育之韶律胄遐方而誕秀協川嶽而稟神識情湛粹風宇明肅道致表於天期德範彰於素器貞悟獨拔群異不足以動其心至誠深固眾論莫能干其執是以超塵絕詣慧旨發於弱齡研微耽玄明道昭於歲暮故能振靈風於神境演妙化於季葉嗣清前哲穆道俗而歸懷焉遊涉眾方敷揚大業妙尋幽賾清言析微加以善屬文辭識賞參流固已諧契風勝領冠一時矣公之中年爰乃慨以城傍難置幽居為節且山水之性素好自然靜外之默體自天心於是謝緣人封遁迹巖壑乃考室于吳興郡故障之崑山味道崇化二十餘載其栖業所弘可以洗心滌𠫤筌象之美足以窮興永年於是晞宗歸仁者自群方而集欽風懷趣者不遠而叩津焉于時時望英豪多延請齋講公虛心應物不嘗以動止介懷推誠述義未始以道俗殊致其中抱壹之德又遐邇所推方將灑拂玄路絙維頹風超外妙梯擬轍玄蹤惜乎不永遘疾而終識者深云亡之痛悠情感惟良之悲蓋無爵而貴生榮死哀者此之謂矣雖至理冥一存亡定於形初玄識妙照骸器同於朽壤然而闕情期於欣戚之境未泯乎離會之心者亦何能不以失得為悲喜臨長岐而悽懷哉苟冥廢之難體寄筌翰以懷風援弱毫而舒情播清暉乎無窮乃作誄曰綿綿終古曖曖玄路妙緣莫叩長寐靡寤生滅紛紜動息舛互相驅百世季葉彌蠧永溺塵勞孰知其故至人乘運靈覺中肇未覩滄流井蛙無小大明融朗幽夜乃曉滅有歸空除闇即皦道洽無方仁被禽鳥昧者靡遺識者彌了超哉法師道性自然壹心絕俗祇誠重玄研微神鋒妙悟無間塵之所著在至斯捐累之所引秉之彌堅擺落塵羈振拕靈淵遼遼清雅肅肅貞韻汪汪其冲亹亹其進和而有慨異而不峻停心獨得標想千刃虛以應物無來不順汎遊弘化振響揚暉開道玄肆肇闢靈扉位制冥極剖析幽微忘懷善挹穆然靡違會通群方總之所歸遐抗頹綱闡固法闈緒此妙慧乃播神威幽境湛默人肆諠引閑邃易一華紛難泯公乃慨然中駕潛軫卜居川巖搆室林巘擯域外緣潛精內敏靡筌不服無微不盡蔚矣崑嶺崗阜丘墟連峯雲秀迴壑迂餘庭蔭蕭條階繞清渠翳然其遠蕭爾其虛眇眇玄風愔愔僧徒味道閑室寂焉神居心隨道親情與俗疎道固無孤德必有隣淵清引映業勝懷人晞風宗玄自遠來賓亦有衿期時來問津湛湛無窮日日王神林壤有謝道心常新聖逝言絕賢表義乖翳翳末運玄化將頹澹矣夫子道俗歸懷庶享遐年振此落維如何不弔棄世永辭儀景長歸逝矣不追有識深慟含情同悲嗚呼哀哉推昔綢繆驟淹信宿閑宴清宇藉卉幽谷或濯素瀨爰憩翠竹屢興名辰汎觴掇菊梨柚薦甘蒲筍為蔌賦詩詠言怡然偕足眷懷茲遊想之在目傷哉斯遇千載無復踐舊霑衿瞻墳悲哭嗚呼哀哉有必之無始則歸卒達人妙觀千齡一日昧者或應橫為凶吉邈矣法師夙反玄室累劫之勤不速而疾庶遘冥緣終會靈術妙行弗運寔深喪質情在未冥悵為自失寄懷毫素徽風載述嗚呼哀哉鳩摩羅什法師誄釋僧肇夫道不自弘弘必由人俗不自覺覺必待匠待匠故世有高悟之期由人故道有小成之運運在小成則靈津輟流期在高悟則玄鋒可詣然能仁曠世期將千載時師邪心是非競起故使靈規潛逝徽緒殆亂爰有什法師者蓋先覺之遺嗣也凝思大方馳懷高觀審釋道之陵遲悼蒼生之窮藹故乃奮迅神儀㝢形季俗統承洪緒為時城塹世之安寢則覺以大音時將晝昏乃朗以慧日思結頹綱於道消緝落緒於窮運故乘時以會錯枉以正一扣則時無互鄉再擊則𡾝𡻱歸仁于斯時也羊鹿之駕摧輪六師之車覆轍二想之玄既明一乘之奧亦顯是以端坐嶺東響馳八極恬愉弘訓而九流思順故大秦符姚二天王師旅以延之斯二王也心遊大覺之門形鎮萬化之上外揚羲和之風內盛弘法之術道契神交屈為形授公以宗匠不重則其道不尊故蘊懷神寶感而後動自公形應秦川若燭龍之曜神光恢廓大宗若羲和之出扶桑融冶常道盡重玄之妙閑邪悟俗窮名教之美言既適時理有圓會故辯不徒興道不虛唱斯乃法鼓重振於閻浮梵輪再轉於天北矣自非位超修成體精百鍊行藏應時其孰契於茲乎以要言之其為弘也隆於春陽其除患也厲於秋霜故巍巍乎蕩蕩乎無邊之高韻然隘運幽興若人云暮癸丑之年年七十四月十三日薨于大寺嗚呼哀哉道匠西傾靈軸東摧朝羲落曜寶岳崩頹六合晝昏迷駕九迴神關重閉三塗競開夜光可惜盲子可哀罔極之感人百其懷乃為誄曰先覺登遐靈風緬邈通仙潛凝應真冲漠叢叢九流是非競作悠悠盲子神根沈溺時無指南誰識冥度大人遠覺幽懷獨悟恬冲靜默抱此玄素應期乘運翔翼天路既曰應運宜當時望受生乘利形標奇相繈褓俊遠髫齓逸量思不再經悟不待匠投足八道遊神三向玄根挺秀宏音遠唱又以抗節忽棄榮俗從容道門尊尚素朴有典斯尋有妙斯錄弘無自替宗無擬族霜結如氷神安如嶽外疏彌高內朗彌足恢恢高韻可模可因愔愔冲德惟妙惟真靜以通玄動以應人言為世寶默為時珍華風既立二教亦賓誰謂道消玄化方新自公之覺道無不弘靈風遐扇逸響高騰廓茲大方然斯惠燈道音始唱俗網以崩癡根彌拔上善彌增人之寓俗其途無方統斯群有紐茲頹綱順以四恩降以慧霜如彼維摩跡參城坊形雖圓應神冲帝鄉來教雖妙何足以臧偉哉大人振隆圓德標此名相顯彼冲默通以眾妙約以玄則方隆般若以應天北如何運邅幽里冥剋天路誰通三塗誰塞嗚呼哀哉至人無為而無不為權網遐籠長羅遠羈純恩下釣客旅上摛恂恂善誘肅肅風馳道能易俗化能移時奈何昊天摧此靈規至真既往一道莫施天人哀泣悲慟靈祇嗚呼哀哉公之云亡時唯百六道匠韜斤梵輪摧軸朝陽頹景瓊岳顛覆宇宙晝昏時喪道目哀哀蒼生誰撫誰育普天悲感我增摧衂嗚呼哀哉昔吾一時曾遊仁川遵其餘波纂承虛玄用之無窮鑽之彌堅曜日絕塵思加數年微情末敘已隨化遷如可贖兮貿之以千時無可待命無可延惟身惟人靡憑靡緣馳懷罔極情悲昊天嗚呼哀哉武丘法綱法師誄宋釋慧琳元嘉十一年冬十一月辛未法綱法師卒嗚呼哀哉夫峭立方矯既傷於通任卑隨圓比又虧於剛絜山居協枯槁之弊邑止來囂湫之患酌二情而簡雙事者法師其有焉少遊華京長栖幽麓樂志入出乘情去來瀆厭人流就閑於木石欝寂丘壑求觀於物類人以為無特操我見其師誠矣天性膚敏陶漸風味從容情理賞託文義交遊敦亮盡之契進趣慕復永之道理身法服朱纓之累早絕抗趾神疆丹墀之閡夙判況乃桑門矯拂之跡徒倚伏之數者哉昔因邂逅傾蓋著交同以剪落夷契群萃布懷舒憤以寄當年遂携手遊梁比翼栖鄧飡風虛岫𭡑道玄津比樂齊讌千載一時自林傾鳥散奄忽盈紀子薄高柯予淪泥滓常冀曾卜索居之遇遂成梁高山海之別東瀾弗復西景莫收致盡川征歸骨曾丘嗚呼哀哉誄曰厥族氏殷寔湯之裔榮聲中微源流昭晰少遭閔凶宗無緦繐慈姑經營託是養衛爰逮三五聰韻特挺雙奇比秀偶羅齊頴志陋中區思擢神境脫落生延耽慕緣永既遵玄轍洞曉名跡仁義之外通非所惜室欲靡遂坐以會適弗依朱扉考卜巖壁來不濡足去不絕翮頡頏升萃進退損益予惡浮波爾能即心俱翔道澤同集德林齊拂和風共聆玄音自宮徂國在目在衿往化綿邈遺思沈吟亦既離逖天道明誓爾出舊山予反遐裔庶乘和運同蔭共憩寒灰弗烟落葉離綴睽願莫從子遂下世人之云亡風懷揜翳嗚呼哀哉玄冬凄烈江滸蕭條寒風颺幕飛霰入艘命有近止歸塗尚遙憫憫即盡寂寂哀號孤旅如均化無褒嗚呼哀哉懷遊居之虎丘悼冥滅之廬嶺惟採錄於中京念提携於番境情飄颻於雙巒思纏綿於兩省何綢繆兮無極心所存兮腷臆閱嚴冬兮已謝籍隆暑兮既息四運紛其邅迴情期窅以長匿苟來緣之匪亡眷生平以增惻嗚呼哀哉龍光寺竺道生法師誄宋釋慧琳元嘉十一年冬十月庚子道生法師卒於廬山嗚呼哀哉善人告盡追酸者無淺含理亡滅如惜者又深法師本姓魏彭城人也父廣戚縣令幼而奇之携就法汰法師改服從業天資聰懋思悟夙挺志學之年便登講座于時望道才僧著名之士莫不窮辭挫慮服其精致魯連之屈田巴項託之抗孔叟殆不過矣加以性靜而剛烈氣諧而易遵喜捨以接誘故物益重焉中年遊學廣搜異聞自楊徂秦登廬躡霍羅什大乘之趣提婆小道之要咸暢斯旨究舉其奧所聞日優所見踰賾既而悟曰象者理之所假執象則迷理教者化之所因束教則愚化是以徵名責實惑於虛誕求心應事芒昧格言自胡相傳中華承學未有能出斯域者矣乃收迷獨運存履遺跡於是眾經雲披群疑氷釋釋迦之旨淡然可尋珍怪之辭皆成通論聃周之申名教秀弼之領玄心於此為易矣物忌光頴人疵貞越怨結同服好折群遊遂垂翼斂趾銷影巖穴遵晦至道投跡愚公登舟之迹有往無歸命盡山麓悲興寰畿嗚呼哀哉泗汴之清呂梁之峻惟是淑靈育此明俊如草之蘭如石之瑾匪曰薰彫成此芳絢爰初志學服膺玄跡經耳了心披文調策弱而登講靡章不析善以約言弗尚辭㦎有識欽承厭是鉤賾中年稽教理洗未盡用是遊方求諸淵隱雖遇殊聞彌覺同近塗窮無歸迴轅改軫芟夷名疏闡揚事表何壅不流何晦不曉若出朝離其明昭照四果十住藉以汲矯易之牛馬莊之魚鳥孰徵斯實弗迷斯道淹留茲悟告予誨言道誠在斯群聽咸䊩不獨抵峙誚毀多聞予謂無害勸是宣傳識協貞誠見誨浮諠默蔭去大弭此騰口增栖或英敻逸篁藪遁思泉源無礙川阜庶乘閑託曰仁者壽命也有懸曾不永久蘭蓀速頹氣傷于偶嗚呼哀哉爰念初離三秋告暮風肅流清雲高林素送別南浦交手分路茫茫去止悽悽情顧孰在隱淪各從㳂沂惄是長乖異成永互嗚呼哀哉遡來風之絕響送行雲之莫因緬三冬其已謝轉獻歲於此春聽陽禽之悅豫矚神氣之熅烟念庠序於茲月信習業之嘉辰隱講堂之空覿惻高座之虛聞歎因事以矜理悲緣情以懷人嗚呼哀哉天道茫昧信順可推理不湮滅庶或同歸申夭可略情念可追短章無布聊以寫悲嗚呼哀哉曇隆法師誄謝靈運夫協理置論百家未見其是因心自了一己不患其躓而終莫相辨我若咸歎翻淪得拔竟知于誰冀行跡立則善惡靡徵欲聲名傳則薰蕕同歇然意非身之所挫期出命之所限者目所親覿見之若人矣惠心朗識發於髫辮生自稟華家嬴金帛加以巧乘騎解絲竹沫絕景於康衢弄絃管於華肆者非徒經旬涉朔彌歷年稔而已諒趙李之咸陽程鄭之臨邛矣既而永夜獨悟中飲興歎曰悲夫欣厭迭來終歸憂苦不杜其根於何超絕且三界迴沈諸天倏瞬況齊景牛山隋武企陰催促節物逼迫霜露推此願言伊何能久慨然有擯落榮華兼濟物我之志母氏矜其心姊弟申其操遂相許諾出家求道一身既然闔門離世妻子長絕歡娛永謝豈唯向之靡樂判之盛年終古恩愛於今仳別矣旅舟南遡投景廬嶽一登石門香鑪峰六年不下嶺僧眾不堪其深法師不改其節援物之念不以幽居自抗同學嬰疾振錫萬里相救余時謝病東山承風遙羨豈望人期頗以山招法師至止鄙人勞役前詩敘粗已記之故不重煩及中間反山成說欵盡遂獲接棟重崖俱挹迴㵎茹芝朮而共餌披法言而同卷者再歷寒暑非直山陽靡喜慍之容令尹一進已之色實明悟幽微祛滌近滯蕩去薄垢日忘其疾庶白首同居而乖離無象信順莫歸徵集何緣晚節羅釁遠見參尋至止阻閡音塵殆絕值暑遘疾未旬即化誠存亡命也此行頗實有由承凶感痛寔百常情紙墨幾時非以期名蓋欽志節追深平生自不能默已故投懷援筆其辭曰仰尋形識俯探理類採聲知律拔茅覩彙物以靈異人以智貴即是神明觀鑒意謂爰初在稚惠心夙察吐噏芳華懷抱日月如彼蘭畹風過氣越如彼天倪雲披光發求名約身規操束已儻或愚世曾未近似生以意泰意管生理孰是歡慰程鄭趙李家畜金繒才練藝技驤首揮霍繁弦綺靡酒酣調促意妍服侈朝迫景曛夕忌星徙悠悠白日凄凄良夜年往歡流厭來情捨苦樂環迴終卒代謝棄而更適生速名借誰能易奪何術推移精粗渾濟善惡參差即心有限在理莫規試覈眾肆庶獲所窺道家躓近群流缺遠假名恒誰傍義豈反獨有兼忘因心則善傷物沈迷羨彼驅遣變服京師振錫廬頂長別榮冀永息幽嶺捨華襲素去繁就省人苦其難子取其靜昏之視明即愚成絕智之秉情對理斯涅吝既弗祛滯亦安拔子之矜之為爾苦節節苦在己利貞存彼以明闇逝以慈累徙欲以援物先宜濟此發軫情違終然理是梁鴻携妻荷蓧見子鷄黍接人行歌通已於世曰高於道殊鄙殆見法師獨絕神理形壽易盡然諾難判乘心即化棄身靡歎懷道彌厲景命已晏矜物辭山終息旅館嗚呼哀哉魂氣隨之延陵已了鳶螻同施漆園所曉委骸空野豈異豈矯幸有遺餘聊給蟲鳥嗚呼哀哉緬念生平同幽共深相率經始偕是登臨開石通㵎剔柯疏林遠眺重疊近屬嶇嶔事寡地閑尋微探賾何句不研奚疑弗析帙舒軸卷藏拔紙襞問來答往俾日餘夕沮溺耦耕夷齊共薇跡同心歡事異意違承疾懷灼聞凶滿悲孰云不痛零淚霑衣嗚呼哀哉行久節移地邊氣改終秋中冬踰桂投海永念伊人思深情倍俯謝常人仰愧無待嗚呼哀哉廬山慧遠法師誄宋謝靈運道存一致故異代同輝德合理妙故殊方齊致釋公振玄風於關右法師嗣沫流于江左聞風而悅四海同歸爾乃懷仁山林隱居求志於是眾僧雲集勤修淨行同法飡風栖遲道門可謂五百之季仰劭舍衛之風廬山之㟪俯傳靈鷲之音洋洋乎未曾聞也予志學之年希門人之末惜哉誠願弗遂永違此世春秋八十有四義熙十三年秋八月六日薨年踰縱心功遂身亡有始斯終千載垂光嗚呼哀哉乃為誄曰於昔安公道風允被大法將盡頹綱是寄體靜息動懷真整偽事師以孝養徒以義仰弘如來宣揚法雨俯授法師威儀允舉學不闚牖鑒不出戶粳糧雖御獨為萇楚朗朗高堂蕭蕭法庭既嚴既靜愈高愈清從容音旨優遊儀形廣運慈悲饒益眾生堂堂其器亹亹其資總角味道辭親隨師供養三寶析微辯疑盛化濟濟仁德怡怡於焉問道四海承風有心載馳戒德鞠躬令聲續振五濁暫隆弘道讚揚彌虛彌冲十六王子孺童先覺公之出家年未志學如彼鄧林甘露潤澤如彼瓊瑤既磨既琢大宗戾止座眾龍集聿來胥宇靈寺奚立舊望研機新學時習公之勗之載和載輯乃修什公宗望交泰乃延禪眾親承三昧眾美合流可久可大穆穆道德超於利害六合俱否山崩海竭日月沈輝三光寢晰眾麓摧柯連波中結鴻化垂緒徽風永滅嗚呼哀哉生盡冲素死增傷悽單蟄土槨示同斂骸人天感悴帝釋慟懷習習遺風依依餘凄悲夫法師終然是栖室無停響除有廣蹊嗚呼哀哉端木喪尼哀直六年仰慕洙泗俯憚蹄筌今子門徒實同斯難晨掃虛房夕泣空山嗚呼法師何時復還風嘯竹柏雲藹巖峯川壑如丘山林改容自昔聞風志願歸依山川路邈心往形違始終銜恨宿緣輕微安養有寄閻浮無希嗚呼哀哉若邪山敬法師誄宋張暢夫待物而遊致用生外道來自我懷抱以歡故晦寶停璞導兼車以出魏鸞逸雲緒豈增軒以入衛是以士之傲俗尚孤其道幽居之民無悶高獨吾每宣書夙流照爛故已跋予感詠身心不足若乃冲獨之韻少歲已高絕嶺之氣早志能遠初憩駕廬山年始勝髮緬邈之志直已千里乃求剃形就道忘家入法時沙門釋慧遠雖高其甚高以其尚幼未之許也遂乃登孔㵎首太羊臨虛投地之險以身易志法師乃奇而納焉冑翔華胤業集素履勁露未嚴先風苦節同學不勝其勞若人不改其操于時經藏始東肆業華右遂扣塗萬里屢遊函洛定慧相曉致用日微羅什既亡遠公沈世乃還迹塞門屏居窮岫其不出意若邪山之者於茲二十餘年矣余叔謝病歸身惟風停想法師乘感來遊積席談晏清榭竟言不別而別故已默語交達而動靜虛員矣徵士戴顒秀調宣簡神居共逸風理交融乃倚岫成軒停林啟館即此人外因心會友西河方浪東山已隤風雲既盡草木餘哀心之憂矣淚合無開嗚呼哀哉乃為作誄曰在尚尚王歌鳳伊洛逸路翔雲高軒鳴鶴靈源世流幽人代作歸來之子跨古逢運結𨅊承風遵途襲問緯玉則溫經金斯振歲學尚幼年盈數始令德既軒其秀唯起鋒頴萬代風標千里情愛相輕家國如草達矣哲人獨肆玄寶總駕七覺飛案八道三江多靜湛勝廬山地去萬物軌跡停玄遼遼清慧結宇承烟前驅群有首路人天吾生製融集彼清風業流善會情竦妙同白日春上素月秋中方寸無底六合可窮卓彼羅什三界特秀真俗冠冕神道領袖若人對響承車即𨅊沙漠織寒長風負雪投袂氷霜攬裾暮節誰斯問津悠焉在哲莊衿老帶孔思周情百時如一京載獨開胸地既滿顧惟糟魄移此無生悽居樹席妙入環中道出形上所謂伊人玄途獨亮智虛于情照實其相生住無住異壞相尋羅什就古慧遠去今匠石何運伯牙罷音殷憂逃遁昔還爾心東巖解迹削景若邪早帳風首春席雲阿流庭結草澓渚含波月軒東秀日落西華情步不辭寢興高絕白雲臨操清風練節經綸五道提衡六趣四諦歸想三乘總路生滅在法諸行難常哲人薪盡舊火移光白日投晦中春起霜嗚呼哀哉昔余紈髮早讌清衿送志悲歲迎韻者心家貧親老耕而弗飽就檄追歡身素孤夭既隔于形徒通以道自我從病高榭東山明月途靜白雲路閑承松吐嘯風上舒言咨予戴矦風居涼峻佇館伊人流心酌韻如何高期隔成幽顯五弦喪弄三𨢩誰醆嗚呼哀哉山泉同罷松竹哀涼秋朝霜露寒夜嚴長嗚呼哀哉孤猨將思旅雁聲時廣開性品無情者誰連臺成草比館唯悲存亡既代物色長衰嗚呼哀哉蒼生失御萬物無歸陰爽就夜重陽頓暉嗚呼哀哉伊四望之茫茫愴余心之悄悄雖淚至之有端固憂來其無兆隱於靳反長思以歎悲諒縱橫於言表嗚呼哀哉新安寺釋玄運法師誄南齊釋慧林維建武四年五月八日甲午沙門釋玄運右臥不興神去危城嗚呼哀哉法師本譙邦右族寓于燉煌幼稟端明仁和之性長樹弘懿冲閑之德真粹天挺夙鑒道勝乃遺擯俗纏超出塵礙濯景玄津栖習法道率由儀律之絕精學體微之妙潛仁晦名之行散畜忘相之施無德而稱者日夜而茂焉敷說架乎當時理思冠乎中世鑽仰之徒自遠而來虛至實歸遍于轍跡帝后儲貳之尊藩英鼎宰之重莫不揖道宗師瞻猷結敬而宏量邃奧不以貴賤舛其顧眄夷整淵深不以寒暑品其懷抱所以括綜像末崇振頹流者法師其人矣啟訓之緣有限負手之歌會終風火告徵愈恬明於危識靈聖滅現屢恭悅於告漸春秋六十九嗚呼哀哉外稟哽識內諮慟魂慕題往迹行寔浮言迺作誄曰世滯悠曠苦海遐長慾蓋修掩愛網宏張法燈不耀慧日霾光朽宅燔仆炎火浮揚二儀構毀算其有歲三轉廓遼空劫誰計從冥詎曉淪川莫濟接踵既疎寔資命世日誕明哲降靈自緣涵徵蘊器有表孩年神幾幼澈凝鑒早宣猶玉初瑩若珠啟泉疵厭塵濁超悟玄微訣捨愚縛澄翦情違齠年植節草歲從師承規檢敬肅範儀威秉躬淳絜淑慎心行學辨祕源問窮理敻前隱用照往疑斯鏡匠佚功倍思高業盛爰洎中歲綽奧宏廣輪演法空雲滌日朗乘衢若夷權開似敞悠悠品類式是宗仰右河振聞左江標秀聲因德宣稱緣道富提獎詢求悅懌研授仁厚猶地志高如岫輟飡赴嗛捨纊矜寒蓄無停日財以施單寧賤傲色匪貴愉顏湛茲懿慶均彼籍蘭教之所洽晦識斯明智之所誘務以心成接惛茂貨撫迷諒情憑微請要莫不咸亨險路恒遠開引有極生滅相禪念念匪息徂年寡留西光遽逼雲變豈停將運淨域嗚呼哀哉體深病苦慮達四疾鍼石醫巫分劑貶失端情法旅正想慈律不捨勇勤誓拯群墜嗚呼哀哉合既終離假會應謝同悲素林寂然中夜談人勗善瞻天儼駕即彼紺宮去此塵舍嗚呼哀哉絕微言於永沒毀舟航於遐澨挨崇塵之嚴華蕪峻堂之雕麗捨形有其若遺遷情靈其何界資訓仰兮眷徒空血淚兮感逝嗚呼哀哉南齊安樂寺律師智稱法師行狀闕撰人法師諱智稱其先日某郡某氏挹汾澮之清源稟河山之秀質蓄靈因於上業成慧性於閻浮直哉惟清爰初夙備溫良恭儉體以得之然天韻真確含章隱曜沈漸人群莫能測其遠邇蓋由徑寸之華韜光濬壑盈尺之寶未剖聯城監觀者罔識其巨麗逖聽者弗得其鴻名羈束戎旅俛起阡陌年登三十始覽眾經退而歎曰百年倏忽功名為重名不常居功難與必且吉凶悔吝孔書已驗變化起伏歷聖來稱安知崢嶸之外寥廓之表籠括幽顯大援無邊者哉彼有師焉吾知歸矣遂乃長揖五忍斂衽四依挫銳解紛於是乎盡宋大明中益部有印禪師者苦節洞觀欝為帝師上人聞風自託一面盡禮印公言歸庸蜀乃携手同舟以宋泰始元年出家於玉壘誠感人天信貫金石直心波若高步道場既而敬業承師就賢辯志遨遊九部馳騁三乘摩羅之所宣譯龍王之所韜祕雖且受持諷誦然未取以為宗常謂攝心者迹迹密則心檢弘道者行行密則道存安上治人莫先乎禮閑邪遷善莫尚乎律可以驅車火宅翻飛苦海瞻三途而勿踐歷萬劫而不衰者其毘尼之謂歟乃簡棄枝葉積思根本頓轡洗心以為己任於是曳錫踽步千里遊學擁經持鉢百舍不休西望荊山南過澧浦周流華夏博採奇聞土木形骸琬琰心識靡高不仰無堅不攻寢之所安席不及煖思之所至食不遑飡入道三年從師四講教逸功倍而業盛經明每稱道不墜地人各有美宣尼之學何詎常師于時具隱二上人先輩高流鳳鳴西楚多寶穎律師洽聞溫故翰起東都法師之在江陵也稟具隱為周援及還京雒以穎公為益友皆權衡殿最言刈菁華捨稊稗而膳稻梁會鹽梅而成鼎飪其理練其旨深膚受末學莫能踵武以泰始六年初講十誦於震澤闡揚事相咫尺神道高談出雲漢精義入無間八萬威儀怡然理暢五部章句渙爾同波由是後進知宗先達改觀輝光令問於斯籍甚法師應不擇方行有餘力清言終日而事在其中立栖雲於具區營延祚於建業令不待嚴房櫳肅靜役不加迅棟宇駢羅自方等來儀變胡為漢鴻才鉅學連軸比肩法華維摩之家往往間出涅槃成實之唱處處聚徒而律藏憲章於時最寡振裘持領允屬當仁若夫淵源浩汗故老之所迴惑峻阻隱複前修之所解駕皆剖析豪釐粉散膠結鉤深致遠獨悟胸懷故能反戶之南彎弓之北尋聲赴響萬里而至門人歲益經緯日新坐高堂而延四眾轉法輪而朝同業者二十有餘載君子謂此道於是乎中興絕慶弔屏流俗朱門華屋靡所經過齊竟陵文宣王顧輕千乘虛心八解嘗請法師講於邸寺既許以降德或謂宜修賓主法師笑而答曰我則未暇及正位函丈始交涼燠時法筵廣置髦士如林主譽既馳客容多猛發題命篇疑難鋒出法師應變如響若不留聽囿辯者土崩負強者折角莫不遷延徙靡亡本失支觀聽之流稱為盛集法師性本剛克而能悅以待問發言盈庭曾無忤色虛己博約咸竭厥才依止疎附訓之如一少壯居家孝子惟友脫屣四攝愛著兩忘親黨書介封而不發內恕哀慼抑而不臨常曰道俗異故優陀親承音旨寧習其言而忽其教煩惱呴濡蕭然頓遣法師之於十誦也始自吳興迄于建業四十有餘講撰義記八篇約言示制學者傳述以為妙絕古今春秋七十有二齊永元三年遷神于建康縣之安樂寺僧尼殷赴若喪昆姊諒不言之信不召之感者云若夫居敬行簡喜慍不形於色知人善誘甄藻罔遺於時臨財廉取予義明允方大處變不渝汪汪焉堂堂焉渤碣河華不能充其量蓋淨行之儀表息心之軌則歟弟子某等感梁木之既摧慟德音之永閟俾陳信而有徵庶流芳而無愧廬山香鑪峯寺景法師行狀虞羲法師諱僧景本姓歐陽衡陽湘鄉人也資無始之良因得今生之遠悟黃中通理幼而自然好誦經善持操行止有方身口無擇十歲而孤事母盡孝母為請室良家非其好也辭不獲命弱冠以世役見羈于時戎馬生郊羽檄日至躬擐甲冑跋履山川且十年矣雖外當艱棘而內結慈悲故未離人群已具息心之行後行經彭䗍見廬岳而悅之於是有終焉之志復反湘川稍棄有非所味道忘食日一菜蔬後得出壘門便離妻室忽夢廬山之神稽首致敬曰廬山維岳峻極于天是曰三宮壁立萬仞欲屈真人居之真人若不見從則此山永廢矣又夢受請而行至香鑪峯石門頂見銀閣金樓丹泉碧樹崢嶸刻削希世而有於是鷄鳴戒旦便飄爾晨征于時江陵僧徒多有行業或告法師曰荊州法事大盛乃因此東枻自夏首西浮遇僧淨道人深解禪定乃曰真吾師也遂落髮從之住竹林禪房始斷粒食默然思道或明發不寐刺史聞風而悅欲相招延或曰此公乃可就見不可屈致也於是累詣草廬遂服膺請戒江漢人士亦迴向如雲先是神山廟靈驗如響侵迕見災且以十數法師考室其旁神遂見形為禮使兩神童朝夕立侍有女巫見而問之法師不答廬山神復來固請以永明十年七月振錫登峯行履所見宛如夢中乃即石為基倚巖結構匡坐端念虎豹為群先德曇隆慧遠之徒亦卜居于此既人跡罕至遂不堪其憂且山氣氛氳令人頭痛身熱曾未幾時莫不來下唯法師獨往一去不歸既却禾黍之資不避霜露之氣時捫蘿越險行動若飛或有群魔不憙法師來者能使雷風為變以試法師既見神用確然魔群乃止久之復隨險幽尋造石梁石室靈山祕地百神之所遨遊也法師說戒行香神皆頭面禮足昔神人吳猛得入此遊觀自茲厥後唯法師復至焉羲皇以來二人而已矣初法師入山二年禪味始具每斂心入寂偏見彌勒如來常云宿植之緣也建武四年春忽語弟子曰吾壽當九十但餘年無益於世而四大有累於人思拯助眾生不得久留此矣七月二十一日標極嶺西頭為安屍之處人莫之知也復七日而疾疾後七日而終春秋五十八臨終合掌曰願即生三途救一切眾苦又曰吾以身施烏鳥慎勿埋之初法師喚下寺數人安居講授或謂法師曰今欲出山尋醫又勸進飲食法師曰吾累在此身及吾無身吾有何累勿多言也遷化旬有六日容貌如生兩指屈握伸之隨復如故宿德比丘皆曰夫得道人多以七為數法師自疾至沒不其然歟兩指不伸亦良有以也初鑪峯孤絕羽翼所不至自法師經始常有雙烏來巢及法師即化烏亦永逝矣惟法師宿籍幽源久素淨業故慈悲喜捨習與性成微妙玄通因心則有入山林而不出絕榮觀而超然若乃八珍強骨之資九轉延華之術皆如脫屣矣唯直心定志在無價寶舟愛護化城期為彼岸鑽仰不測故未得而名焉南齊禪林寺尼淨秀行狀沈約比丘尼釋淨秀本姓梁氏安定烏氏人也其先出自少昊至伯益佐禹治水賜姓羸氏周孝王時封其十六世孫非子於秦其曾孫秦仲為宣王矦伯平王東遷封秦仲少子於梁是為梁伯漢景帝世梁林為太原太守徙居北地烏氏遂為郡人焉自時厥後昌阜于世名德交暉蟬冕疊映漢元嘉元年梁景為尚書令少習韓詩為世通儒魏時梁爽為司徒左長史祕書監博極群書善談玄理晉太始中梁闡為涼雍二州刺史即尼之迺祖也闡孫撝晉范陽王虓驃騎參軍事魚陽太守遭永嘉蕩析淪於偽趙為祕書監征南長史後得還晉為散騎侍郎子疇字道度征虜司馬子粲之仕宋征虜府參軍事封龍川縣都亭侯尼即都亭矦之第四女也挺慧悟於曠劫體妙解於當年而性調和綽不與凡孩孺同數齡便神情峻徹非常童稚之伍行仁尚道洗志法門至年十歲慈念彌篤絕粉黛之容棄錦綺之翫誦經行道長齋蔬食年十二便求出家家人苦相禁抑皆莫之許於是心祈冥感專精一念乃屢獲昭祥亟降瑞相第四叔超獨為先覺開譬內外故雅操獲遂上天性聰叡幼而超群年至七歲自然持齋家中請僧行道聞讀大涅槃經不聽食肉於是即長蔬不噉二親覺知若得魚肉輒便棄去昔有外國普練道人出於京師往來梁舍便就五戒勤翹奉持未嘗違犯日夜恒以禮拜讀誦為業更無餘務及手能書常自寫經所有財物唯充功德之用不營俗好少欲入道父母為障遂推流歲月至年二十九方獲所志落綵青園服膺寺主上事師虔孝先意承旨盡身竭力猶懼弗及躬修三業夙夜匪懈僧使眾役每居其首精進劬勤觸事關涉有開井士馬先生者於青園見上即便記云此尼當生兜率天也又親於佛殿內坐禪同集三人忽聞空中有聲狀如牛吼二尼驚怖迷悶戰慄上淡然自若徐起下床歸房執燭檢聲所在旋至拘欄二尼便聞殿上有人相語云各自避路某甲師還後又於禪房中坐伴類數人一尼鼾眠此尼於睡中見有一人頭屆于屋語云勿驚某甲師也此尼於是不敢復坐又以一時坐禪同伴一尼有小緣事暫欲下床見有一人抵掌止之曰莫撓某甲師於是閉氣徐出歎未曾有如此之事比類甚繁既不即記悉多漏忘不得具載性受戒律進止俯仰必欲遵承於是現請輝律師講內自思惟但有直一千心中憂慮事不辦夜即夢見鴉鵲鸜鵒雀子各乘車車並安軒車之大小還稱可鳥形同聲唱言我助某甲尼講去既寤歡喜知事當成及至就講乃得七十檀越設供果食皆精後又請頴律師開律即發講曰清淨甖水自然香如水園香氣深以為欣既而坐禪得定至於中夜方起更無餘伴便自念言將不犯觸即諮律師律師答云無所犯也意中猶豫恐有失且見諸寺尼僧多不如法乃喟然歎曰嗚呼鴻徽未遠靈緒稍隤自非引咎責躬豈能導物即自懺悔行摩那埵於是京師二部莫不咨嗟云如斯之人律行明白規矩應法尚爾思愆何況我等動靜多過而不慚愧者哉遂相率普懺無有孑遺又於南園就頴律師受戒即受戒日淨甖水香還復如前青園諸尼及以餘寺無不更受戒者律師於是亦次第詣寺敷弘戒品闡揚大教故憲軌遐流迄屆于今穎律師又令上約語諸寺尼有高床俗服者一切改易上奉旨制勒無不祇承律藏之興自茲更始後又就三藏法師受戒清淨水香復如前不異青園徒眾既廣所見不同師已遷背更無覲侍於是思別立住處可得外嚴聖則內窮宴默者以宋大明七年八月故黃修儀及南昌公主深崇三寶敬仰德行初置精舍上麻衣弗溫藿食忘飢躬執泥瓦盡勤夙夜以宋泰始三年明帝賜號曰禪林蓋性好閑靜冥感有徵矣而制龕造像無不必備又寫集眾經皆令具足莊黃染成悉自然有娑伽羅龍王兄弟二人現迹彌日不滅知識往來並親瞻覩招納同住十有餘人訓化獎率皆令禪誦每至奉請聖僧果食之上必有異迹又於一時虔請聖眾七日供養禮懺始訖攝心運想即見兩外國道人舉手共語一云呿羅一言毘呿羅所著袈裟色如桑葚之熟因即取泥以壞衣色如所見於是遠近尼僧並相倣斆改服間色故得絕於五大之過道俗有分者也此後又請阿耨達池五百羅漢日日凡聖無遮大會已近二旬供設既豐復更請罽賓國五百羅漢足上為千及請凡僧還如前法始過一日見有一外國道人眾僧悉皆不識於是試相借問自云從罽賓國來又問來此幾時答云來始一年也眾僧覺異令人守門觀其動靜而食畢乃於宋林門出使人逐視見從宋林門去行十餘步奄便失之又嘗請聖僧浴器盛香湯及以雜物因而禮拜內外寂默即聞器檥杓作聲如用水法意謂或是有人出便共往看但見水杓自然搖動故知神異又曾夜中忽見滿屋光明正言已曉自起開戶見外猶闇即便閉戶還床復寢久久方乃明也又經違和極為錦篤忽自見大光明遍於世界山河樹木浩然無礙欣爾獨笑傍人怪問具陳所見即能起行禮拜讀誦如常無異又於一時復違和亦甚危困忽舉兩手狀如捧物語傍人不解問言為何所捧答云見寶塔從地出意欲接之幡花伎樂無非所有於是疾恙豁然而除都無復患又復違和數日中亦殊綿惙恒多東向視合掌向空於一時中急索香火移時合掌即自說云見彌勒佛及與舍利弗目連等諸聖人亦自見諸弟子數甚無量滿虛空中須臾見彌勒下生翅頭末城云有人持幡華伎樂及三臺來迎於此上幡華伎樂非世間比半天而住一臺已在半路一臺未至半路一臺未見但聞有而已爾時已作兩臺為此兆故即更作一臺也又云有兩樹寶華在邊人來近床語莫壞我華自此之後病即除損前後遇疾恒有瑞相或得涼風或得妙藥或聞異香病便即愈疾差之為理都以漸豁然而去如此甚數不能備記又天監三年一夏違和於晝日眠中見虛空藏菩薩即自圍遶誦唄唄聲徹外眠覺所患即除又白日臥開眼見佛入房幡蓋滿屋語傍人令燒香了自不見上以天監五年六月十七日得病苦心悶不下飲彭城寺令法師以六月十九日夜得夢見一處謂是兜率天上住止嚴麗非世間比言此是上住處即見上在中於是法師有語上上得生好處當見將接上是法師小品檀越勿見遺棄上即答云法師丈夫又弘通經教自應居勝地某甲是女人何能益法師又云不如此也雖為丈夫不能精進持戒不及上時體已轉惡與令法師素疎不堪相見病既稍增飲粥日少為治無益漸就綿惙至七月十二日爾時天雨涼悶勢如小退自云夢見迎來至佛殿西頭人人捉幡竿猶車在地幡之為理不異世間軍隊擔鼓旗幡也至二十日便絕不復進飲粥至二十二日令請相識眾僧設會意似分別至二十五日云見十方諸佛遍滿空中至二十七日中後泯然而臥作兩炊久方復動轉自云上兜率天見彌勒及諸菩薩皆黃金色上手中自有一琉璃清淨甖可高三尺許以上彌勒即放光明照于上身至兜率天亦不見飲食自然飽滿故不復須人間食也但聞人間食皆臭是以不肯食於彼天上得波利將還意欲與令法師有人問何意將去答云欲與令法師是人言令法師是人中果報那得食天上食不聽將去既而欲見令法師閑居上為迎法師來相見語法師可作好菜食以餉山中坐禪道人若修三業方得生兜率天耳法師不坐禪所以令作食餉山上道人者欲使與坐禪人作因緣也自入八月體中亦轉惡不復說餘事但云有三十二童子一名功德天二者名善女天是迦毘羅所領恒來在左右與我驅使或言得人餉飲食令眾中行之復云空中晝夜作伎樂鬧人耳也
