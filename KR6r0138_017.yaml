body:
  text: 大唐西明寺沙門釋道宣撰佛德篇第三之三門下仰惟正覺大慈大悲救護群生津梁庶品朕歸依三寶重興聖教思與四海之內一切人民俱發菩提共修福業使當今現在爰及來世永作善因同登妙果宜請沙門三十人諳解法相兼堪宣導者各將侍者二人并散官各一人薰陸香一百二十斤馬五匹分道送舍利往前件諸州起塔其未注寺者就有山水寺所起塔依前山舊無寺者於當州內清靜寺處建立其塔所司造樣送往當州僧多者三百六十人其次二百四十人其次一百二十人若僧少者盡見僧為朕皇后太子廣諸王子孫等及內外官人一切民庶幽顯生靈各七日行道并懺悔起行道日打剎莫問同州異州任人布施錢限止十文已下不得過十文所施之錢以供營塔若少不充役正丁及用庫物率土諸州僧尼普為舍利設齋限十月十五日午時同下入石函總管刺史已下縣尉已上息軍機停常務七日專檢校行道及打剎等事務盡誠敬副朕意焉主者施行仁壽元年六月十三日內史令豫章王臣暕宣舍利感應記隋著作王邵皇帝昔在潛龍有婆羅門沙門來詣宅出舍利一裏曰檀越好心故留與供養沙門既去求之不知所在其後皇帝與沙門曇遷各置舍利於掌而數之或少或多並不能定曇遷曰曾聞婆羅門說法身過於數量非世間所測於是始作七寶箱以置之神尼智仙言曰佛法將滅一切神明今已西去兒當為普天慈父重興佛法一切神明還來其後周氏果滅佛法隋室受命乃興復之皇帝每以神尼為言云我興由佛故於天下舍利塔內各作神尼之像焉皇帝皇后於京師法界尼寺造連基浮圖以報舊願其下安置舍利開皇十五年季秋之夜有神光自基而上右繞露槃赫若冶鑪之焱一旬內四如之皇帝以仁壽元年六月十三日御仁壽宮之仁壽殿本降生之日也歲歲於此日深心永念修營福善追報父母之恩故迎諸大德沙門與論至道將於海內諸州選高爽清靜三十處各起舍利塔皇帝於是親以七寶箱奉三十舍利自內而出置於御座之案與諸沙門燒香禮拜願弟子常以正法護持三寶救度一切眾生乃取金瓶瑠璃各三十以瑠璃盛金瓶置舍利於其內薰陸香為泥塗其蓋而印之三十州同刻十月十五日正午入於銅函石函一時起塔諸沙門各以精勤奉舍利而行初入州境先令家家灑掃覆諸穢惡道俗士女傾城遠迎總管刺史諸官人夾路步引四部大眾容儀齊肅共以寶蓋旛幢華臺像輦佛帳佛輿香山香鉢種種音樂盡來供養各執香華或燒或散圍繞讚唄梵音和雅依阿含經舍利入拘尸那城法遠近翕然雲蒸霧會雖盲躄老病莫不匍匐而至焉沙門對四部大眾作是唱言至尊以菩薩大慈無邊無際哀愍眾生切於骨髓是故分布舍利共天下同作善因又引經文種種方便訶責之教導之深至懇惻涕零如雨大眾一心合掌右膝著地沙門乃宣讀懺悔文曰菩薩戒佛弟子皇帝某敬白十方三世一切諸佛一切諸法一切賢聖僧弟子蒙三寶福祐為蒼生君父思與一切民庶共逮菩提今欲分布舍利諸州起塔欲使普修善業同登妙果為弟子及皇后皇太子廣諸王子孫等內外官人一切法界幽顯生靈三塗八難懺悔行道奉請十方常住諸佛十二部經甚深法藏諸尊菩薩一切賢聖願起慈悲受弟子等請降赴道場證明弟子為一切眾生發露懺悔於是如法禮拜悉受三歸沙門又稱菩薩戒佛弟子皇帝某普為一切眾生發露無始已來所作十種惡業自作教他見作隨喜是罪因緣墮於地獄畜生餓鬼若生人間短壽多病卑賤貧窮邪見諂曲煩惱妄想未能自寤今蒙如來慈光照及於彼眾罪方始覺知深心慚愧怖畏無已於三寶前發露懺悔承佛慧日願悉消除自從今身乃至成佛願不更作此等諸罪大眾既聞是言甚悲甚喜甚愧甚懼銘其心刻其骨投財賄衣物及截髮以施者不可勝計日日共設大齋禮懺受戒請從今以往修善斷惡生生世世常得作大隋臣子無問長幼華夷咸發此誓雖屠獵殘賊之人亦躬念善舍利將入函大眾圍遶填噎沙門高奉寶瓶巡示四部人人拭目諦視共睹光明哀戀號泣聲響如雷天地為之變動凡是安置處悉如之真身已應靈塔常存天下瞻仰歸依福日益而無窮矣皇帝以起塔之旦在大興宮之大興殿庭西面執珽而立迎請佛像及沙門三百六十七人旛蓋香華讚唄音樂自大興善寺來居殿堂皇帝燒香禮拜降御東廊親率文武百僚素食齋戒是時內宮東宮逮於京邑茫茫萬寓舟車所通一切眷屬人民莫不奉行聖法眾僧初入勅使左右密夾數之自顯陽門及昇階凡數三遍常䞉一人皇帝見一異僧曷槃覆髆以語左右曰驚動他置爾去已重數之曷槃覆髆者果不復現舍利之將行也皇帝曰今佛法重興必有感應其後處處表奏皆如所言雍州於仙遊寺起塔天時陰雪舍利將下日便朗照始入函雲復合岐州於鳳泉寺起塔將造函寺東北二十里忽見文石四段光潤如玉小大平整因取之以作重函於是大函南壁異色分炳為雙樹之形高三尺三寸莖如雪白葉如瑪瑙北壁東壁有鳥獸龍象之狀四壁皆有華形左旋右轉其後基石漸變盡如水精沙門道圖此雙樹之像置於許州葉盡變為青色明年岐州大寶昌寺寫得陝州瑞相圖置於佛堂以供養當戶大像三吐赤光流出戶外於是戶外千佛像及觀世音菩薩亦頻放光半旬之內天華再落涇州於大興國寺起塔將造函三家各獻舊磨好石非界內所有因而用之恰然相稱秦州於靜念寺起塔先是寺僧夢群仙降集以赤繩量地鐵橛釘記之及定塔基正當其所再有瑞雲來覆舍利是時十月雪下而近寺草木悉皆開華舍利將入函神光遠照空內又有讚歎之聲華州於思覺寺起塔天時陰雪舍利將下日便朗照有五色光氣去地數丈狀若相輪正覆塔上數十里外遙望之則正赤上屬天舍利下訖雲霧復起瑞雪飛散如天華著人衣久之而不濕同州於大興國寺起塔舍利宿於近驛天夜雨明旦輿行雲日迎之開朗入自南門而城北雨如故既至寺又陰雨臨入函日乃出眾色光相繞日如輪先是寺僧慧真夢見聖人項有圓光明照天地來自西方入門而立及舍利輿至無故止於其所因定塔基焉十二月八日夜有五色圓光從基而上遍照城內明如晝日五十里咸見之明年四月白光起於塔西流照塔東良久乃滅蒲州於栖巖寺起塔九月二十六日舍利在治下仁壽寺其夜堂內光明如晝二十八日定基明日地大震山大吼巖上有鍾鼓之聲十月七日舍利將之栖巖地又動八日輿登山從者千數大風從下而上因風力俄頃至於佛堂其夜浮圖上有光長數尺乍隱乍顯至於十餘瓶內亦有光五道散出還斂入瓶又有二光並大如鉢出於西壁合為一道流入塔基食頃乃滅俄而復出流入於堂山頂亦有大光照二百里遠望者皆言燒山九日夜又有二光遶浮圖其一流照西谷其一流照南谷十二日堂內又有光狀如香鑪流至浮圖露盤移時乃滅其夜露盤上又有光或散或聚皆似蓮華移更乃滅十三日夜浮圖上又有光如三佛像並高尺停住者久之十四日夜有光三道從堂而出其一直上天其一流於東北其一狀如樓闕赫照州城自朔至望寺及城內常聞異香桃李杏柰多花人採之以供養舍利入函之夜又有光再從塔出圓如大鏡諸光多紫赤而見者色狀不必同或云如大電或云如燎火其都無所見者十二三有婦人抱新死小兒來乞救護至夜便蘇遇光照以愈疾者非一諸州皆有感應而栖巖寺最多蓋由太祖武元皇帝之所建也并州於舊無量壽寺起塔舍利初在道場大眾禮拜重患者便得除起塔之旦雲霧晝昏至於已後日乃朗照五色雲夾之舍利將入函放光或一尺或五寸有無量天神各持香花幢幡寶蓋遍覆州城定州於恒嶽寺起塔有一異翁來禮拜施布一匹負土數籠人問其姓字而不答忽然失之此地舊無水開皇三年初營寺其西八里白龍淵忽東流而過作役罷水便絕及將起新塔水復大流相州於大慈寺起塔天時陰雪舍利將下日便朗照始入函雲復合建塔之明年八月光天尼寺寫得陝州瑞相圖置於佛堂神光屢發如電又有五色雲蓋正臨堂上一日四見焉又有白雲狀如林木雰雨金華其二花形如大蝶色似青瑠璃翱翔不下乃騰虛而去明年正月寺內又雨天華鄭州於定覺寺起塔舍利將至寺東有光如大流星入至佛堂前而沒輿到此處無故自止既而定塔基於西岸其東岸舊舍利塔有二光西流入於基所寺僧設二千人齋供然而萬餘人食之不盡一甕飯出八十盆餘食供寺眾二百人數日乃盡舍利將入函四面懸幡無風而一時內向嵩州於閑居寺起塔人眾從舍利者萬餘有兔逆坂走來歷輿下而去天時陰雪舍利將下日便朗照始入函雲復合亳州於開寂寺起塔界內無石舍利至便於三處各得一成磨方石一似函而無底乃合而用之不須改鑿掘塔基至盤石有二浪井夾之天時陰雪舍利將下日便朗照始入函雲復合汝州於興世寺起塔天時陰雪舍利將下日便朗照始入函雲復合泰州於岱岳寺起塔舍利至州其夜岳廟內有鼓聲天將曉三重門皆自闢或見三十騎從廟而出蓋岳神也舍利自州之寺來至數里雲蓋出於山頂五色而三重白氣如虹來覆舍利散成大霧沾濕人衣其狀如垂珠其味如甘露自旦至午霧氣乃斂而歸山分為三段乍來乍往如軍行然蓋亦岳神之來迎也於是瓶內有聲放光高丈餘食頃乃滅人審視之見瑠璃內金瓶蓋自開瓶口有寸光如箸炯然西指雖急轉終不迴如此經八日將入函光遂散出還入金瓶雲霧復起有童子能誦法華經來禮舍利遂燒身於野以供養焉明年二月六日泰山神鼓竟夜鳴北聽則聲南南聽則聲北東西亦如之青州於勝福寺起塔掘基深五尺遇盤石自然成大函因而用之及舍利將入瓶內有光乍上乍下牟州於巨神山寺起塔舍利初至二大紫芝欻現於道天時陰雪舍利將下日便朗照始入函雲復合隋州於智門寺起塔十月六日掘基得神龜七日甘露降於石橋旁之楊樹有黑蜂無算來繞之八日旦大霧舍利將之寺天便開朗歷光化縣忽見門內木連理過楊樹之下甘露五道懸流沾灑輿上既而沈陰舍利將下日便朗照始入函雲復合神龜色狀特異有文在其腹曰王興州使參軍獻之日日開匣欲視其頭而縮藏不可見勅使著作郎王邵審檢龜便長引頸足恣人反轉連日如之乃見有文在其頭曰上大王八八七千萬年皇帝親撫視之入於懷袖自然馴狎放諸宮沼及草內還來直至御前每放輒如之襄州於大興國寺起塔天時陰晦舍利將下日便朗照始入函雲復合楊州於西寺起塔州久旱舍利入境其夜雨大洽蔣州於栖霞寺起塔隣人先夢佛從西北來寶蓋旛花映滿寺眾悉執花香出迎及舍利至如所夢焉吳州於大禹寺起塔舍利凡五度江風波不起既至寺放青黃赤白之光獲紫芝高二尺餘四莖共三蓋天時陰晦舍利將下日便朗照始入函雲復合蘇州於虎丘山寺起塔其地是晉司徒王珣琴臺掘得甎函銀合子有一舍利浮之鉢水右轉四周舍利初發州天降雨未至寺日便出乃有雜色雲臨輿而行徘徊不散至於塔所空裏有音樂之聲既而天又陰晦舍利將下雲暫開舍利入函雲復合先是寺內鑿石井井吼二日蓋舍利將來之應也衡州於衡岳寺起塔沙門奉舍利自江陵水行二千餘里四遇逆風願定便定四乞順風皆如所欲初掘基融峯上有白雲闊二丈餘甚整直來臨基所右旋三匝乃散既而陰晦舍利將下日便朗照始入函雲復合桂州於緣化寺起塔舍利未至城十餘里有鳥千數夾輿行飛入城乃散舍利將入塔五色雲來覆之番州於洪楊鄉崇楊里之靈鷲山寺起塔掘得宋末所置石函三其二各有銅函盛二小銀像其一有銀瓶子盛金瓶疑本有舍利今乃空矣既而坑內有神仙雲氣之象昔宋主劉義隆之時天竺有聖僧求那跋摩將詣楊都路過靈鷲寺謂諸僧曰此間尋有異瑞兼值王者登臨徵應建立終逢菩薩聖主方大修弘其年冬果有群燕共銜繡像委之堂內及齊主蕭道成初為始興太守遊於此寺而起白塔陳天嘉三年寺內立碑其文也如此聖主修弘驗於今日交州於禪眾寺起塔益州於法聚寺起塔天時陰晦舍利將下日便朗照始入函雲復合廓州於法講寺起塔舍利初發京下宿於臨臯沙門夢失舍利是夜廓州有光高數丈從東方來入寺右繞佛塔照及城樓內外洞朗遙望者疑燒積薪光漸西流食頃乃沒及定塔基正當光沒之所又有香氣𣱦氳異常瓜州於崇教寺起塔虢州表言州雖不奉舍利亦請眾僧行道有一異鳥來集梁上意似聽經不驚不動一夜一日乃下止於讀經之床人人讚歎摩𭢃又擎之以行道法師於佛前為之受戒良久乃去隋州典籤王威送流人九十道逢舍利盡釋其囚千里期集無一違者隋州人於溳水作魚獄三百既見舍利亦悉決放之餘州若此類蓋多矣皇帝當此十月之內每因食於齒下得舍利皇后亦然以銀盌水浮其一出示百官須臾忽見有兩右旋相著二貴人及晉王昭豫章王暕蒙賜蜆勅令審視之各於蜆內得舍利一未過二旬宮內凡得十九多放光明自是遠近道俗所有舍利率奉獻焉皇帝曰何必皆是真諸沙門相與推試之果有十三玉粟其真舍利鐵䆘而無損慶舍利感應表隋安德王雄百官等臣雄等言臣聞大覺圓備理照空有至聖虛凝義無生滅故雖形分聚芥尚貯金甖體散吹塵猶興寶剎自釋提請灰之後育王建塔已來未有分布舍利紹隆勝業伏惟皇帝積因曠劫宿證菩提降迹人王護持世界往者道消在運仁祠廢毀慈燈滅影智海絕流皇祚既興法鼓方振區宇之內咸為淨土生靈之類皆覆梵雲去夏六月爰發詔旨迎請沙門奉送舍利於三十州以十月十五日同時起塔而蒲州栖巖寺規模置塔之所於此山上乃有鍾鼓之聲舍利在講堂內其夜前浮圖之上發大光明爰及堂裏流照滿室將置舍利於銅函又有光若香鑪乘空而上至浮圖寶瓶復起紫焰或散或聚皆成蓮華又有光明於浮圖上狀如佛像花趺宛具停住久之稍乃消隱又有光明繞浮圖寶瓶蒲州城內仁壽寺僧等遙望山頂光如樓闕山峯㵎谷昭然顯見照州城東南一隅良久不滅其栖巖寺者即是太祖武元皇帝之所建造又華州置塔之處于時雲霧大雪忽即開朗正當塔上有五色相輪舍利下訖還起雲霧皇帝皇后又得舍利流輝散彩或出或沈自非至德精誠道合靈聖豈能神功妙相致此奇特臣等命偶昌年既覩太平之世生逢善業方出塵勞之境不勝抃躍謹拜表陳賀以聞門下仰惟正覺覆護群品濟生靈於苦海救愚迷於火宅朕所以至心迴向結念歸依思與率土臣民爰及幽顯同崇勝業共為善因故分布舍利營建神塔而大聖慈愍頻示光相宮殿之內舍利降靈莫測來由自然變現歡喜頂戴得未曾有斯實群生多幸延此嘉福豈朕微誠所能致感覽王公等表悚敬彌深朕與王公等及一切民庶宜更加剋勵興隆三寶今舍利真形猶有五十所司可依前式分送海內庶三塗六道俱免蓋纏稟識含靈同登妙果主者施行高麗百濟新羅三國使者將還各請一舍利於本國起塔供養詔並許之詔於京師大興善寺起塔先置舍利於尚書都堂十二月二日旦發焉是時天色澄明氣和風靜寶輿旛幢香花音樂種種供養彌遍街衢道俗士女不知幾千萬億服章行位從容有敘上柱國司空公安德王雄已下皆步從至寺設無遮大會而禮懺焉有青雀狎於眾內或抽佩刀擲以布施當人叢而下都無所傷仁壽二年正月二十三日復分布五十一州建立靈塔令總管刺史已下縣尉已上廢常務七日請僧行道教化打剎施錢十文一如前式期用四月八日午時合國化內同下舍利封入石函所感瑞應者別錄如左恒州泉州循州營州洪州杭州涼州德州滄州觀州瀛州冀州幽州徐州莒州齊州萊州楚州江州潭州毛州貝州宋州趙州濟州兗州壽州信州荊州梁州蘭州利州潞州黎州慈州魏州汴州杞州許州豫州顯州曹州安州晉州懷州陝州洛州鄧州秦州重得舍利衛州洺州鄭州恒州表云舍利詣州建立靈塔三月四日到州即共州府官人巡歷檢行安置處所唯治下龍藏寺堪得起塔其月十日度地穿基至十六日未時有風從南而來寺內香氣殊異無比道俗官私並悉共聞及有老人姓金名瓚患鼻不聞香臭出二十餘年於時在眾亦聞香氣因即鼻差至四月八日臨向午時欲下舍利光景明淨天廓無雲空裏即雨寶屑天花狀似金銀碎薄大小間雜雰雰散下猶如雪落先降塔基石函上遍墮寺內城治俱有雜色晃曜金晶映日時即將衣承取復在地拾得道俗大眾十萬餘人並見俱獲又剎柱東西二處忽有異氣其色黃白初細後麁如烽火烟龍形宛轉迴屈直上周旋塔頂遊騰清漢莫惻長短良久乃滅又有四白鶴從東北而來周繞塔上西南而去至二十日已時築塔基恰成復雨寶屑天華收得盛有一斗即遣行參軍王亮於先奉獻皇帝開華於寶屑內復得舍利三箇甚大歡欣瀛州表云掘地欲安舍利石函時可深六尺許土裏忽有真紫色光現須臾遂滅其土即有黑文雜間成篆書字云轉輪聖王佛塔謹表聞知黎州表云掘基安舍利塔於地下得一瓦銘云千秋萬歲樂未央觀州表云舍利塔上有五色雲如車蓋其日午時現至暮魏州表云所送舍利數度放光復有諸病人或患眼盲或患五內發願禮拜病皆得愈至四月八日欲下舍利午時天忽有一片五色雲香馥非常須臾之間即降金花至九日旦復下銀花遍滿城治其花大者如榆莢小者似火精人人皆得函盛奉獻其日復有一黑狗耽耳白胸於舍利塔前舒左肱屈右脚見人行道即起行道見人持齋亦即持齋非時與食不食唯欲得飲淨水至後日旦起解齋與粥始喫其寺內先有數箇猛狗但見一狼狗無不競來吠嚙若見此狗入寺悉皆低頭掉尾當爾之時看人男夫婦女三十餘萬盡皆不識此狗未知從何而來秦州表云欲下舍利時七日地微動至八日大動兗州表云勅書分送起塔以瑕丘縣普樂寺最為清淨即於其所奉安舍利以去三月二十五日謹即經營以為函蓋初磨之時體唯青質及其功就變同碼瑙五色相雜文彩煥然復於其裏間生白玉內外通徹照物如水表裏洞朗鑒人等鏡其送舍利曹州表云三月二十九日舍利於子城上赤光現四月五日申時舍利現雙樹并有師子現五日亥時舍利現金光長七寸六日卯時龍花樹現下有佛像俱出六日卯時漆龕板外光明狀如金華色六日申時漆龕北板上化佛菩薩雙樹等形六日亥時舍利精舍裏出黃白花光長四五寸八日辰時漆龕板後雲霧金光等形狀巳時漆龕板後裟羅雙蓮華影佛像眾僧師子形等午時塔上五色雲現午後漆龕內板上有娑羅雙樹林樓閣等現九日漆龕內板上疊石壘基文甲後漆龕板外大娑羅樹及僧執香鑪等形容金佛像現似若太子初生身如黃金色後有三僧身著紫黃法服手捉香鑪供養其香氣與世香不同每日恒聞晉州表云舍利於塔前放光三度皆紫光色眾人盡見杞州表云舍利以三月四日到州十四日辰時瑠璃瓶裏色白如月須臾之間即變為赤色至四月二日後變作紫光或現青色瓶內流轉一來一去循環不止道俗瞻仰咸共歸依實相容儀良久乃散七日午時神影復出變動輝煥於前無異徐州表云舍利二月二十八日至州西一驛宿其夜陰雨舍利放光向州四十五里其淨道寺僧向北山看光影從驛所舍利處而來舍利石函蓋四月五日磨治訖遂變出仙人二僧四人居士一人騏驎一師子一魚二自餘並似山水之狀鄧州表云舍利四月六日石函變作玉及瑪瑙其石有文現正國德三字并有仙人驎鳳等出安州表云奏寺安置送舍利法師淨業共州官人量度基申時忽有香氣𣱦氳乘空而至芬芳微妙世未曾有道俗咸皆驚愕隨至處所香氣遍滿至五更方始散盡又至四月八日行道日滿供設大齋午時欲下舍利道俗一萬餘人法師昇高座手捧舍利以示大眾人人悲感不能自勝即有赤色從師手內瓶口而出便二度放光高一尺又下石函忽有白雲團圓如蓋正當函上右旋數匝繞訖還當元出之處消滅又塔南先有佛閣當時鎖閉舍利於其下立道場遣二防人看守忽聞閣上有眾人行聲看閣門仍閉又復須臾復聞行聲即走告寺主來共開閣門上驗看唯有佛像自外都無所見又下舍利訖日到申時有法師淨範投陀僧淨滔於舍利塔後臨水巖邊為諸道俗受菩薩戒眾人見群魚行隊遊水首皆南出似欲歸依多少一萬餘請二禪師乘船入水為魚受戒然內諸魚悉迴首向船隨逐巡行如似聽法趙州表云舍利以三月四日到州臣等於治下文際寺安置起塔二日打剎行道舍利於塔所放赤光從未至申更見不同或似像形或似樓閣或見白光乍大乍小巡繞舍利繞瓶行道或隱或顯或遲或速官人道俗莫不覩見驚憙號咽沸騰寺內至四日又放赤光曜如金色縱橫一尺餘紫綠相間前後三度良久乃滅又見一佛像長二尺餘坐於蓮華趺坐又以二菩薩俠侍長一尺餘從卯至巳見諸形相道俗四部二萬餘人咸悉瞻仰豫州表云舍利瓶有白光須臾成五色遊轉瓶內形相非常又鑿舍利銘其石更無異質鑿至皇帝一字從上點及竪牽橫畫隨鑿之處如刻金所成利州表云舍利三月二十六日夜一更內放光遍照衙內如月明州表云四月八日下舍利掘地安石函乃得一像衛州表云四月三日齋訖舍利金瓶外其色紅赤鮮麗殊常或行瑠璃瓶底或遊瓶側緣瓶上下光明外照比至八日照灼如初洺州表云舍利三月十一日天降甘澤十三日乃止有戒德沙門僧猛先患腰脚不堪出行其日聞舍利欲到合寺馳走僧猛自身抱患不得奉迎命弟子法藏扶侍出戶迴心正念遂便得起行出城十里許親迎舍利因此瘳降漸堪得行毛州表云舍利二月二十七日到州其日即依式安置一切男女皆發菩提心競趣歸依瘂者能言攣躄之人悉皆能行石函乃變如琉璃內外明徹四月十二日天雨金銀華落表送奉獻冀州表云舍利放光五色照滿城治時有一僧先患目盲亦得見舍利復有一人患腰脚攣躄十五年自舍利到州所是患人禮拜發願即得行動宋州表云三月四日舍利至州其所部宋城縣市院先有古井塸由來鹹苦水色舊赤全不堪食其縣民胡子乾因取水和埿怪其色白甞覺甚甘四月三日舍利於塔內放赤色光六日夜五更寺內又放白色光七日辰時寺內天雨白華目驗雰雰然狀如細雪不落於地八日午時欲下舍利入函天上有白鶴翔塔基之上懷州表云舍利於州城長壽寺安置四月五日辰時有一雄雉飛來函側心閑從容質羽鮮華自飛自止曾無驚畏河內縣民楊邁特以示道俗六千餘人莫不同見勅使沙門靈璨即與受戒其雉向師似如聽法師云此雉是野鳥內法道理無容籠繫即令送城北太行山放之舍利塔廂復有一跡從塔東南三十步而來直到塔所不見還蹤復無入處或闊四寸或闊三寸蟠屈逶迤狀等龍蛇之跡宮人道俗並悉共見八日至午前舍利欲入塔函遂放光於瓶外巡迴數匝暉彩照曜或上或下乍隱乍出汴州表云舍利三月二日到州權置州館六日夜大德僧慧徹等忽聞香氣有異尋常至八日諸僧迎舍利將向塔所大德僧粲等五人復聞香氣去慧福寺門四十餘步遂放青色光覆炤露帳大久乃滅其寺有舍利在僧房供養其日杞州人張相仁於僧房見寺內舍利復放青色光恰與新至舍利色狀相似十日復至見赤色光臨寺佛堂高五尺其夜四更復見青赤雜色光於寺復有一老母患腰已來二十餘年拄杖伏地而行聞舍利至寺強來禮拜於大眾裏見舍利光腰即得差捨杖而行洛州表云舍利三月十六日至州即於漢王寺內安置至二十三日忽降香氣世未曾有四月七日夜一更向盡東風忽起燈花絕焰在佛堂東南神光炤燭復有香風而來官人道俗等共聞見於是彌增剋念至八日臨下舍利塔側桐樹枝葉低莖幽州表云三月二十六日於弘業寺安置舍利石函始磨兩面以水洗之明如水鏡內外相通紫光焰起其石班駁又類碼瑙潤澤泫燿光似瑠璃至四月二日起齋行道至三日亥時舍利前焚香供養燈光炤庭眾星夜朗有素光舒卷在佛輿之上至八日舍利入函自旦及辰函石現文髣像有菩薩光彩粉藻又似眾仙其間鳥獸林木諸狀不常者眾實難詳審其有文理照顯分明今畫圖奉進許州表云三月三日初夜於州北境去州九十里舍利放光紫赤二色照曜州城內外民庶皆見神光四月七日在州大廳舍利出金瓶之外瑠璃瓶內行道放光至八日在辦行寺塔所又放光明午時舍利欲入石函又有五色光彩雲來臨塔上雲形如蓋其日在塔西南一百餘步依育王造塔本記一枯池不在四畔正在池中可深九尺忽有甘井自現其水不可思議當時道俗看者二萬餘人同飲齊所錄瑞應奉表奏聞荊州舍利現雲如車蓋正當塔上雲間雨花遊颺不落眾鳥翔塔濟州舍利本一至彼現二放光炤現聞異香氣雲間出音自然鍾聲及以讚善大鳥群飛塔下楚州舍利當行道日野鹿來聽鶴遊塔上莒州舍利本一至彼現三放光映炤掘基地下忽得銅塔及瘂者能言營州舍利三度放光白色舊龜石自然折解用為石函抗州舍利山間掘基得自然石窟容舍利函潭州舍利江鳥迎送潞州舍利至彼自然泉湧飲者病愈洪州舍利白項烏引路德州舍利至彼躄者能行大鳥旋塔鄭州舍利放光幡向內垂江州舍利至彼行道日耕人犁得一銅像蘭州舍利掘基地下得一石像又小兒撥得二銅像慈州舍利現白雲蓋如飛仙自然泉涌飲者病愈廉州未得舍利別得一舍利放光佛香鑪烟氣又類蓮華黃白色天雨寶屑雍州表云仁壽二年五月十二日京城內勝光寺大興善寺法界寺州公廨裏及城治街巷天雨銀屑大如榆莢小如麩等表送奉獻仁覺寺五月十二日未時有風從西南而來香氣氛氳沙門及經生道俗等並悉俱聞當夜雨銀屑天花芭蕉枝葉椶櫚莖檊上人皆拾得大小如前無異仁壽二年六月五日夜仁壽宮所慈善寺新佛堂內靈光映現形如鉢許從前柱遶梁栿眾僧覩見仁壽二年六月五日夜雨銀屑天花枇杷葉上及餘草頭上落地仁壽二年六月八日諸州送舍利沙門使還宮所見旨相問慰勞訖令九日赴慈善寺為慶光齋僧眾至寺讚誦旋遶行香欲食空裏微零復雨銀屑天花舍人崔君德令盛奉獻京城內勝光寺模得陝州舍利石函變現瑞像娑羅雙樹等形相者仁壽二年五月二十三日已後在寺日日放光連連相續緣感即發不止晝夜城治道俗遠來看人歸依禮拜闐門塞路往還如市遇斯光者炤動群心悲喜發意其城內諸寺外縣諸州以絹素模將去去者或上輿放光或在道映照或至前所開明現朗光光色別隨見不同仁壽二年七月十五日京城內延興寺灌寫釋迦金銅像丈六其夜雨寶屑銀華香氣甚異無比陝州舍利從三月十五日申時至四月八日戌時合一十一度見靈瑞總有二十一事四度放光光內見花樹二度五色雲掘地得鳥石函變異八娑羅樹樹下見水一臥佛三菩薩一神尼函內見鳥三枝金華興雲成輪相自然幡蓋函內流出香雲再放光舍利在陝州城三月二十三日夜二更裏大通寺善法寺闡業寺並見光明唯善法寺所見光內有兩箇華樹形色分明久而方滅其色初赤尋即變白後散如水銀滿屋之內物皆照徹舍利在大興國寺四月二日夜二更裏靈勝寺見光明洞了庭前果樹及北坡草木光照處見其形塔基下掘地得鳥舍利來向大興國寺三月二十八日卯時司馬張備共大都督侯進檢校築基掘地已深五尺有閿鄉縣玉山鄉民杜化雲钁下忽出一鳥青黃色大如鶉馴行塔內安然自處執之不恐未及奉送其鳥致死今營福事於舍利塔內獲非常之鳥既以出處為異謂合嘉祥今別畫鳥形謹附聞奏五色雲再見三月十五日申時舍利到陝州城南三里㵎即有五色雲從東南欝起俄爾總成一蓋即變如紫羅色舍利入城方始散滅當時道俗並見至二十八日未時在大興國寺復有五色雲從西北東南二處而來舍利塔上相合共成一段時有文林郎韋範大都督楊旻及官民等並同觀矚其雲少時即散者也兩度出聲舍利在州三月二十三日夜從寶座出聲如人間打靜聲至三乃止後在大興國寺四月五日酉時復出一聲大於前者道俗並聞石函內外四面見佛菩薩神尼娑羅樹光明等四月七日巳時欲遣使人送放光等四種瑞表未發之間司馬張備共崤縣令鄭乾意閿鄉縣丞趙懷坦大都督侯進當作人民侯謙等至舍利塔基內石函所檢校同見函外東面石文亂起其張備等怪異更向北面虔意以衫袖拂拭隨手向上即見娑羅樹一雙東西相對枝葉宛具作深青色俄頃道俗奔集復於西面外以水澆洗即見兩樹葉有五色次南面外復有兩樹枝條稍直其葉色黃白次東面外復有兩樹色青葉長其四面樹下並有水文於此兩樹之間使人文林郎韋範初見一鳥仰臥司馬張備次後看時其鳥已立鳥前有金華三枝鳥形大小毛色與前掘地得者不異其鳥須臾向西南行至佛下停住函內西南近角復有一菩薩坐華臺上面向東有一立尼面向菩薩合掌相去二寸西面內復有二菩薩並立一金色面向南一銀色面向北相去可有三寸西脣上有一臥佛側身頭向北面向西其三菩薩於石函內並放紅紫光高一尺許從已至未形狀不移圖畫已後色漸微滅道俗觀者其數不少此函本是青石色基黑闇見瑞之時變為明白表裏瑩徹周迴四面俱遣人坐並相照見無所翳障其函內外四面總見一佛三菩薩一尼一鳥三枝華八株樹今別畫圖狀謹附聞奏下時四方雲起變成輪相復有自然幡蓋及塔上香雲二度光見四月八日午時欲下舍利于時道俗悲號四方忽然一時雲起如煙如霧漸次向上至於日所即遶日變成一暈猶如車輪內別有白雲團圓翳日日光漸即微闇如小盞許在輪外周匝次第以雲為輻其輪及輻並作紅紫色至下舍利訖其雲散滅日光還即明淨復於塔院西北牆外大有自然幡蓋亦有見幡蓋圍遶舍利者當時謂有人捉幡供養至下舍利訖其幡蓋等忽即不見于時道俗見者不少至戌時司馬張備等見塔上有青雲氣從塔內而出其雲甚香即喚使人文林郎韋範大興寺潧曇暢入裏就看備共韋範等並見流光向西北東南二處流行須臾即滅法義篇第四之一夫法者何耶所謂憑准修行清神洗惑而為趣也義者何耶所謂深有所以千聖不改其儀萬邪莫迴其致者也俗法五常仁義禮智信也百王不易其典眾賢贊翼而不墜者也道法兩諦謂真俗也諸佛之所由生群有因之而超悟者也然則俗保五常淪惑綿亘道資兩諦勝智增明故真俗為出道之階基正法為入空之軌躅者也故論云非俗無以通真非真無以遣俗又云諸佛說法常依二諦斯則大略之成教也至於大小半滿之流三篋八藏之典明心塵之顯晦曉業報之殊途通慧解以鏡象心了世相以光神照也若斯以敘謂之法義也至於如說修行思擇靈府者則四依法正創究識於倒情八直明道策淨心於妄境三學開其玄府一貫統其真源漸染基搆當自得其涯也但以幽關難啟匠石易迷匪藉言方莫由升附所以自古道俗同而問津疎瀹精靈陶練心術或著論而導其解或談述而寫其懷因言而顯聖心寄迹而揚玄理者也昔梁已敘其致今唐更廣其塵各有其志明代代斯言之不絕也廣弘明集法義篇第四之初釋疑論晉戴安安處子問於玄明先生曰蓋聞積善之家必有餘慶積不善之家必有餘殃又曰天道無親常與善人斯乃聖達之格言萬代之宏標也此則行成於己身福流於後世惡顯於事業獲罪乎幽冥然聖人為善理無不盡理盡善積宜歷代皆不移行無一善惡惡相承亦當百世俱闇是善有常門惡有定族後世修行復何益哉又有束修履道言行無傷而天罰人楚百羅備纓任性恣情肆行暴虐生保榮貴子孫繁熾推此而論積善之報竟何在乎夫五情六慾人心所常有斧藻防閑外事之至苦苟人鬼無尤於趣舍何不順其所甘而強其苦哉請釋所疑以祛其惑先生曰善哉子之問也史遷有言天之報施善人何如哉荀悅亦云飾變詐而為姦宄者自足乎一世之間守道順理者不免飢寒之患二生疑之於前而未能辨吾子惑之於後不亦宜乎請試言之夫人資二儀之性以生稟五常之氣以育性有脩短之期故有彭殤之殊氣有精麁之異亦有賢愚之別此自然之定理不可移者也是以堯舜大聖朱均是育瞽叟下愚誕生有舜顏回大賢早夭絕嗣商臣極惡令胤剋昌夷叔至仁餓死窮山盜跖肆虐富樂自終比干忠正斃不旋踵張湯酷吏七世珥貂凡此比類不可稱言驗之聖賢既如彼求之常人又如此故知賢愚善惡脩短窮達各有分命非積行之所致也夫以天地之玄遠陰陽之廣大人在其中豈惟𥺀米之在太倉毫末之於馬體哉而匹夫之細行人事之近習一善一惡皆致冥應欲移自然之彭殤易聖於朱舜此之不然居可識矣然則積善積惡之談蓋施於勸教耳何以言之夫人生而靖天之性也感物而動性之欲也性欲既開流宕莫檢聖人之救其弊因神道以設教故理妙而化敷順推遷而抑引故功玄而事適是以六合之內論而不議鑽之而不知所由日用而不見所極設禮學以開其大矇名法以束其形跡賢者倚之以成其志不肖企及以免其過使孝友之恩深君臣之義篤長幼之禮序朋執之好著背之則為失道之人譏議以之起向之則為名教之士聲譽以之彰此則君子行已處心豈可須臾而忘善哉何必修教責實以期應報乎苟能體聖教之幽旨審分命之所鍾庶可豁滯於心府不祈驗於冥中矣安處子乃避席曰夫理蘊千載念纏一生今聞吾子大通之論足以釋滯疑祛幽結矣僕雖不敏請佩斯言與遠法師書安公和南弟子常覽經典皆以禍福之來由於積行是以自少束修至于白首行不負於所知言不傷於物類而一生艱楚荼毒備經顧景塊然不盡唯已夫冥理難推近情易纏每中宵幽念悲慨盈懷始知脩短窮達自有定分積善積惡之談蓋是勸教之言耳近作此釋疑論今以相呈想消息之餘脫能尋省戴安公和南遠法師答釋慧遠頓首省君別示以為慨然先雖未善想患人物來往亦未始暫忘分命窮達非常智所測然依傍大宗似有定檢去秋與諸人共讀君論亦並有同異觀周郎作答意謂世典與佛教粗是其中今封相呈想暇日能力尋省難釋疑論周道祖近見君釋疑論蓋即情之作料檢理要殆乎有中但審分命之守似未照其本耳福善莫驗亦僕所常惑雖周覽六籍逾深其滯及覩經教始昭然有歸故請以先覺語當今之學者也君以為審分命所鍾可無祈驗於冥中餘慶之言在於勸教請審分命之旨為當宅情於理任而弗營邪為忘懷闇昧直置而已邪若宅情於理則理未可喻善惡紛互逆順莫檢苟非冥廢豈得弗營若直置而已則自非坐忘事至必感感因於事則情亦昇降履信獲祐何能不慶為惡弗罰焉得無怨雖欲忘懷其可得乎靖求諸己其效明矣又勸教之設必傍實而動直為訓之方不可一塗而盡故或若反而後會或曉昧於為言是以塗車芻靈堂室異詔或顯其遠或徵其近令循教之徒不苟求於分表飲和之士自足於仁義故深淺並訓而民聽不濫而神明之頤蘊於妙物豈得顯稱積善正位履霜而事與教反理與言違夷齊自得於安忍顏冉長悲於履和恐有為之言或異於此若謂商臣之徒教所不及汲引之端蓋中智已還而安于懷仁不沒其身臧會以僭有後魯國則分命所鍾於何而審玄明之唱更為疑府矣是以古之君子知通圮之來其過非新賢愚壽夭兆明自昔楚穆以福濃獲沒蔡靈以善薄受禍郗宛以釁深莫救宋桓以愆微易唱故洗心以懷宗練形以聞道拔無明之沈根翳貪愛之滯網不祈驗於冥中影嚮自徵不期存於應報而慶罰以彰故能反步八極水鏡萬有但微明之道理隔常域堯孔拯其麁宜有未盡史遷造其門而未踐乎室惜其在無聞之世故永悲以窮年君既涉其津亦應不遠而得此乃幽明之所寄豈唯言論而已乖敘多年聊以代懃來論又以為天地曠遠人事細近一善一惡無關冥應然則天網恢恢疎而遂失耶莫見乎隱莫顯乎微但盈換藏於日用交賒昧乎理緣故或乖於視聽耳山崩鍾應不以路遠喪感火澤革性不以同象成親詳檢數端可以少悟矣重與遠法師書安公和南間作釋疑論以寄其懷故呈之匠者思聞啟誨既辱還告開示宗轍并送周郎難甚有趣致但理本不同所見亦殊今重申鄙意答周復以相呈旨誠可求而辭不自暢想脫覽省戴公和南釋疑論答周居士難戴安公間以暇日因事致感脫作釋疑以呈法師既辱還告并來難辭喻清贍致有旨歸但自覺雖先觀者莫悟所見既殊孰是能正苟懷未悟請共盡之僕所謂能審分命者自呼識拔常均妙鑒理宗校練名實比驗古今者耳不謂淪溺生死之域欣慼失得之徒也苟能悟彭殤之壽夭則知脩短之自然察堯舜於朱均以得愚聖之有分推淵商之善惡足明冥中之無罰等比干盜跖可識禍福之非行既能體此數事然後分命可審不祈冥報耳若如來難宅情於理則理未可喻靖求諸己其明效矣此乃未喻由於求己非為無理可喻也若舍己而外鑒必不遠而復矣難曰勸教之設必傍實而動直為訓之方不可以一塗而盡僕豈謂聖人為教反真空設邪夫善惡生於天理是非由乎人心因天理以施教順人心以成務故幽懷體仁者挹玄風而載悅肆情出轍者顧名教而內掬功玄物表日用而忘其惠理蘊冥寂濤之不見其宗非違虛教以眩於世也是以前論云因神通以設故理妙而化敷順推遷而相引故功玄而事適者也難曰安于懷仁不沒其身臧會以僭有後魯國則分命所鍾於何而審玄明之唱更為疑府矣答曰斯乃所以明善惡之有定不由於積行也若夫仁者為善之嘉行安于懷之而受福僭者反理之邪事臧會為之而獲後良由分應沒身非履仁之所移命當為後非行僭之能罰豈異比干忠正而嬰剖心之戮張湯酷吏而獲七世之祜哉苟斯理之不殊則知分命之先定矣乃同玄明之有分非為成疑府也難曰古之君子知通圮之來其過非新賢愚壽夭兆明自昔楚穆以福濃獲沒蔡靈以善薄受禍郄宛以釁深莫救宋桓以愆微易唱答曰夫通圮非新壽夭自昔信哉斯言是僕所謂各有分命者也若夫福濃獲沒釁深莫救此則報應之來有若影嚮蔡靈以善薄受禍商臣宜以極逆羅殃宋桓以愆微易唱邾文應用行善延年而罪同罰異福等報殊何明鑒於蔡宋而獨昧於楚邾乎君所謂不祈驗於冥中影嚮自微不期在於應報而慶罰以彰於斯躓矣難曰然則天網恢恢疎而遂失耶莫見乎隱莫顯乎微但盈換藏於日用交賒昧於理緣答曰夫天理冥昧變狀難明且當推已兆之終古考應報之成跡耳至於善惡禍福或有一見斯自遇與事會非冥司之真驗也何以明之若其有司當如之治國長之一家善無微而不賞惡無纖而必罰使修行者保其素履極逆者受其酷禍然後積善之家被餘慶於後世積不善之家流殃咎乎來世耳而今則不然或惡深而莫誅或積善而禍臻或履仁義而亡身或行肆虐而降福豈非無司而自有分命乎若以盈換藏於日用交賒昧於理緣者但當報對遲晚不切目前耳非為善惡舛錯是非莫驗推斯而言人之生也性分夙定善者自善非先有其生而後行善以致於善也惡者自惡非本分無惡長而行惡以得於惡也故知窮達善惡愚智壽夭無非分命分命玄定於冥初行跡豈能易其自然哉天網不失隱見微顯故是勸教之言耳非玄明所謂本定之極致也既未悟妙推之有宗亦何分命之可審乎將恐向之先覺還為後悟矣言面未日聊以讜敘周居士書見重伸釋疑論辭理切驗善乎校實也但僕意猶有不同乃即欲更言所懷一日侍法師坐粗共求君意云氣力小佳當自有酬因君論旨兼有所見也僕是以不復稍厝其爝火須成旨因上君云審分命者乃是體極之人既非所同又僕所立不期存於應報而慶罰已彰亦不如君所位也書不盡言於是信矣其中小小亦多未喻付之未遇遠法師書見君與周居士往復足為賓主然佛教精微難以事詰至於理玄數表義隱於經者不可勝言但恨君作佛弟子未能留心聖典耳頃得書論亦未始暫忘年衰多疾不暇有答脫因講集之餘粗綴所懷今寄往試與同疑者共尋若見其族則比干商臣之流可不思而得釋慧遠頓首答遠法師書安公和南辱告并見三報論旨喻弘遠妙暢理宗覽省反復欣悟兼懷弟子雖伏膺法訓誠信彌至而少遊人林遂不涉經學往以艱毒交纏聊寄之釋疑以自攄散此蓋情發於中而形於言耳推其俗見之懷誠為未盡然三報曠遠難以辭究弟子尋當索歸必覲展冀親承音旨蓋祛其滯諸懷寄之周居士戴安公和南報應問何承天西方說報應其枝末雖明而根本常昧其言奢而寡要其譬迂而無徵乖背五經故見棄於先聖誘掖近情故得信於季俗夫欲知日月之行故假察於機將伸幽冥之信宜取符於見事故鑑燧懸而水火降雨宿離而風雲作斯皆遠由近驗幽以顯著者也夫鵝之為禽浮清池咀春草眾生蠢動弗之犯也而庖人執焉尠有得免刀爼者燕翻翔求食唯飛蟲是甘而人皆愛之雖巢幕而不懼非直鵝燕也群生萬有往往如之是知殺生者無惡報為福者無善應所以為訓者如彼所以示世者如此余甚惑之若謂燕非蟲不甘故罪所不及民食芻豢奚獨嬰辜若謂禽豕無知而人識經教斯則未有經教之時畋漁網罟亦無罪也無故以科法入中國乃所以為民陷穽也彼仁人者豈其然哉故余謂佛經但是假設權教勸人為善耳無關實敘是以聖人作制推德翳物我將我享寔膺天祜田獲三品賓庖豫焉若乃見生不忍死聞聲不食肉固君子之所務也竊願高明更加三思答何承天劉少府敬覽高話辭切證明所謂彼上人者難為酬對者也然如來窮理盡性因感成教故五善思啟戒品為之設六蔽待祛般若為之照薰以十善淨以無漏畢竟解脫至菩提而已矣斯末之所以明而本之不昧者耶孔以致孝為務則仁被四海釋以大慈為首則化周五道導物之迹非乃冥耶但應有麁精終然自殊耳凡覽般若諸經不以無孔為疑何獨誦丘之書而有見棄之言乎以龍鬼之陋尚感聖而至誘掖得信豈季俗而已哉足下據見在之教以詰三世之辯奢迂之怪固不待言若許因果不謬猶形之與影徵要之効如合符也若日月之行幽明之信水火之降風雲之作皆先因而後果不出感召之道故緣起鑑能致水緣滅燧不招火一切諸法從緣起滅耳若鵝之就斃味登爼鼎燕之獲免無取鹽梅故鵝殺於人猶虫死於燕鵝虫見世受人燕未來報報由三業業有遲疾若人入孝出悌揚于王庭君親無將將音埒而必誅此見報之疾著乎視聽者也若忠為令德剖心沈淵劫掠肆殺有幸而免此後報之遲疎而不失者也善惡之業業無不報但過去未來非耳目所得故信之者寡而非之者眾耳科法清淨滌塵開慧中國弗思謂為陷穽非我無謀秦弗用也勸人為善誠哉斯言然權者謂實非假設也故文王廢伯邑考而立武王權也周適非王發有天命禮是疎制理固從實伯廢發立實也各從其實德用交歸自非大智孰能預之經云善權方便亦復如是耳夫民生而殺性之欲也飲血席毛在上皇之世矣聖人去殺非教殺也但民殺未盡而化宜漸損雖將享三品尊薦厚賓然湯開其網孔釣不綱詩翼五豝禮弗身踐據茲而觀作者之心見矣今忍不食成己慈之心若推不忍於視聽之表均不食於見聞之內其至矣哉其至矣哉祇藉嘉評伸以管窺實相無言言成戲論既不自是想亦同非若高明之譬請俟諸君子辯宗論諸道人王衛軍問答謝靈運同遊諸道人並業心神道求解言外余枕疾務寡頗多暇日聊伸由來之意庶定求宗之悟釋氏之論聖道雖遠積學能至累盡鑒生方應漸悟孔氏之論聖道既妙雖顏殆庶體無鑒周理歸一極有新論道士以為寂鑒微妙不容階級積學無限何為自絕今去釋氏之漸悟而取其能至去孔氏之殆庶而取其一極一極異漸悟能至非殆庶故理之所去雖合各取然其離孔釋矣余謂二談救物之言道家之唱得意之說敢以折中自許竊謂新論為然聊答下意遲有所悟法勗問敬覽清論明宗極雖微而一悟頓了雖欣新剖竊有所疑夫明達者以體理絕欲悠悠者以迷惑嬰累絕欲本乎見理嬰累由於乖宗何以言之經云新學者離般若便如失明者無導是為懷理蕩患於茲顯矣若涉求未漸於大宗希仰猶累於塵垢則永劫劬勞期果緬邈既懷猶豫伏遲嘉訓初答道與俗反理不相關故因權以道之權雖是假旨在非假智雖是真能為非真非真不傷真本在於濟物非假不遂假濟則反本如此永劫無為空懃期果有如皎日勗再問案論孔釋其道既同救物之假亦不容異而神道之域雖顏也孔子所不誨實相之妙雖愚也釋氏所必教然則二聖建言何乖背之甚哉再答二教不同者隨方應物所化地異也大而較之監在於民華人易於見理難於受教故閉其累學而開其一極夷人易於受教難於見理故閉其頓了而開其漸悟漸悟雖可至昧頓了之實一極雖知寄絕累學之冀良由華人悟理無漸而誣道無學夷人悟理有學而誣道有漸是故權實雖同其用各異昔向子期以儒道為一應吉甫謂孔老可齊皆欲窺宗而況真實者乎勗三問重尋答以華夷有險易之性故二聖敷異同之教重方附俗可謂美矣然淵極朗鑒作則於上愚民蒙昧伏從於下故作則宜審其政伏從必是其宗今孔廢聖學之路而釋開漸悟之逕筌蹄既已紛錯群黎何由歸真三答冬夏異性資春秋為始末晝夜殊用緣晨暮以往復況至精之理豈可逕接至粗之人是故傍漸悟者所以密造頓解倚禮教者所以潛成學聖學聖不出六經而六經得頓解不見三藏而以三藏果筌蹄歷然何疑紛錯魚兔既獲群黎以濟僧維問承新論法師以宗極微妙不容階級使夫學者窮有之極自然之無有若符契何須言無也若資無以盡有者焉得不謂之漸悟耶初答夫累既未盡無不可得盡累之弊始可得無耳累盡則無誠如符契將除其累要須傍教在有之時學而非悟悟在有表託學以至但階級教愚之談一悟得意之論矣維再問論云悟在有表得不以漸使夫涉學希宗當日進其明不若使明不日進與不言同若日進其明者得非漸悟乎再答夫明非漸至信由教發何以言之由教而信則有日進之功非漸所明則無入照之分然向道善心起損累生垢伏伏似無同善似惡乖此所務不俱非心本無累至夫一悟萬滯同盡耳維三問答云由教而信則有日進之功非漸所明則無入照之分夫尊教而推宗者雖不永用當推之時豈可不暫合無耶若許其暫合猶自賢於不合非漸如何三答暫者假也真者常也假知無常常知無假今豈可以假知之暫而侵常知之真哉今暫合賢於不合誠如來言竊有微證巫臣諫莊王之日物賒於己故理為情先及納夏姬之時已交於物故情居理上情理雲互物己相傾亦中知之率任也若以諫自為悟豈容納時之惑耶且南為聖也北為愚也背北向南非停北之謂向南背北非至南之稱然向南可以向南背北非是停北非是停北故愚可去矣可以至南故悟可得矣慧驎演僧維問當假知之一合與真知同異初答與真知異驎再問以何為異再答假知者累伏故理暫為用用暫在理不恒其知真知者照寂故理常為用用常在理故永為真知驎三問累不自除故求理以除累今假知之一合理實在心在心而累不去將何以去之乎三答累起因心心觸成累累恒觸者心日昏教為用者心日伏伏累彌久至於滅累然滅之時在累伏之後也伏累滅累貌同實異不可不察滅累之體物我同忘有無一觀伏累之狀他己異情空實殊見殊實空異己他者入於滯矣一無有同我物者出於照也驎維問三世長於百年三千廣於赤縣四部多於戶口七寶妙於石沙此亦方有小大故化有遠近得不謂之然乎初答事理不同恒成四端自有小大各得其宜亦有賢愚違方而處所謂世同時異物是人非譬割鷄之政亦有牛刀佩璽而聽豈皆唐虞今謂言折體盡於武城長世皆覃於天下未之聞也且俱稱妙覺而國土精粗不可以精粗國土而言聖有優劣景迹之應本非所徵矣維再問論云或道廣而事狹或事是而人非今不可以事之小大而格道之粗妙誠哉斯言但所疑不在此耳設令周孔實未盡極以之應世故自居宗此自是世去聖遠未足明極夫降妙數階以接群粗則粗者所不測然數階之妙非極妙之謂推此而言撫世者於粗為妙然於妙猶粗矣以妙乘粗則無往不盡以粗求妙則莫覩其原無往不盡故謂之窮理莫覩其原故仰之彌高今豈可就顏氏所崇而同之極妙耶再答今不藉顏所推而謂之為極但謂顏為庶幾則孔知幾矣且許禹昌言孔非本談以堯則天體無是同同體至極豈計有之小大耶維三問凡世人所不測而又昌言者皆可以為聖耶三答夫昌言賢者尚許其賢昌言聖者豈得反非聖耶日用不知百姓之迷蒙惟佛究盡實相之崇高今欲以崇高之相而令迷蒙所知未之有也苟所不知焉得不以昌言為信既以釋昌為是何以孔昌為非耶竺法綱問敬披高論探研宗極妙判權實存旨儒道遺教孔釋昌言折中允然新論可謂激流導源瑩拂發暉矣詳複答勗維之問或謂因權以通或學而非悟爾為玄句徒設無關於胸情焉竊所未安何以言之夫道形天隔幾二險絕學不漸宗曾無髣髴馳騁有端思不出位神崖曷由而登幾峰所從而超哉若懃務於有而坐體於無者譬猶揮毫鍾張之側功侔羿養之能不然明矣蓋同有非甚閡尚不可以翫此而善彼豈況乎有無之至背而反得以相通者耶又云累既未盡無不可得盡累之弊始可得無耳問曰夫膏肓大道摧輈玄路莫尚於封有之累也蓋有不能祛有祛有者必無未有先盡有累然後得無也就如所言累盡則無爾為累之自去實不無待實不無待則不能不無故無無貴矣如彼重暗自晞無假火日無暇火日則不能不設亦明無尚焉落等級而奇頓悟將於是乎躓矣暇任之餘幸思嘉釋釋慧琳問三復精議辨㦎二家斟酌儒道實有懷於論矣至於去釋漸悟遺孔殆庶蒙竊惑焉釋云有漸故是自形者有漸孔之無漸亦是自道者無漸何以知其然耶中人可以語上久習可以移性孔氏之訓也一合於道場非十地之所階釋家之唱也如此漸絕文論二聖詳言豈獨夷束於教華拘於理將恐斥離之辯辭長於新論乎勗道人難云絕欲由於體理當謂日損者以理自悟也論曰道與俗反本不相關故因權以通之物濟則反本問曰權之所假習心者亦終以為慮乎為曉悟之日與經之空理都自反耶若其永背空談翻為未說若始終相扶可修教而至不答維驎假知中殊為藻艶但與立論有違假者以旋迷喪理不以鑽火致惑苟南向可以造越北背可以棄燕信燕北越南矣慮空可以洗心損有可以祛累亦有愚而空聖矣如此但當懃般若以日忘瞻郢路而驟進復何憂於失所乎將恐一悟之唱更躓於南北之譬耶答綱琳二法師披覽雙難欣若暫對藻豐論博蔚然滿目可謂勝人之口然未厭於心聊伸前意無由言對執筆長懷謝靈運和南答綱公難來難云同有非甚閡尚不可以翫此而善彼豈況乎有無之至背而反得以相通者耶此是拘於所習以生此疑耳夫專翫筆札者自可不工於弧矢弧矢既工復翫筆札者何為不兼哉若封有而不向宗自是封者之失造無而去滯何為不可得皆借不兼之有以詰能兼之無非惟鍾胡愧射於更李羿養慚書於羅趙觸類之躓始充巧歷之歎今請循其本夫憑無以伏有伏之則有忘伏時不能知知則不復辨是以坐忘日損之談近出老莊數緣而滅經有舊說如此豈累之自去實無之所濟且明為晦新功在火日但火日不稱功於幽闇般若不言惠於愚憃耳推此而往詎俟多云答琳公難孔雖曰語上而云聖無階級釋維曰一合而云物有佛性物有佛性其道有歸所疑者漸教聖無階級其理可貴所疑者殆庶豈二聖異塗將地使之然斥離之難始是有在辭長之論無乃角弓耶難云若其永背空談翻為未說若始終相扶可循教而至可謂公孫之辭辯者之囿矣夫智為權本權為智用今取聖之意則智即經之辭則權傍權以為檢故三乘咸蹄筌既意以歸宗故般若為魚兔良由民多愚也教故迂矣若人皆得意亦何貴於攝悟假知之論旨明在有者能為達理之諫是為交賒相傾非悟道之謂與其立論有何相違燕北越南有遇空聖其理既當頗獲於心矣若懃者日忘瞻者驟進亦實如來言但懃未是得瞻未是至當其此時可謂向宗既得既至可謂一悟將無同轡來馳而云異𨅊耶王衛軍問論曰由教而信有日進之功非漸所明無入照之分問曰由教而信而無入照之分則是闇信聖人若闇信聖人理不關心政可無非聖之尤何由有日進之功論曰暫者假也真者常也假知無常常知無假又曰假知累伏理暫為用用暫在理不恒其知問曰暫知為假知者則非不知矣但見理尚淺未能常用耳雖不得與真知等照然寧無入照之分耶若暫知未是見理豈得云轉理暫為用又不知以為稱知論曰教為用者心日伏伏累彌久至於滅累問曰教為用而累伏為云何伏耶若都未見理專心闇信當其專心唯信而已謂此為累伏者此是慮不能並為此則彼廢耳非為理累相權能使累伏也凡厥心數孰不皆然如此之伏根本未異一倚一伏循環無已雖復彌久累何由滅弘曰一悟之談常謂有心但未有以折中異同之辯故難於厝言耳尋覽來論所釋良多然猶有未好解處試條如上為呼可容此疑不既欲使彼我意盡覽者泠然又對無兆兼當造膝執筆增懷真不可言王弘敬謂答王衛軍問問曰由教而信而無入照之分則是闇信聖人耶若闇信聖人理不關心政可非聖之尤何由有日進之功答曰顏子體二未及於照則向善已上莫非闇信但教有可由之理我有求理之志故曰關心賜以之二回以之十豈直免尤而已實有日進之功問曰暫知為假知者則非不知矣但見理向淺未能常用耳雖不得與真知等照然寧可謂無入照之分耶若暫知未是見理豈得云理暫為用又不知以何稱知答曰不知而稱知者政以假知得名耳假者為名非暫知如何不恒其用豈常之謂既非常用所以交賒相傾故諫人則言政理悅已則犯所知若以諫時為照豈有悅時之犯故知言理者浮談犯知者沈惑推此而判自聖已下無淺深之照然中人之性有崇替之心矣問曰教為用而累伏為云何伏耶若都未見理專心闇信當其專心唯信而已謂此為累伏者此是慮不能並屬此則彼廢耳非為理累相權能使累伏也凡厥心數孰不皆然如此之伏根本末異一倚一伏循環無已雖復彌久累何由滅答曰累伏者屬此則廢彼實如來告凡厥心數孰不皆然亦如來旨更恨不就學人設言而以恒物為譏耳譬如藥驗者疾易痊理妙者吝可洗洗吝豈復循環疾痊安能起滅則事不侔居然已辨但無漏之功故資世俗之善善心雖在五品之數能出三界之外矣平叔所謂冬日之陰輔嗣亦云遠不必携聊借此語以況入無果無阻隔靈運自一悟理質以經誥可謂俗文之談然書不盡意亦前世格言幽僻無事聊與同行道人共求其衷猥辱高難辭微理析莫不精究尋覽彌日欣若暫對輒復更伸前論雖不辯酬釋來問且以示懷耳海嶠岨逈披敘無期臨白增懷眷歎良深謝靈運再拜王衛軍重答書更尋前答超悟亦不知所以為異政當爾已送示生公此間道人故有小小不同小涼當共面盡脫有厝言更白面寫未由寄之於此所散猶多竺道生答王衛軍書究尋謝永嘉論都無間然有同似若妙善不能不以為欣檀越難旨甚要切想尋必佳通耳且聊試略取論意以伸欣悅之懷以為苟若不知焉能有信然則由教而信非不知也但資彼之知理在我表資彼可以至我庸得無功於日進未是我知何由有分於入照豈不以見理於外非復全昧知不自中未為能照耶與安成侯嵩書姚興吾曾以己所懷疏條摩訶衍諸義圖與什公平詳厥衷遂有哀故不復能斷理未久什公尋復致變自爾喪戎相尋無復意事遂忘棄之近以當遣使送像欲與卿作疏箱篋中忽得前所條本末今送示卿徐徐尋撫若於卿有所不足者便可致難也見卿未日並可以當言笑吾前試通聖人三達觀以諮什公公尋有答今并送往請此事皆是昔日之意如今都無情懷如何矣通三世論曾問諸法師明三世或有或無莫適所定此亦是大法中一段處所而有無不泮情每慨之是以忽疏野懷聊試孟浪言之誠知孟浪之言不足以會理然胸襟之中欲有少許意子不能默已輒疏條相呈匠者可為折衷余以為三世一統循環為用過去雖滅其理常在所以在者非如阿毘曇注言五陰塊然喻若足之履地真足雖往厥迹猶存當來如火之在木木中欲言有火耶視之不可見欲言無耶緣合火出經又云聖人見三世若其無也聖無所見若言有耶則犯常嫌明過去未來雖無眼對理恒相因苟因理不絕聖見三世無所疑矣什法師答雅論大通甚佳去來定無此作不通佛說色陰三世和合總名為色五陰皆爾又云從心生心如從穀生穀以是故知必有過去無無因之咎又云六識之意識依已滅之意為本而生意識又正見名過去業未來中果法也又十力中第二力知三世諸業又云若無過去業則無三途報又云學人若在有漏心中則不應名為聖人以此諸比固知不應無過去若無過去未來則非通理經法所不許又十二因緣是佛法之深者若定有過去未來則與此法相違所以者何如有穀子地水時節牙根得生若先已定有則無所待有若先有則不名從緣而生又若先有則是常倒是故不得定有不得定無有無之說唯時所宜耳以過去法起行業不得言無又云今不與目對不得言有雅論之通甚有佳致又大品所明過去如不離未來現在如未來現在如亦不離過去如此亦不言無也此實是經中之大要俟得高對通復盡之通不住法住般若眾生之所以不階道者有著故也是以聖人之教恒以去著為事故言以不住般若雖復大聖玄鑒應照無際亦不可著著亦成患欲使行人忘彼我遺所寄汎若不繫之舟無所倚薄則當於理矣通聖人放大光明普照十方聖人之教玄通無涯致感多方不可作一途求不可以一理推故應粗以粗應細以細應理固然矣所以放大光明現諸神變者此應十方諸大菩薩將紹尊位者耳若處俗接麁復容此事耶阿含經云釋氏之處天竺四十餘載衣服飲食受諸患痛與人不別經又云聖人亦入鹿馬而度脫之當在鹿馬豈異於鹿馬哉若不異鹿馬應世常流不待此神變明矣每事要須自同於前物然後得行其化耳通三世眾生歷涉三世其猶循環過去未來雖無眼對其理常在是以聖人尋往以知往逆數以知來通一切諸法空夫道者以無為為宗若其無為復何所有耶安成侯姚嵩表臣言奉珠像承是皇后遺囑所建禮覲之日永慕罔極伏惟感往增懷臣言先承陛下親營像事每注心延望遲冀暫一禮敬不悟聖恩垂及乃復與臣供養此像既功寶並重且於制作之理擬若神造中來所見珠像誠當奇妙然方之於此信復有間瞻奉踊躍實在無量夫受乾施者無報蒙恩隆者無謝雖欲仰陳愚誠亦復莫知所盡臣言臣言奉陛下所通諸義理味淵玄辭致清勝簡詣踰於二篇妙盡侔乎中觀詠之翫之紙已致勞而心猶無厭真可謂當時之高唱累劫之宗範也但臣頑闇思不參玄然披尋之日真復詠歌弗暇不悟弘慈善誘乃欲令參致問難敢忘愚鈍輒位敘所懷豈曰存難直欲諮所未悟耳臣言臣言上通三世甚有深致既已遠契聖心兼復抑正眾說宗塗亹亹超絕常境欣悟之至益令賞味增深加為什公研該兼備實非愚臣所能稱盡正當銘之懷抱以為心要耳臣言臣言上通不住法住般若義云眾生所以不階道者有著故也聖心玄詣誠無不盡然至乎標位六度而以無著為宗取之於心誠如明誨即之于事脫有未極夫無著雖妙似若有不即真兩冥有不即真兩冥恐是心忘之謂耳竊尋玄教如更有以謹牒成言以攄愚見故經云以無所捨法具足檀波羅蜜以此三事不可得故三者既冥有無無當無當之理即同幻化以此而推恐不住之致非直忘彼我遺所寄而已難上通聖人放大光明普照十方詔云放大光明諸神變者此自應十方諸大菩薩將紹尊位者耳斯理之玄固非庸近所參然不已之情猶欲言所未達夫萬有不同精麁亦異應彼雖殊而聖心恒一恒一故圓以應之不同故權以濟之雖鹿馬而未始乖其大雖現神變而未始遺其細故淨名經云如來或以光明而作佛事或以寂寞而作佛事顯默雖異而終致不二然則於小大之間恐是時互說耳如華手經初佛為德藏放大光明令諸眾生普蒙其潤又思益經中網明所問如來三十三種光明一切遇者皆得利益法華經云佛放眉間相光亦使四眾八部咸皆生疑又云處闇眾生各得相見苟有其緣雖小必益苟無其因雖大或乖故般若經云若有眾生遇斯光者必得無上道又以神變令三惡眾生皆生天上以此而言至於光明神變之事似存平等敢緣慈顧輒竭愚思若復哀矜重開道者豈直微臣獨受其賜難通一切諸法皆空詔云夫道者以無為為宗若其無為復何所為耶至理淵淡誠不容言然處在涉求之地不得不尋本以致悟不審明道之無為為當以何為體若以妙為宗者雖在帝先而非極若以無有為妙者必當有不無之因因稱俱未冥詎是不二之道乎故論云無於無者必當有於有有無之相譬猶脩短之相形耳無理雖玄將恐同彼斷常常猶不可況復斷耶然則有無之肆乃是邊見之所存故中論云不破世諦故則不破真諦又論云諸法若實則無二諦諸法若空則無罪福若無罪福凡聖無泮二苟無泮道何所益由臣闇昧未悟宗極唯願仁慈重加誨諭姚興答卿所難問引喻兼富理極深致實非膚淺所能具答今為當都格以相酬耳卿引般若經云若有眾生遇斯光者必得無上道即經所言未聞有凡流而得見光明者如釋迦放大光明普照十方當斯之時經不言有群品而得見其怪而異之者皆是普明之徒以斯言之定不為群小也卿若以眾生為疑者百億菩薩豈非眾生之謂耶然經復云普明之詣釋迦皆與善男子善女人持諸華香來供養釋迦及致供養之徒自應普蒙其潤也但光明之作本不為善男子善女人所以得蒙餘波者其猶蠅附驥尾得至千里之舉耳卿又引神變令三惡眾生得生人天若在鹿為鹿在馬為馬而度脫之豈非神變之謂耶華手思益法華諸經所言若云放大光明自應與大品無異也若一一光明以應適前物此作非大所通夫光明之與寂寞此直發意有參差其揆一也卿引經言施者受者財物不可得與不住法不住般若未有異二者直是始終之教也統而言之俱是破著之語耳何者罪不罪施者受者及財物都不可得若都不可得復何所著是勸無所著明矣卿又問明道之無為為宗同諸法之自空為妙空無以成極耶又引論中二諦之間言意所不及道之無為所寄耶吾意以為為道止無為未詳所以宗也何者夫眾生之所以流轉生死者皆著故也若欲止於心即不復生既不生死潛神玄漠與空合其體是名涅槃耳既曰涅槃復何容有名於其間哉夫道以無寄為宗若求寄所在恐乃惑之大者也吾所明無為不可為有者意事如隱尋求或當小難今更重伸前義卿所引中論即吾義宗諸法若不空則無二諦若不有亦無二諦此定明有無不相離何者若定言有則無以拔高士若定明無則無以濟常流是以聖人有無兼抱而不捨者此之謂也然諸家通第一義廓然空寂無有聖人吾常以為殊太遙遠不近人情若無聖人知無者誰也安成侯嵩重表臣言奉賜還詔誨喻周備伏尋之日欣踊無量陛下爰發德音光闡幽極拓道義之門演如來之奧冥宗隱而復彰玄扉掩而再敞文外之旨可謂朗然幽燭矣夫理玄者不可以言稱事妙者固非常辭之所讚雖欲心仰詠亦罔知所盡由臣愚鈍而猥蒙陛下褒飾之美誠復欣戴殊眷實𧹞比仰味微言研詠彌至其為蒙悟豈唯過半之益但臣仍充外役無由親承音旨每望雲遐慨實在罔極不勝延係謹以申聞臣嵩言得表具一二吾常近之才加多事惛塞觸事面牆不知道理安在為復以卿好樂玄法是以聊復孟浪以言之耳而來喻過美益以不安折疑論唐沙門釋慧淨太子中舍辛諝學該文史誕傲自矜心存道術輕弄佛法染翰著論詳略釋宗時有對者諝必碎之于地謂僧中之無人也慧淨法師不勝其侮乃裁論以擬之曰披覽高論博究精微旨贍文華驚心眩目辯超炙輠理跨聯環幽難勃以縱橫掞藻紛其駱驛非夫哲士誰其溢心瞻彼上人固難與對輕持不敏寧酬客難來論云一音演說各隨類解蠕動眾生皆有佛性然則佛陀之與先覺語從俗異智慧之與般若義本玄同習智覺若非勝因念佛慧豈登妙果答曰大哉斯舉也深固幽遠理涉嫌疑今當為子略陳梗概若乃問同答異文郁郁於孔書名一義乖理明明於釋典若名同不許義異則問一不得答殊此例既昇彼並自沒如有未喻更為提撕夫以住無所住萬善所以兼修為無不為一音所以齊應豈止絕聖棄智抱一守雌冷然獨善義無兼濟較言優劣其可倫乎二宗既辯百難斯滯論云必彼此名言遂可分別一音各解乃翫空談答曰誠如來旨亦須分別竊以逍遙一也鵬鷃不可齊乎九萬榮枯同也椿菌不可齊乎八千而況爝火之侔日月浸灌之方時雨寧有分同明潤而遂均其曜澤哉至若山毫一其小大彭殤均其壽夭莛楹亂其橫竪施厲混其妍蚩斯由相待不定相奪可忘莊生所以絕其有封非謂未始無物斯則以余分別攻子分別子亡分別即余亡分別矣君子劇談幸無虛論一言易失駟馬難追斯文誡矣深可慎哉論云諸行無常觸類緣起復心有待資氣涉求然則我淨受於熏修慧定成於繕剋答曰無常者故吾去也緣起者新吾來也故吾去矣吾豈常乎新吾來矣吾豈斷乎新故相傳假熏修以成淨美惡更代非繕剋而難功是則生滅破於斷常因果顯乎中觀斯寔莊釋玄同東西理會而吾子去彼取此得無謬乎論云續鳧截鶴庸詎真如草化蜂飛何居弱喪答曰夫自然者報分也熏修者業理也報分已定二鳥無羨於短長業理資緣兩蟲有待而飛化然則事像易疑沈冥難曉幽求之士淪惑罔息至乃道圓四果尚昧衣珠位隆十地猶昏羅縠聖賢固其若此而況庸庸者乎自非鑒鏡三明雄飛七辯安能妙契玄極敷究幽微貧道藉以受業家門朋從是寄希能擇善敢進芻蕘如或鏗然願詳金牒於是辛氏頂受斯文頓裂邪網斯疑前周沙門姚道安二教論已有成解但未見者謂辛草創有李遠問舍人者曾讀斯論意所未詳便以示沙門法琳請更廣其義類琳乃答曰蒙示辛氏與淨法師齊物論大約兩問詞旨宏贍理致幽絕既開義府特曜文鋒舉佛性平等之談別群生各解之說陳彼此之兩難辯玄同之一門非夫契彼寰中孰能振斯高論美則美矣疑頗疑焉何者尋上皇朝徹始流先覺之名法王應物爰標佛陀之號智慧者蓋分別之小術般若者乃無知之大宗分別緣起所以強稱先覺無知性寂於是假謂佛陀分別既影於外有數無知則於內無心於外有數分別之見不亡於內無心誘引之功莫匱甚秋毫之方巨岳踰尺鷃之比大鵬不可同年而語矣莊生云吾亡是非不亡彼此庸詎然乎所以小智不及大智小年不及大年惟彭祖之特聞非眾人之所逮也況三世之理不差二諦之門可驗是以聖立因果凡夫有得聖之期道稱自然學者無成道之望從微至著憑繕剋而方研乘因趣果藉薰修而始見彼既知而故問余亦述而略答詳夫一音普被弱喪由是同歸四智廣覃真如以之自顯自顯也者惟微惟彰同歸也者孰來孰去蓋知隨業受報二鳥不嫌其短長因濕致生兩蟲無擇於飛化不存待與無待明即待之非待矣請試論之昔闞澤有言孔老法天諸天法佛洪範九疇承天制用上方十善奉佛慈風若將孔老以匹聖尊可謂子貢賢於仲尼跛鼈陵於駿驥欲觀渤澥更保涓流何異蔽目而視毛端却行以求郢路非所應也非所應也且王導周顗宰輔之冠蓋王濛謝尚人倫之羽儀次則郗超王謐劉璆謝客等並江左英彥七十餘人皆學綜九流才映千古咸言性靈真要可以持身濟俗者莫過于釋氏之教及宋文帝與何尚之王玄保等亦有此談如其宇內並遵斯要吾當坐致太平矣尚之又云十善暢則人天興五戒行則鬼畜絕其實濟世之玄範豈造次而可論乎中舍學富才高文華理切秦懸一字蜀挂千金何以當茲奇麗也不量管見輕陳鄙俚敢此有酬示麻續組耳李舍人得琳重釋渙然神解重疑頓消仍以斯論廣于視聽故得二文雙顯各其志乎
