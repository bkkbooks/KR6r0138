body:
  text: 大唐西明寺沙門釋道宣撰辨惑篇第二之四擊像焚經坑僧詔元魏世祖太武帝帝諱燾以明元帝泰常八年即位時年八歲尚在幼沖資政所由惟恃台輔時司徒崔浩尤不信佛帝訪國事每以為懷言佛法虛誕為俗費害黃老仙道可以存心浩既雅信仙道授帝老經隨言信用曾無思擇即立道壇四追方士當時佛法隆盛浩內嫉之常求瑕釁會蓋吳反於杏城關中騷動帝乃西伐時浩從焉既至長安有沙門種麥於寺中御騶牧馬帝入觀馬從官入其便室見有弓矢出以奏聞帝怒曰此非沙門所用當與蓋吳通謀規害人耳命有司案誅一寺閲其財産及州郡牧守富人所寄藏物蓋以萬計詔乃焚破佛像敕留臺下四方一依長安行事太平真君五年帝年二十有九春秋方富盛於武功崔浩邪謀相接交扇方士仙觀日有登臨釋門清衆將事殲殄又下詔曰愚民無識信偽惑妖私養師巫挾藏讖記沙門之徒假西域虛誕坐致妖孽非所以一齊政化布淳德於天下也自王公以下至於庶人有私養沙門者限今年二月十五日過期不出沙門身死容止者誅一門時恭宗為太子監國素敬佛法頻上表陳刑殺沙門之濫又非圖像之罪今罷其道杜諸寺門世不修奉土木丹青自然毀滅如是再三不許時有沙門玄高者空門之秀傑也太子晃師之晃敬事如佛崔浩得幸於帝恐晃攝政或見危逐密讒於帝晃有異圖若不先慮後悔無及又晃結納玄高高又通靈鬼物善得人心可不猜耶帝初不從後且幽之又夢其先祖云太子無事又問百官咸云太子仁孝抂見幽辱帝乃出晃以政歸之浩又重譖帝信之便幽死晃於禁中縊高於郊南浩得志於朝廷也列辟莫敢致言便以太平真君七年三月下詔一切蕩除所有圖像胡經皆擊破焚毀沙門無少長悉坑之斯並崔浩之意致也及後帝遭癘惱浩被族誅呼嗟長慨無所及矣事迹如前釋老志廣之周滅佛法集道俗議事周高祖猜忌為心安忍嫌隙大冢宰晉國公護權衡百揆決通庶政帝竊嫉之恐有陵奪召護入內親自誅之并大臣六家並從族滅帝以得志於天下一無所慮也然信任讖緯偏以為心自古相傳黑者得也謂有黑相當得天下猶如漢末訛言黃衣當王以黃代赤承運之像言黑亦然所以周太祖挾魏西奔衣物旗幟並變為黑用期訛讖之言斯亦漢光武之餘命也昔者高洋之開齊運流俗亦有此謠洋言黑者稠禪師黑衣天子也將欲誅之會稠遠識悟而得免備如別説故周祖初重佛法下禮沙門並著黃衣為禁黑故有道士張賓譎詐罔上私達其黨以黑釋為國忌以黃老為國祥帝納其言信道輕佛親受符録躬服衣冠有前僧衛元嵩與賓脣齒相扇惑動帝情云僧多怠惰貪逐財食不足欽尚帝召百僧入內七宵行道時既密知各加懇到帝亦同僧寢處覘候得失或為僧讀誦或讚唄禮悔僧皆懍厲莫不訝帝之微行也既期已滿無何而止至天和四年歲在已丑三月十五日敕召有德衆僧名儒道士文武百官二千餘人帝御正殿量述三教以儒教為先佛教為後道教最上以出於無名之前超於天地之表故也時議者紛紜情見乖咎不定而散至其月二十日依前集論是非更廣莫簡帝心帝曰儒教道教此國常遵佛教後來朕意不立僉議如何時議者陳理無由除削帝曰三教被俗義不可俱至四月初更依前集必須極言陳理無得面從又敕司隸大夫甄鸞詳度佛道二教定其深淺辨其真偽天和五年鸞乃上笑道論三卷用笑三洞之名至五月十日帝大集群臣詳鸞上論以為傷蠧道法帝躬受之不愜本圖即於殿庭焚蕩時道安法師又上二教論云內教外教也練心之術名三乘內教也救形之術名九流外教也道無別教即在儒流斯乃易之謙謙也帝覽論以問朝宰無有抗者於是遂寢乃經五載至建德三年歲在甲午五月十七日初斷佛道兩教沙門道士並令還俗三寶福財散給臣下寺觀塔廟賜給王公餘如別述于時衛王不忍其事直入宮燒乾化門攻帝不下退至虎牢捉獲入京父子十二人并同謀者並誅二教論沙門釋道安歸宗顯本第一有東都逸俊童子問於西京通方先生曰僕聞風流傾墜六經所以緝修誇尚滋彰二篇所以述作故優柔弘潤於物必濟曰儒用之不匱於物必通曰道斯皆孔老之神功可得而詳矣近覽釋教文博義豐觀其汲引則恂恂善誘要其指趣則亹亹茲良然三教雖殊勸善義一塗迹誠異理會則同至於老嗟身患孔歎逝川固欲後外以致存生感往以知物化何異釋典之厭身無常之説哉但拘滯之流未馳高觀不能齊天地於一指均是非乎一氣致令談論之際每有不同此所謂匿摩尼於胎㲉掩大明於重夜傷莫二之純風塞洞一之玄指祈之彌劫奚可值哉敬請先生為之開闡通方先生曰子之問也激矣哉可謂窮辨未盡理也僕雖不敏稽疑上國服膺靈章陶風下席今當為子略陳其要夫萬化本於無生而生生者無生三才兆於無始而始始者無始然則無生無始物之性也有化有生人之聚也聚雖一體而形神兩異散雖質別而心數弗亡故救形之教教稱為外濟神之典典號為內是以智度有內外兩經仁王辨內外二論方等明內外兩律百論言內外二道若通論內外則該彼華夷若局命此方則可云儒釋釋教為內儒教為外備彰聖典非為誕謬詳覽載籍尋討源流教唯有二寧得有三何則昔玄古朴素墳典之誥未弘淳風稍離丘索之文乃著故包論七典統括九流咸為治國之謨並是修身之術故藝文志曰儒之流蓋出於司徒之官助人君順陰陽明教化者也遊文於六經之中留意於五德之際祖述堯舜憲章文武宗師仲尼其道最高者也道家者流蓋出於史官清虛以自守卑弱以自持此君人者南面之術合於堯之克讓易之謙謙是其所長也陰陽家者流蓋出於羲和之官敬順昊天曆象日月星辰敬授民時此者所長也法家者流蓋出於理官信賞必罰以輔禮制易曰先王以明罰敕法此其所長也名家者流蓋出於禮官古者名位不同禮亦異數孔子曰必也正名乎名不正則言不順言不順則事不成此其所長也墨家者流蓋出於清廟之官茅屋採椽是以貴儉養三老五更是以兼愛選士大射是以上賢宗祀嚴父是以有鬼此其所長也縱橫家者流蓋出於行人之官孔子曰誦詩三百使乎四方不能專對雖多亦奚以為又曰使乎使乎言其當權事制宜受命而不受詞此其所長也雜家者流蓋出於議官兼儒墨含名法知國體之有此見王治無不貫此其所長也農家者流蓋出於農稷之官播五穀勸耕桑以足衣食故八政一曰食二曰貨此其所長也若派而別之則應有九教若總而合之則同屬儒宗論其官也各王朝之一職談其籍也並皇家之一書子欲於一代之內令九流爭川大道之世使小成競辨豈不上傷皇極莫二之風下開拘放鄙蕩之弊真所謂巨蠧鴻猷眩曜朝野矣佛教者窮理盡性之格言出世入真之軌轍請其文則部分十二語其旨則四種悉檀理妙域中固非名號所及化擅繫表又非情智所尋至於遣纍落筌陶神盡照近超生死遠證泥洹播闡五乘接群機之深淺該明六道辨善惡之升沈敻期出世而理無不周邇比王化而事無不盡能博能要不質不文自非天下之至慮孰能與斯教哉雖復儒道千家墨農百氏取捨驅馳未及其度者也惟釋氏之教理富權實有餘不了稱之曰權無餘了義號之為實通云善誘何成妙賞子謂三教雖殊勸善義一余謂善有精麁優劣宜異精者超百化而高升麁者循九居而未息安可同年而語其勝負哉又云教迹誠異理會則同爰引世訓以符玄教此蓋悠悠之所昧未暨其本矣教者何也詮理之謂理者何也教之所詮教若果異理豈得同理若必同教寧得異筌不期魚蹄不為兔將為名乎理同安在夫厚生情篤身患之誡遂興不悟遷流逝川之歎乃作並是方內之至談諒非踰方之巨唱何者推色盡於極微老氏之所未辨究心窮於生滅宣尼又所未言可謂瞻之似盡察之未極者也故涅槃經曰分別色心有無量相非諸聲聞緣覺所知且聲聞之與菩薩俱越妄想之鄉菩薩則惠兼九道聲聞則獨善一身其猶露潤之方巨壑微塵之比須彌況凡夫識想何得齊乎故淨名曰無以日光等彼螢火若夫以齊而齊不齊者未齊矣以齊而齊於齊者未齊焉余聞善齊天下者以不齊而齊天下者也何須夷嶽實淵然後方平續鳧截鶴於焉始等此蓋狷夫之野議豈達士之貞觀故諺曰紫實昧朱狂斯濫哲請廣其類更曉子懷上至天子下至庶民莫不資色心以成軀稟陰陽以化體不可以色心是等而便混以智愚安得以陰陽義齊則同之貴賤此之不可至理皎然雖強齊之其義安在儒道升降第二問曰先生涇渭孔釋清濁大懸與奪儒道取捨尤濫史遷六氏道家為先班固九流儒宗為上討其祖述並可命家論其憲章未乖典式欲言俱非情謂未可儻其都是何宜去取答曰塗軌乖順不可無歸朱紫之際久宜有在漢書十志並是古則藝文五行豈今始有農為治本史遷不言安毀縱橫官典俱漏故孟堅之撰今古褒其是子長之論曩見貶其非是以前漢書曰史遷序墳籍則先黃老後六經論遊俠則退處士進姦雄述貨殖則崇勢利羞貧賤此其為弊也後漢書曰太史令司馬遷採左氏國語刪世本戰國策據楚漢春秋列時事上自黃帝下訖獲麟作本紀世家列傳書表凡百三十篇而十篇缺焉至於採經托傳分散百家之事甚多疏略不如其本務欲以多聞廣載為功論義淺而不篤其論術學也則崇黃老而薄五經輕仁義而賤守節此其甚弊傷道所過極刑之咎也又晉書禮樂志曰世稱子長史記奇而不周奇謂博古遠達不周謂弊於儒道儒道既弊聖教不興何王摹之尚道廢儒惑亂天下變風毀俗遂使魏晉為之陵遲四夷交侵中國微矣此皆國史實録之文奚獨可異校其得失詳列典志取捨升降何豫鄙懷問老子之教蓋修身治國絶棄貴尚論大道則為三才之元辨上德則為五事之本猶陶埏之成造譬槖籥之不窮先生何為抑在儒下答曰余聞恬志大和者不務變常安時處順者不求反古故詩曰不愆不忘率由舊章惟藝文之盛易最優矣吾子謂老與易何若昔宓羲氏仰觀象於天俯察法於地近取諸身遠取諸物於是始作八卦以通神明之德以類萬物之情文王重六爻孔子弘十翼故曰易道深矣人更三聖世歷三古故繫詞曰易有太極是生兩儀易説曰夫有形生於無形故曰有太易有太初有太始有太素太易者未見氣也太初者氣之始太始者形之始太素者質之始本氣形質而未相離故曰混沌視之不見聽之不聞循之不得故曰易也孝經説曰奇者陽節偶者陰基得陽而成合陰而居數相配偶乃為道也故曰一陰一陽之謂道陰陽不測謂之神此而遐瞻足賢於老也子謂仁由失德而興禮生忠信之簿安其所習毀所不見且大樂與天地同和大禮與天地同節豈在飾敬之年責報之歲哉然老氏之旨本救澆浪虛柔善下修身可矣不上賢能於治何續既扶易之一謙便是儒之一派幸勿同放兼棄五德君為教主第三問敬尋懋製剖析離合云派而別之應有九教統而合之同一儒宗採求理例猶謂未當何者名雜鄧尹法參悝商墨出由胡農興野老斯皆製通賢達不可以為教首孔老聖歟可以命教故九流之中唯論其二儒教道教豈不婉哉答曰子之問也似未通遠夫帝王功成作樂治定制禮此蓋皇業之盛事也而左史記言右史記事事為春秋言為尚書百王同其風萬代齊其軌若有位無才猶虧弘闡有才無位灼然全闕昔周公攝政七載乃制六官孔老何人得為教主孔雖聖達無位者也自衛回輪始弘文軌正可修述非為教源且柱史在朝本非諧贊出周入秦為尹言道無聞諸侯何況天子既是仙賢固宜雙缺道屬儒宗已彰前簡問孔子問禮於老聃則師資之義存矣又論語孔子自稱吾述而不作信而好古竊比於我老彭子云孔聖而云老賢比類之義義將焉在褒貶乖衷諒為侮聖答曰余既庸昧奚敢穿鑿廢智任誠唯依謨典嵇子云老子就涓子學九仙之術尋乎練餌斯或有之至於聖也則不云學論語曰生而知之者上學而知之者次依前漢書品孔子為上上類皆是聖以老氏為中上流並是賢又何晏王弼咸云老未及聖此皆典達所位僕能異乎孔子曰吾無常師問禮於老聃斯其義也有問農云吾不如老農又問圃云吾不如老圃入太廟每事問豈農圃守廟之人而賢於孔丘乎竊比遜詞斯其類也故知他評近實自謙則虛侮聖之談恐還自纍孔子問樂於長弘學琴於師襄子豈弘子之流皆賢於孔子乎聖人之迹於斯可見問魯隱公者蓋是讓國之賢君而人表評為下下老子者乃無為之大聖漢書品為中上故知班彪父子詮度險巇先生何乃引之為證答曰吾子近取杜預之談遠忽春秋之意隱公者桓公之庶兄也桓公幼小攝行政事及桓長大歸政桓公雖能歸政不能去猜讚毒於是縱橫遂為桓公所弒既不自全陷弟不義讓國之美竟復何在此而非下孰有下乎漢書之評於是乎得且孔子受命遂號素王未聞載籍稱老為聖言不關典君子所慚問尚書云惟狂克念作聖惟聖罔念則狂子云聖也則不關學是何言歟答曰孔語生知學言積習向者論儒未云釋也上智下愚本不隨化中庸之類乃順化遷聖可為狂則非上智狂可為聖復非下愚書辨狂聖皆中庸也老子曰絶聖棄智民利百倍此蓋中才之聖非上智也詰驗形神第四問曰先生云救形之教教稱為外敬尋雅論實為未允易云知幾其神乎寧得雷同七典皆為形教釋辨濟神義將安在答曰書稱知遠遠極唐虞春秋屬詞詞盡王業至若禮樂之敬良詩易之溫潔皆明夫一身豈論三世固知教在於形方者未備洪祐示逸乎生表者存而未議易曰幾者動之微也能照其微非神如何此言神矣而未辨練神練神者閉情開照期神曠劫幽靈不亡積習成聖階十地而逾明邁九宅而高蹈此釋教所弘也經曰濟神拔苦莫若修善六度攝生淨心非事故也仙異涅槃第五問釋稱涅槃道言仙化釋云無生道稱不死其揆一也何可異乎答曰靈飛羽化者並稱神丹之力無疾輕強者亦云餌服之功哀哉不知繕績前成生甄異氣壽夭由因修短在業佛法以有生為空幻故忘身以濟物道法以吾我為真實故服餌以養生生生不貴存存何績縱使延期不能無死故莊周稱老子曰古者謂之遁天之形始以為其人今則非人也尚非遁天之仙故有秦佚之弔死扶風葬槐里涅槃者常恆清涼無復生死心不可以智知形不可以像測莫知所以名強謂之寂其為至也亦以極哉縱其雙林息照而靈智常存體示闍維而舍利恆在雖復大椿遐壽以彭年為殤非想多劫與無擇對戶凡聖理懸動寂天異焉可同時而辨升降哉吾子何為抗餘燎於日月之下而欲與羲和爭暉至於狷也何至甚乎道仙優劣第六問先生高談壽夭繕績前生業果雖詳芝丹仍略且道家之極極在長生呼吸太一吐故納新子欲劣之其可得乎答老氏之旨蓋虛無為本柔弱為用渾思天元恬高人世浩氣養和得失無變窮不謀通達不謀己此學者之所以詢仰餘流其道若存者也若乃練服金丹餐霞餌玉靈升羽蛻尸解形化斯皆尤乖老莊立言本理其致流漸非道之儔雖記奇者有之而言道者莫取昔漢武好方技遂有欒大之妖光武信讖書致有桓談之議書為方技不入墳流人為方士何關雅正吾子曷為捨大而從小背理而趣誕乎孔老非佛第七問西域名佛此方云覺西言菩提此云為道西云泥洹此言無為西稱般若此翻智慧準此斯義則孔老是佛無為大道先已有之答曰鄙俗不可以語大道者滯於形也曲士不可以辨宗極者拘於名也案孟子以聖人為先覺聖中之極寧過佛哉故譯經者以覺翻佛覺有三種自覺覺他及以滿覺孟軻一辨豈具此三菩提者案大智度論云無上慧然慧照靈通義翻為道道名雖同道義尤異何者若論儒宗道名通於大小論語曰雖小道必有可觀致遠恐泥若談釋典道名通於邪正經曰九十有六皆名道也聽其名則真偽莫分驗其法則邪正自辨菩提大道以智度為體老氏之道以虛空為狀體用既懸固難影響外典無為以息事為義內經無為無三相之為名同實異本不相似故知借此方之稱翻彼域之宗寄名談實何疑之有準如茲例則孔老非佛何以明其然者昔商大宰問於孔丘曰夫子聖人歟對曰丘博識強記非聖人也又問三王聖人歟對曰三王善用智勇聖非丘所知又問五帝聖人歟對曰五帝善用仁信聖非丘所知又問三皇聖人歟對曰三皇善用時聖非丘所知大宰大駭曰然則孰者為聖孔子動容有間曰西方之人有聖者焉不治而不亂不言而自信不化而自行蕩蕩乎民無能名焉若老氏必聖孔何不言以此校之理當推佛老子西升經云天下大術佛術第一又西升玄經云吾師化由天竺善入泥洹又府子曰老氏之師名釋迦文直就道書咸皆師佛釋異道流第八問後漢書云佛道神化興自身毒案山海經西方有天毒國郭景純注云即天竺國也而漢書西域傳云天竺國一名身毒國也詳其清心釋纍之訓空有兼遣之宗道書之流也以此推之則道教收佛又佛經云一切文字悉是佛説非外道書而先生高位釋教在儒道之表將不自局而近誣聖乎答曰吾子援引漢書而問余亦還以漢書而答後漢西域傳曰張騫之著天竺惟云地多濕暑斑勇之列身毒正言奉佛不殺而精文善法導達之功靡所傳記余聞之後説也其國則殷平中土玉燭和氣靈智之所降集賢之所挺生神迹詭怪則理絶人區感驗明顯則事出天外而騫超無聞者豈其道閉往運數開叔葉乎不然何經典之甚也漢自楚英始盛齋戒之祀桓帝又修華蓋之飾將微義未譯但神明之耶且好仁惡殺蠲弊崇善所以賢達君子多受其法焉然好大不經奇譎無已雖鄒衍談天之辨莊周蝸角之論未足以概其萬一尋漢書之録兼而有徵取其微義未譯則云道書之流談其神奇感驗則言理絶天表惟四藏贍博二諦並陳總論九道則無非佛説別明三乘則儒道非流此乃在我之明證非吾子之清決乎服法非老第九問經云釋迦成佛已有塵劫之數或為儒林之宗或為國師道士固知佛道冥如符契又清淨法行經云佛遣三弟子振旦教化儒童菩薩彼稱孔丘光淨菩薩彼稱顏淵摩訶迦葉彼稱老子先生辨異似若自私答曰聖道虛寂圓應無方無方之應逗彼群品器量有淺深感通有厚薄故令無像之像像遍十方無言之言言充八極應實塵砂大略有二八相感成雙林現滅斯其大也權入六道晦迹塵光斯其小也小則或畫卦以御時或播殖以利世或修征以定亂或行禮以誡物或談無而傲榮或説有而重爵何為老生獨非一迹故須彌四域經曰寶應聲菩薩名曰伏羲寶吉祥菩薩名曰女媧但今之道士始自張陵乃是鬼道不關老子何以知之李膺蜀記曰張陵避病瘧於丘社之中得呪鬼之術書為是遂解使鬼法後為大蛇所吸弟子妄述升天後漢書稱沛人張魯母有姿色兼挾鬼道往來劉焉家益州刺史劉焉遂任魯以為督義司馬魯遂與別部司馬張修將兵掩殺漢中太守蘇固斷絶斜谷殺漢使者魯既得漢中遂殺張修而并其衆焉於漢為逆賊戴黃巾服黃布褐魯字公旗初祖父陵順帝時客於蜀學道鶴鳴山中造作符書以惑百姓受其道者輒出米五斗故世謂之米賊陵傳其子衡衡傳於魯魯遂自號天師君其來學者初名鬼卒後號祭酒祭酒各領部衆多者名曰治頭皆教以誠信不聽欺妄有病但令首過而已諸祭酒各起義舍於同路同路懸亭置米肉以給行旅食者量腹取足過多則鬼能病人犯法者先加三令然後行刑不置長吏以祭酒為治氐夷信向之朝廷不能討遂就拜魯鎮夷中郎將通其貢獻自魯在漢垂三十年獻帝建安二十年曹操征之至陽平魯欲舉漢中降其弟衛不聽率衆數萬拒關固守操破衛斬之魯聞陽平已陷將稽顙歸降閻圃説曰今以急往其功為輕不如且依巴中然後委質功必多也於是乃奔南山左右欲悉焚寶貨倉庫魯曰本欲歸命國家其意未達今日之走以避鋒鋭非有惡意遂封藏而去操入南鄭甚嘉之又以魯本有善意遣人慰安之魯即與家屬出逆拜鎮南將軍封閬中侯而張角張魯等本因鬼言漢末黃衣當王於是始服之曹操受命以黃代赤黃巾之賊至是始平自此已來遂有茲弊至宋武帝悉皆斷之至寇謙之時稍稍還有今既大道之世風化宜同小巫巾色實宜改復且老子大賢絶棄貴尚又是朝臣服色寧異古有專經之學而無服象之殊黃巾布衣出自張魯國典明文豈虛也哉夫聖賢作訓弘裕溫柔鬼神嚴厲動為寒暑老子誡味祭酒皆飲張製鬼服黃布則齊真偽皎然急緩可見自下略引張氏數條妄説用懲革未聞或禁經止價玄光論云道家諸經制雜凡意教迹邪險是故不傳但得金帛便與其經貧者造之至死不覩貪利無慈逆莫過此又其方術穢濁不清乃有扣齒為天鼓咽唾為醴泉馬屎為靈薪老鼠為芝藥資此求道焉能得乎或妄稱真道蜀記曰張陵入鶴鳴山自稱天師漢嘉平末為蟒蛇所吸子衡奔出尋無所畏負清議之譏乃假設權方以表靈化之迹生縻鶴足置石崕頂到光和元年遣使告曰正月七日天師升玄都米民山獠遂因妄傳販死利生逆莫此之甚也或含氣釋罪妄造黃書兒癩無端乃開命門抱真人嬰兒龍回虎戲備如黃書所説三五七九天羅地網士女溷漫不異禽獸用消災禍其可然乎或挾道作亂黃巾鬼道毒流漢室孫恩求仙禍延皇晉破國害民惑亂天下或章書伐德遷達七祖乞免擔沙橫費紙筆奏章太上戊辰之日上必不達不達太上則生民抂死嗚呼哀哉或畏鬼帶符左佩太極章右佩昆吾鐵指日則停暉擬鬼千里血若受黃書赤章即是靈仙或制民輸課蜀記曰受其道者輸米肉布絹器物紙筆薦席五綵後生邪濁增立米民或解除墓門左道餘氣墓門解除春秋二分祭竈祠社冬夏兩至記祠同俗先受治録兵符社契皆言軍將吏兵都無教戒之義或苦妄度厄塗炭齋者事起張魯驢輾泥中黃土塗面摘頭懸櫛埏埴使熟至義熙初有王公朝省去打拍吳陸修靜猶泥額反縛懸頭而已資此度厄何癡之甚或夢中作罪夢見先亡輒云變怪召食鬼神軍將吏兵奏章斷之或輕作凶侫造黃神越章用持殺鬼又造赤章用持殺人輒悅世情不計殃罪陰謀懷嫉凶邪之甚斯皆三張之鬼法豈老子之懷乎自於上代爰至符姚皆呼衆僧以為道士至寇謙之始竊道士之號私易祭酒之名事簡姚書略可祥究然法行經者無有人翻雖入疑科未傷弘旨摩訶迦葉釋迦弟子稟道闡猷詎希方駕三張符録詭託老言捃採譎詞以相扶助復引實談證其虛説嗚呼可歎幸深察焉問敬尋道家厥品有三一者老子無為二者神仙餌服三者符録禁厭就其章式大有精麁麁者厭人殺鬼精者練尸延壽更有青録受須金帛王侯受之則延年益祚庶人受之則輕健少疾君何不論惟貶鄙者答曰子之所言何其陋矣惟王者興作非詐力所致必有靈命以應天人至於符瑞不無階降上則河圖洛書次則龜龍麟鳳此是帝皇之符籙也今大周馭宇膺曆受圖出震為神電軒流景上宣衢室下闢靈臺列彼三光搖茲二柄而德侔終古動植效靈仁並二儀幽明薦社故真容表相不假尋於具茨澄照淵猷無惑求於象罔牢籠語默彈厭名言超絶有無逈踰彼此芻狗萬機不可謂之為有孝慈兆庶不可謂之為無四海一家不可謂之為彼九州遼曠不可謂之為此故遊之者莫測其淺深蹈之者未窮其厚薄加以三足九尾赤雀緑龜嘉瑞相尋不時而至茲乃大道弘仁光盈四表慶靈總萃厚祚無強豈聖德之清寧天朝之多士尚信鬼録之談猶傳巫覡之説者哉昔神賜虢田若始求田之義民供趙雀由初受爵之徵此皆委巷鄙言子從所不許也然皇帝之尊極天人之義王者之名盡霸功之業當受命神宗廓風化於寰宇封禪山嶽報成功於天地不見鬼言豫經論之始曾無詭説達致遠之宗徒訛惑生民敗傷王教真俗擾動歸正無從惟孔子貴知命伯陽去奇尚奚取鬼符望致其壽若言受之必益今佩符道士悉可長年無録生民並應短壽事既不徵何道之有明典真偽第十問老經五千最為淺略上清三洞乃是幽深且靈寶禁經天文玉字超九流越百氏儒統道家豈及此乎答老子道經朴素可崇莊生內篇宗師可領暨茲已外製自凡情黃庭元陽採撮法華以道換佛改用尤拙靈寶創自張陵吳赤烏之年始出上清肇自葛玄宋齊之間乃行尋聖人設教本為招勸天文大字何所詮談始自古文大小兩篆以例求之都不相似陽平鬼書於是乎驗晉元康中鮑靖造三皇經被誅事在晉史後人諱之改為三洞其名雖變厥體尚存猶明三皇以為宗極斯皆語出凡心實知非教不關聖口豈是典經而張葛之徒皆雜符禁化俗怪誕違爽無為哀哉吁何乃指蟲迹欲比倉文以毒乳而方甘露乎依張魯蜀記凡有二十四治而陽平一治最為大者今道士上章及奏符厭皆稱陽平重其本故也以上清為洞玄靈寶為洞真三皇為洞神故曰三皇問道經幽簡本接利人佛經顯博源拔鈍士窮理徵事皎然可見答曰釋典洸洸幽顯並蘊玄章浩浩廣略俱通大智度曰為利人略説為解義故為利人廣説為誦持故為鈍人略説為誦持故為鈍人廣説為解義故如般若一座敷玄鷲嶽及其階益乃數十周智典既然餘經皆爾通言博在其鈍何誣之甚香城金簡龍宮玉牒天上人間釋典何量八音部帙其數無邊十二該之罄無不盡可謂詩篇三百蔽者一言以此例之廣略可見詳其道經三十六部廣則定廣無略可收即是純鈍何利之有廣而可略則非定廣略而可廣則非定略釋典之深於是乎在教旨通局第十一問姬孔立教可以安上治民移風易俗老莊談玄可以歸淳反素息尚無為為化足矣何假胡經又簪抽髮削毀容易姓可以化彼強夷不可施之中夏其猶車可陸運不可泛流船可水行不宜陸載佛經怪誕大而無徵怖以地獄則使怯者寒心誘以天堂則令愚者虛企竪説塵劫尚云不遙傍談沙界猶言未遠或説貧由慳至富藉施來貴因恭恪賤興侮慢慈仁不殺則壽命延長多殘掠獵則年算減夭尋討云云難相符允竊見好施不害貧而早終慳貪多殺富而長壽禪戒苦節嬰羅疹患坑殘至廣封賞始隆信謂苦惱由惑而生爵祿因殺而得其猶種角生葦母子乖張牛毛生蒲因果不類雖言業報無以愜心徒説將來何殊繫影未若陶甄稟於自然森羅均於獨化忽焉自有恍爾而無吉凶任運離合非我人死神滅其猶若燈膏明俱盡知何所至胡勞步驟於空談之際馳騁於無驗之中答曰異哉子之所陳何其鄙也果以拘纏窞井封守一方故耳孟子曰人之所知未若人之所不知信矣吾當告子古之明大道者五變而形名可舉九變而賞罰可言所以方內階漸猶未可頓者也至於釣弋順時禁四民之暴三軀之禮顯王迹之仁可謂美矣未盡善也尋先生制作局云寰宇天分十二野極流沙地列九州西窮黑水談遺過去辨略未來事盡一生未論三世豈聖達之不知信嘉緣之未構釋迦發窮源之真唱演大哀之洪慈上極聖人下及蜫蟻等行不殺仁人之至也若乃道包真俗義冠精靈移仁壽於菩提徙教義於權實使宗虛者悟空空之旨存有者進戒定之權於是慧光遐照莊王因覩夜明靈液方津明帝以之神夢春秋左傳曰魯莊公七年歲次甲午四月辛卯夜恆星不見星隕如雨即周莊王十年也莊王別傳曰王遂即易筮之云西域銅色人出世所以夜明非中夏之災也案佛經如來四月八日入胎二月八日生亦二月八日成道生及成佛皆放光明而云出世即成佛年也周以十一月為正春秋四月即夏之二月也依天竺用正與夏同杜預用晉曆算辛卯二月五日也安共董奉忠用魯曆算即二月七日用前周曆算即二月八日也又依什法師年紀及石柱銘並與春秋符同如來周桓王五年歲次乙丑生桓王二十三年歲次癸未出家莊王十年歲在甲午成佛襄王十五年歲在甲申滅度至今一千二百五年良謂遂通資感悟涉藉緣運值百齡齊均萬劫於是秦景西使而摩滕東逝道暢皇漢之朝訓敷永平之祀物無爝螢人斯草偃始知放華猶昏而文宣未旭者也吾子初云其同而未識其異故知始之所同者非同末之所異者非異何則修淳道者務在反俗俗既可反道則可淳反俗之謨莫先剃落而削髮毀容事存高素辭親革愛趣聖之方祛嗜欲於始心忘形骸於終果何眷戀乎三界豈留連於六道太伯文身斷髮匪是西夷范蠡易姓改名寧非東夏近讓千乘論語稱其至德遠辭九宅寧羅氏族之拘故阿含經曰四姓出家同一釋種莊子舟車之喻譬以古今猶禮有損益樂有相沿吾子何為濫云國土惟聖教無方不以人天乖應妙化無外豈以華戎阻情是以一音演唱萬品齊悟豈以夷夏而為隔哉維摩經曰佛以一音演説法衆生隨類各得解夫讖介之惡歷劫不亡毫釐之善永為身用但禍福相乘不無倚伏得失相襲輕重冥傳福成則天堂自至罪積則地獄斯臻此乃必然之數無所容疑若造善於幽得報於顯世謂陰德人咸信矣造惡於顯得報於幽斯理盡然寧不信也易曰積善必有餘慶積惡必有餘殃而商臣肆惡乃獲長壽顏子庶幾而致早終伯牛含沖和而納疾盜跖抱凶悖而輕強斯皆善惡無徵生茲網惑若無釋教則此塗永躓矣經曰業有三報一者現報二者生報三者後報現報者善惡始於此身苦樂即此身受生報者次身便受後報者或二生或三生百千萬生然後乃受受之無主必由於心心無定司必感於事緣有強弱故報有遲速故經曰譬如負債強者先牽此因果之賞罰三報之弘趣自非通才達識罕得其門世或有積善而得殃或有凶邪而致慶此皆現業未熟而前報已應故曰貞祥遇禍妖孽享福疑似之嫌於是乎在斯則顏子短壽運鍾在昔今之積德利在方將盜跖長年酬於往善今之肆惡衰在未來注曰楚穆王字商臣楚成王之太子世有殺父之愆諡之為穆名實之差起於此矣此皆生後二報非現報也故經曰雜業故雜受如歌利王之刖羼提現被霹靂末利夫人供養須菩提見為王后若斯之流皆現報也子云多殘為富貴之因持戒為患疾之本經有成通可得而言矣或有惡緣發善業多殺而致爵或有善緣發惡業多禪戒而獲病病從惡業而招豈修善而得貴從善業而興非坑殘所感故論曰是緣不定非受不定受定者言因不可變也其猶種稻得稻必不生麥麥雖不生不可陸種地為緣也稻即因矣然因果浩博諒難詳究依經成言略標二種一者生業二者受業俱行十善同得人身生業也貧富貴賤聰鈍短長受業也故施獲大富慳致貧窮忍得端正瞋招醜陋相當因果也惟業報理微通人尚昧思不能及邪見是興或説人死神滅更無來生斷見也或云聚散莫窮心神無間常見也或言吉凶苦樂皆天所為他因外道或計諸法自然不由因得無因外道果以禍福之數交謝於六府苦樂之報迭代而兩行遂使遇之者非其所對乃謂名教之書無宗於上善惡報應無徵於下若能覽三報以觀窮通之分則尼父不答仲由斷可知矣是故文子稱黃帝之言曰形有糜而神不化以不化乘化其變無窮又嬴博之葬曰骨肉歸乎地而神氣無不之釋典曰識神無形假乘四蛇形無常主神無常家斯皆神馳六道之明證形盡一生之朗説未能信經希詳軒誥因茲而觀佛經所以越六典絶九流者豈不以疏神達要陶鑄靈府窮原盡化水鏡無垠者矣依法除疑第十二於是童子愀然而怒曰僕聞釋典沖深非名教所議玄風悠邈豈器象所該故染漬風流者脫形梏於始心研窮理味者蕩心塵於終慮抗志與夷皓齊蹤潔己與嚴鄭等迹忽榮譽去嗜欲然釋訓稍陵競為奢侈上減父母之資下損妻孥之分齋會盡肴膳之甘塔寺極莊嚴之美罄私家之年儲費軍國之資實然諸沙門秀異者寡受茲重惠未能報德或墾植田圃與農夫等流或估貨求財與商民爭利或交託貴勝以自矜豪或占算吉凶殉於名譽遂使澄源漸濁流浪轉渾僕所以致怪良在於斯覬欲清心佛法鑽仰餘風覩此悵然洗心無託先生憮然而笑曰余聞麟介之物不達臯壤之事毛羽之族豈識流浪之形類異區分固其宜耳惟十性淵博含生等有二諦該深物我斯貫辨有也則九道森然談空也則萬像斯寂故般若曰色即薩婆若薩婆若即色然色是無知之頑質薩婆若諸佛之靈照論有居然無別言無一而莫異極矣哉極矣哉老氏之虛無乃有外而張義釋師之法性乃即色而遊玄遊玄不礙於器象何緣假之可除即色而冥乎法性則境智而俱寂般若曰不壞假名而説諸法實相維摩曰但除其病而不除法信哉此道孰可逮乎故能拯溺俗於沈流拔幽根於重劫遠開三乘之津廣闢天人之路夫大士建行以檀度為先標榜宗極以塔寺為首施而有報匪成虛費惠而有德豈曰空為且精微稍薄華侈漸興失在物懷何關聖慮故崇軒玉璽非堯舜之心翠居麗食豈釋迦之意今大周馭宇淳風遐被振道綱於六合布德網於八荒川無扣浪之夫谷無含難之士四民咸安其業百官各盡其分嘉穀委於中田倉庫積而成朽方將擊壤以頌太平鼓腹而觀盛化吾子何拘妄慮窮竭古人歎曰才之為難信矣孔門三千並海內翹秀簡充四科數不盈十其中伯牛惡疾回也夭極商也慳吝賜也貨殖求也聚斂由也凶愎而舉世推載為人倫之宗欽尚高軌為搢紳之表百代慕其遺風千戴仰其景行至於沙門苦相駁節蓋髮膚微嗣世人之所重而沙門遺之如脫屣名位財色有情之所滯而沙門視之如秕粳斯乃忍人所不能忍去人所不能去可謂超世之津梁弘道之勝趣也録其脫俗之誠足消四事採其高尚之迹可報四恩況優於此者乎夫崑山多玉尚有礫沙浮水豐金寧無土石沙門之中禪禁實多不無五三缺於戒律正可以道廢人不應以人廢道子何覩此遂替釋教故經曰依法不依人依智不依識不可見紂跖之蹤而忽堯孔之軌覽調達之迹而忘妙德之風今當為子撮言其致三乘俱出生死而幽駕大有淺深九流咸明宇內沖賾寧無總別儒經曰夫孝德之本教之所由生也既云德本道高仁義之迹教之由生墳典因之以弘然則同歸而殊途一致而百慮孝慈為總子何惑焉儒之為統子何疑焉於是童子莞然而悅曰夫柏梁之構興乃知茅茨之仄陋仰日月之彌高何丘陵之可匹覩真筌之遼廓覺世訓之為近尋二經之實談悟三張之詭妄佛生西域形儀罔覿教流東土得聽餘音然神蹤曠遠理乖稱謂因果寂遼信絶名言今以淺懷得聞高論銷疑散滯渙若春氷始知釋典茫茫該羅二諦儒宗硌硌總括九流信駭常談無得而稱者矣僕誠不敏謹承嘉誨
