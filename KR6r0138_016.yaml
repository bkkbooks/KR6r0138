body:
  text: 大唐西明寺沙門釋道宣撰佛德篇第三之二奉阿育王寺錢啓梁簡文臣諱言臣聞八國同祈事高於法本七區皆蘊理備於涌泉故牙床白繖無因不覩金瓶寶函有緣斯出伏惟陛下懸天鏡於域中運大權於宇內三有均夢則臨之以慧日百藥同枯則潤之以慈雨動寂非己行住因物無能名矣臣何得而稱焉故以昭光赤書賤前史之為瑞珥芝景玉嗤往代之為珍難遇者乃如來真形舍利昭景寶瓶浮光德水如觀鉤鎖似見龍珠自非聖德威神無以值斯希有天人頂戴遐邇歸心伏聞阿育王寺方須莊嚴施巨萬金檀豐十藏寶陳河府泉出水衡比丘持土大廈方搆羅漢引繩高塔將表不勝喜抃謹上錢一百萬雖誠等散花心符不盡而微均渧瀝陋甚鄰空輕以塵聞伏啓悚汗謹啓謝敕苦行像并佛迹等啓臣諱啓舍人顧疌奉宣敕旨以金銅苦行佛并佛迹供養具等賚使供養伏以六年道樹超出四魔千輻足輪德圓萬善故能聞見悟解逢遇祛塵天聽恩隆曲垂獎被謹修飾欄宇齋潔身心翹仰慈光伏待昭降千昌四辨尚不宣心輕毫弱簡豈能陳謝不任下情謹啓事謝聞謹啓謝敕參迎佛啓臣諱啓主書周昂奉宣敕旨曲賚恩參臣即爾到建元寺奉候法身金山戾止王人勞問榮恩頻疊啓謝無辭不任下情謹啓事謝聞謹啓答敕聽從舍利入殿禮拜啓臣諱啓舍人王景曜至奉宣敕旨曲垂逮問并聽臣隨從舍利入殿禮拜謹奉秋色昭澄預表光瑞臣比身心得無障惱明陪扈寶函謹鞠躬恭到但不生羽翼無假神通身升淨土高排閶闔足踐蓮華方茲非喻升躡寶梯比斯未重誘導殊恩實回始望顧茲塵縛喜戴不勝謹啓謝敕賚銅供造善覺寺塔露盤啓臣諱啓主書陳僧聰奉宣敕旨垂賚銅一萬三千斤供造善覺寺塔露盤是稱杻陽之珍實亦昆吾之瑤燥濕無變九布見奇寒暑得宜六律成用況復神龍負子光斯妙塔金鳥銜帶飾茲高表函谷恥其詠歌臨淄恧其祥應陽燧含景還譬日輪甘露入盤足稱天酒辭林本闕心辨又慚徒戴重恩終難陳謝不任銘荷之誠謹奉啓聞謹啓謝敕使入光嚴殿禮拜啓臣諱啓舍人王景曜奉宣敕旨曲垂勞問并使明入光嚴殿禮拜法身謹奉臣粗蒙恩造明守開恭到遂以勞屢升淨土風積水厚不足為喻微心悚躍上謝無辭不任下情謹啓事謝聞謹啓謝敕使監善覺寺起剎啓臣諱啓伏見敕旨使監作舍人王曇明材官將軍沈徽御仗吳景等監看善覺寺起剎事爰奉聖恩曲降神力命斯執事修茲長表寶塔雲搆無待喜園水精特建非差龍海大龜持泥未足為盛鶖鷺引繩方斯取劣仰瞻慈渥喜戴不勝俯循宿願私增涕噎不任銘荷謹奉啓謝聞謹啓謝御幸善覺寺看剎啓并答臣諱言即日輿駕幸善覺寺威神所被金表建立概泰清而特起接庫樓而上征既等湛然長均淨土方為佛事永利天人頂荷之誠臣百恆品不任下情謹奉啓事謝聞謹啓汝所營建慈悲寶剎諸佛威神不營多功裁欲運力即便竪立幽顯欣仰我亦隨喜不得與汝同共瞻拜以此為恨耳越敕謝敕賚錢并白檀香充法會啓臣諱啓傳詔奉宣敕旨以臣明法會垂賚錢二十萬白檀薰陸棧香各十斤黃紙詔書先開泉府青雲好氣次集桂宮貨重文龜芳踰麗草散金廡下止及軍吏積穀充家才斑親族未若資此良田方開五蓋入茲法度長出四流假辭敬祖尚慚難述借辨君卿猶知非謝不任荷戴謹啓事以聞謹啓謝敕賚柏剎柱并銅萬斤啓臣諱啓傳詔呂文強奉宣敕旨賚臣柏剎柱一口銅一萬斤供起天中天寺九牧貢金千尋挺樹永曜梵輪方興寶塔夏羞神鼎晉惡相風使福被域中功提無外臣以庸愚稟承勝善樂受遍心恩光動色銘荷之誠無詞啓謝不任頂戴謹奉啓謝謹啓千佛願文梁簡文蓋聞九土區分四民殊俗昏波易染慧業難基故法身寂鏡有照斯感滌無明於欲海度蒼生於寶船或輕慈導捨薄笑牽悲曲艷口宣斜光頂入自鹿樹表光金河匿曜故像法衆生希向有形雖千聖異迹一智同塗弟子某甲久沒迷波長流苦沫不生意樹未啓心燈而善生一念敬造千佛雖復無上無為極相難辨非空非有妙智誰觀而紺髮日光蓮眸月面庶可長表誠敬永寄心期為人造丈八夾紵金薄像疏梁簡文比丘某甲敬白竊以慧日潛影慈輪罷應業逐惱飄愛隨情織徒愍衣珠抱名珍而弗悟眇歎葉金惑空言而啼止自非表茲勝業樹彼妙緣何以去此心堂移茲身窟故水精龍塔永愴恨於遺髭明鏡石龕獨徘徊於留影某甲久發誓願遍為六道四生造夾紵丈八佛像一軀年月已流因緣易奪常恐暫有之身忽隨畫水還無之報飈爾電光今便建立誠心遂茲本誓使聚月見容金山表迹見形善發聞名惡捨拔六根之痛惱去五燒之焚灼但四寶屢空七財多匱仰雙蓮而獨慨覩萬字而無由儻能薄離五家微捐四事結此冥慈共成因果則素疊之功非唯昔世散華之報方驗來緣語善無奢在言多恧謹白與僧正教梁簡文此州伽藍支提基列雖多設莊嚴盛修供具觀其外迹必備華侈在乎意地實有未弘何者凡鑄金刻玉鏤漆圖瓦蓋所以仰傳應身遠注靈覺羡龍瓶之始晨追鵠林之餘慕故祭神如在敬神之道既極去聖茲遠懷聖之理必深此土諸寺止乎應生之日則暫列形像自斯已後封以篋笥乃至葉服離身尋炎去頂或十尊五聖共處一厨或大士如來俱藏一匱信可謂心與事背貌是情非增上意多精進心少昔塔裏紅函止傳舍利象頭白繖非謂全身夫以畫像追陳尚使吏民識敬鎔金圖範終令越主懷思匹以龍阿尚能躍鞘方之虎兕猶稱出匣況復最大圓慈無上善聚聞名去煩見形入道而可慢此雕香蘊斯木櫁緘匿玉毫封印金掌既殊羅閲久入四天又異祇洹掩戶三月寶殿空臨瓊階虛敞密帷不開非仲舒之曲學紅壁長掩似邠卿之避讎且廣廈雲垂崇甍鳥跂若施之玉座飾以金鈿必不塵靄輪姿翳點月面琉璃密窗自可輕風難入龍鬚細網足使飛燕不過兼得虔敬之理必崇接足之心彌重可即宣勒永使準行與廣信侯書梁簡文綱白闊絶音旨每用延結風嚴寒徑願比怡和伏承淨名法席親承金口辭珍鹿苑理愜鷲山微密祕藏於斯既隆莊嚴道場自茲彌闡豈止心燈夜炳亦乃意蘂晨飛思理弘明本長內教今陪十善之車開八政之路流波若之水洗意識之塵以此春翹方為秋實綱每憶華林勝集亦叨末位終朝竟夜沐浴妙言至於席罷日餘退休傍省携手登臨兼展談笑仰望九層俯窺百尺金池動月玉樹含風當於此時足稱法樂今卷帷之部乘傅一隅聞慧雨滂流喜躍充遍徒仰懸河無由承稟空無所有不瑩情靈緣癡有愛自嗟難拔兼下車以來義言益少舊憶已盡新解未餐既慚口誦復非心辨永謝寫瓶終慚染疊是則慈雲既擁智海亦深影末波餘希時灑拂但暌違轉積興言盈瞼願加敬納言不宣心謹白與慧琰法師書梁簡文五翳消空韶光表節百華異色結綵成春道體何如恆清宜也對玩清虛既在風雲之表遊心入理差多定慧之樂弟子俗務紛糾勞倦特深眷然北嶺欽賢已積會遇之期庶必可孱有緣之儔事等飢渴佇望來儀一日三歲想思弘利益理當無爽指遣此信無述寸襟綱和南旦來雨氣殊有初寒攝衛已久轉得其力雖他方法界略息化緣祇洹之裏恆有語對眷佇之深無時不積久因倩師頻述方寸不知巧笑之僧頗為津及不耳前昨已來微事義聚龍象畢同應供皆集慧炬開心甘露入頂間之善謔特盡歡怡想味之懷轉復無極昔在幼年經聞制旨受道日淺北面未深雖異禪那事同華水今假西下特蓄本心訪理質疑屬在明德不謂般若留難現疾未瘳問津無地歎恨何已伏承輿駕尋幸伽藍冀於此時得一覯止辨論青豆之房遣或赤華之舍追往年之宿眷述即日之寸心此事此期必冀非爽指遣承問佇有還書綱白和南答湘東王書暮春美景風雲韶麗蘭葉堪把沂川可浴弟邵南寡訟時綴甘棠之陰冀州為政暫止褰襜之務唐景薦大言之賦安太述連環之辨盡遊玩之美致足樂耶吾春初臥疾極成委弊雖西山白鹿懼不能愈子豫赤丸尚憂未振高臥六安每思扁鵲之問靜然四屋念絶修都之香豈望文殊之來獨思吳客之辨屬以皇上慈被率土甘露聿宣鳴銀鼓於寶坊轉金輪於香地法雷驚夢慧日暉朝道俗輻湊遠邇畢集聽衆白黑日可兩三萬獨以疾障致隔聞道豈止楊濮有關外之傷周南起留滯之恨第十三日始侍法筵所以君長近還未堪執筆敬祖前邁裁欲勝衣每自念此慜然失慮江之永矣寤寐相思每得弟書輕痾遣疾尋別有信此無所申寺剎佛塔諸銘頌南齊僕射王奐枳園寺剎下石記一首梁沈約佛教東流適未尤著始自洛京盛於江左晉故車騎將軍琅耶王劭玄悟獨曉信解淵微於承祖文獻公清廟之北造枳園精舍其始則芳枳樹籬故名因事立雖房殿嚴整而寶剎未樹劭玄孫尚書僕射南徐州大守王奐深達法相洞了宗極勤誠外著仁隱內弘食不過中者一十一載雖翼務朝端而事鄰奈圃日者作翰湘州樹麾蠡服位與年升秩隨歲厚顧惟恩隆主盻寵結皇情任處東方寄深外屏徒欲盡能竭慮知無不為下彼民和上宣聖澤而自以力弱途遠終慚短效且義止今生報褰來果非所以酬鴻貺於冥津暢丹誠於遐劫自乘傳衡皋辭簪派渚誓於舊寺光樹五層捐割蕃俸十遺其一凡厥所收三十有六萬齊之永明六年六月三日蓋木運將啓之令辰上帝步天之嘉日乃抗崇表於蒼雲植重扃於玄壤仰願宸居納祐福履攸歸八神警室萬祇翼體寶祚隆邈比固須彌靈算遐永齊軌常住諸聖延祥挹天和於少極蕃王碩茂播宗英於梁楚群后流克讓之風庶民垂可封之德含生愷樂物不夭性嘉穀年登餘糧栖畝夷荒由附邊城解柝家備十善人懷六度魔衆稽顙外道屈膝抽薪止火折劍摧鋒拯幽酸於無擇陟神化於有頂三界五道咸同斯願刊石重壤式昭厥心齊竟陵王題佛光文一首夫理貫空寂雖鎔範不能傳業動因應非形相無以感是故日華月采照曜天外方區散景咫尺塵方太祖皇帝濯襟慧水凝神淨域厭世瑤陛遷靈寶地竟陵王諱泣明臺之不臨慟高山之方遠慕瓶王意憤殷雙樹永惟可以炳發神功崇高妙業莫若裁金寫好資匠傳儀以皇齊之四年月日子敬制釋迦像一軀尊麗自天工非世造色符留影妙越栴香俾穀林之思永旌於萬劫用刊徽迹式垂不朽云爾彌陀佛銘法身無像常住非形理空反應智滅為靈窮寂震響大夜開冥眇哉遐壽非歲非齡物愛雕綵人榮寶飾事儉欲興情充纍息至矣淵聖流仁動惻順彼世心成茲願力於惟淨土既麗且莊琪路異色林沼焜煌靡胎靡娠化自餘方託生在焉紫蒂青房眷言安養興言遐適報路雖長由心咫尺幽誠曷寄刊靈表迹髣佛尊儀圖金寫石隨柁玉沙乍來乍往玲瓏寶樹因風發響願遊彼國晨翹慕想七珍非羡三達斯仰瑞石像銘夫靈應微遠無迹可追心路照通有感斯順我皇體神御極挹睿臨乾幽顯成帙無思不服若夫二儀叶德五精翼化下洞淵泉上達蒼昊天無息瑞地不湮祥十住髣佛於林御應真𦙝蠁於清夜素毫月舉騰光於梵室妙趾神行布武於椒殿至於事荷緗諜既表禎圖無不雲霏霧委盈簡被策莫黑三距眇千齡而再現皓露淳腴望鳳蓋而沾陛此皆舜日未書堯年罕降豈直朱烏動色玄秬相趣而已哉嘉玉遠自北戎梁弱水而委質潤徹瓌奇曠世之所不覩白金近發東山剖幽巖而啓瑞滂被崖巘鴻靈之所未刊雖復素環之絶貺燭銀之瑤寶方斯蔑如也若夫金石貝剛非遊泳之質自非淬德潛衍感極回靈豈變堅沈之體顯輕浮之相維永明七年某月爰有祥石眇發天津漾海因潮翻流回至表異浙河獻奇禁圃瓊瑜等潤精金比色帝上眷幽關之易啓咨玄應之無方雖析事寂寥而因心咫尺愛其貞恆之性嘉其可久之姿莫若圖妙像於旃香寫遺影於祇樹乃詔名工是鐫是琢靈相瑞華煥同神造至於雕削之餘遺刊委方圓小大觸水斯沈駐罕停蹕親加臨試良由法身是託不溺沈玉之淵剖析既離方須浮金之水至矣哉禎符若斯之妙也敢銘寶貺永福天人其詞曰遙哉上覺曠矣神功四禪無像三達皆空表靈降世演露開蒙惟聖仁宇寶化潛融道非迹應事以感通沈精浮質遠自河蔥悠悠亘水眇眇因風泛彼遼碣瑞我國東有符皇德乃眷宸衷永言鷲室栖誠梵宮載雕載範寫好摛工藉茲妙力祚闡業隆冕旒南面比壽華嵩釋迦文佛像銘積智成朗積因成業能仁奚感將吼妙法駐景上天降生右脅始出四門終超九劫眇求靈性曠追玄軫道雖有門迹無可朕直引反物我兼謝心行同泯一去後心百非寧盡感資理悟或以言陳言不自叩出之者身有來必應如泥在鈞形酬響答且物且人應我以形而余矇瞽守茲大夜焉拔斯苦仰尋靈相法言攸吐不有尊儀薆焉誰覩千佛頌道有偕適理無二歸照寂同是形相俱非千覺俯應遞叩冥機七尊緬矣感謝先違既過已滅未來無像一剎靡停三念齊往不常不住非今非曩賢劫雖遼倏焉如響栖林藉樹背室違家前佛後佛迹罔隆窊或遊堅固或蔭龍華能達斯旨可類恆沙華華群群均此妙極先晚參差各願隨力密迹弘道數終乃陟誓覩來運永德含識彌勒贊皇太子造石彌勒太官令作贊乘教本一法門不二業基纍明功由積地眇眇長津遙遙遐裔道有常尊神無恆器脫屣王家來承寶位慧日晨開香雨霄墜藉感必從憑緣斯至曰我聖儲儀天作二尚相龍柯瞻言思媚鐫石圖微雕金寫祕望極齊工攀光等邃超矣廢臻融然理備敬勒玄蹤式傳遐懿繡像題贊維齊永明四年歲次丙寅秋八月己未朔二日庚申第三皇孫所生陳夫人含微宅理炳慧臨空結言寶住騰心淨覺敬因樂林寺主比丘尼釋寶願造繡無量壽尊像一軀乃為贊曰表相異儀傳形匪一鏤玉圖光雕金寫質亦有淑人含芳上律絢發綺情幽摛寶術縟文內炳靈姿外溢水耀金沙樹羅瓊實現符淨果來應妙袟育藻宸閨騰華梵室有億斯年於萬茲日光宅寺剎下銘光宅寺蓋上帝之故居行宮之舊地楊州丹陽郡秣陵縣某鄉某里之地自去茲邠亳來儀京輔拓宇東第步武城闉聖心留愛間素遷負南郭義等去酆事均從鎬及剋濟橫流膺斯寶運命帝閽以廣闢即太微而為宇既等漢高流運於豐沛亦同光武眷戀於南陽思所以永流聖迹垂之不朽今事與須彌等同理與天地無窮莫若光建寶塔式傳于後乃以大梁之天監六年歲次星紀月旅黃鍾閏十月二十三日戊寅仲冬之節也乃樹剎玄壤表峻蒼雲下洞淵泉仰迫星漢方當銷巨石於賢劫極未來於忍土若夫朱光所耀彤雲所臨非止天眷兼由地德皇帝乃啓閶闔造舟淮涘接神颷而動驂越浮梁而徑度芝蓋容與翠華葳蕤下輦停蹕躬展誠敬廣集四部揆景同流弘此廣因被之無外同由厥路俱至道場乃作銘曰八維悠闊九服荒茫靈聖底止咸表厥祥壽丘𮙀𮙀電繞樞光周原膴膴五緯入房自茲遐敻名在處亡安知若水寧辨窮桑自天攸縱於惟我皇即基昔兆為世舟航重簷纍構逈剎高驤土為淨國地即金床因斯大極溥被翱翔豈徒三界寧止十方濡足萬古授手百王一念斯答萬壽無疆如日之久如天之長栖禪精舍銘此寺征西蔡公所立昔廁蕃麾預班經創之始今重遊踐覽舊興懷故為此銘以傳芳迹在郢州永徽三年歲次某時某月某朔某日爾巖靈旅逸地遠栖禪蘭房葺蕙嶠甍架煙南瞻巫野北望淮天遙哉林澤曠矣江田空心觀寂慧相淳筌眷惟斯踐愴屬遐年遊仁廁遠宅賞憑旃頒創神苑陪構靈椽瞻禁拓圃望鷲疏山製石調響栖理凝玄曠移羽斾眇別松泉委組東國化景西蓮巒隰夷改蓬蘀徂遷重依漢遠復逐旌懸往辭妙幄今承梵筵八翻海鶴九噪巖蟬珮華長掩懋迹空傳式籕雲拱敢告祥緣
