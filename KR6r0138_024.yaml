body:
  text: 大唐西明寺沙門釋道宣撰僧行篇第五之二沙汰僧徒詔宋武帝門下佛法訛替沙門混雜未足扶濟鴻教而專成逋藪加項姦心頻發凶狀屢聞敗道亂俗人神交忿可符所在與寺耆長精加沙汰後有違犯嚴其誅坐主者詳為條格速施行褒揚僧德詔元魏孝文帝帝以僧顯為沙門都統詔門下近得録公等表知欲早定沙門都統比考德選賢寤寐勤心繼佛之任莫知誰寄或有道高年尊理無縈紆或有器玄識邈高挹塵務今以思遠寺主法師僧顯仁雅欽韶澄風澡鏡深敏潛明道心清亮固堪茲任式和妙衆近已口白可敕令為沙門都統又副儀二事緇素攸同頃因輝統獨濟遂廢茲任今欲毗德贊善固須其人皇舅寺法師僧義行恭神暢溫聰謹正業懋道優用膺副翼可都維那以光賢徒帝立僧尼制詔門下凝覺澄沖事超俗外淵模崇賾理寄忘言然非言何以釋教非世何能表真是以三藏舒風必資誡典六度摛化固憑尺波自象教東流千齡已半秦漢俗華制禁彌密故前世英人隨宜興例世輕世重以裨玄奧先朝之世嘗為僧禁小有未詳宜其修立近見沙門統僧顯等白云欲更一刊定朕聊以淺識共詳至典事起匆匆觸未詳究且可設法一時粗救世殿須立白一同更釐厥衷帝聽諸法師一月三入殿詔門下崇因贊業莫若宗玄神染志誰先英哲故周旦著其朋之誥釋迦唱善知之文然則位尊者以納賢為貴德優者以親仁為尚朕雖寡昧能無庶幾也先朝之世經營六合未遑內範遂令皇庭闕高邈之容紫闥簡超俗之儀於欽善之理福田之資良為未足將欲令懿德法師時來相見進可餐稟道味退可飾光朝廷其敕殿中聽一月三入人數法諱別當牒付帝令諸州衆僧安居講説詔門下憑玄歸妙固資真風餐慧習慈實鍾果智故三炎檢攝道之恆規九夏溫詮法之嘉猷可敕諸州令此夏安居清衆大州三百人中州二百人小州一百人任其數處講説皆僧祇粟供備若粟鮮徒寡不充此數者可令昭玄量減還聞其各欽旌賢匠良推睿德勿致濫濁惰茲後進贈徐州僧統并設齋詔門下徐州道人統僧逞風識淹通器尚倫雅道業明博理味淵澄清聲懋譽早彰於徐沛英懷玄致風流于譙宋比唱法北京德芬道俗應供皇筵美敷辰宇仁睿之良朕所嘉重依因既終致茲異世近忽知問悲怛于懷今路次兗濮青泗豈遙愴然念德又增厥心可下徐州施帛三百匹以供追福又可為設齋五千人歲施道人應統帛詔門下應統仰紹前哲繼軌道門徽綜玄範沖猷是託今既讓俗名理宜別供可取八解之義歲施帛八百匹準四輩之況隨四時而給又修善之本實依力命施食之因內典所美可依朝官上秩當月而施所以遠譬深理者匪獨開崇俗心抑亦獎厲道意耳帝為慧紀法師亡施帛設齋詔門下徐州法師慧紀凝量貞遠道識淳虛英素之操超然世外綜涉之功斯焉罕倫光法彭方聲懋華裔研論宋壤宗德遠邇爰於往辰唱諦鹿苑作匠京緇延賞賢叢倏矣死魔忽殲良器聞之悲哽傷慟于懷可敕徐州施帛三百匹并設五百人齋以崇追益述僧中食論南齊沈休文人所以不得道者由於心神昏惑心神所以昏惑由於外物擾之擾之大者其事有三一則勢利榮名二則妖妍靡曼三則甘旨肥濃榮名雖日用於心要無晷刻之纍妖妍靡曼方之已深甘旨肥濃為纍甚切萬事云云皆三者之枝葉耳聖人知不斷此三事求道無從可得不得不為之立法使簡而易從也若直云三事惑本並宜禁絶而此三事是人情所甚惑念慮所難遣雖有禁止之旨事難卒從譬於方舟濟河豈不欲直至彼岸河流既急會無直濟之理不得不從流邪靡久而獲至非不願速事難故也禁此三事宜有其端何則食之於人不可頓息其於情性三纍莫甚故推此晚食併置中前自中之後清虛無事因此無事念慮得簡在始未專在久自習於是束以八支紆以禁戒靡曼之欲無由得前榮名衆纍稍隨事遣故云往古諸佛過中不餐此蓋是遣纍之筌蹄適道之捷徑而或咸謂止於不食此乃迷於向方不知厥路者也述僧設會論沈休文夫修營法事必有其理今世召請衆僧止設一會當由佛在世時常受人請以此擬像故也而佛昔在世佛與衆僧僧伽藍內本不自營其食具也至時持鉢往福衆生今之僧衆非惟持中者少乃有腆恣甘腴厨膳豐豪者今有加請召並不得已而後來以滋腴之口進蔬䔩之具延頸蹙頞固不能甘既非樂受不容設福非若在昔不得自營非資四輩身口無託者也此以求福不其反乎篤而論之其義不爾何者出家之人本資行乞誡律昺然無許自立厨帳并畜淨人者也今既取足寺內行乞事斷或有持鉢到門便呼為僧徒鄙事下劣既是衆所鄙恥莫復行乞悠悠後進求理者寡便謂乞食之業不可復行白淨王子轉輪之貴持鉢行詣以福施者豈不及千載之外凡庸沙門躬命僕竪自營口腹者乎今之請僧一會既可髣像行之乞丐受請二事不殊若以今不復行乞又復不請召則行乞之法於此永置此法既置則僧非佛種佛種既離則三寶墜于地矣今之為會者宜追想在昔四十九年佛率比丘入城乞食威儀舉止動自應心以此求道道其焉適若以此運心則為會可矣議沙汰釋李詔并啓北齊文宣帝問朕聞專精九液鶴竦玄州之境苦心六歲釋擔煩惱之津或注神鬼之術明尸解之方或説因緣之要見泥洹之道是以太一闡法竟於輕舉如來證理環於寂滅自祖龍寢迹劉莊感夢從此以歸紛然遂廣至有委親遺纍棄國忘家館舍盈於山藪伽藍遍於州郡若黃金可化淮南不應就戮神威自在央掘豈得為鯨若以御龍非實荊山有攀髯之戀控象為虛瀍洛寤夜光之詭是非之契朕實惑焉乃有緇衣之衆參半於平俗黃服之徒數過於正戶所以國給為此不充王用因茲取乏欲擇其正道蠲其左術一則有潤邦家二則無惑群品且積競繇來行之已久頓於中路沙汰實難至如兩家升降二途修短可指言優劣無鼠首其辭臣樊孝謙謹奉詔對曰臣聞天道性命聖人所不言蓋以理絶涉求難為稱謂伯陽道德之論莊周逍遙之旨遺言取意猶有可尋至若玉簡金書神經祕録三尸九轉之奇絳雪玄霜之異淮南成道犬吠雲中王喬得仙劍飛天上皆是憑虛之説海棗之談求之如繫風學之如捕影而燕君齊后秦皇漢帝信彼方士冀遇其真徐福去而不歸欒大往而無獲猶謂升霞倒影抵掌可期祭鬼求神庶或不死江璧既反還入驪山之墓龍媒已至終下茂陵之墳方知劉向之信洪寶歿有餘責王充之非黃帝此為不朽又末葉已來大存佛教寫經西土畫像南宮昆池地墨以為劫燒之灰春秋夜明謂是降神之日汝王自在變化無窮置世界於微塵納須彌於黍米蓋理本虛無示諸方便而妖妄之輩苟求出家藥王燔軀波崙灑血假未能然猶當剋念寧有改形易貌有異世人恣意放情還同俗物龍宮餘論鹿野前言此而得容道風將墜伏惟陛下受天明命屈己濟民山鬼效靈海神率職湘中石燕沐時雨而群飛臺上銅烏傃和風而獨轉但周都洛邑治在鎬京漢宅咸陽魂歸豐沛汾晉之地王迹惟始既疲遊幸且勞經略猶復降情文苑斟酌百家想執玉於瑤池念求珠於赤水竊以王母獻環由感舜德上天賜珮實報禹功兩馬記言二班書事不見三世之辭無聞一乘之旨帝樂王禮尚有時而沿革左道怪民亦何疑於沙汰臣某謹對弔道澄法師亡書梁簡文省啓承尊師昨夜涅槃甚深悲怛法師志業淹明道風淳素戒珠瑩淨福翼該圓加以識見冥通心解遠察記落雨而必然稱黑牛而匪謬服膺者無遠近蒙益者兼道俗弟子自言旋京輦便申結緣豈謂一息不追奄至乎此然勝業本深智力久利必應遊神寶地騰迹淨天但語其乳池啓殯香棺入室不了空心于何不慟但如來降生之迹因此而入泥洹正當其生住滅靡有定相先聖後賢何其形響推校因緣未始有例上人等並在三歲積始終稟道宜應共相策勉弘遵舊業使道場無斷利益不墜所襚物輒如法供養奈何奈何與東陽盛法師書梁王筠菩薩戒弟子王筠法名慧炬稽首和南問訊東陽盛法師弟子昔因多幸早蒙覲接歲月推流踰三十載欽慕風德獨盈懷抱間以山川無由禮敬司馬參軍仰述存眷曲垂訪憶既荷録舊之情兼佩殷勤之旨歡欣頂戴難為譬説仰承乘和履福享年九十有四蚩絳人之未高同殷宗之遐壽且耳長真已過項齒剛曾不先落延華駐釆怡神輔性自非宿植善因何以招斯勝果尊年尚齒之誠懷德敦舊之款依風慕道之深欣羡景仰之至興居在念寤寐載懷弟子限此樊籠迫茲纓瑣無由問道撫躬如失庶心期冥會咫尺江山道術相忘棄置形迹唯願敬勗保此期頤赤松朱髮復何足貴飛錫騰軀真在旦夕指陳丹款殊未申暢儻惠一言豈不幸甚弟子筠稽首和南與汝南周顒書梁釋智林近聞檀越敘二諦之新意陳三宗之取捨聲殊洹律雖進物不速作論已成隨喜充遍物非常重又承檀越恐立異當時干犯學衆制論雖成定不必出聞之懼然不覺興悲此義旨趣似非初聞妙音中絶六十七載理高常韻莫有能傳貧道年二十時便參傳此義常謂藉此微悟可以得道竊每歡喜無與共之年少見長安耆老多云關中高勝乃舊有此義常法集盛時能深得斯趣者本無多人既犯越常情後進聽受便自甚寡傳通略無其人貧道捉麈尾以來四十餘年東西講説謬至一時其餘義統頗見宗録唯有此途百里無人得者貧道積年乃為之發病既衰痾未愈加復旦夕西旋顧惟此道從今永絶不言檀越機發無緒獨創方外非意此音猥來入耳且欣且慰實無以況建明斯義使法燈有種始是真實行道第一功德雖復國城妻子施佛及僧其為福利無以相過既幸已詮述想便宜廣宣使賞音者見也論明法理當仁不讓豈得顧惜衆心以失奇趣邪若此論已成遂復中寢恐檀越方來或以此為法障往意理然非戲論矣想便寫一本為惠貧道齎以還西使處處弘通也比小可牽曳故入山取敘深企付之與舉法師書梁劉峻一名孝標聞諸行李高談徽德逖聽風聲心飛魂竦無異蘄仙之望石髓太陰之思龍燭倉星昏昊涼雲送秋道勝則肥固應頤攝衣裳虹霓帷幕霄露餌黃菊之落蘂酌清澗之毖流旦候歸雁晨鳧暮聽雌獨鵠神彯彯爾蓋象蕭史之騎鳴鳳列子之御長風雖荊卿傍若無人孝然堅臥氷雪沈沈隱隱何以尚之哉至於馳騖經囿翱翔書圃極龍宮之妙典殫石室之鴻記道生伏其天真曼倩謝其辨物若乃習是童子厝志雕蟲藻思內流英華外發葳秋竹照曜春松爵頌息明珠之譽長門濫黃金之賞盛矣美矣煥其麗乎昔旅浙河嘗觀組繢不覺紙爇筆焚魂魄斯盡自茲厥後兩絶圭璧意眷眷於菁華腸回回於九折夫日御停照不踰隙穴海若濆涌莫限隈嵎以玉抵鵲幸傳餘寶冀閲清徽用瘳眩疾然越民非鬻冠之所齊國豈奏韶之地望與其進無貽責焉與皎法師書并答梁王曼頴弟子孤子曼頴頓首和南一日蒙示所撰高僧傳并使其掎托力尋始竟但見偉才紙弊墨渝迄未能罷若乃至法既被名德已興年幾五百時經六代自摩騰法蘭發軫西域安侯支讖荷錫東都雖迹標出沒行實深淺咸作舟梁大為利益固宜油素傳美鉛斬定辭昭示後昆揄揚往秀而道安羅什間表秦書佛澄道進雜聞趙册晉史見拾復恨局當時宋典所好頗因其會兼且抗出君台之記糅在元亮之説感應或所商攉幽明不無梗概泛顯傍文未足光闡間有諸傳又非隱括景興偶採居山之人僧寶偏綴遊方之士法濟唯張高逸之例法安止命志節之科康泓專紀單開王季但稱高座僧瑜卓爾獨載玄暢超然孤録唯釋法進所造王巾有著意存該綜可擅一家然進名博而未廣巾體立而不就梁來作者亦有病諸僧祐成簡既同法濟之責王季染毫復獲景興之誚其唱公纂集最實近之求其鄙意梗概頗見法師此製始所謂不刊之鴻筆綿亘古今包括內外屬辭比事不文不質謂繁難省云約豈加以高為名既使弗逮者恥開例成廣足使有善者勸向之二三諸子前後撰述豈得約長量短同年共日而語之哉信文徒竟無一言可豫市肆空設千金之賞方入簉龍函上登麟閣出內瓊笈卷舒玉笥弟子雖實不敏少嘗好學頃日尫餘觸途多昧且獲披來帙斯文在斯鑽仰弗暇討論何所誠非子通見元則之論良愧處道知休奕之書徒深謝安慕竺曠風流殷皓憚支遁才俊耳不見旬日窮情已勞扶力此白以代訴盡弟子孤子王曼頴頓首和南晈法師答君白一日以所撰高僧傳相簡意存針艾而來告纍紙更加拂拭顧惟道藉人弘理由教顯而弘道釋教莫尚高僧故漸染以來昭明遺法殊功異績列代而興敦厲後生理宜綜綴貧道少乏懷書抱篋自課之勤長慕鉛墨塗青揚善之美故於聽覽餘間厝心傳録每見一分可稱輒有懷再省但歷尋衆記繁約不同或編列參差或行事出沒已詳別序兼具來告所以不量寸管輒樹十科商榷條流意言略舉而筆路蒼茫辭誤陋拙本以自備疏遺豈宜濫入高聽檀越既學兼孔釋解貫玄儒抽文綴藻內外淹劭披覽餘暇脫助詳閲故忘鄙俚用簡龍門然事高辭野久懷多愧來告吹噓更增㥏𭟓今以所著贊論十科重以相簡如有紕謬請備斟酌釋君白弔震法師亡書梁劉之遴弟子劉之遴頓首和南泡電倏忽三相不停苦空無我五陰寧住尊師僧正捨壽閻浮遷神妙樂雖乘此宿植必登善地人情怛化銜疚悲摧念在三之重追慕哀慟纏綿永往理不可任奈何奈何僧正精理特拔經論洽通蔬菲終身有為略盡枯稿當年儀形二衆豈直息心標領亦為人倫之傑弟子少長遊遇數紀迄茲平生敬仰善友斯寄哀疾待盡不獲臨泄鯁慟之懷二三增楚扶力修唁迷猥不次弟子劉之遴頓首和南與震兄李敬朏書同上作生滅無常賢弟震法師奄同力士生處道識長往法言永絶惋怛抽摧不能已己年事未高德業方播疾恙甫爾謂無過憂遂至遷化道俗驚愕念孔懷之切天倫至慟永往之情不可居處奈何奈何法師義味該洽領袖黑衣識度愷悌籍甚當世昔在京師聖上眄接自還鄉國歷政禮重且講説利益既實弘多經始寺廟實廣福業襟抱豁然與物無忤所與遊款皆是時賢白黑歸美近遠欽敬豈止息心殄悴實亦人倫喪寶追懷歎愴何可弭歇并辱遺書及別物對增哽欷殿下自為作銘又教鮑記室為志序恐鮑想悉未能究盡己得面為鮑説諸事行及徽猷計必勒不朽事如今白志石為豸并呼師修之鐫刻亦當不久可就言增泫然投筆悽悶劉之遴頓首頓首弔僧正京法師亡書同上作八月二十日之遴和南法界空虛山木頽壞尊師大正遷神淨土凡夫淺纍嬰滯哀樂承此凶訃五內抽摧哀慟深至不能自已念追慕永往纏綿斷絶情在難居奈何奈何大正德冠一時道蔭四部訓導學徒紹隆像法年居僧首行為人師公私瞻敬遐邇宗仰若乃五時九部流通解説匹之前輩聯類往賢雖什肇融恆林安生遠豈能相尚頓悟雖出自生公弘宣後代微言不絶實賴夫子重以愛語利益窮四攝之弘致檀忍智慧備六度之該明白黑歸依含識知庇舟航愚冥棟梁寺塔日用不知至德潛運何道長而世短功被而身沒映乎大海永墜須彌照彼高山長收朗日往矣奈何當復奈何法師幼而北面生小服膺迄乎耆邁恆在左右在三之重一旦傾捐哀慟之至當何可處弟子紈綺遊接五十餘年未隆知顧相期法侶至乎菩提不敢生慢未來難知現在長隔眷言生平永同萬古尋思惋愴倍不自勝未由唁執申世哀歎謹裁白書投筆哽猥弟子劉之遴頓首和南東陽金華山栖志劉孝標夫鳥居山上層巢木末魚潛淵下窟穴埿沙豈好異哉蓋性其然也故有忽白璧而樂垂綸負玉鼎而要卿相行藏紛糾顯晦踳駁無異火炎水流圓動方息斯則廟堂之與江海蓬戶之與金閨並然其所然悅其所悅焉足毛衣瘡痏在其間哉豫生自原野善畏難狎心駭雲臺朱屋望絶高蓋青組且霑濡霧露彌願間逸每思濯清瀨息椒丘寤寐永懷其來尚矣蚓專噬壤民欲天從爰洎二毛得居巖穴所居東陽郡金華山東陽實會稽西部是生竹箭山川秀麗皋澤坱鬱若其群峯疊起則接漢連霞喬林布濩則春青冬緑回溪泱流則十仞洞底膚寸雲合必千里雨散信卓犖爽塏神居奧宅是以帝鴻遊斯鑄鼎雨師寄此乘煙故澗勒赤松之名山貽縉雲之號近代江治中奮迅埿滓王徵士高拔風塵龍盤鳳栖咸萃茲地良由碧湍素石可致幽人者哉金華山古馬鞍山也蘊靈藏聖列名仙諜左元放稱此山云可免洪水五兵可合神丹九轉金華之首有紫巖山山色紅紫因以為稱靡迤坡陀下屬深渚巑岏隱嶙上虧日月登自山麓漸高漸峻路逈隘險魚貫而升路側有絶澗閣閜哮豁俯窺木杪焦原石邑匪獨危懸至山將半便有廣澤大川皋陸隱脤豫之葺宇實在斯焉所居三面回山周繞有象郛郭前則平野蕭條目極通望東西帶二澗四時飛流泉清瀾微霔滴瀝生響白波跳沫洶涌成音漕瀆引流交渠綺錯懸溜瀉於軒甍激湍回於階砌供帳無綆汲盥漱息瓶匜楓𣚛椅櫪之樹梓柏桂樟之木分形異色千族萬種結朱實包緑果杌白蒂抽紫莖橚樉苯䔿捎風鳴籟垂條櫩戶布葉房櫳中谷澗濱花蘂攢列至於青春受謝萍生泉動則有都梁含馥壞香送芬長樂負霜宜男贙露芙蕖紅華照水皋蘇縹葉從風憑軒永眺蠲憂忘疾丘阿陵曲衆藥灌叢地髓抗莖山筋抽節金鹽重於素璧五豉貴於明珠可以養性銷痾還年駐色不藉崔文黃散勿用負局紫丸翾翾翔鳥風胎雨鷇緑翼紅毛素羽翠鬣肅肅切羽關關好音馴狎園池旅食雞鶩若乃䲰日伺辰響類鍾鼓鳴蚿候曙聲象琴瑟玄猿薄霧清囀飛㹳乘煙永吟嘈囋飀喨悅心娛耳諒所以跨躡管籥韜軼笙簧宅東起招提寺背巖面壑層軒引景邃宇臨空博敝間虛納祥生白左眷右睇仁智所居故碩德名僧振錫雲萃調心七覺詆訶五塵郁烈戒香浴滋定水至於熏爐夜爇法鼓旦聞豫跕屣摳衣躬行頂禮詢道哲人飲和至教每聞此河紛梗彼岸永寂熙熙然若登春臺而出宇宙唯善是樂豈伊徒言寺東南有道觀亭亭崖側下望雲雨蕙樓蘭榭隱曖林篁飛觀烈錢玲瓏煙霧日止却粒之氓歲次祈仙之客餌星髓吸流霞將乃雲衣霓裳乘龍馭鶴觀下有石井聳跱中澗雕硺刻削頗類人工躍流潀瀉渀涌泱咽電擊雷吼駭目驚魂寺觀前皆植修竹檀欒蕭飋被陵緣阜竹外則有良田區畛通接山泉膏液鬱潤肥腴鄭白決漳莫之能擬致紅粟流溢鳧雁充厭春鱉旨檀碧雞冬菌味珍霜鵽縠巾取於丘嶺短褐出自中園莞蔣逼側池湖菅蒯駢填原隰養給之資生生所用無不阜實蕃籬充牣崖巘歲始年季農隙時間濁醪初醞清觴新熟則田家有野老提壺共至班荊林下陳鐏置爵酒酣耳熱屢舞歡呶晟論箱庾高談穀稼嗢噱謳歌舉杯相挹人生樂耳此歡豈訾若夫蠶而衣耕而食日出而作日入而息晚食當肉無事為貴不求於世不忤於物莫辨榮辱匪知毀譽浩蕩天地之間心無怵惕之警豈與嵇生齒劍楊子墜閣較其優劣者哉與徐僕射領軍述役僧書陳釋真觀泉亭光顯寺釋真觀致書領軍檀越竊聞四依開士匡正法於將頽十地高人秉玄文於已絶能使崛山遺迹無虧宴坐之風祇樹餘苗得肆經行之道伏見今者皇華奉宣嚴憲凡是僧尼之類不書名籍之者並令捐茲法戒就此黎民去彼伽藍歸其里閈既普天之下莫匪王臣正當僶俯恭承鞠躬祇奉但愚情所謂竊或疑焉自佛法肇興千有餘載流轉此地數百年間濟濟僧徒一何為盛雖復市朝亟改風化頻移慧炬常明戒香恆馥其為福利難可勝言所現靈祥聞諸史傳至如浮圖和上曜彩鄴中高座法師流芳鞏雒或復昆明池內識劫燒之餘灰長沙寺裏感碎身之遺蔭道開入境仙人之星乃出法成去世紺馬之瑞爰浮乃有青目赤髭黃眸白足連眉表稱大耳傳名莫不定水淵澄義峰山竪汪汪道望類迦葉之高蹤肅肅威儀似頞鞞之清行頃年訛替乃日澆漓而正法洪基猶應未殄忽復違其本志奪彼前心莫不仰高殿而酸傷辭舊房而悽楚依依法座重反何期戀戀禪門再還無日乃非岐路而有分袂之悲雖異河梁遂結言離之痛若以不繼名籍為其深罪延茲咎纍亦可哀矜夫出俗之人務應修道許其方外之禮不拘域中之節或有不貫名籍無關簿領並皆遊方採聽隨處利安望剎為居臨中告飯或頭陀林下或蘭若巖阿如此之流寧容繼屬若勝業不全清禁多毀宜應休道此事誠然而持犯難知聖凡相濫譬菴羅之果生熟難分雪山之藥真偽難辨忽使崑峰之上玉石同焚大澤之中龍蛇等斃何期惜也吁可傷哉又其割愛辭親披緇剪髮既無僕使永絶妻孥或老病之年單貧之士皆憑子弟還相養衛如其一朝雨散便溘死溝渠遂有赴浚而投身縊長繩而殞命雖復汨羅之痛匹此猶輕荒谷之悲方斯未重且復奇才絶學並寄後生聽講誦經咸資晚秀所以須陀得戒猶是幼童身子揚名差非耆老如斯之類若並翻緇恐此法門便無紹繼梵輪絶矣精舍空焉若八陳未休四郊多壘前驅所寄後殿斯憑愚謂此人殆成無用若必有拔拒投石之能索鐵申鉤之力則並從軍募久預長驅儻復尚服緇衣猶居寺宇則是習勇心薄樂道情深若非衛玠之清羸便同孟昶之浮怯既不便弓馬徒勞行陳雖復身披甲胄還想法衣手執干戈猶疑錫杖必當遙聞戰鼓色變心驚遠望軍麾魂飛氣懾將恐有沮都護之威無益二師之勇若謂不輸王課靡助國儲所以普使收其賦斂但浮遊之屬萍迸蓬飛散誕之流且貧終窶鄉里既無田宅京師又闕主人納屨則兩踵併穿斂襟則雙肘皆現觀董生之百結尚覺輕華見顏子之一簞更疑豐飽求朽壤以為藥寧識紫丸服糞掃而為衣豈逢黃絹貨財之禮此則無從懷璧之𮘧信哉應免若令其在道猶可分衛自資遂使還民便是糇糧莫寄伏惟皇朝御曆齊聖欽明繼踵軒羲比肩炎昊握鏡之風彌遠垂衣之化方深兼復梁棟三寶敷弘十善昔漢明靈感止夢金人晉武覆修才招玉像用今方古彼有慚焉或深經是護等仙預大王珤塔斯成類無憂國主明揚仄陋信巢父之清虛徵聘漁畋許嚴生之高尚愚謂絓預今者免首僧尼若已離法衣無遵道業或常居邸肆恆處田園並依民例宜從策使如其禪誦知解蔬素清虛或宣唱有功梵聲可録或繕修塔廟建造經書救濟在心聽習為務乃至羸老之屬貧病之流幸於編戶無所堪用並許停寺仍上僧籍必望十城之珤或出荊山百步之中時逢芳草於是寺斷流俗之僧衆無餔酒之客六時翹請常以國界為心三業精修必用君王為本豈不幽明踴躍人鬼欣歡冥力護持善緣扶助然後二儀交泰六氣調和征馬息鞍軍旗卷斾邊荒入附無待丹水之師玉帛來朝還想稽山之集何期樂矣實可欣哉儻復疆埸不虞軍資有闕薄須費計伏聽徵求仰唯領軍檀越外則探賾典墳內則鉤深經論才高帷幄寄重鹽梅必願降意芻蕘留心正法微惠研詳薄垂觀覽如其一毫可採深悕曲為矜論無使蘭艾同鋤薰蕕俱氣庶得仙人范裏更轉法輪長者園中還鋪講席則匡維之德比恆岱而齊高擁護之功似滄溟而共廣橫此忓煩彌增悚惕諫仁山深法師罷道書陳徐陵竊聞出家間曠猶若虛空在俗籠樊比於牢獄非但經有明文亦自世間共見瞥聞法師覆彼舟航趣返緇衣之務此為目下之英奇非久長之深計何以知然從苦入樂未知樂中之樂從樂入苦方知苦中之苦弟子素以法師雖無曩舊相知已來亦復不疏夫良藥必自無甘忠諫者決乎逆耳倚見其僻是以不忍不言且三十年中造莫大之業如何一旦捨已成之功孰為可惜敬度高懷未解深意將非帷幄之策欲集留侯形類臥龍遠求葛氏黃石兵法寧可再逢三顧茅廬無由兩遇封爵五等唯見不逢中閣外門難朱易白鳴笳鳳管非有或聞舞女歌姬空勞反玩覓之者等若牛毛得之者譬猶牛角以此之外何所窺窬法師今若退轉未必有一稱心交失現前十種大利何者佛法不簡細流入者則尊歸依則貴上不朝天子下不讓諸侯獨玩世間無為自在其利一也身無執作之勞口餐香積之飯心不妻妾之務身飾芻摩之衣朝無踐境之憂夕不千里之苦俯仰優遊寧不樂哉其利二也躬無任重居必方城白壁朱門理然致敬夜琴晝瑟是自娛懷曉筆暮詩論情頓足其利三也假使棘生王路橋化長溝巷吏門兒何因仰喚寸絹不輸官庫斗米不進公倉庫部倉司豈須求及其利四也門前擾擾我且安眠巷裏云云余無驚色家休小大之調門停強弱之丁入出隨心往還自在其利五也出家無當之僧猶勝在俗之士假使心存殺戮手無斷命之愆密裏通情決勝酌然嬌俗如斯煩垢萬倍勝於白衣一入愛河永沈無出其利六也聽鍾聲而致敬尋香馥以生心朝覩尊儀暮披寶軸剎那之善逐此而生水渧微功漸盈大器未知因緣果報善惡皎然就此而言其利難陳矣假使達相白衣猶有埃塵之務縱令遙寄彈指遠近低頭形去心留身移意往閡有者得如此貧苦者永無因近在目前不言可見其利七也山間樹下故自難期枕石漱流實為希有猶斯之類不可思議如此者難逢一心人希遇法師未能不學交習聰勝之因一旦退心於理邈矣其利八也開織成之帙見過去之因摛琉璃之卷驗當來之果識因識業不以為愆知福知報何由作罪上無舟楫交見沒溺之悲下失浮囊則有沈身之患其利九也曠濟群品為天人之師水陸空行皆所尊貴言必闍梨和上書輒致敬和南遠近嗟詠貴賤顒仰法師今必退轉立成可驗才脫袈裟逢人輒稱汝我始解偏袒姓名便亦可呼平交故自不論下劣者亦恐不讓薄言稱已榻席懸異從來小得自在便以君為題封若不屈膝斂眉自達無因俯仰承迎未間合度如此專專何由可與其利十也略言十事空失此機其間深道寧容具述仰度仁者心居魔境為魔所迷意附邪途受邪易性假使眉如細柳何足關懷頰似紅桃詎能長久同衾分枕猶有長信之悲坐臥忘時不免秋胡之怨洛川神女尚復不惑東阿世上斑姬何關君事夫心者面焉若論繾綣則共氣共心一過纏綿則連宵厭起法師未通返照安悟賣花未得他心那知彼意嗚呼桂樹遂為巨火所焚可惜明珠乃受淤埿埋沒弟子今日橫咨必為法師所哂世上白衣何訾何限且一人退道而不安危推此而言實成難解譬如瓦礫盈路人所不驚片子黃金萬夫息步正言法師入道之功已備染俗之法未加何異金博赤銅銀換鉛錫可悲可惜猶可優量能忍難忍方知其最願棄俗事務息塵勞正念相應行志兩全薄加詳慮更可思惟悔之在前無勞後恨如弟子算遠即十數年中決知惻愴近即三五歲內空唱如何萬恨萬悲寧知遠及自誤自惜永棄一生乃知斷絃可續情去難留或若火裏生花可稱希有迷人知返去道不遙幸速推排急登正路法師非是無知遂為愚者所迷類似阿難便為魔之所嬈猶須承三寶之力制彼群凶竪波若之幢天魔自欵若此言旨當即便寄棄芻蕘若不會高懷幸停深怪耳諫周祖沙汰僧表釋曇積僧曇積白皇帝大檀越德握乾坤心懸白日照燭無私之道卷舒不測之化能威臨皂白悲及僧尼控引玄綱示之出路欲使清升練行顯迹於明時寡德沙門恥還於素俗爰降明詔責其試藝頒下諸州問其課業竊惟入道多端諒非一揆依相驗人有五理不足何者或有僧尼生年在寺節儉自居願行要心不犯諸禁燒香旋塔頂禮殷勤合掌低頭忘寢以食但受性愚鈍於讀誦無緣習學至苦而不得一字今量所告意須文誦聰者為是重審試僧不退實行為是正意偏望取其明決且實而不聰行之本也聰而不實智之相也若用為有業是不求備於一人若實為非僧便責知於滿足大覺智慧不可思議諸所為法天人頂受況在凡夫輒思改易群聖自言種種神變於斯大法不能加減大人出世識本知機巧妙多方化人以漸衆生根行各各不同令聖説經互差不一內外相通亦無乖異又如孔子領徒三千達者七十有二升堂入室莫過數人自餘已外豈容斥逐今州郡縣各有學生德及顏淵詎幾人也可以不及顏淵廢郡不立可以無德頑僧並令還俗不及顏淵者猶勝於野人無德頑僧者猶勝於外道伏此二途不足一也或有專歸樹下擎錫持盂望中而餐正命自活名聞頓捨利養無心理觀除煩遂闕文誦論其人入道則內業有餘究其文解則相功不足何必聚衆京華悉是德僧孤拔林野咸非行士故果有生熟不可以色相而噉人有出沒不可以形名而取敢自三思不足二也或有營經造像厲力積年修補伽藍憂勤纍歲捨身濟物不以寒苦經心施樂與人不以飢貧易志但無聰力日誦不過一言旦夕栖栖日讀不盈數紙準其回向則善不空施徵其發趣則佛之真子今無辜退俗是枉濫行人直性頓非不足三也佛説僧是福田理難損抑雖可年未形凡而法服尊重豈容朝施暮奪自加豸毀愛惡無常豈責其得失於一人之上置不恆之式於十二沖典恐不合聖心甚乖大趣上損慈悲下虧正化唯畏後世相傳受誣僧之謗不足四也今大周大國僧尼未幾寺舍烈然有盈萬數只應招延二部溢滿其間動梵鳴鍾為國行道方便窮其長短曲覓愆非黜放還民使棟梁空曠若他方異國遠近聞知疑謂求兵於僧衆之間取地於塔廟之下深誠可怪但頑僧任役未足加兵寺地給民豈能富國染不頓除性由漸顯一切衆生具諸煩惱若頓遣圓修是滅佛法匪直損身魔必得便何者一向純善精加供養一向純惡退令還俗此言所見深滅三寶若麁細等看魔難得便何者純善退還成麁衆麁之人猶生物善經文道理莫問麁細之行唯不還俗終成佛子進退三思不足五也貧道餘年賤質寄命關右欽化承恩得存道業是以呻吟策杖送此丹誠忓誤之愆伏增戰越敬白菩薩戒弟子戴逵貽書與仙城禪師命禪師座下竊以渭清涇濁共混潮宗之源松長箭短同秉堅貞之質幸賴含靈五常理宜範圍三教是以闕里儒童闡禮經於洙濟苦縣迦葉遷妙道於流沙雖牢籠二儀蓋限茲一世豈如興正法於鹿苑蕩妄想於鷲山半滿既陳權實斯顯誠教有淺深人無內外禪師德聲遠振行高物表攝受四依因牧羊而成誦負笈千里歷龍宮而苞括故能內貫九部總雪山之祕藏外該七略備壁水之典墳支遁天台之銘竺真羅浮之記曇賦七嶺汰詠三河寶師妙折莊生璩公著論爰集若吞雲夢如指諸掌加以妙持淨戒如護明珠善執律儀似臨懸鏡稟羅云之密行種賓頭之福田撫挹定水便登覺觀高蔭禪枝將逾喜捨是以不遠瀟湘來儀陸植杖龍泉仍為精舍回車馬谷即創伽藍鑿嶺安龕詎假聚沙成塔因山構苑無勞布金買地開士雲會袂似華陰法侶朋衝衆齊稷下禪室晨興時芳杜若支提暮啓暫入桃源香山梵響將阮嘯而相發日殿妙音與孫琴而齊韻紫蓋貞松仍麾上辨洪崖神井即瑩高心故以才堪買山德邁同輦崇峰景行牆仞懸絶弟子業風鼓慮欲海沈形洎渚宮淪覆將歷二紀晝倦坐馳夜悲愕夢未能忘懷彼我歸軫一乘遣蕩胸襟朗開三達既念鼠藤彌傷鳥繫昔在志學家傳賜書五禮優柔三玄饜飫頗絶韋編構述餘緒爰登弱冠捃托百家及乎從仕留連文翰雖未能採龍門而梯會稽賦鷦鷯而咏鸚鵡若求其一介亦髣佛古人但深悟聚泡情悲交臂常欲蟬蛻俗解貪味真如一日鄖城訊修隗館屈膝情欣係襪遇同進履未盡開襟遽嗟飄忽尋望拂衣世網脫屣牽絲滄浪濯纓漢陰抱甕行餐九轉用遣幽憂漸寤三空將登苦忍仙梁視玉不廢從師深澗折桃無妨請益所希彌天勝氣乍酬鑿齒雁門高論時答嘉賓冬暖如春願珍清軌室邇人遐彌軫禁帶餘辭殘簡念無金玉幽林沙門釋惠命酬書濟北戴先生夫一真常湛徼妙於是同玄萬聖乘機違順以之殊迹是以西關明道東野談仁雕朴改工有無異軫今若括此二門原茲兩教豈不歸宗三轉會入五乘藉淺之深資權顯實斯若池分四水始則殊名海控八河終無別味檀越幼挺奇才夙懷茂緒華辭卓世雅致參玄智涉五明學兼三教益矣能忘蹈顏生之逸軌損之為道慕李氏之玄蹤雖復六經該廣百家繁富聖賢異準儒墨分流或事曠而文殷或言高而義遠莫不納如瓶受説似河傾明鏡匪疲洪鍾任扣子建挹以奇文長卿恧其高趣故雖秦楚分墟周梁改俗白眉青眼龜玉之價弗踰栖鳳臥龍魚水之交莫異加以識瑩苦空志排塵俗形雖廊廟器乃江湖是以屬歎牽絲興言世網辭同應陸調合張嚴嗟朱火之遽傳愍清波之速逝方應濯足從道洗耳辭榮九轉充虛四扉排疾然後尋八正以味一真解十纏而遣三患斯之德也寧不至哉貧道識鏡難清心塵易壅定慚華水戒非草繫才侔撤燭學謝傳燈內有愧於德充外無狎於人世是以淹滯一丘寓形蓬柳端居千仞託志筠松測四序於風霜候三旬於眺魄至乃夜聞山鳥仍代九成晝視遊魚聊追二子蓽戶弊襟既在原非病朱門結駟亦於我如雲所歎藤鼠易侵樹猿難靜勞想鷲頭倦思雞足至於林凋秋葉曾無獨覺之明谷響春鶯終切寡聞之歎忽承來問曲見光譽幽氣若蘭清音如玉誠復溢目致歡而實撫膺多愧雖識謝天池未辨北溟之説而事同泥井慚聞東海之談所冀伊人於焉好我黃石匪遙結期明旦白駒可縶用永終朝善敬清猷時因素札言不洗意報此何申弔延法師亡書隋薛道衡八月二十三日名和南俗界無常延法師遷化情深悲怛不能已已唯哀慕摧割當不可任法師弱齡捨俗高蹈塵表志度恢弘理識精悟靈臺神宇可仰而不可窺智海法源可涉而不可測同夫明鏡屢照不疲譬彼洪鍾有來斯應往逢道喪玄維落紐栖志幽巖確乎不拔高位厚禮不能回其慮嚴威峻法未足懼其心經行宴坐夷險莫二戒德律儀始終如一聖皇啓運像法重興卓謂緇林鬱為稱首屈宸極之重申師資之義三寶由其弘護二諦藉以宣揚信足以追蹤澄什超邁安遠而法柱忽傾仁舟遽沒匪直悲纏四部固亦酸感一人師杖錫挈瓶夙承訓導升堂入室具體而微在三之情理百恆慟往矣奈何無常奈何疾礙不獲展慰但深悲結謹遣白書慘愴不次弟子薛道衡和南
