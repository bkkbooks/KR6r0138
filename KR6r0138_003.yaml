body:
  text: 大唐西明寺沙門釋道宣撰歸正篇第一之三遂古篇梁侍中江淹僕嘗為造化篇以學古制今觸類而廣之復有此文兼象天問以遊思云爾聞之遂古大火然兮水亦溟涬無涯邊兮女媧練石補蒼天兮共工所觸不周山兮河洛交戰寧深淵兮黃炎共鬪涿鹿川兮女妓九子為民先兮蚩尤鑄兵幾千年兮十日並出堯之間兮羿乃斃日事豈然兮常蛾奔月誰所傳兮豐隆騎雲為靈仙兮夏開乘龍何因緣兮傅說託星安得宣兮夸父鄧林義亦艱兮尋木千里烏易論兮穆王周流往復旋兮河宗王母可與言兮青鳥所解露誠亶兮五色玉石出西偏兮崑崙之墟海北間兮去彼宗周萬二千兮山經古書亂編篇兮郭釋有兩未精堅兮上有剛氣道家言兮日月五星皆虛懸兮倒景去地出雲煙兮九地之下如有天兮土伯九約寧若先兮西方蓐收司金門兮北極禺強為常存兮帝之二女遊湘沅兮霄明燭光尚焜煌兮太一司命鬼之元兮山鬼國殤為遊魂兮迦維羅衛道最尊兮黃金之身誰能原兮恆星不見頗可論兮其說彬炳多聖言兮六合之內理常渾兮幽明詭怪令智惛兮河圖洛書為信然兮孔甲豢龍古共傳兮禹時防風處隅山兮春秋長狄生何邊兮臨洮所見又何緣兮蓬萊之水淺於前兮東海之波為桑田兮山崩邑淪寧幾千兮石生土長必積年兮漢鑿昆明灰炭全兮魏開濟渠螺𧉻堅兮白日再中誰使然兮北斗不見藏何間兮建章鳳闕神光連兮未央鍾𧇀生花鮮兮銅為兵器秦之前兮丈夫衣綵六國先兮周時女子出世間兮班君絲履遊太山兮人鬼之際有隱淪兮四海之外孰方圓兮沃沮肅慎東北邊兮長臂兩面亦乘船兮東南倭國皆文身兮其外黑齒次裸民兮侏儒三尺並為鄰兮西北丁零又烏孫兮車師月支種類繁兮馬蹄之國若騰奔兮西南烏弋及罽賓兮天竺于闐皆胡人兮條支安息西海漘兮人跡所極至大秦兮珊瑚明珠銅金銀兮琉璃馬腦來雜陳兮車渠水精莫非真兮雄黃雌石出山垠兮青白蓮花被水濱兮宮殿樓觀並七珍兮窮陸溟海又有民兮長股深目豈君臣兮丈夫女子及三身兮結胸反舌一臂人兮跂踵交脛與羽民兮不死之國皆何因兮茫茫造化理難循兮聖者不測況庸倫兮筆墨之暇為此文兮薄暮雷電聊以忘憂又示君兮梁典云江淹位登金紫初淹年六歲能屬文為詩最長有遠識愛奇尚年二十以五經授宋諸王待以客禮初年十三而孤貧採薪養母以孝聞及梁朝六遷侍中夢郭璞索五色筆淹與之自是為文不工人謂其才盡然以不得志故也有集十卷深信天竺緣果之文余檢其行事與傳同焉綴述佛理不多録其別篇知明賢之雅志耳家訓歸心篇北齊光祿顏之推三世之事信而有徵家業歸心勿輕慢也其間妙旨具諸經論不復於此少能讚述但懼汝曹猶未牢固略重勸誘耳原夫四塵五陰剖析形有六舟三駕運載群生萬行歸空千門入善辨才智慧豈徒七經百氏之博哉明非堯舜周孔老莊之所及也內外兩教本為一體漸極為異深淺不同內典初門設五種之禁與外書仁義禮智信五常符同仁者不殺之禁也義者不盜之禁也禮者不邪之禁也智者不酒之禁也信者不妄之禁也至如畋狩軍旅宴饗刑罰因民之性不可卒除就為之節使不淫濫耳歸周孔而背釋宗何其迷也俗之謗者大抵有五其一以世界外事及神化無方為迂誕也其二以吉凶𮂁福或未報應為欺誑也其三以僧尼行業多不精純為姦慝也其四以縻費金寶減耗課役為損國也其五以縱有因緣而報善惡安能辛苦今日之甲利益後世之乙乎乙乎為異人也今並釋之于下云釋一曰夫遙大之物寧可度量今人所知莫若天地天為精氣日為陽精月為陰精星為萬物之精儒家所安也星有墜落乃為石矣精若是石不可有光性又質重何所繫屬一星之徑大者百里一宿首尾相去數萬百里之物數萬相連闊狹縱斜常不盈縮又星與日月光色同耳但以大小為其等差然而日月又當石耶石既牢密烏兔焉容石在氣中豈能獨運日月星辰若皆是氣氣體輕浮當與天合往來環轉不得偝違其間遲疾理寧一等何故日月五星二十八宿各有度數移動不均寧當氣墮忽變為石地既滓濁法應沈厚鑿土得泉乃浮水上積水之下復有何物江河百谷從何處生東流到海何為不溢歸塘尾閭泄何所到沃焦之石何氣所然潮汐去還誰所節度天漢懸指那不散落水性就下何故上騰天地初開便有星宿九州未劃列國未分剪疆區野若為躔次封建以來誰所制割國有增減星無進退災祥禍福就中不差懸象之大列星之夥何為分野止繫中國昴為旄頭胸奴之次西胡東夷雕題交趾獨棄之乎以此而求迄無了者豈得以人事尋常抑必宇宙之外乎凡人所信惟耳與目自此之外咸致疑焉儒家說天自有數義或渾或蓋乍穹乍安斗極所周管維所屬若所親見不容不同若所測量寧足依據何故信凡人之臆說疑大聖之妙旨而欲必無恆沙世界微塵數劫乎而鄒衍亦有九州之談由中人不信有魚大如木海上人不信有木大如魚漢武不信弦膠魏文不信火布胡人見錦不信有蟲食樹吐絲所成昔在江南不信有千人氈帳及來河北不信有二萬石船皆實驗也世有呪師及諸幻術猶能履火蹈刃種瓜移井倏忽之間千變萬化人力所為尚能如此何妨神通感應不可思量千里寶幢百由旬座化成淨土踊出妙塔乎釋二曰夫信謗之興有如影響耳聞眼見其事已多或乃精誠不深業緣未感時儻差簡終難獲報耳善惡之行禍福所歸九流百氏皆同此論豈獨釋典為虛妄乎項託顏回之短折伯夷原憲之凍餧盜跖莊蹻之福壽齊景桓魋之富強若引之先業冀以後生更為實耳如以行善而偶鍾禍報為惡而儻值福徵便可怨尤即為欺詭則亦堯舜之云虛周孔之不實也又安所依信而立身乎釋三曰開闢已來不善人多而善人少何由恚責其精潔乎見有名僧高行棄而不說若覩凡猥流俗便生非毀且學者之不勤豈教者之為過俗僧之學經律何異士人之學詩禮詩禮之教格朝廷之士略無全行者經律之禁格出家之輩而獨責無犯哉且闕行之臣猶求祿位毀禁之侶何慚供養乎其於戒行自當有犯一被法服已墮僧數歲中所計齊講誦持比諸白衣猶不啻山海也釋四曰內教多途出家自是其一法耳若能誠孝在心仁惠為本須達流水不必剔落髦髮豈令罄井田而起塔廟窮編戶以為僧尼也皆由為政不能節之遂使非法之寺妨民稼穡無業之僧空國賦算非大覺之本旨也抑又論之求道者身計也惜費者國謀也身計國謀不可兩遂誠臣徇主而棄親孝子安家而忘國各有行也儒有不屈王侯高尚其事隱有讓王辭相避世山林安可計其賦役以為罪人也若能皆化黔首悉入道場如妙樂之世儴佉之國則有自然粳米無盡寶藏安求田蠶之利乎釋五曰形體雖死精神猶存人生在世望於後身似不連屬及其歿後則與前身猶老少朝夕耳世有魂神示見夢想或降僮妾或感妻孥求索飲食徵須福祐亦為不少矣今人貧賤疾苦莫不怨尤前世不修功德以此而論可不為之作地乎夫有子孫自是天地間一蒼生耳何預身事而乃愛護道以基趾況於己之神爽頓欲棄之乎故兩疏得其一隅纍代詠而彌光矣凡夫曚蔽不見未來故言彼生與今生非一體耳若有天眼鑒其念念隨滅生生不斷豈可不怖畏耶又君子處世貴能克己復禮濟時益物治家者欲一家之慶治國者欲一國之良僕妾臣民與身竟何親也而為其勤苦修德乎亦是堯舜周孔虛失愈樂一人修道濟度幾許蒼生免脫幾身罪纍幸熟思之人生居世須顧俗計樹立門戶不得悉棄妻子一皆出家但當兼修行業留心讀誦以為來世資糧人身難得勿虛過也七録序梁處士阮孝緒日月貞明匪光景不能垂照嵩華載育非風雲無以懸感大聖挺生應期命世所以匡濟風俗矯正彝倫非夫丘索墳典詩書禮樂何以成穆穆之功致蕩蕩之化也哉故鴻荒道喪帝昊興其爻畫結繩義隱皇頡肇其文字自斯以往㳂襲異宜功成治定各有方冊正宗既殄樂崩禮壞先聖之法有若綴旒故仲尼歎曰大道之行也與三代之英丘未逮也而有志焉夫有志以為古文猶好也故自衛反魯始立素王於是刪詩書定禮樂列五始於春秋興十翼於易道夫子既亡微言殆絶七十並喪大義遂乖逮乎戰國俗殊政異百家競起九流互作嬴正疾之故有坑焚之禍至漢惠四年始除挾書之律其後外有太常太史博士之藏內有延閣廣內祕室之府開獻書之路置寫書之官至孝成之世頗有亡逸乃使謁者陳農求遺書於天下光祿大夫劉向及子伋歆等讎校篇籍每一篇已輒録而奏之會向亡哀帝使歆嗣其前業乃徙溫室中書於天祿閣上歆遂總括群篇奏其七略及後漢蘭臺猶為書部又於東觀及仁壽闥撰集新記校書郎班固傅毅並典祕籍固乃因七略之辭為漢書藝文志其後有著述者袁山松亦録在其書魏晉之世文籍逾廣皆藏在祕書中外三閣魏祕書朗鄭默刪定舊文時之論者謂為朱紫有別晉領祕書監荀勗因魏中經更著新薄雖分為十有餘卷而總以四部別之惠懷之亂其書略盡江左草創十不一存後雖鳩集淆亂以甚及著作佐郎李充始加刪正因荀勗舊簿四部之法而換其乙丙之書沒略衆篇之名總以甲乙為次自時厥後世相祖述宋祕書監謝靈運丞王儉齊祕書丞王亮監謝朏等並有新進更撰目録為七志其中朝遺書收集稍廣然所亡者猶太半焉齊末兵火延及祕閣有梁之初缺亡甚衆爰命祕書監任昉躬加部集又於文德殿內別藏衆書使學士劉孝標等重加進乃分數術之文更為一部使奉朝請祖暅撰其名録其尚書閣內別藏經史雜書華林園又集釋氏經論自江左篇章之盛未有踰於當今者也孝緒少愛墳籍長而弗倦臥病間居傍無塵雜晨光才啓緗囊已散宵漏既分録帙方掩猶不能窮究流略探盡祕奧每披録內省多有缺然其遺隱記頗好搜集凡自宋齊以來王公搢紳之館苟蓄聚墳籍必思致其名簿凡在所遇若見若聞校之官目多所遺漏遂總集衆家更為新録其方內經記至于術技合為五録謂之內篇方外佛道各為一録謂之外篇凡為録有七故名七録昔司馬子長記數千年事先哲愍其勤雖復稱為良史猶有捃拾之責況總括群書四萬餘卷皆討論研核標判宗旨才愧疏通學慚博達靡班嗣之賜書微黃香之東觀儻欲尋檢內寡卷軸如有疑滯傍無沃啓其為紕謬不亦多乎將恐後之罪子者豈不在於斯録如有刊正請俟君子昔劉向校書輒為一録論其指歸辨其訛謬隨竟奏上皆載在本書時又別集衆録謂之別録即今之別録是也子歆探其指要著為七略其一篇即六篇之總最故以撮略為名次六藝略次諸子略次詩賦略次兵書略次數術略次方技略王儉七志改六藝為經典次諸子次詩賦為文翰次兵為軍書次數術為陰陽次方技為術藝以向歆雖云七略實有六條故立圖譜一志以全七限其外又條七略及漢藝文志中經簿所闕之書并方外之經佛經道經各為一録雖繼七志之後而不在其數今所撰七録斟酌王劉王以六藝之稱不足標榜經目改為經典今則從之故序經典録為內篇第一劉王並以衆史合于春秋劉氏之世史書甚寡附見春秋誠得其例今衆家記傳倍於經典猶從此志實為繁蕪且七略詩賦不從六藝諸部蓋由其書既多所以別為一略今依擬斯例分出衆史序記傳録為內篇第二諸子之稱劉王並同又劉有兵書略王以兵字淺薄軍言深廣故改兵為軍竊謂古有兵革兵戎治兵用兵之言斯則武事之總名也所以還改軍從兵兵書既少不足別録今附于子總以子兵為稱故序子兵録為內篇第三王以詩賦之名不兼餘制故改為文翰竊以傾世文詞總謂之集變翰為集於名尤顯故序文集録為內篇第四王以數術之稱有繁雜之嫌改為陰陽方技之言事無典據又改為藝術竊以陰陽偏有所繫不如數術之該通術藝則濫六藝與數術不逮方技之要顯故還依劉氏各守本名但房中神仙既入仙道醫經經方不足別創故合術技之稱以名一録為內篇第五王氏圖譜一志劉略所無劉數術中雖有歷譜而與今譜有異竊以圖畫之篇宜從所圖為部故隨其名題各附本録譜既注記之類宜與史體相參故載于記傳之末自斯以上皆內篇也釋氏之教實被中土講說諷味方軌孔籍王氏雖載于篇而不在志限即理求事未是所安故序佛法録為外篇第一仙道之書由來尚矣劉氏神仙陳於方技之末王氏道經書於七志之外今合序仙道録為外篇第二王既先道而後佛今則先佛而後道蓋所宗有不同亦由其教有淺深也凡內外二篇合為七録天下之遺書祕記庶幾窮於是矣有梁普通四年歲惟單閼仲春十有七日於建康禁中里宅始述此書通人平原劉杳從余遊因說其事杳有志積久未獲操筆聞余已先著鞭欣然會意凡所抄集盡以相與廣其聞見實有力焉斯亦康成之於傳釋盡歸子順之書也古今書最右七種二十一帙一百八十一卷阮孝緒撰不足編諸前録而載於此孝緒陳留人宋中領軍歆之曾孫祖慧真臨賀太守父彥太尉從事中郎孝緒年十三略通五經大義隨父為湘州行事不書南紙以成父之清年十六丁艱終喪不服綿纊雖蔬食有味即吐之在鍾山聽講母王氏忽有疾孝緒於講座心驚而反合藥須生人蔘自採於鍾山高嶺經日不值忽有鹿在前行心怪之至鹿息處果有人蔘母疾即愈齊尚書令王晏通家權貴來候之傳呼甚寵孝緒惡之穿籬而遁晏有所遺拒而不納嘗食醬而美問之乃王家所送遂命覆醢及晏被誅以非黨獲免常以鹿林為精舍環以林池杜絶交好少得見者御史中丞任昉欲造之而不敢進睨鹿林謂其兄履曰其室則邇其人甚遠太中大夫殷藝贈以詩任昉止之曰趣舍苟異何用相干於是朝貴絶於造請惟與裴貞子為交貞子即子野之諡天監十二年祕書監傅昭薦焉並不到天子以為苟立虛名以要顯譽自是不復徵聘故何胤孝緒並得遂其高志南平元襄謂履曰昔君大父舉不以來遊取纍賢弟獨執其志何也孝緒曰若麏䴥盡可驂馭何以異夫騄驥哉王作二暗及性情義並以示之請為潤色世祖著忠臣傳集釋氏碑銘丹陽尹録妍神記並先簡居士然後施行鄱陽忠烈王孝緒姊夫也王及諸子歲時致饋一無所受嘗自筮死期云與劉著作同年是秋劉杳卒孝緒睨曰吾其幾何數旬果亡年五十八皇太子遣使弔祭賵贈甚渥子恕追述先志固辭不受門人諡曰文貞處士孝緒博極群書無一不善精力強記學者所宗著七録削繁等諸書一百八十一卷並行於世編次佛道以為方外之篇起於此矣
