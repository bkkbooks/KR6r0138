body:
  text: 大唐西明寺沙門釋道宣撰僧行篇第五之三福田論隋東都洛賓上林園翻經館學士沙門釋彥琮隋煬帝大業三年新下律令格式令云諸僧道士等有所啓請者並先須致敬然後陳理雖有此令僧竟不行時沙門釋彥琮不忍其事乃著福田論以抗之意在諷刺言之者無罪聞之者以自誡也帝後朝見諸沙門並無致敬者大業五年至西京郊南大張文物兩宗朝見僧等依舊不拜下敕曰條令久行僧等何為不致敬時明贍法師對曰陛下弘護三寶當順佛言經中不令拜俗所以不敢違教又敕曰若不拜敬宋武時何以致敬對曰宋武虐君偏政不敬交有誅戮陛下異此無得下拜敕曰但拜僧等峙然如是數四令拜僧曰陛下必令僧拜當脫法服著俗衣此拜不晚帝夷然無何而止明日設大齊法祀都不述之後語群公曰朕謂僧中無人昨南郊對答亦有人矣爾後至終畢無拜者其黃巾士女初聞令拜合一李衆連拜不已帝亦不齒問之論曰昔在東晉太尉桓玄議令沙門敬於王者廬山遠法師高名碩德傷智幢之欲折悼戒寶之將沈乃作沙門不敬王者論設敬之儀當時遂寢然以緝詞隱密援列杳深後學披覽難見文意聊因暇日輒復申敘更號福田論云忽有嘉客來自遠方遙附桓氏重述前議主人正念久之抗聲應曰客似未聞福田之要吾今相為論之夫云福田者何耶三寶之謂也功成妙智道登圓覺者佛也玄理幽寂正教精誠者法也禁戒守真威儀出俗者僧也皆是四生導首六趣舟航高拔天人重踰金石譬乎珍寶劣相擬議佛以法主標宗法以佛師居本僧為弟子崇斯佛法可謂尊卑同位本末共門語事三種論體一致處五十之載弘八萬之典所說指歸惟此至極寢聲滅影盡雙林之運刻檀書葉留一化之軌聖賢間起門學相承和合為群住持是寄金人照於漢殿像法通於洛浦並宗先覺俱襲舊章圖方外而發心棄世間而立德官榮無以動其志親屬莫能纍其情衣則截於壞色髮則落於毀容不戴冠而作儀豈束帶而為飾上天之帝猶恆設禮下土之王固常致敬有經有律斯法未殊若古若今其道無滯推帝王之輕重亞神祇之大小八荒欽德四海歸仁僧尼朝拜非所聞也如懷異旨請陳雅見客曰周易云天地之大德曰生聖人之大寶曰位老子云域中有四大王居一焉竊以莫非王土建之以國莫非王臣繫之以主則天法地覆載兆民方春比夏生長萬物照之以日月之光潤之以雲雨之氣六合則咸宗如海百姓則共仰如辰戎夷革面馬牛回首蛇尚荷於隋侯魚猶感於漢帝豈有免其編戶假其法門忘度脫之寬仁遺供養之弘造高大自許卑恭頓廢譬諸禽獸將何別乎必能御以神通得成聖果道被天下理在言外然今空事剔除尚增三毒虛改服飾猶染六塵戒忍弗修定智無取有乖明誨不異凡俗詎應恃宣讀之勞而抗禮萬乘藉形容之別而闕敬一人昔比丘接足於居士菩薩稽首於慢衆斯文復彰厥趣安在如以權道難沿佛性可尊況是君臨罔非神降伯陽開萬齡之範仲尼敷百王之則至於謁拜必遵朝典獨有沙門敢為陵慢此而可忍孰可容乎弊風難革惡流易久不遇明皇誰能刊正忽起非常之變易招無信之譏至言有憑幸垂詳覽主曰吾所立者內也子所難者外也內則通於法理外則局於人事相望懸絶詎可同年斯謂學而未該聞而不洽子之所惑吾當為辨試舉其要總有七條無德不報一也無善不攝二也方便無礙三也寂滅無榮四也儀不可越五也服不可亂六也因不可忘七也初之四條對酬難意後之三條引出成式吾聞天不言而四時行焉王不言而萬國治焉帝有何力民無能名成而不居為而不恃斯乃先王之盡善大人之至德同霑庶類齊預率賓幸殊草木差非蟲鳥戴圓履方俯仰懷惠食粟飲水飽滿銜澤既能矜許出家慈聽入道斷麁業於已往祈妙果於將來既蒙重惠還思厚答方憑萬善之益豈在一身之敬追以善答攝報乃深徵以身敬收利益淺良由僧失正儀俗減餘慶僧不拜俗佛已明言若知可信理當遵立如謂難依事應除廢何容崇之欲求其福卑之復責其禮即令從禮便同其俗猶云請福未見其潤此則存而似棄僧而類民非白非黑無所名也竊見郊禋總祭惟存仰福為尊僧尚鄙斯不恭如何令僧拜俗天地可反斯儀罕乖後更為敘是謂第一無德不報者也法既漸衰人亦稍末罕有其聖誠如所言雖處凡流仍持忍鎧縱虧戒學尚談智典如塔之貴似佛之尊歸之則善生毀之則罪積猛以始發割愛難而能捨引凡終期成覺逈而能趣斯故剔髮之辰天魔遙懾染衣之日帝釋遙歡妓女聊披無漏遂滿醉人暫剪有緣即結龍子賴而息驚象王見而止怖威靈斯在儀服是因多未受具對揚佛旨小不可輕光揚僧力波離既度釋子服心尼陀亦歸匿王屈意乃至若老若少可師者法無賤無豪所存者道然後賢愚之際默語之間生熟相似去取非易肉眼分別恐不逢寶信心平等或有值真才滿四人即成一衆僧既弘納佛亦通在食看沸水之異方遣施僧衣見織金之奇乃令奉衆僧之威德不亦大矣足可以號良福田之最為聖教之宗是謂第二無善不攝者也若論淨名之功早升雲地臥疾之意本超世境久行神足咸嘆辨才新學頂禮誠謝法施事是權宜式非常准謂時暫變其例乃多則有空藏弗恭如來無責沙彌大願和上推先一往直觀悉可驚怪再詳典釋莫匪通塗不輕大士獨興高跡警彼上慢之流設茲下心之拜偏行一道直用至誠既非三惠詎是恆式因機作法足為希有假弘教化難著律儀大聖發二智之明制五篇之約廢其爵齒存其戒夏始終通訓利鈍齊仰耆幼有序先後無雜未以一出別業而令七衆普行自然之理分明可見昔妻死歌而鼓盆身葬嬴而襯土此亦匹夫之節豈概明王之制乎況覺典冲邃聖言幽密局執一邊殊乖四辨是謂第三方便無礙者也且復周之柱史久牽王役魯之司寇已居國宰宗歸道德始曰無名訓在詩書終云不作祖述堯舜憲章文武鞠躬恭敬非此而誰巢許之風望古仍邁夷齊之操擬今尚逈焉似高攀十力遠度四流厭斯有為之苦欣彼無伴之滅不繫慮於公庭未流情於王事自然解脫固異儒者之儔矣是謂第四寂滅無榮者也至如祭祀鬼神望秩川嶽國容盛典書契美談神輩為王所敬僧猶莫致於禮僧衆為神所禮王寧反受其敬上下參差翻違正法衣裳顛倒何足相方令神擁護今來在僧祈請之至會開呪力竟無拜理是謂第五儀不可越者也本皇王之奮起必真人之託生上德雖祕於淨心外像仍標於俗相是以道彰緇服則情勤宜猛業隱玄門則形恭應絶求之故實備有前聞國主頻婆父王淨飯昔之斯等咸已克聖專修信順每事歸依縱見凡僧還想崇佛不以跪親為孝許非不孝之罪不以拜君為敬豈是不敬之愆所法自殊所法已別體無混雜制從於此是謂第六服不可亂者也謹案多羅妙典釋迦真說乃云居剎利而稱尊籍般若而為護四信不壞十善無虧奉佛事僧積功纍德然後日精月像之降赤光白氣之感金輪既轉珠寶復懸應天順民御圖握鏡始開五常之術終弘八正之道亦宜覆觀宿命追憶往因敬佛教而崇僧寶益戒香而增慧力自可天基轉高比梵宮之遠大聖壽恆固同劫石之長久然則雷霆勢極龍虎威隆慶必賴兼犯使怒及出言布令風行草偃既抑僧禮誰敢鱗張但恐有損冥功無資威業曷誠盡命如斯而已是謂第七因不可忘者也上已略引吾意粗除子惑欲得博聞宜尋大部客曰主人向之所引理例頻繁僕雖庸暗頗亦承覽文總幽明辨苞內外所論祭典尚有迷惑周易云一陰一陽之謂道陰陽不測之謂神竊以昧隱神路隔絶人境欲行祠法要藉禮官本置奉常專司太祝縱知鬼事終入臣伍真佛已潛聖僧又滅仰信冥道全陟幽神季葉凡夫薄言回向共規間逸相學剔剪職掌檀會所以加其法衣主守塔坊所以蠲其俗役才觸王網即墜民貫既同典祀詎合稱寶朝敬天子固是恆儀苦執強梁定非通識宋氏舊制其風不遠惟應相襲更欲何辭主人曰客知其一未曉其二請聽嘉言少除異想吾聞鬼者歸也死之所入神者靈也形之所宗鬼劣於人唯止惡道神勝於色普該情趣心有靈智稱之曰神隱而難知謂之不測銓其體用或動或靜品其性欲有陰有陽周易之旨蓋此之故殊塗顯於一氣誠言闕於六識設教之漸斷可知焉鬼報冥通潛來密去標以神號特用茲耳嘗試言之受父母之遺稟乾坤之分可以存乎氣可以立乎形至若已之神道必是我之心業未曾感之於乾坤得之於父母識含胎藏彌亘虛空意帶熏種漫盈世界去而復生如火焰之連出來而更逝若水波之續轉根之莫見其始究之豈覿其終濁之則為凡澄之則為聖神道細幽理固難詳矣神之最高謂之大覺思議所不得名相孰能窮真身本無遷謝生盲自不瞻睹託想追於舊蹤傾心玩於遺法若欲荷傳持之任啓要妙之門賴此僧徒膺茲佛付假慈雲為內影憑帝威為外力玄風遠及至於是乎教通三世衆別四部二從於道二守於俗從道則服像尊儀守俗則務典供事像尊謂比丘比丘尼也典供謂優婆塞優婆夷也所像者尊則未參神位所典者供則下預臣頒原典供之人同主祭之役吾非當職子何錯引由子切言發吾深趣理既明矣勿復惑諸在宋之初暫行此抑彼亦乖真不煩涉論邊鄙風俗未見其美忽遣同之可怪之極客曰有旨哉斯論也蒙告善道請從退歸問出家損益詔并答唐高祖皇唐啓運諸教並興然於佛法彌隆信重捨京舊第置興聖寺自餘會昌勝業慈悲證果集仙等寺架築相尋至於道觀無聞於俗武德四年有太史令傅奕者先是黃巾深忌緇服既見國家別敬彌用疚心乃上廢佛法事十有一條云佛經誕妄言妖事隱損國破家未聞益世請胡佛邪教退還天竺凡是沙門放歸桑梓則家國昌大李孔之教行焉武皇容其小辨朝輔任其放言乃下詔問僧曰棄父母之鬚髮去君臣之章服利在何門之中益在何情之外損益二宜請動妙釋有濟法寺沙門襄陽釋法琳憤激傅詞側聽機候承有斯問即陳對曰琳聞至道絶言豈九流能辨法身無象非十翼所詮但四趣茫茫飄淪欲海三界蠢蠢顛墜邪山諸子迷以自焚凡夫溺而不出至人所以降靈大聖為之興世遂開解脫之門示以安隱之路於是天竺王種辭恩愛而出家東夏貴遊厭榮華而入道誓出二種生死志求一妙涅槃弘善以報四恩立德以資三有此其利益也毀形以成其志故棄鬚髮美容變俗以會其道故去君臣華服雖形闕奉親而內懷其孝禮乖事主而心戢其恩澤被怨親以成大順福霑幽顯豈拘小違上智之人依佛語故為益下凡之類虧聖教故為損懲惡則濫者自新進善則通人感化此其大略也出沙汰佛道詔唐祖太武皇帝門下釋迦闡教澄淨為先遠離塵垢斷除貪欲所以弘宣勝業修殖善根開導愚迷津梁品庶是以敷演經教檢約學徒調伏身心捨諸染著衣服飲食咸資四輩自正覺遷謝像法流行末代陵遲漸以虧濫乃有猥賤之侶規自尊高浮惰之人苟避徭役妄為剃落託號出家嗜欲無厭營求不息出入閭里周旋闤闠驅策畜産聚積貨財耕織為生估販成業事同編戶迹等齊人進違戒律之文退無禮典之訓至乃親行劫掠躬自穿窬造作妖訛交通豪猾每罹憲網自陷重刑黷亂真如傾毀妙法譬茲稂莠有穢嘉苗類彼淤泥混夫清水又伽藍之地本曰淨居栖心之所理尚幽寂近代以來多立寺舍不求間曠之境唯趣喧雜之方繕築崎嶇甍宇舛錯招來隱匿誘納姦邪或有接近𮠔邸鄰邇屠酤埃塵滿室羶腥盈道徒長輕慢之心有虧崇敬之義且老氏垂化本貴冲虛養志無為遺情物外全真守一是謂玄門驅馳世務尤乖宗旨朕膺期馭宇興隆教法深思利益情在護持欲使玉石區分薰蕕有辨長存妙道永固福田正本澄源宜從沙汰諸僧尼道士女官等有精勤練行遵戒律者並令就大寺觀居住官給衣食勿令乏短其不能精進戒行有闕者不堪供養並令罷道各還桑梓所司明為條式務依法教違制之事悉宜停斷令道士在僧前詔并表唐太宗貞觀十一年駕巡洛邑黃巾先有與僧論者聞之於上乃下詔云老君垂範義在清虛釋迦貽則理存因果求其教也汲引之迹殊途求其宗也弘益之風齊致然大道之興肇於遂古源出無名之始事高有形之外邁兩儀而運行包萬物而亭育故能經邦致治反朴還淳至如佛教之興基於西域逮於後漢方被中土神變之理多方報應之緣匪一洎於近世崇信滋深人冀當年之福家懼來生之禍由是滯俗者聞玄宗而大笑好異者望真諦而爭歸始波涌於閭里終風靡於朝庭遂使殊俗之典鬱為衆妙之先諸華之教翻居一乘之後流遁忘返于茲纍代今鼎祚克昌既憑上德之慶天下大定亦賴無為之功宜有解張闡茲玄化自今已後齊供行立至於稱謂道士女官可在僧尼之前庶敦反本之俗暢於九有尊祖之風貽諸萬葉時京邑僧徒各陳極諫有司不納沙門智實後生俊頴內外兼明携諸夙老隨駕陳表乃至關口其表略云僧某等言某年迫桑榆始逢太平之世貌同蒲柳方值聖明之君竊聞父有諍子君有諍臣某等雖預出家仍在臣子之例有犯無隱敢不陳之伏見詔書國家本系出自柱下尊祖之風形于前典頒告天下無德而稱令道士等在僧尼之上奉以周旋豈敢拒詔尋老君垂範治國治家所佩服章亦無改異不立館宇不領門人處柱下以全真隱龍德而養性智者見之謂之智愚者見之謂之愚非魯司寇莫之能識今之道士不遵其法所著冠服並是黃巾之餘本非老君之裔行三張之穢術棄五千之妙門反同張陵漫行章句從漢魏以來常以鬼道化於浮俗妄託老君之後實是左道之苗若位在僧之上誠恐真僞同流有損國化如不陳奏何以表臣子之情謹録道經及漢魏諸史佛先道後之事如別所陳伏願天慈曲垂聽覽今上制沙門等致拜君親敕一首敕旨君親之義在三之訓為重愛敬之道凡百之行攸先然釋老二門雖理絶常境恭孝之躅事叶儒津遂於尊極之地不行跪拜之禮因循自久迄乎茲辰宋朝暫革此風少選還遵舊貫朕稟天經以揚孝資地義而宣禮獎以名教被茲真俗而瀨鄉之基克成天構連河之化付以國王裁制之由諒歸斯矣今欲令道士女官僧尼於君皇后及皇太子其父母所致拜或恐爽其恆情宜付有司詳議奏聞龍朔二年四月十五日光祿大夫右相太子賓客上柱國高陽郡開國公臣許敬宗宣大莊嚴寺僧威秀等上沙門不合拜俗表一首僧威秀等言伏奉明詔令僧拜跪君父義當依行理無抗旨但以儒釋明教咸陳正諫之文列化恢張俱進芻蕘之道僧等荷國重恩開以方外之禮安居率土得弘出俗之心所以自古帝王齊遵其度敬其變俗之儀全其抗禮之迹遂使經教斯廣代代漸多宗匠攸遠時時間發自漢及隋行人重阻靈岫之風猶鬱仙苑之化尚疏未若皇運肇興隄封海外五竺與五嶽同鎮神州將大夏齊文皇華之命載隆輶軒之塗接軫莫不欽斯聖迹興樹遺蹤固得梵侶來儀相從不絶今若返拜君父乖異群經便登驚俗之譽或陳輕毀之望昔晉成幼冲庾氷矯詔桓楚飾詐王謐抗言及宋武晚季將隆虐政制僧拜主尋還停息良由事非經國之典理越天常之儀雖曰流言終纏顯議況乃夏勃敕拜納上天之怒魏燾行誅肆下癘之責斯途久列備舉見聞僧等奉佩慞惶投庇失厝恐絲綸一發萬國通行必使寰海望風方弘失禮之譽悠哉後代或接效尤之傳伏惟陛下中興三寶慈攝四生親承付囑之旨用勵學徒之寄僧等內遵正教固絶跪拜之容外奉明詔令從儒禮之敬俯仰惟谷慚懼實深如不陳請有乖臣子之喻或掩佛化便陷惘君之罪謹列衆經不拜俗文輕用上簡伏願天慈賜垂照覽則朝議斯穆終遵途於晉臣委略常談畢歸度於齊后塵黷威嚴惟深戰戢謹言龍朔二年四月二十一日上時京邑僧等二百餘人往蓬萊宮申表上請左右相云敕令詳議拜不拜未定可待後集僧等乃退於是大集西明相與謀議共陳啓狀聞諸寮寀云西明寺僧道宣等上雍州牧沛王論沙門不應拜俗啓一首僧道宣等啓自金河徙轍玉門揚化歷經英聖載隆良輔莫不拜首請道歸向知津故得列剎相望仁祠棊布天人仰福田之路幽明懷正道之儀清信之士林蒸高尚之賓雲結是使教分三法垂萬載之羽儀位開四部布五乘之清範頃以法海宏曠類聚難分過犯滋彰有塵御覽下非常之詔令拜君親垂惻隱之懷顯疏朝議僧等荷斯明命感悼涕零良由行缺光時遂令上霑憂被且自法教東漸亟涉窊隆三被屏除五遭拜伏俱非休明之代並是暴虐之君故使布令非經國之謨乖常致良史之誚事理難返還襲舊津伏惟大王統維京甸攝御機衡道俗來蘇繁務攸靜今法門擁閉聲教莫傳據此靜障拔難之秋拯溺扶危之日僧等叫閽難及徒鶴望於九重天階罕登終栖遑於百慮所以干冒陳欵披露冀得俯被鴻私載垂提洽是則遵崇付囑清風被於九垓正像更興景福光於四海不任窮塞之甚具以啓聞塵擾之深惟知慚惕謹啓四月二十五日西明寺僧道宣等上榮國夫人楊氏請論沙門不合拜俗啓一首僧道宣等啓自三寶東漸六百餘年四俗立歸戒之因五衆開福田之務百王承至道之化萬載扇惟聖之風故得寰海知歸生靈回向然以慧日既隱千載有餘正行難登嚴科易犯遂有稊稗涉青田之穢少壯懷白首之徵備列前經聞于視聽且聖人在隱凡僧程器後代住持非斯誰顯故金石泥素表真像之容法衣剔髮擬全僧之相依而信毀報果兩分背此繕修俱非正道又僧之真僞生熟難知行德淺深愚智齊惑故經陳通供如海之無窮律制別科若涯之有際宗途既列名教是依設出俗之威儀登趣真之圓德固使天龍致敬幽顯歸心弘護在懷流功不絶比以時經濁染人涉凋訛竊服飾詐之徒叨幸憑虛之侶行無動於塵俗道有翳於憲章上聞御覽布君親之拜乃回天眷垂朝議之敕僧等內省慚懼如灼如焚相顧失守莫知投厝仰惟佛教通屬四部幽明敢懷竊議夫人當斯遺寄況復體茲正善崇建為心垂範宮闈成明道俗今三寶淪溺成濟在緣輒用咨陳希垂救濟如蒙拯拔依舊住持則付囑是歸弘護斯在輕以聞簡追深悚息謹啓四月二十七日西明寺僧道宣等序佛教隆替事簡諸宰輔等狀一首列子云周穆王時西極有化人來反山川移城邑千變萬化不可窮極穆王敬之若神重之若聖此則佛化之初及也朱仕行釋道安經録云秦始皇時西域沙門十八人來化始皇弗從禁之夜有金剛丈六人破獄出之始皇稽首謝焉漢書云武帝元狩中開西域獲金人率長丈餘列之甘泉宮帝以為大神燒香禮拜後遣張騫往大夏尋之云有身毒國即天竺也彼謂浮圖即佛陀也此初知佛名相云成帝都水使者劉向云向檢藏書往往見有佛經此則周秦已行始皇焚之不盡哀帝元壽中使景憲往大月氏國因誦浮圖經還于時漢境稍行齊戒據此曾聞佛法中途潛隱重此中興後漢明帝永平中上夢金人飛行殿前乃使秦景等往西域尋佛法遂獲三寶東傳雒陽畫釋迦立像是佛寶也翻四十二章經是法寶也迦竺來儀是僧寶也立寺於雒城西門度人開化自近之遠展轉住持終於漢祚魏氏一代五主四十五年隆敬漸深不聞拜毀吳氏江表四主五十九年孫權創開佛法感瑞立寺名為建初其後孫皓虐政將事除屏諸臣諫之乃止召僧而受五戒蜀中二主四十三年于時軍國謀猷佛教無聞信毀晉司馬氏東西立政一十二主一百五十六年中朝四帝崇信之極不聞異議唯東晉成帝咸康六年丞相王導太尉庾亮薨後庾氷輔政帝在幼冲為帝出詔令僧致拜時尚書令何充尚書謝廣等議不合拜往返三議當時遂寢爾後六十二年安帝元初中太尉桓玄以震主之威下書令拜尚書令桓謙中書王謐等抗諫曰今沙門雖意深於敬不以形屈為禮迹充率土而趣超方內是以外國之君莫不降禮如育王等禮比丘事良以道在則貴不以人為輕重如魏文之軾干木漢光之遇子陵等尋大法東流為日諒久雖風移政易而弘之不異豈不以獨絶之化有日用於陶漸清約之風無害於隆平者乎玄又致書廬山遠法師序老子均王侯於三大遠答以方外之儀不隸諸華之禮乃著沙門不敬王者論五篇其事由息及安帝返政還崇信奉終於恭帝有宋劉氏八君五紀雖孝武大明六年暫制拜君尋依先政齊梁陳氏三代一百一十餘年隆敬盡一信重逾深中原魏氏十有餘君一百五十五年佛法大行備見魏收良史唯太武真君七年聽讒滅法經於五載感癘而崩還興佛法終於靜帝自晉失御中原江表稱帝國分十六謂五凉四燕三秦二趙夏蜀是也斯諸僞政信法不虧唯赫連佛佛據有夏州凶暴無厭以殺為樂佩像背上令僧禮之後為震死尋為北代所吞妻子刑刻具如簫子顯齊書高齊在鄴六帝二十八年信重逾前國無兩事宇文周氏五帝二十五年初武帝信重佛法後納張賓之議便受道法將除佛教有安法師著二教論以抗之論云九流之教教止其身名為外教三乘之教教靜心惑名為內教老非教主易謙所攝帝聞之存廢理乖遂雙除屏不盈五載身歿政移隋氏承運二帝三十七年文帝崇信載興佛法海內置塔百有餘州皆發休瑞具如圖傳煬帝嗣録改革前朝雖令致敬僧竟不屈自大化東漸六百餘年三被誅除五令致拜既乖經國之典又非休明之政刳斫之虐被於亂朝抑挫之儀揚於絶代故使事理乖常尋依舊轍良以三寶為歸戒之宗五衆居福田之位雖信毀交貿殃咎推移斯自人有窊隆據道曾無興廢所以千餘大聖出賢劫之大期壽六萬年住釋門之正法況乃十六尊者作化於三洲九億應供護持於四部據斯以述歷數未終焉得情斷同符儒典且易之蠱爻不事王侯禮之儒行不臣天子在俗四位尚有不屈之人況棄俗從道而便責同臣妾之禮又昊天上帝嶽瀆靈祇君人之主莫不祭饗而下拜今僧受佛戒形具佛儀天龍八部奉其道而仰其容莫不拜伏於僧者故得冥祐顯徵祥瑞雜沓聞之前傳豈復同符老氏均王侯於三大者哉故沙門之宅生也財色弗顧榮祿弗縻觀時俗若浮雲達形命如陽焰是故號為出家人也故出家不存家人之禮出俗無霑處俗之儀其道顯然百代不易之令典者也其流極廣故略述之今列佛經論明沙門不敬俗者梵網經下卷云出家人法不禮拜國王父母六親亦不敬事鬼神涅槃經第六卷云出家人不禮敬在家人四分律云佛令諸比丘長幼相次禮拜不應禮拜一切白衣佛本行經第五十三卷云輸頭檀王與諸眷屬百官次第禮佛已佛言王今可禮優波離等諸比丘王聞佛教即從座起頂禮五百比丘新出家者次第而禮薩遮尼乾經云若謗聲聞辟支佛法及大乘法毀呰留難者犯根本罪今僧依大小乘經不拜君親是奉佛教今乃令違佛教拜跪俗人即不信佛語犯根本罪又謗無善惡業報不畏後代自作教人堅住不捨是名根本重罪大王若犯此罪不自悔者燒滅善根受無間苦以王行此不善重業故梵行羅漢諸仙聖人出國而去諸天悲泣諸善鬼神不護其國大臣輔相諍競相害四方賊起天王不下龍王隱伏水旱不調死亡無數時人不知是過而怨諸天訴諸鬼神是故行法行王為救此苦不行此過廣如經說更有諸論文多不載僧道宣等白朝宰群公伏見詔書令僧致敬君父事理深遠非淺情能測夫以出家之迹列聖齊規真俗之科百王同軌干木在魏高杭而謁文侯子陵居漢長揖而尋光武彼稱小道尚懷高蹈之門豈此沙門不垂間放之美但以三寶嚮位用敷歸敬之儀五衆陳誠載啓福田之道今削同儒禮則佛非出俗之人下拜君父則僧非可敬之色是則三寶通廢歸戒絶於人倫儒道是師孔經尊於釋典在昔晉宋備有前規八座詳議足為龜鏡僧等荷國重寄開放出家奉法行道仰承聖則忽令致拜有纍深經俯仰栖遑罔知投庇謹列內經及以故事具舉如前用簡朝議請垂詳採敬白至五月十五日大集文武官僚九品以上并州縣官等千有餘人總坐中臺都堂將議其事時京邑西明寺沙門道宣大莊嚴寺沙門威秀大慈恩寺沙門靈會弘福寺沙門會隱等三百餘人并將經文及以前狀陳其故事以申厥理時司禮太常伯隴西郡王博叉謂諸沙門曰敕令俗官詳議師等可退時群議紛紜不能畫一隴西王曰佛法傳通帝代既遠下敕令拜君親又許朝議今衆人立理未可通遵司禮既曰職司可先建議同者署名不同則止時司禮大夫孔志約執筆述狀如後令主事大讀訖遂依位署人將太半左肅機崔餘慶曰敕令司別立議未可轍承司禮請散可各隨別狀送臺時所送議文抑揚駁雜今謹依所司上下區以別之先列不拜之文次陳兼拜之狀後述致拜之議善惡咸録件之如左焉中臺司禮太常伯隴西王博叉大夫孔志約等議一首竊以凡百在位雖存敬上之道當其為師尚有不臣之義況佛之垂法事超俗表剔髮同於毀傷擁錫異乎簪紱出家非色養之境離塵豈策名之地功深濟度道極崇高何必破彼玄門牽斯儒轍披釋服而為孔拜處俗塗而當法禮存其教而毀其道求其福而屈其身再三研核謂乖通理又道之為教雖全髮膚出家超俗其歸一揆加以遠標天構大啓皇基義藉尊嚴式符高尚並仍舊貫無點彝章如必改作恐非稽古雖君親崇敬用軫神衷道法難虧還留睿想既奉詢芻之詔敢罄塵嶽之誠懼不愜允追深戰惕司元議一首肖形二氣嚴父稱莫大之尊資用五材元后標則天之貴至於擎跪曲拳之禮陶化之侶同遵服勤就養之方懷生之倫共紀凡在君父理絶名言而老釋二門出塵遺俗虛無一旨離有會空瑞見毗耶闡慈悲之偈氣浮函谷開道德之篇處木雁之間養生在慮罷色聲之相寂滅為心執禮蹈儀者靡窮其要妙懷忠履孝者未酌其波瀾理存太極之先事出生靈之表故尊其道則異其服重其教則變其禮爰自近古迄乎末葉雖沿革暫乖而斯道無墜洎哀纏雙樹慟結三號防後進之虧風約儒宗以控法故當輔成舊教豈應裁制新儀誠宜屈宸扆之嚴申方外之旨委尊親之重縱環中之遊愚管斟量遵故為允司戎議一首臣聞三災變火六度逾凝二字為經百成攸緬是以白毫著相闡一乘於萬劫紫氣浮影混萬殊於一致爰有儒津復軔殊軫秀天地陰陽之稟禮君臣父子之穆故知循名責實矩跡端形則教先於闕里齊心力行修來悔往則化漸於連河釋為內防雅有制於魏闕儒為外檢不能括其靈臺別有玄宗素範振蕩風物翾鵬逸鷃促椿遼菌無為無事何得何失然則道佛二教俱為三寶佛以佛法僧為旨道以道經師為義豈直攝生有託陶性通資信亦為政是基裨聲濃化而比丘未諭先生多僻恃出俗而浮逸以矜傲為誇誕處匹夫之賤直形骸於萬乘忘子育之恩不降屈於三大固君父所宜革乃臣子所知非遂降綸璽是改其弊雖履孝居忠昌言改轍而稽古愛道參酌群情懷響者谷不銷聲撫塵者山無隔細必備輿人之頌以貢芻蕘之說何則柱史西浮千有餘祀法流東漸六百許年雖曆變市朝而事無損益唯庾氷責沙門之拜桓玄議比丘之禮幸有何充進奏慧遠陳書事竟不行道終不墜是以大易經綸三聖蠱象不事王侯大禮充牣兩儀儒行不臣天子亦有嚴陵踞謁光武亞夫長揖漢文介胄豈曰觸麟故人不為纓網惟舊詎先師道法侶何後戎昭上則九天真皇十地菩薩下則南山四皓淮南八公或順風而禮謁或御氣而遊處一以貫之靡得而屈十室忠信亦豈無其人哉五刑之設關三木者不拜豈五德之具居三服者拜之罪之不責恭肅德之誠足容養然則含識之類懷生之流莫不致身以輸忠彼則不臣王者莫不竭力而尊孝彼則不敬其親雖約㢮三章律輕三尺有一於此三千其大而不被以嚴誅置於巨責者豈不以道釋與堯孔殊制傷毀與禮教正乖蓮華非結綬之色貝葉異削圭之旨人以束帶為彝章道則冠而不帶人以束髮為華飾釋則落而不容去國不為不忠辭家不為不孝出塵滓割愛於君親奪嗜欲棄情於妻子理乃區分於物類不可涯檢於常塗生莫重於父母子則不謝施莫厚於天地物則不答君親之恩事絶名象豈稽首拜首可酬萬分之一者歟出家之於君父豈曰全無輸報一念必以人王為願首四諦則於父母為弘益方祛塵劫永離死生豈與夫屈膝為盡忠色養為純孝而已矣必包之俗境處之儒肆屈其容降其禮則不孝莫過於絶嗣何不制以婚姻不忠莫大於不臣何不令稱臣妾以袈裟為朝服稱貧道而趨拜儀範兩失名稱兼舛深恐一跪之益不加萬乘之尊一拜之勞式彰三服之墜則所不可而豈然乎王者無父事三老無兄事五更君人之尊亦有所敬法服之敬不敬其人若屈其數則卑其道數而可卑道則云缺矣豈若存敬於己存道於物敬存則己適道在則物尊尊道所以敬於物敬物亦所以尊於己也況復形猶身也道若影焉身既如聲道亦如響形動則影隨聲揚則響應道崇則形寵身替則道息豈可使居身之道屈於道外之身豈可使方外之人存於身中之敬又彼守一居道不離塵俗若可拜之是謂俗之道而可俗俗又參道則一當有二而道不專行矣安可以區道俗之常域保專一之至誠哉據僧祇律敬袈裟如敬佛塔謂袈裟為福田衣衣名銷瘦取能銷瘦煩惱鎧名忍辱取能降伏魔軍亦喻蓮華不染泥滓亦為諸佛之所幢相則袈裟之為義其至矣夫若損茲佛塔壞彼幢相將輕忍辱更貶福田甚用危疑終迷去取解衣而拜則越俗非章甫之儀整服而趨則緇衣異朝宗之典故禪幽舍衛之境步屏高門之地理絶朝請事乖榮謁豈不謂我崇其道所以彼請其來請而卑之復何為者廬山為道德所居不在搜揀之例甘棠為聽訟所息式致勿翦之思山與樹之無心且以德而存物法與道之有裕豈崇道而遺人語曰人能弘道則道亦須人而行也王人雖微位在諸矦之上行道之輩焉復可卑其禮若謂兩為欺詭則可一而寢之寢之之道則芟剃之之謂是則所奪者多何止降屈而已若謂兩為濃助則宜崇之崇之之道則尊貴之之謂豈可尊貴其道而使其恭敬哉假以金翠為真儀不以金翠而增肅以芻狗而尊像不以芻狗而加輕肅敬終寄於道輕重不係於物物之不能遷道亦猶道之恆隨於物矣沙門橫服於己資法服而為貴莫不敬其法服而豈係於人乎不拜之典義高經律法付國王事資持護法為常也常行不易一隅可革千門或爽通有護法之資塞有墜法之慮與其墜之曷若護之何必屈折於僧容盤辟於法服使萬國歸依者居蒂芥於其間哉語曰因人所利而利之則利之之術亦可因其精詣而為利矣洎乎日光上照皇運攸宗海接天潢枝連寶構藉無上之道闡無疆之業別氏他族敬猶崇往神基靈派道豈撝今此為甚不可一也月氏東國寶祚斯俟定水玄波法雲彩潤高解脫之慶演常住之福王前帝昔尚或攸遵主聖臣良胡寧此變臣愚千慮萬不一得儻緣斯創造無益將來於恆河沙劫有毫釐之纍雖率土碎首群生粉骨何以塞有隱之責蠲不忠之罪此為甚不可二也臣所以汲汲其事區區其誠搔首捫心隳肝瀝膽伏願聖朝重興至教恆春奈苑永轉法輪一心歡録其人百祚遠光於帝冊則雖死猶生朝夕可矣竊惟詔旨微婉義難適莫天情畫一則可使由之睿想傍求則誰不竭慮臣以庸昧何足寓言以兩教為無則崇之於聖運聖而崇之則非無矣以兩教為有則筆削於明時時而削之恐非有矣斯所以岐路徘徊兩端交戰道宜存跡理未懕心管豈天窺蛙焉海測理絶庶幾之外事超智識之表自可懷鉛閣筆扣寂銷聲而欲鳥處程言竽中竊吹將聳聾聽而齊俗與瞽視而均叟雖有罄於心靈終不詣於聞見也直以八風逈扇萬籟咸貢其音兩曜升暉千形不匿其影茲焉企景是庶轉規就日心葵輸涓驛露而靦顏漿夏履薄氷春兢惕已甚𧹞畏交集謹議司刑太常伯劉祥道竊以朝廷之敘肅敬為先生育之恩色養為重釋老二教今悉反之抗禮於帝王受敬於父母而優容自昔迄乎今代源其深致蓋有以然諒由剔髮有異於冠冕袈裟無取於章服出家故無家人之敬捨俗豈拘朝廷之禮至於玄教清虛道風遐曠高尚其事不屈王矦帝王有所不臣蓋此之謂國家既存其道所以不屈其身望准前章無違舊貫謹議議拜者明沙門應致拜也昔皇覺御㝢尚開信毀之源豈惟像末不流弘約之議頃以法海宏曠類聚難分有穢玄猷頗聞朝聽致使拘文之士廢道從人較而言之未曰通方之巨唱也余所以考諸故實隨而彈焉庶崇佛君子或能詳覽議沙門兼拜狀合三首左威衛長史崔安都録事沈玄明等議狀一首竊以紫氣騰真玄牝之風西被白虹沈化涅槃之蘊東流轡羽驤霞影王京而凝衆妙津慈照寂啓金園而融至道義冠空有理洞希夷祛濟塵蒙薰滌因纍神道裨教茲焉有徵坦躅業已遵從流弊義資懲革彈曰守法高尚稱為流弊違經拜俗謂之懲革即事不可其如理何原夫在三之敬六位峻尊卑之象百行之本四始旌罔極之談本立然後道生敬形於焉禮穆實王化之始乃天地之經佛以法為師帝以天為則域中有四大王者居一焉王道既其齊衡天法固乃同貫身為法器法惟道本黃冠慕道緇裳奉佛致敬君父眇契玄波彈曰佛法乃寰外之尊帝王為域中之大教存而令屈折不羈還類編人此乃法水壅而不流何玄波之眇契耶且夫戒録才高猶盡肅於膜拜況乎貴賤懸邈頓遺恭於屈膝彈曰王謐云沙門所以上下相敬而抗禮宸居者良以宗致既同則長幼成序津途有隔則義無降屈誠哉是言可為龜鏡矣必以山林獨往物我兼忘混親疏齊寵辱惠我不為是損己詎稱非自當泯若無情湛然恆寂安假仰迦維而頓顙覿天尊而雅拜塵容不異俗致敬未乖真彈曰沙門落采披緇道俗懸隔拜違佛教具顯經文而言敬未乖真容不異俗此乃指南為北反白成玄且伯陽緒訓於和光不輕演教於常禮妙叶謙尊之德遠符鄰照之規伯陽誕自姬周身充柱史為官則王朝之一職言道儒宗之一流拜伏君親固其宜矣至若不輕之禮四衆乃權道之一時其猶文命入裸俗而解裳不可例率土以為模楷又三極之中師居其末末猶展敬本何疑哉彈曰釋衆所以師資相敬正以教義不殊故耳非是約本末而言何孟浪之甚也若以袈裟異乎龍黼縠巾殊於鷩辨服既戎矣拜何必華各循其本無爽彝式其有素履貞遁清規振俗神化肹響戒行精勤藻掞桐鸞梵清霄鶴錦旌徵獸瓊符御靈德秀年耆蠲其拜禮自餘初學後進聲塵寂寥並令盡敬君父請即編之恆憲彈曰若以不拜為非則德秀年耆詎宜蠲免若以不拜為是則後進初學無宜令拜進退矛盾去取自乖請即編之恆憲何所見之短乎如此則進德修業出塵之軌彌隆苦節棲壇入道之心逾勵玄風斯遠國章惟緝庶可以詳示景則靜一訛弊彈曰以乖宗為景則謂守法為訛弊約斯以驗餘何可觀自我作故奚舊之拘夫鏡非常之理必藉非常之照天鑒玄覽體睿甄微探象外之遺宗極環中之幽致雖則暫駭常聽抑亦終置大道謹議右清道衛長史李洽等議狀一首竊以道教冲虛釋門祕寂至於照仁濟物崇義為心乃眷儒風理言不異彈曰儒教所明不踰寰域釋宗所辨高出見聞故魏東陽王丕曰佛法冲洽非儒墨者所知今言不異何多謬耶至若宿德耄齒戒律無虧栖林遁谷高尚其事若斯儔輩可致尊崇其有弱齓蒙求薰修靡譽背真混俗心行多違以此不拜義難通允彈曰夫稱沙門者何也謂紹法象賢發蒙啓化儀乏搢紳之飾教殊廊廟之規求宗故所以直骸孰可分其德業矯俗故由茲抗禮寧容隔以尊卑但在家在國事親事君不拜之儀何可以訓彈曰誠哉奉君親者無宜不拜沙門不事王侯背恩天屬以拜為訓似未之思望請勒拜垂憲於後謹議長安縣令張松壽議狀一首竊惟佛道二門虛寂一致縱不能練心方外擯影人間猶須迹與俗分事與時隔然今出家之輩多雜塵伍外以不屈自高內以私謁為務徒有入道之名竟無離俗之實彈曰不科簡懲屈者奉法而然私謁者誠違教義只可峻其彼不逞之流寧容縱火崑岡而欲俱焚玉石耶至若君親之地禮兼臣子孝敬所宗義深家國不有制度何以經綸望請僧尼道士女冠等道為時須事因法會者雖在君后聽依舊式捨此以往並令讚拜若歸覲父母子道宜申如在觀寺任遵釋典彈曰夫僧尼合拜則無宜不拜不合豈簡時方何得剃髮同是一人約處便開異禮法服始終無二據事遂制殊經此乃首鼠兩端要時妄立庶其以卑屈為恥稍屏浮競以道德自尊漸弘教法輒進愚管伏增慚戰謹議中臺司禮太常伯隴西王博叉執議狀奏一首司禮議僧尼道士女冠等拜君親等事一五百三十九人議請不拜右大司成令狐德棻等議稱竊以凡百在位咸隆奉上之道當其為師尚有不臣之義況佛之垂法事越常規剔髮同於毀傷振錫異乎簪𮓓出家非色養之境離塵豈策名之地功深濟度道極崇高何必破彼玄門牽斯儒轍披法服而為俗拜踐孔門而行釋禮存其教而毀其道求其福而屈其身詳稽理要恐有未愜又道之為範雖全髮膚出家超俗其歸一揆加以遠標天構大啓皇基義藉尊嚴式符高尚惟此二教相沿自久爰暨我唐徽風益扇雖王猷遐暢實賴天功而聖輪常轉式資冥助今儻一朝改舊無益將來於恆沙之劫起毫塵之纍則普天率土灰身粉骨何以塞有隱之責蠲不忠之罪與其失於改創不若謬於修文孔子曰因人所利而利之老子曰聖人無常心以百姓心為心二教所利弘益多矣百姓之心歸信衆矣革其所利非因利之道乖其本心非無心之謂請遵故實不拜為允伏惟陛下德掩上皇業光下問君親崇敬雖啓神衷道法難虧還留睿想既奉詢芻之旨敢罄塵嶽之誠懼不折衷追深戰惕一三百五十四人議請拜右兼司平太常伯閻立本等議稱臣聞剛折柔存扇玄風之妙旨答形甘辱騰釋路之微言故能開善下之源弘不輕之義是以聲聞降禮於居士柱史委質於周王此乃成緇服之表綴立黃冠之龜鏡自茲已降喪其宗軌歷代溺其真理習俗守其迷途一人有作萬物斯覩紐維天地驅駕皇王轉金輪於勝境構玉京於玄域遂使尋真道士追守藏之遐風落䰂沙門弘禮足之錦典況太陽垂曜在天標無二之明大帝稱尊御宇極通三之貴且二教裁範雖絶塵容事止出家未能逃國同賦形於姒鏡皆仰化於姚風豈有抗禮宸居獨高真軌然輕尊傲長在人為悖臣君敬父於道無嫌考詳其義跪拜為允前奉四月十六日敕旨欲令僧尼道士女冠於君親致拜恐爽於恆情宜付有司詳議奏聞者件狀如前伏聽敕旨今上停沙門拜君詔一首東臺若夫華裔列聖異軫而齊驅中外裁風百慮而同致自周霄隕照漢夢延輝妙化西移惠流東被至於玄牝邃旨碧落希聲具開六順之基偕叶五常之本而於愛敬之地忘乎跪拜之儀其來永久罔革茲弊朕席圖登政崇真導俗凝襟解脫之津陶思常名之境正以尊親之道禮經之格言孝友之義詩人之明准豈可以絶塵峻範而忘恃怙之敬拔纍貞規乃遺溫清之序前欲令道士女冠僧尼等致拜將恐振駭恆心爰俾詳定有司咸引典據兼陳情理沿革二塗紛綸相半朕商榷群義沈研幽賾然箕潁之風高尚其事遐想前載故亦有之今於君處勿須致拜其父母所慈育彌深祇伏斯曠更將安設自今已後即宜跪拜主者施行龍朔二年六月八日西臺侍郎弘文館學士輕車都尉臣上官儀宣京邑老人程士顆等上請表一首臣言臣聞佛化所資在物斯貴良由拔沈冥於六道濟蒙識於三乘其德既弘其功亦大所以佛為法主幽顯之所歸依法為良藥煩惑由之清蕩僧為佛種弘演被於來際遂使歷代英主重道德而護持清信賢明度子女而承繼固得僧尼遍於區㝢垂範導於無窮伏惟陛下慈濟九有開暢一乘愛敬之道克隆成務之途逾遠近奉明詔令僧跪拜父母斯則崇揚孝始布範敬源但佛有成教出家不拜其親欲使道俗殊津歸戒以之投附出處兩異真俗由之致乖莫非心受佛戒形具佛儀法網懸殊敬相全別且自高尚之風人主猶存抗禮豈惟臣下返受跪拜之儀俯仰撫循無由啓處意願國無兩敬大開方外之迹僧奉內教便得立身行道不任私懷之至謹奉表以聞塵黷威嚴伏增戰越謹言直東臺舍人馮神德上一道士僧尼請依舊僧尼在前此一條在貞觀十一年因令合上一僧尼請依舊不拜父母臣聞祕教東流因明后而闡化玄風西運憑至識以開宗故知弘濟千門義宣於雅道提誘萬品理塞於邪津只可隨聖教以抑揚豈得逐人事而興替沙門者求未來之勝果道士者信有生之自然自然者貴取性真絶其近僞之跡勝果者意存杜漸遠開趨道之心誘濟源雖不同從善終歸一致伏惟皇帝陛下包元建極御一飛貞乘大道以流謙順無為而下濟因心會物教不肅成今乃定道佛之尊卑抑沙門之拜伏拜伏有同常禮未是出俗之因尊卑物我之情豈曰無為之妙陛下道風攸闡釋教載陳每至齊忌皆令祈福祈福一依經教二者何獨乖違陛下者造化之神宗父母者人子之慈稱陛下以至極之重猶停拜敬之儀所生既曰人臣何得曲申情禮捨尊就愛棄重違經緣情猶尚不通據教若為行用陛下統天光道順物流形形物尚不許違淨教何宜改作願陛下因天人之志順萬物之心停拜伏之新儀遵尊卑之舊貫庶望金光東曜不雜塵俗之悲紫氣西暉無驚物我之貴即大道不昧而得盛於明時福業永貞庶重彰於聖日謹言西明寺僧道宣等上榮國夫人楊氏請論拜事啓一首僧道宣等啓竊聞紹隆法任必歸明哲崇護真詮良資寵望伏惟夫人宿著熏修啓無彊之福早標信慧建不朽之因至於佛教威儀法門軌式實望特垂恩庇不使陵夷自敕被僧徒許隔朝拜誠當付囑之意實深荷戴之情然於父母猶令跪拜私懷徒愜佛教甚違若不早有申聞恐遂同於俗法僧等翹注莫敢披陳情用𭝽惶輒此投訴伏乞慈覆特為上聞儻遂恩光彌深福慶不勝懇切之甚謹奉啓以聞塵擾之深唯知悚息謹啓大莊嚴寺僧威秀等上請表一首謹録佛經出家沙門不合跪拜父母有損無益文如左梵網經云出家人不向國王父母禮拜順正理論云國君不求比丘禮拜玄教東漸六百餘年上代皇王無不依經敬仰洎乎聖帝遵奉成教彌隆故得列剎相望精廬峙接人知慕善家曉思𮘧僧等忝在生靈詎忘忠孝明詔頒下率土咸遵恐直筆史臣書乖佛教萬代之後蕪穢皇風僧威秀等言竊聞真俗異區桑門割有生之戀幽顯殊服田衣無拜首之容理固越情道仍舛物況挻形戒律鎔念津梁酬恩不以形骸致養期於福善而令儀不改釋拜必同儒在僧有越戒之𮘧居親有損福之纍臣子之慮敢不盡言伏惟陛下匡振遠猷提獎幽概既已崇之於國亦乞正之於家足使捨俗無習俗之儀出家絶家人之敬護法斯在提福莫先自然教有可甄人知自勉不勝誠懇之至謹奉表以聞塵黷扆旒伏增戰越玉華宮寺譯經沙門靜邁等上拜父母有損表一首沙門靜邁言竊聞策係告先尊父屈體於其子形章攸革介士不拜於君親伏惟僧等揚言紹佛嗣尊之義是同故愛敬降高乃折節於其氣容服異俗形章之革不殊致使沙門亦不支屈於君父窮茲內外雖復繼形變則而心敬君親敢有怠哉至如臣服薨君以日易月形雖從吉而心喪三年是知遏密八音期於三載修于心敬其來尚矣若令反拜父母則道俗俱違佛戒顛沒枉沈淪回未已況動天地感鬼神者豈在於跪伏耶但公家之利知無不為恐因今創改萬有一纍則負聖上放習法之洪恩彌劫粉身奚以塞責伏惟陛下廣開獻書之路通納芻言之辨輕塵聽覽伏增戰汗謹言襄州禪居寺僧崇拔上請父母同君上不令出家人致拜表一首沙門崇拔言拔聞道俗憲章形心異革形則不拜君父用顯出處之儀心則敬通三大以遵資養之重近奉恩敕令僧不拜君王而令拜其父母斯則隆於愛敬之禮闕於經典之教僧寶存而見輕歸戒沒而長隱豈有君開高尚之迹不悖佛言臣取下拜之儀面違聖旨可謂放子求其福受拜仍獲其辜一化致疑二理矛盾伏願請從君敬之禮以通臣下之儀輕黷扆旒彌增隕越謹言論曰威衛司列等狀詞則美矣其如理何咸不惟故實昧於大義苟以屈膝為敬不悟亡脣之禍內經稱沙門拜俗損君父功德及以壽命而抑令俯伏者胡言之不訒輕發樞機哉雖復各言其志亦何傷之大甚而威衛等狀通塞兩兼司列等狀一途氷執或訪二議優劣余以為楚則失矣齊亦未為得也然兩兼則膚腠氷執乃膏肓故升威衛於乙科退司列於景第至若範公質議則旨贍文華隴西執奏言約理舉既而人庶斯穆龜筮叶從故得天渙下覃載隆高尚之美慈育之地更弘拜伏之仁時法侶名僧都鄙耆耋僉曰叶私志矣違教如何於是具顯經文廣陳表啓匪朝伊夕連訴庭闕但天門邃遠申請靡由奉詔求宗難為去取易曰羝羊觸蕃羸其角方之釋侶豈不然歟讚曰威衛之流議雖通塞以人廢道誠未為得司列等狀抑釋從儒拜傷君父詎曰忠謀質議遒華敷陳簡要天人叶允爰垂璽誥恭承明命式抃且歌顧瞻玄籍有纍如何法俗疇咨咸申啓表披瀝丹欵未紆黃道進退惟谷投措靡由仰悕神禹疏茲法流沙門不應拜俗總論釋彥琮曰夫沙門不拜俗者何蓋出處異流內外殊分居宗體極息慮忘身不汲汲以求生不區區以順化情超㝢內迹寄寰中斯所以抗禮宸居背恩天屬化物不能遷其化生生無以纍其生長揖君親斯其大旨也若推之人事稽諸訓詁則所不應拜其例十焉至如望秩山川郊祀天地欲其利物君罄乃誠今三寶住持歸戒弘益幽明翼化可略言焉斯神祇之流也為祭之尸必叶昭穆割牲薦熟時為不臣今三寶一體敬僧如佛備乎內典無俟繁言斯祭主之流也杞宋之君二王之後王者所重敬為國賓今僧為法王之胤王者受佛付囑勸勵四部進修三行斯國賓之流也重道尊師則弗臣矣雖謁天子無北面焉今沙門傳佛至教導凡誘物嚴師敬學其在茲乎斯儒行之流也禮云介者不拜為其失於容節故周亞夫長揖漢文也今沙門身被忍鎧戡剪欲軍掌握慧刀志摧心惑斯介胄之流也著代筮賓尊先冠阼母兄致拜以禮成人今沙門以大法為己任拯群生於塗炭敬遵遺躅祖承嫡胤斯傳重之流也堯稱則天不屈頴陽之高武盡美矣終全孤竹之潔今沙門高尚其事不事王侯蟬蛻囂埃之中自致寰區之外斯逸人之流也犯五刑關三木被箠楚嬰金鐵者不責其具禮今沙門剔毛髮絶胤嗣毀形體易衣服斯甚刑之流也又詔使雖微承天則貴沙門縱賤稟命宜尊況德動幽明化霑龍鬼靜人天之苦浪清品庶之炎氛功既廣焉澤亦弘矣豈使絶塵之伍拜纍君親間放之流削同名教而已余幼耽斯務長頗搜尋採遺烈於青編纂前芳於汗簡重以感淪暉於佛日罄爝火以興詞庶永將來傳之好事又古今書論皆云不敬據斯一字愚竊惑焉何者敬乃通心曲禮稱無不敬拜唯身屈周陳九拜之儀且君父尊嚴心敬無容不可法律崇重身拜有爽通經以拜代敬用將為允故其書曰不拜為文遠公有言曰淵壑豈待晨露哉蓋自申其罔極也此書之作亦猶是焉達鑒通賢儻無譏矣隋煬帝大業三年新下律令格式令云諸僧道士等有所啓請者並先須致敬然後陳理雖有此令僧竟不行時沙門釋彥琮不忍其事乃著福田論以抗之意在諷刺言之者無罪聞之者以自誡也帝後朝見諸沙門並無致敬者大業五年至西京郊南大張文物兩宗朝見僧等依舊不拜下敕曰條令久行僧等何為不致敬時明贍法師對曰陛下弘護三寶當順佛言經中不令拜俗所以不敢違教又敕曰若不拜敬宋武時何以致敬對曰宋武虐君偏政不敬交有誅戮陛下異此無得下拜敕曰但拜僧等峙然如是數四令拜僧曰陛下必令僧拜當脫法服著俗衣此拜不晚帝夷然無何而止明日設大齊法祀都不述之後語群公曰朕謂僧中無人昨南郊對答亦有人矣爾後至終必無拜者其黃巾士女初聞令拜合一李衆連拜不已帝亦不齒問之議拜者明沙門應致拜也昔皇覺御宇尚開信毀之源豈唯像末不流弘約之議頃以法海宏曠類聚難分有穢玄猷頗聞朝聽致使拘文之士廢道從人較而言之未曰通方之巨唱也余所以考諸故實隨而彈焉庶崇佛君子或能詳覽若夫慈濟之道終古式瞻厚命之方由來所重故蠢蠢懷生喁喁哨類莫不重形愛命憎生惡死即事可覩豈待言乎然有性涉昏明情含嗜欲明者恕己為喻不加惱於含靈昏者利己為懷無存慮於物命故能安忍苦楚縱蕩貪癡以多殘為聲勢以利欲為功德是知坑趙六十餘萬終伏劍於秦邦膳畢方丈為常窮形戮於都市至於禍作殃及方悔咎原徒思顧復終無獲已然則釋氏化本止殺為先由斯一道取濟群有故慈為佛心慈為佛室慈善根力隨義而現有心慈德通明起慮而登色界況復慈定深勝兵毒所不能侵慈德感徵蛇虎為之馴擾末代門學師心者多不思被忍辱之衣示福田之相縱恣叨餮以酒肉為身先飲噉異於流俗踐陟同於賢聖經誥明示不得以佛為師譏醜塵點滅法在於斯矣況復蠶衣肉食聞沈侯之極誡醞釀屠宰見梁帝之嚴懲觀其勸勗之文統其殷勤之至足令心寒形栗豈臨履之可擬乎故上士聞之足流涕而無已下愚詳此等長風之激空林且夫生死推遷匪旦伊夕隨業受報淪歷無窮不思形神之疲勞而重口腹之快利終縻碎於大地何所補於精靈乎所以至人流慟常慘戚於狂生大士興言慨怨魂於煩惱撫膺弔影可不自憐一旦苦臨於何逃責既未位於正聚何以抵於三途行未登於初地終有懷於五怖輒舒事類識者思之究竟慈悲論沈休文釋氏之教義本慈悲慈悲之要全生為重恕己因心以身觀物欲使抱識懷知之類愛生忌死之群各遂厥宜得無遺夭而俗迷日久淪惑難變革之一朝則疑怪莫啓設教立方每由漸致又以情嗜所染甘腴為甚嗜染於情尤難頓革是故開設三淨用申權道及涅槃後說立言將謝則大明隱惻貽厥將來夫肉食蠶衣為方未異害命夭生事均理一爚繭爛蛾非可忍之痛懸庖登爼豈偏重之業而去取異情開抑殊典尋波討源良有未達漁人獻鮪肉食同有其緣桑妾登絲蠶衣共頒其分假手之義未殊通閉之詳莫辨訪理求宗未知所適外典云五畝之宅樹之以桑則六十者可以衣帛矣雞肫犬彘勿失其時則七十者可以食肉矣然則五十九年已前所衣宜布矣六十九年已前所食宜蔬矣輕暖於身事既難遣甘滋於口又非易亡對而為言非有優劣宜枲麻果菜事等義同攘寒實腹曾無一異偏通繒纊當有別途請試言之夫聖道隆深非思不洽仁被群生理無偏漏拯麁去甚教義斯急繒衣肉食非已則通及晚說大典弘宣妙訓禁肉之旨載現于言黜繒之義斷可知矣而禁淨之始猶通蠶革蓋是敷說之儀各有次第亦猶闡提二義俱在一經兩說參差各隨教立若執前迷後則闡提無入善之塗禁淨通蠶則含生無有頓免之望難者又以闡提入道聞之後說蠶革宜禁曾無概理大聖弘旨義豈徒然夫常住密奧傳譯遐阻泥洹始度咸謂已窮中出河西方知未盡關中晚說厥義彌暢仰尋條流理非備足又案涅槃初說阿闍世王大迦葉阿難三部徒衆獨不來至既而二人並來惟無迦葉迦葉佛大弟子不容不至而經無至文理非備盡昔涅槃未啓十數年間廬阜名僧已有蔬食者矣豈非乘心暗踐自與理合者哉且一朝裂帛可以終年烹牢待膳亘時引日然則一歲八蠶已驚其驟終朝未肉盡室驚嗟拯危濟苦先其所急敷說次序義實在斯外聖又云一人不耕必有受其飢者故一人躬稼亦有受其飽焉桑野漁川事雖非已炮肉裂繒咸受其分自涅槃東度三肉罷緣服膺至訓操概彌遠促命有殫長蔬靡倦秋禽夏卵比之如浮雲山毛海錯事同於腐鼠而繭衣纊服曾不惟疑此蓋慮窮於文字思迷於弘旨通方深信之客庶有鑒於斯理斯理一悟行迷克反斷蠶肉之因固蔬枲之業然則含生之類幾於免矣與何胤書梁周顒普通年中何胤侈於味食必方丈後稍欲其甚者使門人議之學士鍾岏曰蛆之就脯驟於屈伸蟹之將煻躁擾彌甚仁人用意深懷如怛且不悴不榮曾芻蕘之不若無馨無臭與瓦礫其何算有汝南周顒貽胤書曰丈人所以未極遐蹈惑在於不全菜耶銼折之升鼎爼網罟之興載冊其來實遠誰敢干議觀聖人之設膳羞乃復為之品節蓋以茹毛飲血與生民共始縱而勿裁將無崖畔善為士者豈不以恕己為懷是各靜封疆罔相陵轢況乃變之大者莫過死生生之所重無過性命性命之於彼極切滋味之於我可賒而終身朝脯資之以永歲彼就怨酷莫能自列我業長久吁哉可畏且區區微卵脆薄易矜歂彼弱麑顧步宜愍觀其飲啄飛沈使人憐悼況可甘心撲揥加復恣忍吞嚼至乃野牧成群間豢重圈量肉揣毛以俟支剝如土委地僉謂常理可為愴息事豈一途若云三世理誣則幸矣良快如使此道果然而受形未息一往一來生死常事雜報如家人天如客過客日少在家日多吾修信業未足長免則傷心之慘行亦自念丈人於血氣之類雖不身殘至於晨鳧沈鯉不能不取備屠門財貿之一經盜手猶為廉士所棄生性之一啓鸞刀寧復慈心所忍騶虞雖飢非自死之草不食聞其風豈不使人多愧胤獲書納之遂絶血味注百論十二門論行於法俗斷殺絶宗廟犧牲詔梁武帝梁高祖武皇帝臨天下十二年下詔去宗廟犧牲修行佛戒蔬食斷欲上定林寺沙門僧祐龍華邑正柏超度等上啓云京畿既是福地而鮮食之族猶布筌網並驅之客尚馳鷹犬非所以仰稱皇朝優洽之旨請丹陽琅瑘二境水陸並不得搜捕敕付尚書詳之議郎江貺以為聖人之道以百姓為心仁者之化以躬行被物皇德好生協于上下日就月將自然愍俗一朝抑絶容恐愚民且獵山之人例堪跋涉捕水之客不憚風波江寧有禁即達牛渚延陵不許便往陽羡取生之地雖異殺生之數是同空有防育之制無益全生之術兼都令史王述以為京邑翼翼四方所視民漸至化必被萬國今祁寒暑雨人尚無怨況去俗入真所以可悅謂斷之為是左承謝幾卿曰不殺之禮誠如王述所議然聖人為教亦與俗推移即之事迹恐不宜偏斷若二郡獨有此禁更似外道謂不殺戒皆有界域因時之宜敬同議郎江貺議尚書臣亶僕射臣昂令瑩以下並同貺議帝使周舍難貺曰禮云君子遠庖厨血氣不身剪見生不忍其死聞聲不食其肉此皆即自興仁非關及遠三驅之禮向我者舍背我者射於是依王述議遂斷又敕太醫不得以生類合藥公家織官紋錦並斷仙人鳥獸之形以為褻衣裁剪有乖仁恕至遂祈告天地宗廟以去殺之理被之含識郊廟皆以麵為牲牷其饗萬國用菜蔬去生類其山川諸祀則否乃敕有司曰近以神實愛民不責無識所貴誠信非尚血膋凡有水旱之患使歸咎在上不同牲牢止告知而已而萬姓祈求諂黷為事山川小祇難期正直晴雨或乖容市民怨愚夫滯習難用理移自今祈請報答可如俗法所用以身塞咎事自依前前臣曰夫神道茫昧求諸不一或尚血腥之祀或歆蘊藻之誠設教隨時貴其為善其誠無忒何往不通若祭享理無則四代之風為爽神明實有三世之道為弘語其無不待牲牷之潔據其有宜存去殺之仁周文禴祭由來尚矣苟有明德神其吐諸而以麵為牲於義未達方之紋錦將不矛盾乎齊光祿顏之推誡殺訓儒家君子離庖厨見其生不忍其死聞其聲不食其肉高柴折像未知內教皆能不殺此皆仁者自然用心也含生之徒莫不愛命去殺之事必勉行之見好殺之人臨死報驗子孫殃禍其數甚多不能具録耳且示數條於末梁時有人常以雞卵白和沐云使髮光每沐輒破二三十枚臨終但聞髮中啾啾數千雞雛聲江陵劉氏以賣鱓為業後生一兒頭具是鱓自頸已下方為人耳王克為永嘉郡有人餉羊集賓欲宴而羊繩解來投一客先跪兩拜便入衣中此客竟不言之固無救請須臾宰羊為炙先行至客一臠入口便下皮內周行遍體痛楚號𧥣方復說之遂作羊鳴而死梁時有人為縣令經劉敬躬亂縣廨被焚寄寺而住民將羊酒作禮縣令以羊繫剎屏除形像鋪設床座於堂上接賓未殺之頃羊解徑來至階而拜縣令大笑命左右宰之飲噉飽酒便臥簷下投醒即覺體癢爬搔𤻘疹因爾成病十餘年死楊思達為西陽郡值侯景亂時復旱儉飢民盜田中麥思達遣一部曲守視所得盜者輒截手腕凡戮十餘人部曲後生一男自然無手齊國有一奉朝請家甚豪侈非手殺牛則噉之不美年三十許病篤大見牛來舉體如被刀刺𧥣呼而終江陵高偉隨父入齊凡數年向幽州淀中捕魚後病每見群魚齧之而死斷酒肉文梁高祖弟子蕭衍敬白諸大德僧尼諸義學僧尼諸寺三官夫匡正佛法是黑衣人事乃非弟子白衣所急但經教亦云佛法寄囑人王是以弟子不得無言今日諸僧尼開意聽受勿生疑閉內懷忿異凡出家人所以異於外道者正以信因信果信經所明信是佛說經言行十惡者受於惡報行十善者受於善報此是經教大意如是若言出家人猶嗜飲酒噉食魚肉是則為行同於外道而復不及何謂同於外道外道執斷常見無因無果無施無報今佛弟子酣酒嗜肉不畏罪因不畏苦果即是不信因不信果與無施無報者復何以異此事與外道見同而有不及外道是何外道各信其師師所言是弟子言是師所言非弟子言非涅槃經言迦葉我今日制諸弟子不得食一切肉而今出家人猶自噉肉戒律言飲酒犯波夜提猶自飲酒無所疑難此事違於師教一不及外道又外道雖復邪僻持牛狗戒既受戒已後必不犯今出家人既受戒已輕於毀犯是二不及外道又外道雖復五熱炙身投淵赴火窮諸苦行未必皆噉食衆生今出家人噉食魚肉是三不及外道又外道行其異學雖不當理各習師法無有覆藏今出家人噉食魚肉於親所者乃自和光於所疏者則有隱避如是為行四不及外道又外道各宗所執各重其法乃自高聲大唱云不如我道真於諸異人無所忌憚今出家人或復年時已長或復素為物宗噉食魚肉極自艱難或避弟子或避同學或避白衣或避寺官懷挾邪志崎嶇覆藏然後方得一過噉食如此為行五不及外道又復外道直情徑行能長己徒衆惡不能長異部惡今出家人噉食魚肉或為白衣弟子之所聞見內無慚愧方飾邪說云佛教為法本存遠因在於即日未皆悉斷以錢買肉非己自殺此亦非嫌白衣愚癡聞是僧說謂真實語便復信受自行不善增廣諸惡是則六不及外道又外道雖復非法說法法說非法各信經書死不違背今出家人噉食魚肉或云肉非己殺猶自得噉以錢買肉亦復非嫌如是說者是事不然涅槃經云一切肉悉斷及自死者自死者猶斷何況不自死者楞伽經云為利殺衆生以財網諸肉二業俱不善死墮叫呼獄何謂以財網肉陸設罝罘水設網罟此是以網網肉若於屠殺人間以錢買肉此是以財網肉若令此人不以財網肉者習惡律儀捕害衆生此人為當專自供口亦復別有所擬若別有所擬向食肉者豈無殺分何得云我不殺生此是灼然違背經文是則七不及外道又復外道同其法者和合異其法者苦治令行禁止莫不率從今出家人或為師長或為寺官自開酒禁噉食魚肉不復能得施其教戒裁欲發言他即譏刺云師向亦爾寺官亦爾心懷內熱默然低頭面赤汗出不復得言身既有瑕不能伏物便復摩何直爾止住所以在寺者乖違受道者放逸此是八不及外道又外道受人施與如己法受烏戒人受烏戒施鹿戒人受鹿戒施烏戒人終不覆戒受鹿戒施鹿戒人終不覆戒受烏戒施今出家人云我能精進我能苦行一時覆相誑諸白衣出即飲酒開衆惡門入即噉肉集衆苦本此是九不及外道又外道雖復顛倒無如是衆事酒者何也謂是臭氣水穀失其正性成此別氣衆生以罪業因緣故受此惡觸此非正真道法亦非甘露上味云何出家僧尼猶生耽嗜僧尼授白衣五戒令不飲酒令不妄語云何翻自飲酒違負約誓七衆戒八戒齊五篇七聚長短律儀於何科中而出此文其餘衆僧故復可可至學律者彌不宜爾且開放逸門集衆惡本若白衣人甘此狂藥出家人猶當訶止云某甲汝就我受五戒不應如是若非受戒者亦應云檀越酒是惡本酒是魔事檀越今日幸可不飲云何出家人而應自飲尼羅浮陀地獄身如段肉無有識知此是何人皆飲酒者出家僧尼豈可不深信經教自棄正法行於邪道長衆惡根造地獄苦習行如此豈不內愧猶服如來衣受人信施居處塔寺仰對尊像若飲酒食肉如是等事出家之人不及居家何故如是在家人雖飲酒噉肉無犯戒罪此一不及居家人在家人雖復飲酒噉肉各有丘窟終不以此仰觸尊像此是二不及居家人在家人雖復飲酒噉肉終不吐泄寺舍此是三不及居家人在家人雖復飲酒噉肉無有譏嫌出家人若飲酒噉肉使人輕賤佛法此是四不及居家人在家人雖復飲酒噉肉門行井竈各安其鬼出家人若飲酒噉肉臭氣薰蒸一切善神皆悉遠離一切衆魔皆悉歡喜此是五不及居家人在家人雖復飲酒噉肉自破財産不破他財出家人飲酒噉肉自破善法破他福田是則六不及居家人在家人雖復飲酒噉肉皆是自力所辦出家人若飲酒噉肉皆他信施是則七不及居家人在家人雖復飲酒噉肉是常罪業更非異事出家人若飲酒噉肉衆魔外道各得其便是則八不及居家人在家人雖復如此飲酒噉肉猶故不失世業大耽昏者此則不得出家人若飲酒噉肉若多若少皆斷佛種是則九不及居家人不及外道不及居家略出所以各有九事論欲過患條流甚多可以例推不復具言今日大德僧尼今日義學僧尼今日寺官宜自警戒嚴淨徒衆若其懈怠不遵佛教猶是梁國編戶一民弟子今日力能治制若猶不依佛法是諸僧官宜依法問京師頃年講大涅槃經法輪相續便是不斷至於聽受動有千計今日重令法雲法師為諸僧尼講四相品四中少分諸僧尼常聽涅槃經為當曾聞此說為當不聞若已曾聞不應違背若未曾聞今宜憶持佛經中究竟說斷一切肉乃至自死者亦不許食何況非自死者諸僧尼出家名佛弟子云何今日不從師教經言食肉者斷大慈種何謂斷大慈種凡大慈者皆令一切衆生同得安樂若食肉者一切衆生皆為怨對同不安樂若食肉者是遠離聲聞法若食肉者是遠離辟支佛法若食肉者是遠離菩薩法若食肉者是遠離菩薩道若食肉者是遠離佛果若食肉者是遠離大涅槃若食肉者障生六欲天何況涅槃果若食肉者是障四禪法若食肉者是障四空法若食肉者是障戒法若食肉者是障定法若食肉者是障慧法若食肉者是障信根若食肉者是障進根若食肉者是障念根若食肉者是障定根若食肉者是障慧根舉要為言障三十七道品若食肉者是障四真諦若食肉者是障十二因緣若食肉者是障六波羅蜜若食肉者是障四弘誓願若食肉者是障四攝法若食肉者是障四無量心若食肉者是障四無礙智若食肉者是障三三昧若食肉者是障八解脫若食肉者是障九次第定若食肉者是障六神通若食肉者是障百八三昧若食肉者是障一切三昧若食肉者是障海印三昧若食肉者是障首楞嚴三昧若食肉者是障金剛三昧若食肉者是障五眼若食肉者是障十力若食肉者是障四無所畏若食肉者是障十八不共法若食肉者是障一切種智若食肉者是障無上菩提何以故若食肉者障菩提心無有菩薩法以食肉故障不能得初地以食肉故障不能得二地乃至障不能得十地以無菩薩法故無四無量心無四無量心故無有大慈大悲以是因緣佛子不續所以經言食肉者斷大慈種諸出家人雖復不能行大慈大悲究竟菩薩行成就無上菩提何為不能忍此臭腥修聲聞辟支佛道鴟鴉嗜鼠蝍蛆甘螮以此而推何可嗜著至於豺犬野犴皆知嗜肉人最有知勝諸衆生近與此等同甘臭腥豈直常懷殺心斷大慈種凡食肉者自是可鄙諸大德僧諸解義者講涅槃經何可不殷勤此句令聽受者心得悟解又有一種愚癡之人云我止噉魚實不食肉亦應開示此處不殊水陸衆生同名為肉諸聽講者豈可不審諦受持如說修行凡食肉者如前說此皆是遠事未為近切諸大德僧尼當知噉食衆生者是魔行噉食衆生是地獄種噉食衆生是恐怖因噉食衆生是斷命因噉食衆生是自燒因噉食衆生是自