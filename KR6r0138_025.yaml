問門徒多少弟子當令寺官集僧衆鳴揵槌捨戒還俗著在家服依涅槃經還俗策使唯取老舊者最多門徒者此二種人最宜先問何以故治一無行小僧不足以改革物心治如是一大僧足以驚動視聽推計名德大僧不應有此設令有此當依法治問其餘小僧故自妄言今日集會此是大事因緣非直一切諸佛在此非直一切尊法在此非直一切聖僧在此諸天亦應遍滿虛空諸仙亦應遍滿虛空護世四王亦應在此金剛密迹大辨天神功德天神違馱天神毗紐天神摩醯首羅散脂大將地神堅牢迦毗羅王孔雀王封頭王富尼跋陀羅伽王阿修羅伽王摩尼跋陀羅伽王金毗羅王十方二十八部夜叉神王一切持呪神王六方大護都使安國如是一切有大神足力有大威德力以如是一切善神遍滿虛空五方龍王娑竭龍王阿耨龍王難陀龍王跋難陀龍王伊那滿龍王如是一切菩薩龍王亦應遍滿在此天龍夜叉揵闥婆王阿修羅王迦婁羅王緊那羅王摩睺羅伽王人非人等如是一切有大神足力有大威德力八部神王皆應在此今日土地山川房廟諸神亦應仄塞虛空如是幽顯莫不鑒觀唯無瑕者可以戮人唯自淨者可以淨人弟子今日昌言此事僧尼必當有不平色設令刳心擲地以示僧與數片肉無以取信古人有言非知之難其在行之弟子蕭衍雖在居家不持戒今日當先自為誓以明本心弟子蕭衍從今以去至于道場若飲酒放逸起諸淫欲欺誑妄語噉食衆生乃至飲於乳蜜及以蘇酪願一切有大力鬼神先當苦治蕭衍身然後將付地獄閻羅王與種種苦乃至衆生皆成佛盡弟子蕭衍猶在阿鼻地獄中僧尼若有飲酒噉魚肉者而不悔過一切大力鬼神亦應如此治問增廣善衆清淨佛道若未為幽司之所治問猶在世者弟子蕭衍當如法治問驅令還俗與居家衣隨時役使願今日二部僧尼各還本寺匡正佛法和合時衆皆令聽經法者如說修行不可復令斷大慈種使佛子不續若有犯法破戒者皆依僧制如法治問若有容受不相治舉者當反任罪又僧尼寺有事四天王迦毗羅神猶設鹿頭及羊肉等是事不可急宜禁斷若不禁斷寺官任咎亦同前科別宣意是義論竟宣意如此弟子蕭衍敬白諸大德僧尼諸義學僧尼諸寺三官向已粗陳魚肉障纍招致苦果今重復欲通白一言閻浮提壽云百二十至於世間罕聞其人遷變零落亦無宿少經言以一念頃有六十剎那生老無常謝不移時暫有諸根俄然衰滅三途等苦倏忽便及欲離地獄其事甚難戒德清淨猶懼不免況於毀犯安可免乎雖復長齊菜食不勤方便欲免苦報亦無是處何以故爾此生雖可不犯衆罪後報業強現無方便三途等苦不能遮止況復飲酒噉食衆生諸僧尼必信佛語宜自力勵若云菜食為難此是信心薄少若有信心宜應自強有決定心菜食何難菜蔬魚肉俱是一惑心若能安便是甘露上味心若不安便是臭穢下食所以涅槃經言受食之時令作子想如俱非惑豈須此法且置遠事止借近喻今已能蔬食者懕惡血腥甚於不能蔬食者懕惡菜茹事等如此宜應自力回不善惑以為善惑就善惑中重為方便食菜子想以如是心便得決定凡不能離魚肉者皆云菜蔬冷於人虛乏魚肉溫於人補益作如是說皆是倒見今試復粗言其事不爾若久食菜人榮衛流通凡如此人法多患熱榮衛流通則能飲食以飲食故氣力充滿是則菜蔬不冷能有補益諸苦行人亦皆菜蔬多悉患熱類皆堅強神明清爽少於昏疲凡魚為性類皆多冷血腥為法增長百疾所以食魚肉者神明理當昏濁四體法皆沈重無論方招後報有三途苦即時四大交有不及此豈非惑者用心各有所執甘魚肉者便謂為溫為補此是倒見事不可信復有一種人食菜以為冷便復解素此是行者未得菜意菜與魚肉如水與火食菜裁欲得力復噉魚肉魚肉腥臊能滅菜力所以惑者云菜為性冷凡數解素人進不得菜蔬之力退不得魚肉邪益法多羸冷少有堪能是諸僧尼復當知一事凡食魚肉是魔境界行於魔行心不決定多有留難內外衆魔共相嬈作所以行者思念魚肉酒是魔漿故不待言凡食魚肉嗜飲酒者善神遠離內無正氣如此等人法多衰惱復有一種人雖能菜食恃此憍慢多於瞋恚好生貪求如是之人亦墮魔界多於衰惱又有一種人外行似熟內心麁惡見人勝已常懷忿嫉所行不善皆悉覆相如是等人亦行魔界雖復菜蔬亦多衰惱若心力決正蔬食若節如是等人多為善力所扶法多堪能有不直者宜應思覺勿以不決定心期決定人諸大德僧尼有行業已成者今日以去善相開導令未得者今去皆得若已習行願堅志力若未曾行願皆改革今日相與共為菩提種子勿怪弟子蕭衍向來所白寺官三百六十八人宿德二十五人義學五百七十四人導師三十九人右牒衆僧合一千六人寺官三百六十九人義學六十八人導師五人右牒合尼僧四百四十二人并右牒僧尼合一千四百四十八人並以五月二十二日五更一唱到鳳莊門二十三日旦光宅寺法雲於華林殿前登東向高座為法師瓦官寺慧明登西向高座為都講唱大涅槃經四相品四分之一陳食肉者斷大慈種義法雲解釋輿駕親御地鋪席位於高座之北僧尼二衆各以次列坐講畢耆闍寺道澄又登西向高座唱此斷肉之文次唱所傳之語唱竟又禮拜懺悔普設中食竟出二十三日會其後諸僧尼或猶云律中無斷肉事及懺悔食肉法其月二十九日又敕請義學僧一百四十一人義學尼五十七人於華林華光殿使莊嚴寺法超奉誠寺僧辨光宅寺寶度等三律師升高座御席地施座餘僧尼亦爾制旨問法超等三律師曰古人云止沸莫若去薪息過莫若無言弟子無言乃復甚易但欲成人之美使佛種相續與諸僧尼共弘法教兼即事中亦不得默已故今集會於大衆前求律中意聞諸僧道律中無有斷肉法又無懺悔食肉法諸律師從來作若為開導使人致有此疑法超奉答律教是一而人取文下之旨不同法超所解律雖許噉三種淨肉而意實欲永斷何以知之先明斷十種不淨肉次令食三種淨肉未令食九種淨肉如此漸制便是意欲永斷法超常日講恆作如此說制又問僧辨法師復作若為開導僧辨奉答僧辨從來所解大意亦不異法超但教有深淺階級引物若論噉三種淨肉理當是過但教既未極所以許其如此制又問寶度法師復若為開導寶度奉答愚短所解只是漸教所以律文許噉三種淨肉若涅槃究竟明於正理不許食肉若利根者於三種淨肉教即得悉不食解若鈍根之人方待後教制又問法超法師向答是文外意若依律文作若為判奉答常日解義只作向者所說制問僧辨法師意復云何同超法師不奉答同法超所解制問法超法師從來作此解律諸律師並皆噉肉為不噉肉法超奉答不知餘人並若為法超從來自不食肉制問僧辨法師復食肉不僧辨奉答昔恆不食肉中年疾病有時暫開制問寶度法師復云何奉答本住定林末移光宅二處不得進肉若在餘處為疾病亦不免開問講律時噉肉不奉答講時必有徒衆於徒衆中不敢問不敢有兩義為不敢食為不敢不食制又問僧辨法師常日講律時為當許徒衆食肉為當不許若不許噉肉有食肉者應驅遣去若許者作若為說奉答若約教解不全言不許若論其意未常開許問今正問約教時為許為不許答約教不遮問不遮是許為是不許答引其向理許其得食三種淨肉問見殺亦可不見聞殺亦可不聞疑作若為得免答若見因緣不假疑聞因緣亦不假疑唯遇得者疑問以錢買魚肉是疑非疑答若理中理自是疑問不得以理中見答若理中為論衆僧不應市魚肉今所問事中是疑不答若約教非疑問市中人為誰殺答乃為買者殺但買者不作此想問買肉者此人既不惛亂豈得不知是為買者殺而不作此想答于時作現死肉心問為自死詺作死為殺詺作死答此旨是理中言約教辨只得如此問法師既為人講說為人明導為人法城云何言只得如此但問作意使人買時作若為意答買自死者意問若自死者處處應有寺中亦應有自死者何假往屠肉家買答理中居然是疑問若理中居然是疑者云何得不疑肉食僧辨無復對制又問此肉為當作肉味為當作菜味僧辨奉答猶作肉味問為是慈心故食肉無慈心故食肉答此非慈心問若非慈心豈得非殺耶答理中常應不得約事故如此問律教欲使人出離不答令人出離問食肉得出離不答不得問若爾云何令食肉答為淺行者說引其令深問為具足戒者說為不具足者說答為具足者說問既為具足者說不為童蒙云何令食肉而是引其令深答初教如此非是極教問云何初教教具足戒人答僧辨所解正自齊此制又問律教起何時僧辨奉答起八年已後至涅槃問若如此涅槃經有斷肉楞伽經有斷肉央掘摩羅經亦斷肉大雲經縛象經並斷肉律若至涅槃云何無斷肉事答律接續初教所以如此問律既云接續初教至於涅槃既至涅槃則應言斷肉答若制教邊此是接續初教通於五時不言一切皆同僧辨解正齊此問法師既是大律師為衆開導今日大衆取判法師不得言齊此齊此亦不得住不齊此亦不得住只問此是優波離律不答是問佛般泥洹時優波離既親在坐云何律文不斷食肉答此是接續前近教問若言接近教近教亦不明食肉且涅槃前迦葉已持修行不食肉法律若異此則非優波離律是異部家律云何用此講說以化群僧僧辨不復奉答制問寶度法師說既同德同行云何解此語寶度奉答若律中事是優波離所出經事悉是阿難所出問若爾律中事便當皆不出經答若經中事牽律律中事牽經問佛說經時有所制約便集以為律何處方復牽律若經皆牽律是則說經應在律後答只言經中有明戒處愚謂應相關涉問若論相涉三藏義何嘗不相涉修多羅中亦有毗尼與毗曇毗尼中亦有修多羅與毗曇毗曇中亦有修多羅與毗尼不言無此義但問法師今所講律是優波離律義不違經不答今所講是優波離律與經不違問若是優波離律不違經者則斷肉義不應異涅槃答涅槃經顯斷肉律文雖不明而優波離意未常開肉問律既是具教優波離既不開肉律何得無文法師此解殊為進退只可為寺中沙彌式叉摩尼說不得以此答弟子答寶度愚解正自極此制又問下座諸律師復云何解龍光寺道恩奉答律文不斷涅槃經方斷問法師所講是誰律答是佛律問所引乃極弘曠只未知此律是優波離律不答優波離仰述佛律問優波離悉集佛所說不答集前四時不集涅槃時問若爾迦葉那得語阿難道佛從何處說法至涅槃時集修多羅藏語優波離道佛從何處說法至涅槃時集毗尼藏云何得言唯取前四時不取涅槃答涅槃時不復制戒問涅槃云夫食肉者斷大慈種我從今日制諸弟子不得復食一切肉一切悉斷及自死者如此制斷是戒非戒道恩不復奉答制又問諸律師親自講律諸大法師盡講大涅槃經云何有時解素素是何義若不解是素解則非素素若使得不素戒既是淨亦可得使淨為不淨不諸講律師親違此教外書所云自踰短垣竊簡書法正是此義宣武寺法寵奉答閉穢門稱為素開穢門稱不素問若爾衆僧云何開穢門答實自不應得開但貪欲情深所以如此問云何懺悔答懇惻至心是為懺悔若能懺悔是大丈夫問諸學人即時懺悔不故如弟子請諸法師動至千數導師唱導令懺悔者于時諸法師懺悔以不答那得不懺悔問若懺竟出寺更食肉不答居然不食但其中有無明多者或亦不免更食問出寺更食何如發初作者輕重答一種問云何一種初直爾而食後已經於諸佛前誓方復更噉云何一種答初人無慚愧後人有慚愧乃得有勝初人義問若爾但先道慚愧痛打前人而道我慚愧汝我打汝我慚愧汝我食汝答如大邪見人無慚愧其既知慚愧故知差不慚者問先道慚愧而猶噉食此是知而故犯非謂慚愧若使先時不知或是過誤後方起愧乃是慚愧豈非知而故犯其罪大於不知又復慚愧不得重犯如其直犯復是違破初心論此為罪所以彌大答經有誠文耆婆云汝有慚愧故罪可滅慚愧即是清白法問法師是得經言不得其意此明若作罪後方知慚愧此為白法不言發初慚愧而故作罪以為白法答經又道慚愧為上服若爾便有非上服義問義亦如此若正作罪雖云慚愧終無所益若作罪後能生慚愧者乃是上服法寵無復答法寵奉答事畢三律師並下又敕始興寺景猷升高座讀楞伽央掘魔羅經所明斷肉經文今載如左大般涅槃經四相品上第七此品今月二十三日會已唱此文法雲法師解說今二十九日不復重唱爾時迦葉菩薩白佛言世尊食肉之人不應施肉何以故我見不食肉者有大功德佛讚迦葉善哉善哉汝今乃能善知我意護法菩薩應當如是善男子從今日始不聽聲聞弟子食肉若受檀越信施之時應觀是食如子肉想迦葉菩薩復白佛言世尊云何如來不聽食肉善男子夫食肉者斷大慈種迦葉又言如來何故先聽比丘食三種淨肉迦葉是三種淨肉隨事漸制迦葉菩薩復白佛言世尊何因緣故十種不淨乃至九種清淨而復不聽佛告迦葉亦是因事漸次而制當知即是現斷肉義迦葉菩薩復白佛言云何如來稱讚魚肉為美食耶善男子我亦不說魚肉之屬為美食也我說甘蔗粳米石蜜一切穀麥及黑石蜜乳酪蘇油以為美食雖說應畜種種衣服所應畜者要是壞色何況貪著是魚肉味迦葉復言如來若制不食肉者彼五種味乳酪酪漿生蘇熟蘇胡麻油等及諸衣服憍奢耶衣珂貝皮革金銀盂器如是等物亦不應受善男子不應同彼尼揵所見如來所制一切禁戒各有異意故聽食三種淨肉異想故斷十種肉異想故一切悉斷及自死者迦葉我從今日制諸弟子不得復食一切肉也迦葉其食肉者若行若住若坐若臥一切衆生聞其肉氣悉生恐怖譬如有人近師子已衆人見之聞師子臭亦生恐怖善男子如人噉蒜臭穢可惡餘人見之聞臭捨去設遠見者猶不欲視況當近之諸食肉者亦復如是一切衆生聞其肉氣悉皆恐怖生畏死想水陸空行有命之類悉捨之走咸言此人是我等怨是故菩薩不習食肉為度衆生示現食肉雖現食之其實不食善男子如是菩薩清淨之食猶尚不食況當食肉善男子我涅槃後無量百歲四道聖人悉復涅槃正法滅後於像法中當有比丘似像持律少讀誦經貪嗜飲食長養其身其所被服麁陋醜惡形容憔悴無有威德放畜牛羊擔負薪草頭鬚髮爪悉皆長利雖服袈裟猶如獵師細視徐行如猫伺鼠常唱是言我得羅漢多諸病苦眠臥糞穢外現賢善內懷貪嫉如受啞法婆羅門等實非沙門現沙門像邪見熾盛誹謗正法如是等人破壞如來所制戒律正行威儀說解脫果離不淨法及壞甚深祕密之教各自隨意反說經律而作是言如來皆聽我等食肉自生此論言是佛說互共諍訟各自稱是沙門釋子善男子爾時復有諸沙門等貯聚生穀受取肉魚手自作食執持油瓶寶蓋革屣親近國王大臣長者占相星宿勤修醫道畜養奴婢金銀琉璃硨磲碼瑙頗梨真珠珊瑚琥珀璧玉珂貝種種果蓏學諸伎藝畫師泥作造書教學種植根栽蟲道呪幻和合諸藥作倡伎樂香花治身樗蒲圍碁學諸工巧若有比丘能離如是諸惡事者當說是人真我弟子爾時迦葉復白佛言世尊諸比丘比丘尼優婆塞優婆夷因他而活若乞食時得雜肉食云何得食應清淨法佛言迦葉當以水洗令與肉別然後乃食若其食器為肉所污但使無味聽用無罪若見食中多有肉者則不應受一切現肉悉不應食食者得罪我今唱是斷肉之制若廣說者則不可盡涅槃時到是故略說是則名為能隨問答楞伽阿跋多羅寶經卷第四爾時大慧菩薩以偈問言彼諸菩薩等志求佛道者酒肉及與葱飲食為云何惟願無上尊哀愍為演說愚夫所貪著臭穢無名稱虎狼所甘嗜云何而可食食者生諸過不食為福善惟願為我說食不食罪福大慧菩薩說偈問已復白佛言惟願世尊為我等說食不食肉功德過惡我及諸菩薩於現在未來當為種種悕望肉食衆生分別說法令彼衆生慈心相向得慈心已各於住地清淨明了疾得究竟無上菩提聲聞緣覺自地止息已亦得逮成無上菩提惡邪論法諸外道輩邪見斷常顛倒計著尚有遮法不聽食肉況復如來世間救護正法成就而食肉耶佛告大慧善哉善哉諦聽諦聽善思念之當為汝說大慧白佛唯然受教佛告大慧有無量因緣不應食肉然我今當為汝略說謂一切衆生從本已來展轉因緣常為六親以親想故不應食肉驢騾駱駝狐狗牛馬人獸等肉屠者雜賣故不應食肉不淨氣分所生長故不應食肉衆生聞氣悉生恐怖如栴陀羅及談婆等狗見憎惡驚怖群吠故不應食肉又令修行者慈心不生故不應食肉凡愚所嗜臭穢不淨無善名稱故不應食肉令諸呪術不成就故不應食肉以殺生者見形起識深味著故不應食肉彼食肉者諸天所棄故不應食肉令口氣臭故不應食肉多惡夢故不應食肉空間林中虎狼聞香故不應食肉令飲食無節故不應食肉令修行者不生厭離故不應食肉我常說言凡所飲食作食子肉想作服藥想故不應食肉聽食肉者無有是處復次大慧過去有王名師子蘇陀娑食種種肉遂至食人臣民不堪即便謀反斷其俸祿以食肉者有如是過故不應食肉復次大慧凡諸殺者為財利故殺生屠販彼諸愚癡食肉衆生以錢為網而捕諸肉彼殺生者若以財物若以釣網取彼空行水陸衆生種種殺害屠販求利大慧亦無不教不求不想而有魚肉以是義故不應食肉大慧我有時說遮五種肉或制十種今於此經一切種一切時開除方便一切悉斷大慧如來應供等正覺尚無所食況食魚肉亦不教人以大悲前行故視一切衆生猶如一子是故不聽令食子肉爾時世尊欲重宣此義而說偈言曾悉為親屬鄙穢不淨雜不淨所生長聞氣悉恐怖一切肉與葱及諸韭蒜等種種放逸酒修行常遠離亦常離麻油及諸穿孔床以彼諸細蟲於中極恐怖飲食生放逸放逸生諸覺從覺生貪欲是故不應食由食生貪欲貪令心迷醉迷醉長愛欲生死不解脫為利殺衆生以財網諸肉二俱是惡業死墮叫呼獄若無教想求則無三淨肉彼非無因有是故不應食彼諸修行者由是悉遠離十方佛世尊一切咸訶責展轉更相食死墮虎狼類臭穩可厭惡所生常愚癡多生栴陀羅獵師談婆種或生陀夷尼及諸肉食性羅剎猫狸等遍於是中生縛象與大雲央掘利魔羅及此楞伽經我悉制斷肉諸佛及菩薩聲聞所訶責食已無慚愧生生常癡冥先說見聞疑已斷一切肉妄想不覺知故生食肉處如彼貪欲過障閡聖解脫酒肉葱韭蒜悉為聖道障未來世衆生於肉愚癡說言此淨無罪佛聽我等食食如服藥想亦如食子肉知足生厭離修行行乞食安住慈心者我說常厭離虎狼諸惡獸恆可同遊止若食諸血肉衆生悉恐怖是故修行者慈心不食肉食肉無慈慧永背正解脫及違聖表相是故不應食得生梵志種及諸修行處智慧富貴家斯由不食肉央掘魔羅經第一卷上座迦葉捨種種甘膳之食捨肉味食受持修行不食肉法央掘魔羅經第二卷文殊師利白佛言世尊因如來藏故諸佛不食肉耶佛言如是一切衆生無始生死生生輪轉無非父母兄弟姊妹猶如伎兒變易無常自肉他肉則是一肉是故諸佛悉不食肉復次文殊師利一切衆生界我界即是一界所宅之肉即是一肉是故諸佛悉不食肉文殊師利白佛言世尊珂貝獵蜜皮革繒綿非自界肉耶佛告文殊師利勿作是語如來遠離一切世間如來不食若言習近世間物者無有是處若習近者是方便法若物展轉來者則可習近若物所出處不可習近若展轉來離殺者手則可習近文殊師利白佛言今此城中有一皮師能作革屣有人買施是展轉來佛當受不復次世尊若自死牛牛主從栴陀羅取皮持付皮師師作革屣施持戒人此展轉來可習近不佛告文殊師利若自死牛牛主持皮用作革屣施持戒人為應受不若不受者是比丘法若受者非慈悲然不破戒唱經竟制又語諸僧道諸小僧輩看經未遍互言無斷肉語今日此經言何所道所以唱此革屣文者本意乃不在此正為此二十三日法雲法師講涅槃斷肉事于時僧正慧超法寵法師難云若經文究竟斷一切肉乃至自死不得食者此則同尼揵斷皮革不得著革屣若開皮革得著革屣者亦應開食肉法雲法師乃已有通釋而二法師難意未已于時自仍通云若是聖人故自不著此物若中行人亦不著此著此皆下行人所以不同尼揵者語有所含若無麻紵之鄉亦有開皮革義論有麻紵處大慈者乃實應不著但此事與食肉不得類同凡著一革屣經久不壞若食噉衆生就一食中便害無量身命況日日餐咀數若恆沙亦不可得用革屣以並斷肉于時諸僧乃無復往復恐諸小僧執以為疑方成巨蔽所以唱此不受革屣文正欲釋一日所疑非關前制凡噉肉者是大罪障經文道昔與衆生經為父母親屬衆僧那不思此猶忍食噉衆生己不能投身餓虎割肉貿鷹云何反更噉他身分諸僧及領徒衆法師諸尼及領徒衆者各還本寺宣告諸小僧尼令知此意制說此語竟僧尼行道禮拜懺悔設會事畢出其晚又敕員外散騎常侍太子左衛率周捨曰法寵所言慚愧而食衆生此是經中所明羅剎婦女云我念汝我食汝法寵此心即是經之羅剎又敕捨云僧辨所道自死肉若如此說鴟鴉鳩鴿觸處不死那不見有一自死者麞鹿雉兔充滿野澤亦不嘗見有一自死者而覓死肉其就屠殺家覓死魚必就罾網處若非殺生豈有死肉經言買肉與自殺此罪一等我本不自為正為諸僧尼作離苦因緣又敕捨云衆生所以不可殺生凡一衆生具八萬戶蟲經亦說有八十億萬戶蟲若斷一衆生命即是斷八萬戶蟲命自死衆生又不可食者前附蟲雖已滅謝後所附蟲其數復衆若煮若炙此斷附蟲皆無復命利舌端少味害無量衆生其中小者非肉眼能觀其中大者炳然共見滅慈悲心增長惡毒其實非沙門釋子所可應行又敕捨云衆僧食肉罪劇白衣白衣食肉乃不免地獄而止是一罪至於衆僧食肉既犯性罪又傷戒律以此為言有兩重罪若是學問衆僧食肉者此為惡業復倍於前所以如此既親達經教為人講說口稱慈悲心懷毒害非是不知知而故犯言行既違即成詭妄論學問人食肉則罪有三重所以貴於解義正為如說修行反復噉食魚肉侵酷生類作惡知識起衆怨對墜墮地獄疾於𥎞矛善惡報應必也不亡凡出家人實宜深思又敕捨云聲聞受律儀戒本制身口七支一受之後乃至睡眠悶等律儀恆生念念得未曾得律儀所以爾者睡眠等非起惡心故不損不失乃至常生若起欲殺心於聲聞法雖不失身口戒而於戒有損非唯損不殺戒亦兼污餘戒至於手夾齒齧動身口業則失身口戒爾時律儀無作即斷不續既失不殺戒亦損污餘戒所以爾者旃陀羅人為屠肉時為何等人殺正為食者若食肉即有殺分於不殺戒即成有缺若謂於善律儀受殺生分於不殺戒無所缺者是不善律儀人持八戒齊是惡律儀猶應相續若惡律儀人持八戒齊惡律儀不復相續者是知善律儀人受諸殺分是不殺戒即時便缺別解脫戒不復解脫惡律儀人無論持八戒齊但起一念善心惡律儀即斷若一念不斷多念亦應不斷若多念斷是知一念時斷善律儀人其事亦爾無論受諸殺分有少殺分不殺律儀即時亦爾菩薩人持心戒故自無有食衆生理若缺聲聞戒終不免地獄等苦夫群生所以久流轉生死海者良由無戒德之舟楫者也若乘戒舟鼓以慈棹而不能橫截風濤遠登彼岸者無此理也故正教雖多一戒而為行本其由出必由戶何莫由斯戒矣是以創起道意先識斯門於諸心境籌度懷行其狀如何故論云夫受戒者慈悲為務於三千界內萬億日月上至非想下及無間所有生類並起慈心不行殺害或盡形命或至成佛長時類通統周法界此一念善功滿虛空其德難量惟佛知際不殺既爾餘業例然由斯戒德故能遠大所以上天下地幽顯聖賢莫不憑祖此緣用為基趾經不云乎戒如大地生成住持出有心發是曰生也聖道良資是曰成也法延六萬是曰住也保任三業是曰持也諸餘善法蓋闕此功有入此門便稱聖種乖斯妄立是謂凡流長沒苦海出濟無日自法移東夏千齡過半在魏嘉平方聞戒法自爾迄今道俗流布然大聖垂教知機厥先故使俗士憲章則有具有缺道人律儀有小有大所以五戒八戒隨量制開對境無非戒科約分任其力用是謂接俗之化不可定其時緣出家據道異於俗流備足時緣無開階級雖復位分大小兩學就行齊均上下五衆約過品類乃殊結正同存一戒戒者警也常御在心清信所存聞諸視聽故撮舉數四知奉法之有人焉與隱士劉遺民等書晉廬山釋慧遠彭城劉遺民以晉太元中除宜昌柴桑二縣令值廬山靈邃足以往而不反遇沙門釋慧遠可以服膺丁母憂去職入山遂有終焉之志於西林㵎北別立禪坊養志間處安貧不營貨利是時間退之士輕舉而集者若宗炳張野周續之雷次宗之徒咸在會焉遺民與群賢遊處研精玄理以此永日遠乃遺其書曰每尋疇昔遊心世典以為當年之華宛也及見老莊便悟名教是應變之虛談耳以今而觀則知沈冥之趣豈得不以佛理為先苟會之有宗則百家同致君諸人並為如來賢弟子也策名神府為日已久徒積懷遠之興而乏因籍之資以此永年豈所以勵其宿心哉意謂六齊日宜簡絶常務專心空門然後津寄之情篤來生之計深矣若染翰綴文可託興於此雖言生於不足然非言無以暢一詣之感因驥之喻亦何必遠寄古人於是山居道俗日加策勵遺民精勤偏至具持禁戒宗張等所不及專念禪坐始涉半年定中見佛行路遇像佛於空現光照天地皆作金色又披袈裟在寶池浴出定已請僧讀經願速捨命在山一十五年自知亡日與衆別已都無疾苦至期西面端坐斂手氣絶年五十有七先作篤終誡曰皇甫謐遺論佩孝經示不忘孝道蓋似有意小兒之行事今即土為墓勿用棺槨子雍從之周續之等築室相次各有芳績如別所云與蕭咨議等書梁元帝蓋聞圓光七尺上映真珠之雲面門五色旁臨珊瑚之地化為金案奪麗水之珍變同珂雪高玄霜之彩豈不有機則感感而遂通有神則智智而必斷故碧玉之樓升堂未易紫紺之殿入室為難必須五根之信以信為首六度之檀以檀為上故能捨財從信去有即空率斯而談良可知矣竊以瑞像放光倏將旬日蹈舞之深形於寤寐抃躍之誠結於興寢稍覺十字之蒸嗤何曾之饌五鼎之味笑主偃之辭黿羹麟脯空聞其說羊酪猩脣曷足云也困于酒食未若過中不餐螺蚳登爼豈及春蔬為淨欲吾子三日潔齊自寅至戌一中而已自有米如玉鋭鹽類虎形雲夢之芹遼東之藻十斤之梨千樹之橘青筍紫薑固栗霜棗適口充腸無索不獲八功德水並入法流四王俱至偕讓弘道同志為友豈不盛歟蕭繹疏答湘東王書梁簡文十八日晚於華林閣外省中得弟九月一日書甚慰懸想秋節淒清比如常也州事多少無足疲勞濠梁之氣不異恆日差盡怡悅時有樂事遊士文賓比得談賞終宴追隨何如近日注漢功夫轉有次第思見此書有甚飢惄吾蒙受菩薩禁戒簉預大士此十二日便於東城私懺十七日旦早入寶雲璧門照日銅龍吐霧紅泉含影青蓮吐芳法侶成群金山滿座身心快樂得未曾有昨旦平等寺法會中後無礙受持天儀臨席容親證拜伏雖多疲勞頓遣剃頂之時此心特至心口自謀併欲剪落無疑馬援遣蝨之談不辭應氏赤壺之諷僧璡典議不異昔日竟日問璡殊均子路探鉤取名名曰因理皇情印可今便奉行昨脯後方還所住徐摛庾吾羌恆日夕鏡遠在直時來左右但不得倜儻殊異盤桓之時稍習節文欲避酒泉之職尹王相去既爾彌申欵對臨汝矦比多屬疾來宮小稀其間信使差得不簡曄兼詹事暕為洗馬時申話言數語論辨向之侯東撫復成離闊衡山九嶷尋應引邁臨岐有歎望水興嗟但吾自至都已來意志忽恍雖開口而笑不得真樂不復飲酒垂二十旬次公醒狂自成無理知耆艾數信述吾經過適憶途遵江夏路出西浮日月易來已涉秋暮而韋述有長沮之弊必笑之災術異葛仙形均荀序第復資其糧餼特為經營轉禍為福事均北叟分別已來每增慨憶歎因月積想逐時旋每有西卸事同撫䏶相見之期未知何日瞻言玉嶺靜對金關懷勞之深未常弭歇善自保惜反此不多綱疏與梁朝士書瑗律師光宅寺曇瑗白竊惟至人垂誨各赴機權故外設約事三千內陳律儀八萬誠復楷訓異門無非懲惡孔定刑辟以詰姦宄釋敷羯磨用擯違法二聖分教別有司存頃見僧尼有事每越訟公府且內外殊揆科例不同或內律為輕外制成重或內法為重外網更輕凡情僶俯肆其阿便若苟欲利己則捨內重而附外輕若在陷他則棄內輕而依外重非唯穢黷時宰便為頓乖理制幸屬明令公匡弼社稷和燮陰陽舟楫大乘柱石三寶遐邇向風白黑斯慶貧道忝居僧例頗曾採習毗尼纍獲僧曹送事訪律詳決尋佛具切誡國有憲章絓僧家諍執未審依何折斷謹致往牒佇奉還旨庶成約法永用遵模釋曇瑗呈與瑗律師書釋慧津慧津和南竊聞尋師萬日以禮見知而津伏奉未淹過蒙優接昔鄒陽上書乃可引為上客宋玉陳賦則賜以良田且復康會來吳才堪師表摩騰入漢行合律儀者哉故知道寄人弘德不孤立儔今訪古並非其例豈可虛佩寵靈坐安隆渥便是名踰分外譽超身表但法輪初啓請業者如雲非直四海同風天下慕義遂令負笈之徒排肩自遠歸仁之士繼踵來儀華陰成市曾何足云舉袂如帷豈得獨高前代況乃闡禪定之初門開智慧之燈炬信實傾河倒海宣說不窮先進者陷於金城後生者摧其利齒可號熏修戒善能令十地瓔珞守持身行則使八正莊嚴允穆聖凡叶和幽顯加有懷鉛握錐之好聚螢流麥之勤或剖蚌求珠開河出寶而慧津一介無取內外靡聞學謝懸鍾言慚散粉同斯曲木空廁直蘭類此蒹葭謬參玉樹乃知滄溟汪濊不待豪滴之珠華嶽穹崇寧俟遊塵之壤譬茲秋鳳如彼春林墜獨葉不預百枝落一毛何關六翮正言身名仰委觸途憑纍區區寸誠喻如皎日不意三邊有務四郊多壘致使虧替講筵請益成廢及言悲鯁寧可具披所冀難靜障除更敦咨受不任戀結行遣祇承慧津和南瑗律師答信來枉告良用憮然余學慚技癢人非准的中雖曾講授不異管內𨶳天豈足作範後昆踵武前哲蓋身疾弗瘳門人引去一師盛業廢而莫傳五十之年忽焉將至長夜永懷惆悵何已未有好事者日相請逼遂以罷老復成自勵如法師數子本出名家洛下奇才當今利齒必欲探核論部任持律藏方為美器日見絶塵復有海表奇僧聚中開士皆學無常師不遠而至訪道質疑足稱一時之樂不意胡兵犯蹕虜馬飲江塔廟焚如義徒道殣即日京華故老倚席不談乃復爰訪幽痾令其訓導久廢無次何以誨人故乃荊棘生乎口中雌黃謬於舌杪矣煎水求氷未足為喻佇能近顧方陳寸欵瑗白隋煬帝於天台山顗禪師所受菩薩戒文弟子基承積善生長皇家庭訓早趨貽教夙漸福履攸臻妙機頓悟恥崎嶇於小徑希優遊於大乘笑息止於化城誓舟航於彼岸開士萬行戒善為先菩薩十受專持最上喻立宮室先必基趾徒架虛空終不能成孔老釋門咸資鎔鑄不有軌儀孰將安仰誠復能仁奉為和上文殊冥作闍梨而必藉人師顯傳聖授自近之遠感而遂通波崙罄髓於無竭善財亡身於法界經有明文非徒臆說深信佛語幸遵時導禪師佛法龍象戒珠圓淨定水清澄因靜發慧安無礙辨先物後己謙挹成風名稱遠聞衆所知識弟子所以虔誠遙注命楫遠迎每慮緣差值諸留難亦既至止心路豁然及披雲霧即銷煩惱以年月日於揚州金誠設千僧會敬受菩薩戒戒名為孝亦名制止方便智度歸宗奉極作大莊嚴同如來慈普諸佛愛等視四生猶如一子云云既受戒己便舉法名詺帝為總持菩薩也帝頂受已白曰大師禪慧內融導之以法澤可奉名為智者斯同梁高舉約法師之徽號矣天台智者禪師與煬帝書文多不載備所撰續高僧傳統略淨住子淨行法門序終南太一山釋氏夫淨住之來其流尚矣祖述法王開化道達之方統引群生履信成濟之務也是以正法存沒畢乘信毀之功神用昏明終藉惰勤之力竊開輪王興運肇於有劫之初法主膺期開於濁域之始其故何耶良有以也諒由淳薄結於夙心故使機感隆於視聽自教流震土六百餘年道俗崇仰其蹤可悉至於知機明略弘贊被時垂清範於遺黎導成規於得信者斯文在斯可宗鏡矣昔南齊司徒竟陵王文宣公蕭子良者崇仰釋宗深達至教注釋經論鈔略詞理掩邪道而闢正津弘一乘而揚七衆世稱筆海時號智山或通夢於獨尊諡天王之嘉稱或冥授於經唄傳神度之英規其德難詳輒從蓋闕以齊永明八年感夢東方普光世界天王如來樹立淨住淨行法門因其開衍言淨住者即布薩之翻名布薩天言淨住人語或云增進亦稱長養通道及俗俱稟修行所謂淨身口意如戒而住故曰淨住也子者紹繼為義以三歸七衆制御情塵善根增長紹續佛種故曰淨住子也言淨行法門者以諸業淨所以化行於世了諸法門故有性相差別始於懷鉛終於絶筆凡經七旬兩帙都了遂開筵廣第盛集英髦躬處元座談敘宗致十衆雲合若赴華陰之墟四部激揚同謁靈山之會咸曰聞所未聞清心傾耳故江表通德體道乘權綜而習之用開靈府陳平隨統被及關河傳度不虧備于藏部後進學寡識昧前修曾不披尋任情抑斷號曰僞經相從捐擲斯徒衆矣可為悲夫余以暇景試括檢之文實精華理存信本矣故知今所學教全是師心心何可師一至如此是以智度論云佛滅度後凡所製述弘贊佛經者並號阿毗達磨即十二部經之所攝也聖教明訣理絶凡謀但以初學或昧未能瞻及輒又隱括略成一卷撮梗概之貞明摘扶疏之茂美足以啓初心之跬步標後鋭之前縱又圖而贊之廣于寺壁庶使愚智齊曉識信牢強萬載之道遐開七衆之基成立敬而信者是稱淨行之人宗而行之不亡淨住之目貽厥諸友知其意焉淨住子淨行法南齊文宣公皇覺辨德門第一九十六種道而佛道為最上勝者非無其義夫立名所以表德非德無以顯名有名未必具德有德名非虛唱是知名有真假德有虛實豈可道俗混同竊名假實而不辨析者乎今覩殊教異軌分衢舛迹未嘗不有其名而闕其德不無其稱而求其用是知有名無德者外道也有德有名者佛道也譬若濟海託舟踐途寄足故經云直心是道場無虛假故發行是道場能辨事故如是四弘六度俱稱道場藉如此之勝因獲若斯之妙果所以解脫去其纍般若窮其照相好表其容法身顯其德語其至仁則三念齊想言其自在則無畏獨步談其纍功則十力為用仰其妙極則不共之法神通方便無量法門洞達三世了照萬有卓然明顯英聖超群故號如來十號具足既自覺於生死昏夜又復起於未覺悟者斯可謂有其名德無不苞具其美德無不備故知形端則影直聲雅則響和未見貌醜鑒鏡有悅目之華體矬照水發溢群之觀書云不登山無以知天之高不測水無以知地之厚也凡如斯之異學皆漏於佛之大道矣故經云世間亦有常樂我淨出世亦有常樂我淨世間者有名無義出世者有名有義故六師結誓經問佛名德佛答云最正覺自得不染一切法一切智無畏自然無師保至獨無等倫自獲於正道如來天人尊一切智力具今各既知至德有歸邪正異趣善惡分徑凡聖路隅幸得信因果悟非常順智流入正道諸賢並能悼川上之不追悟交臂之潛往病生滅之無窮慕我淨之恆樂凡我咸已仰風餐化割愛辭榮豈得不懍然增到形命相競者乎故當清和其性哀愍有形等心存濟以法惠施不犯不取有求不逆常志大乘內外相副是名具足清淨度門辨德門頌南齊祕書丞王融紫實昧朱狂斯濫哲舛徑揚鏕分源競枻麗景或幽澄舒每缺水激波生煙深火滅情端徒總理向空蔽不有明心誰驅聖轍開物歸信門第二如來愍念衆生愛同一子何常不以善權方便弘濟益之津乎所以垂形丈六表現靈儀隨方應感法身匪一及其金容託體相好莊嚴顯發衆生欣樂瞻覩行則大千震動衆魔懾伏住則洞達諸定外道歸化坐則演示方等釋梵咨仰臥則開一實道三乘稟德言則三塗靜苦笑則四生受樂聞聲者證道見形者解脫當此之時豈不盛哉今者雖稟精靈昏惑障重進不覩分衛國城退不聞八音辨說將由罪業深厚煩惱牢固非惟恐不見前佛後佛來聖近賢深憂惡道無由可絶發如此意實有切情之悲運如是想不覺痛心之苦豈容順默使流晏安苦海沈淪沸火而不自拔者乎當須慷慨懍厲挫情折意生增上心懺悔滅罪去諸塵纍乃可歸信自不堅強其志亡身捨命捍勞忍苦銜悲惻愴者將恐煩惱熾火無由而滅無明重暗開了未期譬如牢獄重囚具嬰衆苦抱長枷穿大械帶金鉗負鐵鎖捶撲其軀膿瘡穢爛周遍形骸臭惡纏匝而欲以此狀求見國主貴臣雖復一心無怠懇誠嘉到恐升高殿踐玉筵亦無由而果假令愍念欲覩為難何以故以其具諸罪惡不離苦具故若去枷脫鎖洗垢嚴服王不我礙自然而現今欲歸信亦復如斯將見如來相好光明者先當淨身口意洗除心垢六塵愛染永滅不起十惡重障淨盡無餘業纍既除表裏俱淨方可運明想於迦維標清心於寶剎去諸塵勞入歸信門必然仰覩法身無礙如囚脫枷鎖自然見於王我今除煩惱亦必覩諸佛若不如是雖復殷勤倍切直恐障礙難通豈可不五體投地如太山崩一心歸信無復疑想奉為至尊皇太子七廟聖靈龍神八部一切劇苦衆生敬禮十方一切三世諸佛求哀懺悔既悔已後常行柔軟調和心堪受心不放逸心寂滅心真正心不雜心無貪吝心勝心大心慈悲安樂心善歡喜心度一切心守護衆生心無我所心如來心發如是等廣勝妙心專求多聞修離欲定奉戒清淨念報恩德常懷悅豫不捨衆生歸信門頌生浮命舛識網情違業雲結影慧日潛暉逶迤修道極夜無歸登山小魯泛海難沂參珉見璧辨礫知璣迷其未達匪正何依滌除三業門第三身口意三禍患之首故經云有身則苦生無身則苦滅既知其患苦則應挫而滅之滅苦之要莫過懺悔懺悔之法先當潔其心靜其慮端其形整其貌恭其身肅其容內懷慚愧鄙恥外發書云禮無不敬傲不可長又曰過而能改是謂無過經云於一切衆生敬之如親想各自省其過然後懺悔衆等從無始世界以來至於此生由於身意造諸苦業並緣愚癡多違至教遂乃憍慢懈怠形用不恭眠坐放逸行動輕傲或入出僧坊登上堂殿禮拜旋繞形不卑恭或於父母師長上中下座善友知識前服用不端動止乖法非禮而觀用違體製或盜三寶財及親屬物一切他有抄掠強奪欺誑增減非分相凌或淫妷恣縱非時非處罔隔禽獸不避親族或造五逆水火焚澆攻略坑陷加毒無罪或剠劓刖刵考掠斫射傷毀斬截殘害剝裂屠割炮燒煮炙爛瀹諸如此罪或為淫欲或為財利或為慳貪或為癡我無慚賢愚不愧聖達今思此過若影隨形怖懼慚愧悲惻懺悔痛苦懺悔已有相加害者從今已去為真善友生生相向以法示誨願十方佛特加攝念悔身業障永更不造次懺口業此是患苦之門禍纍之始書曰一言可以興邦一言可以喪國又曰言行君子之樞機樞機一發榮辱之主經云不得離間惡口妄言綺語諂曲華詞構扇狡亂故知有言之患招報實重廣如自愛經彰斯業相又如經云失命因緣尚不妄語何況戲笑構扇是非常以直心懺悔口業次懺意業意為身口之本罪福之門書云檢七情務九思思無邪動必正七情者喜怒憂懼憎愛惡欲者也九思者視思明聽思聰色思溫貌思恭言思忠事思敬疑思問忿思難見利思義此皆所以洗除胸懷去邪務正經云不得貪欲瞋恚愚癡邪見故知萬惡川流事由心造何以知其然若瞥緣心起故口發惡言言由意顯便行重罪今欲緘其言而正其身者未若先挫其心而次折其意故經云制之一處無事不辨既心會於道身過不遏而止意順於理口失不防而滅然身口業麁易可抑絶意造細微難可豁盡廣如諸經說其相狀懺悔三業門頌樂由生滅患以身全業資意造事假言筌利衰畢倚榮辱茲纏燕驥匪躡周鍇徒鐫惑端風緒愛境旌懸不勤一至何階四禪修理六根門第四經云罪無定相隨因緣造既是因緣而生今亦隨因緣而滅前已懺其重惡則三業俱明又欲莊嚴容體則須六根清淨固知心之驅役諸識亦猶君之總策諸臣故書云君人者懍乎如朽索之御六馬言其畏敬御物不及於亡驗之此事曉然俱了但以方境森然感發內外更相因倚構接心識故經云心王若正則六臣不邪須各慚愧制馭根識如法句經心意品說昔有道人河邊學道但念六塵曾無寧息龜從河出水狗將噉龜龜縮頭尾四腳藏於甲中不能得便狗去還出便得入水道人因悟我不及龜放恣六情不知死至輪轉五道皆由意根故須總明六根罪業我從無始已來眼根因緣隨逐諸色見勝美之事不能修學見不善之業隨順履行獲此雙眼其淨甚少惟見無慚無恥之色不見賢聖神通方便作用之色雖有雙目與盲不異是大可恥一也我從無始已來耳根因緣隨逐外聲聞說正善信忠勸美不能修學反生憤結聞邪惡事歡然須行緣此因故惟聞一切不善音聲不聞清淨正法之聲十方諸佛常說妙法我今不聞生聾不異是大可恥二也我從無始已來鼻根因緣若聞正教戒德妙香初不樂聞反生妨礙聞諸惡欲邪媚之香深心耽著由此業故墮大地獄生在邊地不聞賢聖五分之香不聞三乘四攝等香使我輪回常與善隔是大可恥三也我從無始已來舌根因緣造過特多貪著厚味不淨說法致此罪緣常淪生死是大可恥四也我從無始已來身根因緣多造衆罪自重輕他增長癡愛由此業故得下賤報於佛勝緣無由攀附是大可恥五也我從無始已來意根因緣備造衆惡至人經教拔苦出要心不悕行更生違拒乃學異論規圖罪種致無正信求名求利增長我見乖僻尤重臨死之時方悔虛過此大可恥六也清淨六根門頌傾都麗佳繞梁之曲肥馬輕裘蕙肴芳醁晦黑滋生昏嚚競欲貌蕩魂浮身甘意觸靈蔡攝根情葵衛足蟲草或虞人何不勗生老病死門第五尋夫遠劫已來三業所纏六根所惑染愛潤業沈沒迄今生老病死實為大苦故經云一身死壞復受一身生死無數盡天下草木斬以為籌計吾故身不能數矣所以達人興厭高升界繫之表愚夫貪生恆淪死生之獄故須識過可得長辭如胞胎經云衆生受胎冥冥漠漠狀若浮塵在胎十月四十二變識微苦毒楚痛難忍臭處迫迮劇於牢獄飢渴寒熱過於餓鬼母飽急塞母飢悶絶食冷如氷食熱如火飲多如漂大海行急如墮險谷坐久如土鎮迮立久如懸廁屋下熏上壓無時不苦及將欲生倍復艱難如赤身赴刃叫聲震裂雖具此苦復多不全若一日百日一月十月或在胞胎墮落或出生母子喪命當思此生實是大苦次思老苦經云年耆根熟形變色衰坐起苦極餘命無幾涅槃經云譬如燈炷惟賴膏油膏油既盡光炷非久人亦如是惟賴壯膏壯膏既盡衰老之炷何得久住又如折軸無所復用如遭霜花人不欲視又經云是日已過命亦隨減如少水魚斯有何樂當思此老復為大苦次思病苦皆由風寒冷熱食飲不節四時變改則水石乖扶況此假合之體危之形望免四大不虧百一無惱豈可得也及至苦患切身心煩愁塞求生不差求死不絶痛楚百端窮憂自結屎尿臭處妻子為之改容形骸不攝傍人為之變色況單身寄病誰肯提携故經云慈父孝子至病死時不能相救此至言也實為大苦復思死苦經云死者盡也氣絶神逝形骸蕭索人物一統無生不終又經云去處懸遠而無伴侶無所破壞見者愁毒等經又云獨生獨死身自當之幽幽冥冥會見無期是以聖人以身為患豈復以死更受生乎往來五道勞我精神誓斷貪源絶其生本是故死苦實由此身如來出家立言此意生老病死門頌穠華易遷繁蕉不實星髮鮐肌憐光愒日二竪潛言十巫空術生之往矣高松蕭瑟即化翻靈從緣墜質噬臍有譏嗟然何汩剋責身心門第六身為苦本自所造集於生死中復增惡業不能改悔隨順佛語是故特須深自剋責經云見人之過口不得言己身有惡則應發露書云聞人之過如聞父母之名耳可得聞口不得言又云君子顯其過經云讚人之善不言己美書云君子揚人之美不伐其善經云恕己可為譬勿殺勿行杖書云己所不欲勿施於人今以經書交映內外之教其本均同正是意殊名異若使理乖義越者則不容有此同致所以稱內外者本非形分但以心表為言也經云佛為衆生說法斷除暗惑猶如良醫隨疾授藥書云天道無親惟仁是與若出家之人觀空無常厭離生死行出世法是則為內乖此為外在家之人歸崇三寶持戒修善奉行禮義是則為內乖此為外今內外道俗共知內美之稱由心外惡之名在行豈得不捨外惡勤修內善若欲修行先自剋責當知求進是假名退檢是實法欲涉千里者必裏糧衛足而致也欲升彼岸者必聚智糧具戒足而登也所以能果者實由退檢覺察校試輕重故能却斷無明退截老死愚暗滅則慧光發四相遷則戒德顯故知廉退者進之兆也貪進者退之萌也夫求而獲者虛則寶愛情深故有傾危墮墜之苦此外道之法也退而獲者實則意無染戀故得常安涅槃之樂斯佛道之法也今者但應退檢不及以自責躬若志求進必損我傷物退察檢失則彼我兼利當知剋責心口是八正之路檢察身行是解脫之蹤是故如上善自剋責則無善而不歸也剋責心行門頌瞻彼進德莫敢或遑顧咨小智徒以太康豈無通術跋此榛荒雖有重離亦照螢光循情內負撫事外傷層羅一舉空念高翔檢覆三業門第七剋責之情猶昧審的之旨未彰故以事檢心校所修習既知不及彌增悚恧何謂檢校檢我此身從旦至中從中至暮從暮至夜從夜至曉乃至一時一剋一念一頃有幾心幾行幾善幾惡幾心欲摧滅煩惱幾心欲降伏魔怨幾心念三寶四諦幾心念苦空無常幾心念報父母恩慈幾心願代衆生受苦幾心發念菩薩道業幾心欲布施持戒幾心欲忍辱精進幾心欲禪寂顯慧幾心欲慈濟五道幾心欲勸勵行所難行幾心欲超求辨所難辨幾心欲忍苦建立佛法幾心欲作佛化度群生上已檢心次復檢口如上時刻從旦已來已得演說幾句深義已得披讀幾卷經典已得理誦幾許文字已得幾過歎佛功德已得幾過稱菩薩行已得幾過稱讚隨喜已得幾過回向發願次復檢身如上時刻已得幾過屈身禮佛幾拜已得幾過屈身禮法禮僧已得幾過執勞掃塔塗地已得幾過燒香散華然燈已得幾過拂除塵垢正列供具已得幾過懸幡表剎合掌供養已得幾過繞佛恭敬幾十百匝如是檢察會理甚少違道極多白淨之業裁不足言煩惱重障森然滿目暗礙轉積解脫何由如上檢察自救無功何有時間議人善惡故須三業自相訓責知我所作幾善幾惡檢校行業門頌渾風緬沒旅俗膠加競文內疚誰靦心瑕再惟情反三省身華貴危窮濫貧懾豪奢邅回六蔽紛綸七邪不圖厥始逸馬難罝訶詰四大門第八上已檢校所行多諸廢惰由此四大招致懈怠是故訶詰令其覺悟夫三界遐曠六導繁滋莫不依因四大相資成體聚則為身散則歸空然風火性殊地水質異各稱其分皆欲求適求適非一所以乖忤易動故一大不調四大俱疾乍增乍損痾疹續生風輕而地重水冷而火熱互相煎惱無時得安經喻四蛇信哉可患又此四大無慚無恥無恩無義我今恐其不安所以資給所須然彼四大初無愧感何以知之至如悲風霜殞嚴冬雪零便須綿纊衣裘臥褥溫室若季夏鬱蒸歊赫炎烈復須輕絺廣室風扇牙簟春秋改節氣候清爽復須輕軟服御乃至食則甘肥珍肴充滿飲則瓜果溫漿冷水隨時資給安苦求樂此皆四大所須而我供贍未曾拒逆而此四大求索無慚不知有無有則充給不厭無則恐迫令得如飢須食不可暫闕脫致乖違內愁外戰增發火大不知我艱辛不恕我空乏惟欲貪求無有休息是名無慚云何無恥汝之所須無窮我隨給汝不少雅然當受初無愧容我既役智盡謀以相資贍而汝初無矜念於我於少日中不須衣食云何無恩今既得我如此供給未嘗為我造作善事獲我衣食飽暖怡懌反更思念作一切惡少時禪誦禮拜即生懈怠云何無義此四大身不可期懷不可委信我今為汝種種供須反復橫起種種愛著驅逼於我行殺盜淫我既愚癡不能制革還相隨順生諸疾病或遭王法牢獄鞭杖為汝所招我既嬰苦汝亦無利猶復不知更求更索從今日去不復隨汝流轉老病生死大海汝當隨我行道作諸善業方可給汝隨分衣食趣得支身以除飢渴汝當善自驅策令我早得五分法身常化遊行自在無礙呵詰四大門頌迅矣百齡綿茲六入出沒昏疑興居愛習矻矻豫求營營爾給匪德日歸惟殃斯集貪人敗類無厭自及昭回不希玄墟何泣出家順善門第九上已檢校所行知乖道實遠剋責自咎則進趣有途前雖道俗總論混知其過然在家罪重出家罪輕但出家之人行業階差生熟難辨然阡陌而觀亦粗見其迹今出家者未登聖境而期望之人恆引聖責凡良由大教勝遠尊之者責重法律精微信之者望深何以知然今欲見雅形妙相之體當覩儀容端麗之人欲觀仁義盛德之風當尋有禮有義之行何常見衆多之口競譏棄諸外道正以不足及言所以息譏在於衆僧動為論端實由我法清勝嫉之者多我法高遠毀之者衆書云城高則衝生道尊則魔盛今乍聞詰誚之言乃足驚怪就理而尋非無義而發試為檢其所修比其所習福之深淺罪之厚薄可加意察之夫父母是孝戀難遣而能辭親妻子是恩染難奪而能割愛勢位物情所競而能棄榮飢苦是人所難忍而能節食滋味是人所貪嗜而甘蔬澀翹勤是人所厭怠而能精苦七珍是人所吝惜而能捨離錢帛是人所蓄聚而能棄散奴僮是人所資待而自給不使五色是人所欣覩而棄之不顧八音是人所競聞而絶之不聽飾玩細滑人所保著而能精麁無礙安身養體人所共同而能忘形捨命眠臥是人所不免而晝夜不寢為業恣口朋遊人所恆習而處靜自檢白衣飲饌不知紀極而進食如毒白衣日夜無所不甘而己限以晷刻虛腹白衣則華屋偶而己冢間離著又行住坐臥如是法禮拜圍繞如是法讀誦講說如是法食飲便利如是法受供行施如是法修道習行如是法略說如上無非有法數則三千威儀廣則說不可盡餘如出家功德經說出家生善門頌澡身浴德晦迹埋名將安寶地誰留化城道場曠謐禪徑間清風瓢弗響震轍徒驚嘯傲焉慮脫落何營長捐有結永置無生在家從惡門第十俗士每言談之次或問白衣歸向何法無不答云釋氏純信縱復實心錯背亦羞言其乖咎所以爾者實由大法精勝不欲與善相違故也既言其信當事與言同若言事相反者便是矯僞諛諂側佞邪媚天下所驚嗟四海所駭歎若欲真實期於三世者見沙門之過當知凡劣形服雖異喜怒何殊便思其理可崇本不在人何得以鄙吝之行用廢大道乎且其積習勝業已積熙連沙喻可不深思今諸士女試自檢察實自多過加以憍慢放逸貢高懟恨諍訟邪命詐現異相以利求利惡求多求無有恭敬不隨教誨身見有見及以無見未嘗省退以禮自制一何苦哉惟恐我不勝人人莫及我經說起慢此業熾盛燒滅宿世所種善根又云為惡雖少後苦無邊如毒在身終為重患諸俗人等惟欲營生不知顧死然生不可保死必奄至尋此危命非朝則夕俄傾之間凶變無常如佛為愚癡富老公說偈汲汲憂子財非我何所有愚人多預慮莫知當來變廣文如彼何得不思貪求積聚終必散失身死名滅惟業相隨又觀女人所起患毒倍於男子經云郁伽長者經云在家修道當觀女人生厭離想非常久想不淨潔想臭穢惡想羅剎惡鬼恆噉人想貪色難飽無止足想惡知識妨淨行想三惡道增憂苦不斷目面脣口惑人之具人為所惑破家滅國殺親害子衆禍之本皆由女色在家男女惡門頌在磨則磷玉生雖堅維居必徙豈曰能賢氷開春日蘭敗秋年教隨類反習乃情遷命符三漏生偕十纏茲焉遂往憂畏方延沈冥地獄門第十一萬法雖差功用不一至於明昧相形惟善惡二途而已語善則人天勝果差別於目驗述惡則三途劇苦皎然而非虛而愚惑之夫好起疑異多言人天是妄造地獄非實說以不覩故便不知推因以測果由不了故復不知驗果以尋因既因果未分空扇是非疑途亂起明在何日無論未來其事難了但以即今善惡是驗冥漠非妄夫有形則影現有聲則響應未見形存而影滅聲續而響乖故知善惡相資亦復如是幸各明信無厝疑心何謂地獄經中廣說此洲地下八大地獄最下阿鼻四萬由旬鐵城四周表裏火徹銅狗黑蛇哮吼嚼咋甚可怖畏諸小獄者散在鐵圍山間海渚空野衆處備受寒熱難可具說獄各有主牛頭阿傍其性殘虐無一慈忍見受苦者惟憂不苦惟憂不毒或問獄卒衆生受苦甚可憐愍而汝無慈常懷毒害獄卒答曰諸受苦者由是不孝父母謗佛法僧罵辱親疏毀陷一切破壞和合瞋恚殺害貪淫欺詐邪命邪求及以邪見憍慢懈怠放逸怨恨迷沒聲色耽著酒食犯所受戒不知慚愧具足惡業來此受苦受苦既畢恆加諫喻此是惡處今已得脫勿復重來然此衆生初無改悔今日得出俄頃復來勞我形力加毒於彼今觀此輩既不修善往趣泥洹則是無知不識避苦所以倍痛害之何由得出慈忍又經云有十惡業殺生偷盜能令衆生墮於地獄畜生餓鬼無量劫數乃得為人還受短命貧窮等報又感外報棘刺沙礫水旱少味不如意等且身口意此三發業之始自作教人見作隨喜此三成業之由現報生報後報此三感業之所故論云三三合九種從三煩惱生然前九位業通善惡受三塗報惟在三毒是故行人先須觀破於此人身可有出理地獄門頌冥津殊復曉高聽亦能卑陰牆雖兩密幽夜有四知炎山翻烈火氷㵎匝寒澌羅城振雲幕鋒樹鬱霜枝茹荼非云苦集木豈稱危求仁曾已得長歎欲何為出家懷道門第十二自大聖已還性體未圓三相所遷四山作固所以如來智周域外尚假苦切之言令諸有生得入律行今居在凡愚善惡雜糅何能免點纍之愆愛染之失若聞所說當深歎悼何時免離若斯之過不得內懷驚疑增其忿憾也然則起忿之來誠由著我如經所說執我見者生死大患第一破戒且舉一我無人不患自非正聚誰不弊之出家本意為滅此惑故諸行者常須遮制積功不已漸得出有迷此不修還同無始徒在僧倫更招苦業今聞出家之美不得便言無惡又聞俗人之惡不可便言無善故通述之宜各警策夫出家者猶信故入道也當去愛著順佛語則出世之行成也若於行有虧則非謂之信也內既無信則剪落納衣瓶鉢等於身無用略引數條不得自怠如此所以勸獎誡厲修學故經云蓋聞沙門之為道也捨家妻子捐棄愛欲斷絶六情守戒無為其清淨一心者則萬邪滅矣一心之道者聲色不能污榮位不能動免離憂苦存亡自在塊然獨立捨五𡠩除兩穢二堅縛二障法二種垢二雨雹二癰瘡二燒法二種病四破戒者一謂三業不淨二謂聞空怖畏三謂不為泥洹四謂貪著我見又如經說菩薩修行先除四失謂捨欺誑重報恩決嫌疑滅諂心如是備行諸度妙行清淨廣大安住寂靜出家懷惡門頌韞石諒非真飾瓶信為假竊服臯門上濫吹緇軒下鳳祀徒驚心騶文終好野實相豈或照浮榮未能捨迹殊冠冕客事襲驅馳者已矣歇鄭聲無然亂周雅在家懷善門第十三前已聞其惡深自鄙悼今顯其善悅以進道何以知之自非貪欲情厚染愛性深富貴意重勢利心濃者則不容安處纍縛黑暗所纏故知在家者衆患之本矣故使室家妻子宗親眷屬周旋來往朋友遊處奉上接下皆須將意意不獨往其應筐篚筐篚之用非求不至既馳求事廣財念無窮惟念多蓄不顧無常擁積腐壞靡知分散是為欲不慳貪便不能得既眷屬纏繞百心不同不加鞭罰則為惡者衆雖曰止惡要由瞋起是為欲不瞋恚亦不能得為此資生校計馳求萬方以利縈心不知患害水火盜賊艱苦備經或夭身命殘殺無辜宴集歡樂非此不濟起貪癡心謂我加爾飲噉之後暢快莫思是為欲不起癡而不能得當知白衣與善相違故曰所作之事與地獄對門又云居處如牢獄妻子如枷鎖財物如重擔親戚如怨家而今在窮苦之地繫縛憂厄艱辛纏纍備諸苦惱不親三寶不近正法窮迷暗障劇苦之內而能一日一夜守持清禁六時行道兼修六齊年三長齊或持一戒二戒三戒乃至五戒八戒十戒菜蔬節味檢身口意又率妻子內外眷屬回向崇善建菩提因或撤父母之供妻子之分財貨衣服甘珍肴果窮其所有敬供精潔合室營奉晨昏翹注或為疾患危急縣官牢獄或親親崩亡祈福魂路或生善滅罪始發信心崇仰沙門在聖無別由其隨順佛正教故所以順佛語故出離生死若違佛語必墮惡道是故常應堅發正願願受化生自在飛行一切佛剎隨所感見應接群生學佛威儀入如來室著如來衣坐如來座巧便大慧開悟解脫於諸法中究竟無障盡虛空際大誓莊嚴在家勸善門頌處塵貴不染被褐重懷珠美玉耀幽石曾蘭挺叢芻四氏不為侶三界豈能渝諒茲親愛染寧以財利拘煩流捨智寶榛路坦夷途萬物竟何匹烈火樹紅芙三界內苦門第十四夫三界牢獄四圍輪轉在家出家未斷我倒無得免者既為生死所纏身心勞纍遷變無窮無非是苦故經云三界皆苦何可樂者而衆生常惑謂言世間是常是樂出世樂因無常是苦何其沈迷頓此顛倒才驗刺身即覺苦受何得云樂略引數條證知惟苦若謂飲食為樂者則應多所餐進身和心悅何意小乖分度便成疹患若謂衣服為樂者則應春夏一服愛心無厭何意寒暑異服明不甘樂所以苦本若謂室宇為樂者何意不常一處既致馳動明知避苦若謂妻子眷屬為樂者則應長相歌笑何意俄爾無常悲號哽噎當知眷屬實是苦本若謂妙色以為樂者則應長悅心目永慰形骸何意須臾顏貌變改髮白面黑傷痛少年華美之艷故知此色本自是苦不是外來若謂好聲以為樂者則應絲竹繁會觀聽無厭何意小時便致昏倦耳不樂聞當知是苦若謂酣酒以為樂者則應適意遣憂長無惱患何故神昏心悶骨節慘痛或因此事鞭杖鎖繫喪身夭命破家亡國受苦無量若謂朋遊為樂者則應終日遊散不知厭極何意每一登臨少時便倦後更相携無復行意若謂淫妷為樂者則應血氣剛強眼明神爽少而不老壯而不變何意恣情逞欲輒有疲困抽腦撤髓頭眩眼亂心驚氣迫筋骨緩縱口燥脣焦四支振掉抽拔五藏由此夭命當知淫妷實是苦本若謂榮位為樂者則應始終不變無恥無辱何意黜陟之間歡悴立至以上諸條大舉而言然此六塵五情遊心之處無非是苦所以大聖覺察三界牢獄知苦不迷解脫生死三界內苦門頌心怨動紛紜情怡輒遷互歡愛一離遠傷憂坐衰暮連幌結清陰高臺起風露腐毒緣芳旨夭伐實修𭒢欲網必虧生繁罝或全兔眇眇夜何期悠悠終肯悟出三界外樂門第十五佛世尊說三界世間總是苦聚非惟一苦而已又是無常無我不淨終歸於空出世之外則有常樂我淨具八自在而衆生長迷妄謂為樂一何可悲且說一苦隨相有八何謂八苦所謂生苦老苦病苦死苦愛別離苦冤憎會苦求不得苦五盛陰苦於一苦中更有諸苦故諸行人策厲行道節身口意翹勤匪懈群小無知謂之為苦大聖圓照三達洞了知此小苦大樂正因雖有勞頓所期者大非謂為苦故引諸行相用簡有心若捨身命憐愍衆生得佛金色身光明洞徹行住坐臥震動大千相若禮拜父母師長賢聖得佛頂相高明若不誑衆生讚揚其德得佛眉間毫相若行慈愛仁救衆生得佛紺青螺髮相若以光燈供養施人得佛頂出日光相若以慈意視衆生者得佛淨目上下眴相若絶滋味十善化人得佛四十齒齊密相若說慈善志意堅強得佛四牙白淨相若絶口四過得佛方頰車廣長舌相若行施平等得佛果時七處合滿相若忍苦行決定無亂得佛師子臆相若行正淨醫藥救人得佛身方正相若行慈仁不杖衆生得佛修臂指長相若視地行不踐蟲命得佛行不蹈地相若手扶接有苦衆生得佛手內外握相若行四攝攝取衆生得佛手足網相若以淨心供養善人得佛手足輪千輻理相若施衣服隱過蔽惡得佛馬陰藏相若說除患死法得佛鹿腨腸相若善莊嚴不解衆生支節得佛鉤鎖骨相若柔和順塔右繞從人得佛右旋毛相若平治道去棘刺得佛一孔一毛相若不服華綺沐浴於人得佛皮膚細軟相若掃塔除穢得佛身不受塵相若修萬行常願具足得佛胸萬字相若捨國城妻子得佛淨土眷屬賢聖相若自節食上味施人得佛上味相若常讀誦不惡口加人得佛總持口香氣相若說法引接衆生得佛面無飢渴滿口光辨才相若持戒無缺得佛法身圓滿相若在山間頭陀苦行得佛塵纍都盡相若捨華堂幽林禪思衆生謂苦不能行之菩薩志意堅強所期者大不以為苦故得自然宮殿七寶房舍早得成佛衆生猶自流轉生死海中豈非為顛倒惑纏之所致也故當勤加精進修行此行便出三界三界外樂門頌端襟測煩海矯步寫埃氛三受猶絶雨八苦若浮雲輸心仰圓極罄質委方墳朝遊淨國侶暮集靈山群燈祇開遠照香宇薦嘉薰俯首睇人俗信矣靜為君斷絶疑惑門第十六夫因果感應影響相生必然之道理無差舛而衆生業行不純善惡迭用以不純故報有精麁或貴或賤或美或惡其事迹匪一不了本行故致疑惑何者如精進奉戒應得長生子孫熾盛親族榮顯而見身命夭促門族衰殄屠害之人應嬰促壽眷屬殘滅而反延年壽考宗強援廣清廉之行應招富足而見貧苦貪盜之人應見困窘而覩豐饒此乃緣其福故現世輕受如金剛般若云由持經故為人輕賤是人先世罪業應墮惡道以今輕賤故先世罪滅所以致有此疑者由其無明惑故妄起顛倒不能解了三世業相今略出數條世人惑事用以懲誡庶有識者識以除疑智人以生為苦所以不忍愚夫貪生以生為樂是一惑也智人以不生則不死故云涅槃寂滅之樂而愚夫惡死不知遠死之方是二惑也智人以居家為苦譬之牢獄書云割情在於驕奢而愚夫染著以為榮樂是三惑也智人知妻子之纍故比之枷鎖書云割情在於所愛而愚夫以恩愛為歡欣是四惑也智人以眷屬是繫縛之本放之如讐而愚夫繼戀以為勝適是五惑也智人榮利是自滅之詮書云割情在於速達而愚夫不計讒害取貴是六惑也智人以色聲香味為苦本書云割情在於嗜欲而愚夫為之沈溺迷醉且列如前不容致惑是以智人當勤自勉生老病死不離其身勿生疑惑一生空過今更出之以顯疑相見布施者疾患早亡便起疑心慳吝見持戒人過中不食致患懷疑自養見忍辱人檢心攝形致患懷惱勸令開意見誦經人旦夕緣理致患勸息見菜𮒄人致患瘦弱勸噉肥美見坐禪者致患勸臥聞語引進便稱本情懈怠自恣隨順流俗曾不思量朝聞夕死如救頭然何有情懶更習常俗以死自誓方曰有志斷疑惑門頌生塗非一理識緒固饒津徒駭東陵富空嗟北郭貧國生曾已戾顏氏信為仁逢尤昭往業習善會茲身勤憂永夷泰晏安終苦辛令名且云重豈若樹良因十種慚愧門第十七既已同知在家男女之惡又見出家僧尼瑕纍又聞疑惑顛倒之門退自思省實可慚愧經云慚愧得具足能滅暗障故又云獸如鐵鉤能制人非法若無慚愧與諸禽獸無相異也涅槃云有二白法能救衆生一慚二愧慚者自不作惡愧者不教他作慚者內自羞恥愧者發露向人有慚愧故則能恭敬父母師長懷慚愧故罪則除滅顯相如此各須慚愧順清白法事乃無量略舉十條以為綱要第一慚愧諸佛如來往昔欲令我等離苦獲安所以發心行菩提道忍苦受辱今成法身常以正法為我解說而我不能如說修行第二慚愧父母哀哀父母生我劬勞長養教詔常懷憂惕既為人子不順誨約反學凶強凌蔑貴賤既乖諍子上失令名深為可愧第三慚愧諸子然彼實能晨昏定省色養無虧而終貧煎無物賑給故使諸子無由得立又闕教導使子愚昏實為可愧第四慚愧師僧然我父母生育訓誨不能使我出生死海今此師僧教我出家受增上戒懷羅漢胎得羅漢果而我違犯深為可愧第五慚愧弟子既能晨夕依教策修而反固遮有違聖說致使道業寸尺無功一生空過無法制奉顧斯負纍亦可深愧第六慚愧帝王恆以十善化導天下故國安寧五穀豐熟所以百姓安家復業出家之人泰然安樂任其禪誦而今懈惰深是可恥第七慚愧檀越出家所懷解脫為本形骸資待衣食為先所以諸俗為道興福供給資緣故隆正業而或不全失於敬重亦可深愧第八慚愧良友知識化導見佛因緣令具梵行大經昌示而我聞諫反以為讐背逆三歸禮向神俗迷著善導故違正誨深可為愧第九慚愧所化諸人由我無德久不種緣致使開悟莫能津濟故令聽者徒枉功夫縱聞雜善不獲純淨內心自疚深可慚愧第十慚愧天龍神鬼護法冥祇我本發心誓度一切故諸天龍擁護無惱而我𮘧缺情志不恆惟知負恩但增慚愧慚愧門頌神膏施惟重玄酒恩未隆明璣隋水上潤玉藍田中稟天性所極資敬道攸崇羽毛共以勢輪軌相為通報德愴前雅酬言愛餘風遵途每多舛顧省能無忡極大慚愧門第十八慚愧之義以不及為本若於正行悉能遵奉則無假慚愧書云內省不疚何憂何懼又曰心苟無瑕何恤無家今既理妙難精觸向乖背一念之間造過無量過無量故慚愧亦應無量前已略舉大致其中支派不可縷悉更立此門使尋文求旨知理無不攝也夫衆生以我見故不能推美於物引惡在己而於萬善不能修習見人勝行意欲凌之無慚之甚何得不見今列位顯之庶可斂迹若見直心行慚愧人我不能行願彼不作見行布施持戒人開解脫門願其早止見行忍辱精進人自不能行願早退沒見多聞修定者自不能行不欲使作見行慈悲喜捨者不能贊勉欲其不行見菜蔬一食者自不行故勸令退敗見行伏心人應慚愧法乃勸不行乖八正道見學問誦經人自無此行不使彼作見圍繞禮拜者自懶惰故嫉令不行見有唱導梵音者自不及彼願不為之見經行頭陀者既不能行反謗毀滅今據叔世說法開化以此為高義當生信滅罪祈福弘道而今登無畏座開廣笑謔之端飾詞自麗之美高言興色誹誚往還儀容傲佷初無謙遜永不退省我解未深惟詰咨者尋經有謬故經云若為利養名譽我心愛黨而說法者是名非法說若利於彼增信心故滅煩惱故起淨業故知慚知愧開八正路是名善說如過去世有苦岸比丘說有衆生我人壽命違於佛語命終入阿鼻地獄仰臥伏臥左右脅臥各九百萬億歲爾後更歷諸餘地獄自外徒黨受苦難言故知不依佛教毀謗正法其罪實重當知法師實亦為難其善則致福無量其惡則獲罪亦重是故法師應須極大慚愧然居在世間養生之急在於衣食由此衣食勞亂極深所須繒纊皮革無不損生殘命著他皮肉還養肉身乃至食噉一粒之食非用功夫無由入口推度前功商量我腹上入下出常流不止而於其中選擇精肥進納軟滑貪嗜美味無羞無恥須臾變改臭不可近將行將坐如廁不殊何有智者於食生貪若生貪者大須慚愧與彼畜獸復何取別極大慚愧門頌冬狐理豐毳春蠶緒輕絲形骸翻為阻心識還自欺手容羈草日平生少年時驅車追俠客酌酒弄妖姬但念目前好安知身後悲惕然一以愧永與情愛辭善友勸獎門第十九夫能了除疑惑內發慚愧勸獎之功善知識也今欲修習萬行非善知識無由進道經云如栴檀葉在伊羅林其葉則臭伊羅臭葉在栴檀林其葉則香書云與善人居如入蘭芷之室久而偕芳與惡人居如在鮑魚之肆與之俱臭又云近墨必緇近朱必赤故知善友能作佛事是大因緣是全梵行善知識者今能將我得升淨土惡知識者今能陷我墜於地獄當知善恩不可酬報夫善惡之理皎然明白但以任情適道則進趣之理遲善友勸獎便勇猛之心疾經有獎課之文書有勸學之說當知要行實由勸成故經云菩薩自身布施亦勸他人令行布施自行持戒忍辱精進一心智慧亦勸他人令行此事然則勝美之事欣樂羡仰物之恆情今若徒有願樂之心不行願樂之事未見其果猶若絶糧思味其於飢渴終無濟益故略引數條盛行要事以相警誡今有財富室溫家給人足不勞營覓自然而至復有貧苦飢弊形骸勞悴終日願於富饒而富饒未嘗暫有以此苦故勸其布施力厲修福若有衣裘服玩鮮華充備又有尺布不全垢膩臭雜是以勸獎令施衣服及以室宇若見甘味珍羞連几重案又有藜藿不充困於水菜所以勸獎令施飲食若見榮位通顯乘肥衣輕適意自在復有卑陋猥賤人不齒録塗炭溝渠坐臥糞穢此苦可厭勸令修福除滅憍慢奉行謙敬豈可他人常貴我常在賤若見形貌端正吐言廣利又有面狀矬陋所言險暴此苦可捨勸令忍辱若見意力強幹少病登勞行道無礙有人多患不安所行莫濟見有此苦勸施醫藥令其進趣故法句經云四時行道得度衆苦一者少年有力勢時二者有財物時三者遇三寶福田時四者當計萬物必離散時常行此四必得道跡應自督課不待他勸善友勸獎門頌蘭室改蓬心栴崖變伊草丹青有必渝絲礫豈常皓曲轅且繩直詭木遂雕藻一簣或成山百里倦中道隆漢乃王臣大楚信無保勉矣德不孤至言匪虛造戒法攝生門第二十前已勸獎於他我今自加課勵凡論課勵要必託境行因若心志浮蕩則進趣無寄然託境行因戒為其始可謂入聖之初門出俗之正路如乖此訓永處三塗人天長絶是以經云譬如大地長生萬物戒亦如是能生衆生人天華果故經云若無此戒諸善功德皆不得生良以三塗苦報罪障所纏人天勝果堪為道器欲感勝果非戒不生是以聖人先明此教然三歸五品戒法兩科七衆小學要以三歸為宗一乘大教必崇三聚為本並如經律具顯規猷卓爾憲章行業明逾鑒鏡今粗舉其大致用光恆俗所以發戒之原須依三寶者蓋由佛法僧寶天人所尊歸依生信必能出有若歸邪神反增苦趣故經說云歸佛清信士不歸諸天神故須先定邪正方識逆順經云信為道元功德之母智是解脫出有之因誠至言也若無此信心志浮虛歸戒不得是以發足立信為先何謂三歸謂佛法僧此三可重故名為寶何謂為佛自覺覺彼無師大智五分法身也何謂為法能軌能正滅諦涅槃清淨無相也何謂為僧能和和衆無學功德自他滅處也何謂為歸可憑可向也何謂為寶能招利樂正心依仗近獲人天遠登無學此則三寶區別之門若論極教理惟一統照無不周照周等覺謂之佛寶體無非法謂之法寶至德常和謂之僧寶此乃體一義三同性三寶衆生解悟信知佛性離此生死招興利樂是故一切無不歸憑第一翻邪三歸第二五戒三歸第三八戒三歸第四十戒第五具戒第六十善戒第七大菩薩戒此之七戒所防過境近約大千世界之內一切六根六大並是戒境廣如常說戒門頌金山嚴寶仞瓊畹烈瑤荑牆狐議不窟簷燕豈能栖淨花莊思序慧沼盥身倪六群儻未一七衆固恆齊端儀有直影正道無傾蹊維宮超以悟襄野竟何迷自慶畢故止新門第二十一從前發心以來知至德可歸檢校剋責滅諸惡門疑惑既遣慚愧續修勸獎兼行戒德又顯得捨如是之罪障餐聽若斯之勝法豈得不踊躍歡喜嗟抃自慶者乎經云八難難度一地獄難二餓鬼難三畜生難四邊地難五長壽天難六雖得人身盲聾喑啞不能聽受難七雖得人身六情完具而世智辨聰信邪倒見不信三寶肆意輕侮此身死已便在三途隨業沈沒久乃得出時在人道還不正信家生第八前後佛間不覩正法徒生一世增長邪見具造衆罪尋爾徒死是故經云徒生徒死甚可憐愍奉法行人先崇此意生死大事不可自寬今略出自慶數條繫在心首佛言地獄難免而今同得免離此苦一自慶也佛言餓鬼難脫而今同得遠於此苦二自慶也佛言畜生難捨而今同得不樹此因三自慶也佛言生在邊地不知仁義今在中國修習禮智四自慶也佛言生長壽天不知植福福盡命終還墮惡道而今不以世樂自娛回以供養五自慶也佛言人身難得一失不返有過盲龜浮木之譬今得人身六自慶也佛言六根難具今無缺損七自慶也佛言丈夫男身難得我已得也佛言女人身者須知佛性則是丈夫我已知也佛言邪辨難捨我今歸正法也佛言佛前佛後是為大難我今相與慷慨立志既見色像又聞正法則同鹿野滅惑不殊也佛言見佛為難我今頂禮佛所說像功用等倫也佛言聞法為難我今備得聞也佛言出家為難我今且隨衆也佛言出家專信倍復為難我今一心無敢二見敬法愛法以法為師經中偈言惟念過去世供養為輕微蒙報歷遐劫餘福值天師淨慧斷生死癡愛銷無遺佛恩流無窮是故重自歸自慶畢故不造新頌春非我春秋非秋一經長夜每悠悠陶形練氣任元造啓蒙夷阻出重幽榮公三樂非為曠箕生五福豈能求靈姿妙境往難集微言至道此云修年逢生幸曾以慶盈愆二過儻知憂畢故斷新別苦海希賢庶善憑智流大忍惡對門第二十二夫道從苦生不由樂果德憑功建非情所集故經云忍辱第一道於諸衆生心無礙故以其在苦則多礙多惱起不善業今所以得無礙者良由在礙而修無礙故礙而不為礙既於礙而無所礙豈非忍力之所致乎經云娑婆世界五濁之剎五痛五燒具諸惡報是故發大乘者多來此土以救苦為資糧以拔惱為要行此土一日修善勝於他方淨國百千萬劫所以爾者良由極苦之地心不及善而能於劇苦之中卓然發意忍苦受辱豈不奇哉所謂火中生蓮華此實為希有他方淨土無修福地所以不及此土何者淨國七財豐溢不假布施攝貧窮也淨國律儀圓淨不假持戒攝毀禁也淨國則無辱無忍穢土無事非辱在辱能忍勝他方也淨國精進如救頭然不假翹勤攝懈怠也淨國之人入法流水念念修順無出入觀不假寂定攝亂意也淨國智慧明滿不假辨才巧說攝愚癡也又淨國之人非無弘誓但弘誓之功不及穢土四攝四等例同無用淨國樂故則救苦之心薄惡土苦故則進善之心猛故經云行於非道通達佛道也夫欲發廣大心行菩薩行自非履危涉險備受艱難蹈熾火歷氷霜嬰苦切甘楚毒於萬苦中而能忍受者則道場可踐若無此惱忍何從生藉此煩惱起我諸善所謂塵勞之儔為如來種當知忍者有力大人功德之本所謂忍痛癢忍思想忍疾病忍飢苦忍疲勞忍寒暑忍憂悲忍熱惱忍惡罵無恥辱忍撾打無恚礙忍貪欲無愛著忍憍慢無背道忍所難忍忍所難行忍所難作忍所難辦能行此者真可謂大忍辱矣大忍門頌崑山之下玉抵禽漢水之陽璧千金清業神居德非重潔己愚俗道已深愛憎喜怒生而習容華芳旨世所欽鴻才巨力萬夫敵誰肯制此方寸心逸驥狂兕曠不御繁羈密匣儻能禁遣情遺事復何想寂然無待恣幽尋緣境無礙門第二十三經云在俗則謂之為縛在道則謂之為解解即無礙所致縛即資待所招今若欲有待於無待則有待更煩無待於無待則有待自遣有待既遣則無礙之門可入若志在於資養便覩縛纏更重但衆生凡類觸向多阻不資於物則自濟無方資於物者纍之重也生纍纏繞解脫何由今既深知其纍纍實為苦何以知之今欲陸行非車輿人馬不動一纍礙也今欲水遊非舟航不移二纍礙也今欲養身非衣裘屋宅則無所憑託三纍礙也今欲養命非粳糧黍粟五味柔軟則無所資待四纍礙也今欲修集一慧髣像無向五纍礙也今欲求見一佛及一淨土發奇特心冥漠不見六纍礙也今欲徹視十方障礙滿目七纍礙也今欲求佛聖智以除障惑近是衆生心行而我不覩八纍礙也今欲披文尋義雖課心力近在淺言不達意旨九纍礙也今欲誦習經典受已忘漏十纍礙也凡此纍礙其事無量聖人所以無礙自在者由何而致實由遠諸塵勞自策為本是所資待莫不勤役自辦不假於他而他為我用所謂讓而得者則其理通求而獲者則其理滯菩薩不求自利但欲利益衆生是以其利在己而得無礙衆生常利我忘彼所以恆縛而無解聖是可求而得非是永隔無津今若欲學聖捨凡者當遵聖人所習雖其途無量然津濟要趣惟一解脫耳故經云若自無縛欲解彼縛斯有是處今欲學菩薩道必須棄凡夫縛凡夫縛者惟願得五欲縱意自在實大縛也菩薩行人棄之不顧經云不得畜養奴婢畜生當自翹勤出離生死若假於他他還縛我無解脫期今云無奴不立無婢不辦此乃氣力強梁之時一旦臥床百事同棄自救不暇何憂及人宜自勉勵則解脫之門易可登耳無礙門頌恍象忽物終不名龍舉鸞集竟誰辨絶智亡身孰為礙韜名戢曜故能顯匪日匪月灼以懸安飛安翔虛而踐壁石無間恣出沒水火有性任舒卷敷教應俗騖泉流現迹依方迅風轉大哉超世莫與群希轅慕舜宜自勉一志努力門第二十四從初辨德極於無礙善惡二途凡聖苦樂明了審諦斯言備矣惟應努力勤而行之經云感傷世間貪意長流沒於愛欲之海吾獨欲反其源故自勉而特出是以世世勤苦不以為勞經云我與阿難空王佛所共發菩提心我常勤精進所以速成正覺又云得正法智已以無疲厭心為衆生說斯可謂努力矣夫衆生流轉三有觸苦相纏所以情識暗弱慮淺多迷每一修善怯退皇擾念念之間百變乖舛自非勸之以努力獎之以剛幹則勇鋭驍果之心不發經云衆生與無明怨賊鬪戰亦不異世間勍敵相御世間則須金鉦壯其氣鼓鍾擊其忿鬱怫增其怒決烈成其力不資此發勇不假此振威何能摧鳴條之戰拉牧野之師乎今與煩惱共戰當集無漏之智命無畏之師控道品之衆禦六度之侶建道場之幡擊甘露之鼓著弘誓鎧胄被忍辱袍甲握智慧弓刀執堅固箭楯精進督怠惰翹勤課不及發行登歡喜稅駕頓法雲種智斷其勇方便運其略於是無明老死之賊協附四魔之軍影響波旬困倚天女憑帶鬼神億千萬衆擔山吐火雷電四繞欲以暗惑之旅退金剛之師由乎菩薩忍調無想積德久善魔怨稽伏一念努力豁然大明非法王壞正法王勝此並經中之盛事若不努力何由辨也如人營家晨起夜寐劬勞督課便自室內盈實飢寒不切但能努力無所不濟出世妙行事不殊俗若小努力微復加意三明六通不足為難更運方便重課心形信順之忍漸染自至豈得空捨一生虛過三塗切己力無所施方復生悔何嗟及矣所以努力一門貫通後者位心極行惟此而已願幽明聖鑒照覽窮途故敢發言託文現意努力門頌豫北二山尚有移河中一州亦可為精誠必至霜塵下意氣所感金石離有子刺掌修名立王生擢髮美譽垂自來勤心少騫墜何不努力出憂危勝幡法鼓縈且擊智師道衆紛以馳有常無我儼既列無明有縛孰能窺禮舍利寶塔門第二十五大聖詮化隨機感益譬若一音說法各得其解是故應以現生蒙利者所以降神母胎誕聖王宮應以出家蒙利者所以捨金輪位剃除鬚髮應以相好蒙利者所以現成正覺坐菩提樹應以實相蒙利者所以三轉法輪十二部經應以滅度蒙利者所以雙樹潛輝現於涅槃良由衆生障業煩多是故聖化隨應不一然則現於涅槃者復是增發悲戀之心以悲慕故善心濃到凡禮拜像塔皆宜感發悲心然思慕慘切其情追想正法我不餐仰泣想如來不親音旨如入祖禰之廟覩靈若在欷歔無顏如來殷勤令我等具諸苦行而我違背自墮惡道在於像末未蒙解脫以苦報故憶如來恩是以今各歸心於此像塔嗚咽涕零慚顏哽慟至心奉為至尊皇后皇太子七廟聖靈今日信施龍神八部廣及一切劇苦衆生敬禮十方三世一切諸剎土中所有如來形像靈廟敬禮釋迦如來一切現在靈骨舍利敬禮如來現在頂骨舍利敬禮如來現在髏蓋舍利敬禮如來現在眼精舍利敬禮如來現在一切紺髮紅爪舍利敬禮如來現在一切指骨舍利敬禮如來現在一切牙齒舍利敬禮如來現在衣鉢水瓶錫杖衆具敬禮過去四佛生地并行坐遺迹敬禮如來得道樹寶塔敬禮如來轉法輪處寶塔敬禮如來般涅槃處寶塔敬禮如來滅後阿育王造八萬四千塔敬禮阿育王所造無量諸佛像敬禮天上人間海中龍宮一切像塔敬禮此國諸州諸瑞聖像敬禮此國諸寺諸山無量靈像敬禮天上人間海中無量形像願一切衆生不在佛前佛後常見佛生常見佛出家常見佛得道常見佛涅槃能建立是無量像塔盡於來際佛事不絶禮舍利像塔門頌越人鑄金誠有思魏后莊木亦云悲中賢小節猶可戀去聖彌遠情彌滋祇樹蕭條多宿楚王宮寂漠斯遺基設像居室若有望開儀駐景曖如之連卿共日獨先後道悠命舛將無時傾懷結想惻以慕垂靈寫照拂塵疑敬重正法門第二十六諸法本空寂滅無說以因緣故現有文字當知文字經典本在破病滅惑為先惑既八萬四千故使教門亦有八萬四千法藏至於病銷惑遣藥亦隨亡如筏喻者可以情悉然群生沈網隨言封滯由此見故教藥常陳所以金簡盈於寶殿玉軸煥於神宮辨析空有於假實表發權智於無方故如來一代四十九年隨緣示教種種說法及於涅槃但有聲教計隨言說必致淪亡然以義理談玄正宗無昧言雖得喪全旨難乖故立法依用永刊定天魔外道莫敢侵陵自慧日已沈法雲遐布非夫簡冊無由獻功尊大迦葉法門英俊擊鍾聲告召集無學千僧一夏撰結遺言十二義求三藏文攝多羅葉典其量莫思蘊積西夏將及千載時運漸染東翻漢朝㳂彼至今年垂六百雜録正經七千餘卷詞義明敏談味無遺近則安國利人遠則超凡證聖備如卷部智者尋之至心奉為至尊皇后皇太子七廟聖靈天龍八部乃至十方一切劇苦衆生敬禮一切真如正法藏敬禮十方一切諸佛所說法藏敬禮賢劫初佛拘樓孫如來天龍宮法藏敬禮拘那含牟尼佛天龍宮中法藏敬禮迦葉佛天龍宮中一切法藏敬禮釋迦如來天龍宮一切法藏敬禮西印度黑蜂山寺一切法藏敬禮沮渠國大乘十二部法藏敬禮北印度石壁八字捨身法藏敬禮神州大國一切衆藏經典敬禮易州石經朔州恆安石窟經像敬禮一切受持三藏諸法師等敬禮一切禪師律師讀誦經典諸行人等願一切含靈入如是法門常能總持廣說教化通達無礙法門頌出不自戶將何由行不以法欲焉修之燕入楚待駿足陵河越海寄輕舟仁言為利壯已博聖道弘濟邈難求通明洞燭煥曾景深凝廣潤湛淵流翼善開賢敷教義昭蒙啓惑滌煩憂功成弗有名弗居淡然無執與化遊奉養僧田門第二十七僧稱福田群道宗尚斯何故耶良由發蒙俗之幽心啓正道之遐趣拯沈淪而將濟於三有御法綱而弘護於萬齡由是道被天下德光四俗能生善種號曰福田德響揵槌又稱應供心乖理義行越法科則顯乖剃落之容幽受空樹之報乃與施主為讐隙與骨肉為瘡疣熱血之相可尋石女之倫不遠僧護佛藏明言不迷智論大經清範攸屬固當日須三省事必九思念念策心無時寧舍方可入三乘之一位預三寶之一員盛德可觀六道歸衣而出有高行難擬七衆相從為福田豈非形寄域中情超域外者也流俗纏糾封付昏迷處處生著何能遠出是以樹立僧寶為俗良田令興福力得出生死不徒設也然佛超纍表作範區中為物受供而實不受法在除惑清淨非情供養感果自隨生業僧含凡聖形繫往因縱成無學猶嬰苦報身謝無餘方出諸有今以形纍有緣多須資待故凡施者教多在僧然供養於僧備有三寶故佛有言隨順我語供養佛也為解脫故供養法也衆僧受用供養僧也有斯理義故名衆僧良福田矣奉為至尊皇后皇太子七廟聖靈天龍八部乃至十方一切劇苦衆生敬禮十方一切僧寶敬禮當來下生佛兜率天彌勒菩薩僧敬禮遊方大士文殊師利菩薩僧敬禮救苦大士觀世音菩薩僧敬禮護法大士普賢菩薩僧敬禮滅罪大士虛空藏菩薩僧敬禮十方一切行大道心菩薩僧敬禮十方一切行緣覺心辟支佛僧敬禮十方一切行下乘者諸聲聞僧敬禮賓頭盧闍住法萬載諸聲聞僧敬禮佛子羅侯羅住法萬載諸聲聞僧敬禮剡州山海九億萬住法萬載諸聲聞僧敬禮三千界內現在一切諸凡聖僧願一切含靈常與賢聖同乘正道開智生福不墜惡趣生生遭遇為善知識伏除煩惱得出諸有僧門頌五玉已潤談而信八桂雖芳風乃操妙理至言惟聖寶不自伊人孰弘道照空觀法識遷流撫俗瞻凡厭生老絶滅情嗜斷歡怡縱落豪榮棄雕藻親愛倏忽信風煙財利悠悠若塵草測以龍雲豈曰高濯足江漢更慚皓勸請僧進門第二十八勸請者殷勤之至意也由發殷勤之意則願善之情深矣是故於一切纖微之善咸須殷勤勸請增進令生慧行不容中廢然勸請有二勸請衆生修行戒善具諸德本勸請諸佛救護衆生說法久住十方四惡趣我今悉勸請修持諸戒行獲得於人身十方一切人我今悉勸請令修十善業得生於天上十方諸天人我今悉勸請登立正定聚得離於惡道十方諸學人我今悉勸請覺察諸煩惱速證無學地十方阿羅漢我今悉勸請知非究竟位惟有一佛乘十方辟支佛我今悉勸請成就大悲智教化諸衆生人天二乘衆我今悉勸請體覺如來藏修習菩薩行一切諸菩薩我今悉勸請修行十度行速登於十地兜率天菩薩我今悉勸請常轉不退輪速下度群生菩薩智未明我今悉勸請金剛滅塵纍顯發真實相十方一切佛初成正覺者我請轉法輪安樂諸衆生十方一切佛若欲捨壽命我今歸命請願久住於世如是佛菩薩我今皆勸請發此殷勤心是故稽首禮勸請門頌俟河之清逢聖朝靈智俯接一其遙白日馳光不流照葵藿微志徒傾翹遍盈空有盡三界綿塞宇宙罄八遼德光業遂升至覺寂寞常住獨能超煎灼欲火思雲露沈汩使水望舟橋弘慈廣度昔有誓法輪道御且徐鏕隨喜萬善門第二十九衆生以愚惑故多懷嫉妬增上之心是以見人行善則興惡想摧毀破壞不令成就然彼前人未必損行而此嫉者妄增惱熱增長惑業生死不絶是以聖人調心制意行此隨喜亦復勸諸衆生如說奉行十方一切衆所有微細善仁義及禮智孝養謙恭德慈和及愛敬廉貞清潔行若有如是善我今悉隨喜離欲在家人奉修如來戒三歸五八戒十善菩薩戒清淨諸律儀離惡名聲者如是諸功德我今悉隨喜飯僧施法衣浴除煩惱垢救攝諸貧窮飢寒窮塞者疾病艱危苦施藥悲憐業如是等功德我今悉隨喜曠路作好井橋船度人物園林池花果施佛并供僧渴乏除熱惱其福實無量如是等功德我今悉隨喜造經流法教燃燈發慧明習誦及轉讀決了諸義趣若復為人說倍增歡喜心如是諸功德我今悉隨喜建立諸塔廟堂殿及寶剎彩畫及木像金銀銅石等傳寫諸相好顯示於法身如是諸功德我今悉隨喜若有造僧坊床帳及臥具令彼息心者安意於禪林出入苦空門次第寂滅觀如是諸功德我今悉隨喜如來大慈悲善說諸法門發生隨喜行今我等修學隨喜諸聲聞忍苦度生死隨喜諸菩薩不捨惡道受隨喜十方佛無畏天人尊能於三界獄引出諸衆生願令衆生類悉得於佛道是故我隨喜稽首禮諸佛隨喜門頌聞善若己燭良書見賢思齊美通誥感幽動地孝有誠殞首流腸忠為操振禮摛文弘憲則機謀飈勇靜姦暴明白入素志沖間高論窮微契神奧捐軀濟物不邀名輕財貴義豈期報百行萬善紛塗軌求誠罄想畢歡蹈回向佛道門第三十言回向者以不著為義原一切衆生備修萬行捨身命財所以不得解脫生死者皆緣耽著果報不能捨離若能不執其心修行攝度隨有微福回施群生向於佛道者則於果報不復生著便於生死蕭然解脫故經云如所說修行回向為大利是以一切所作善業皆應回向兼勸衆生不著果報何者即此身形果報之本終日養飼莊嚴雕飾要必當死徒為保著自非愚暗所以貪愛此身少有慧明何得無時不厭以是智者撫臆論心不容貪著回流生死十方諸衆生所行微善業仁孝及謙敬慈愛柔和等忠正修禮智矜逮賑孤窮如是世俗善悉回向佛道一切諸外道種種勤苦行五熱炙其身投巖赴水火反縛塗灰等無量諸邪見今皆為回向同歸正覺道一切清信士歸戒行十善乃至諸女人亦能修福德又能善說法開化衆妙福回以施群生共成無上道一切弟子衆聞聲即解悟善來成比丘乃至四道果方便及初觀苦空非常想亦回施群生共向無上道十方諸辟支自然成緣覺深悟在別世曉了因緣法隱顯化衆生獨處樂善寂如是兼一切盡回向佛道十方諸菩薩讀誦於經法入禪出禪者勸物行衆善如是等三善一切衆德本亦回施群生歸向無上道一切諸善等乃至賢聖果解空未能窮有無不雙盡悉令與一切同入真妙境若回有相心皆向解脫道如是諸菩薩我今勸回向發此無著心是故稽首禮回向門頌悠悠九土各異形擾擾四俗非一情驅車秣馬徇世業市交鬻義衒虛名三墨紛紜殊不會七儒委鬱曾未并吉凶拘忌乃數術取與離合實縱橫朝日夕月竟何取投巖赴火空捐生咄嗟失道爾回駕彼流水趣東瀛發願莊嚴門第三十一原衆惡所趣皆緣意地貪瞋癡也自害害他勿過於此故經號為根本三毒能煩能惱勞擾身心於緣起惡三三九種然此九種義通善惡三善根生名善業道三不善根生名惡業道是故行人常一其心不令動亂微塵起相見即覺察守護六根不令塵染常發弘願以自莊嚴願一切衆生皆從今日乃至菩提眼常不看貪淫邪艷惑人之色不看瞋恚醜狀屠裂愚癡暗鈍倨慢邪衆之色願見一切十方常住法身之色菩薩下生八相之色如來相好聖衆和會善集之色願一切衆生耳常不聞悲啼愁歎聲地獄苦楚聲餓鬼畜生受苦聲八苦交對聲四百四病起發聲八萬四千塵勞聲願耳常聞諸佛說法八音聲八萬四千波羅蜜聲三乘聖果十地功德如是等聲願一切衆生鼻常不聞殺生滋味飲食之氣三十六物革囊之氣發欲羅綺脂澤之氣五辛能薰九相尸氣願鼻常聞十方世界諸樹草木之香五戒八戒十善六念諸功德香學無學人十地五分十力八萬四千諸度無漏之香十方諸佛說法之香願一切衆生舌恆不嘗衆生有命身肉雜味能生煩惱滋味願舌恆嘗甘露不死之味天自然食在其舌根變成上味諸佛所食之味法喜禪悅之味解脫泥洹最上勝味願一切衆生身常不覺邪淫細滑生欲樂觸不覺鑊湯寒氷之觸餓鬼畜生諸苦惱觸四百四病寒熱風霜蚊虻蚤虱飢渴困苦等觸願身常覺清涼強健心悟安隱證道飛行八自在觸願一切衆生皆從今日乃至菩提意常覺知九十八使八萬四千塵勞之法十惡五逆九十六種邪師之法三塗可厭生死大苦願意常知一切衆生皆有佛性佛為醫王法為良藥僧為看病者為諸衆生治生死患令得解脫心常無礙空有不染發願門頌心所期兮彼之岸何事浮俗久淹逭照慧日兮駕法雲騰危城兮出塵館芳珠燁兮聞歲時寶樹颻兮警昏旦清露摶甘永以挹喜園流采常為玩無待殷鼎方丈羞安用秦箏纖指彈勤誠欵願長不渝習苦塵勞從此捍福者何耶所謂感樂受以安形取歡娛以悅性也然則法王立法周統識心三界牢獄三科檢定一罪二福三曰道也罪則三毒所結繫業屬於鬼王論其相狀後篇備列福則四弘所成我固屬於天主道則虛通無滯據行不無明昧昧則乘分小大智涉信法明則特達理性高超有空斯道昌明如別所顯今論福者悲敬為初悲則哀苦趣之艱辛思拔濟而出離敬則識佛法之難遇弘信仰而登神緣境乃涉事情據理惟心為本故虛懷不繫則其福不回於自他倒想未移則作業有乖於事用故綿古歷今相從不息王者識形有之非我興住持於塔寺餘則困於不足多行施以周給是知為有造業未曰超升多由起過重增生死故云為有造罪一向須捨為有起福雖行不著由斯意致位行兩分滯則增生捨則增道道據逆流出凡入聖福則順生興倒結業故啓福本擬歷賢明北代魏天子拓拔圭書皇帝敬問太山朗和上承妙聖靈要須經略已命元戎上人德同海嶽神算遐長冀助威謀克寧荒服今遣使者送素二十端白氈五十領銀鉢二枚到願納受晉天子司馬昌明書皇帝敬問太山朗和上承睿德光時飛聲東嶽靈海廣淹有生蒙潤大人起世善翼匡時輒申經略懸稟妙算昔劉曜創荒戎狄繼業元皇龍飛遂息江表舊京淪沒神州傾蕩蒼生荼蓼寄在左袵每一念至嗟悼朕心長驅魏趙掃平燕伐今龍旗方興剋復洢洛思與和上同養群生至人通微想明朕意今遣使者送五色珠像一驅明光錦五十匹象牙簟五領金鉢五枚到願納受僧朗頓首頓首夫至人無隱德生為聖非德非聖何敢有喻夫曰出家栖息塵表慕靜山林心悕玄寂靈迹難逮形纍而已奉被詔命慰及應否大晉重基先承孝治惠同天地覆養無邊願開大乘伸揚道味僧朗頓首頓首秦天子符堅書皇帝敬問太山朗和上大聖膺期靈權超逸蔭蓋十方化融無外若山海之養群生等天地之育萬物養存生死澄神寂妙朕以虛薄生與聖會而隔萬機不獲輦駕今遣使人安車相請庶冀靈光回蓋京邑今并送紫金數斤供鍍形像綪綾三十匹奴子三人可備灑掃至人無違幸望納受想必玄鑒見朕意焉僧朗頓首頓首如來永世道風潛淪忝在出家栖心山嶺精誠微薄未能弘匠不悟陛下遠問山川詔命殷勤實感恩旨氣力虛微未堪跋涉願廣開法輪顯保天祚僧朗頓首頓首蒙重惠賜即為施設福力之功無不蒙賴貧道才劣不勝所重燕天子慕容垂書皇帝敬問太山朗和上澄神靈緒慈蔭百國凡在含生孰不蒙潤朕承藉纂統方夏事膺昔蜀不恭魏武含慨今二賊不平朕豈獲安又元戎剋興征掃暴亂至人通靈隨權指化願兵不血刃四海混伏委心歸誠久敬何已今遣使者送官絹百匹袈裟三領綿五十斤幸為呪願僧朗頓首頓首能人御世英規遐邈光敷道化融濟四海貧道忝服道味習教山林豈惟詔旨咨及國難王者膺期統有六合大能并小自是常倫若葵藿之傾太陽飛步之宗鱗鳳皇澤載融群生繫仰陛下高明何思不服貧道窮林蒙賜過分僧朗頓首南燕天子慕容德書皇帝敬問太山朗和上遭家多難災禍屢臻昔在建熙王室西越賴武王中興神武御世大啓東夏拯拔區域遐邇蒙蘇天下幸甚天未忘災武王即晏永康之始西傾東蕩京華主上播越每思靈闕屏營飲淚朕以無德生在亂兵遺民未幾繼承天祿幸和上大恩神祇蓋護使者送絹百匹并假東齊王奉高山荏二縣封給書不盡意稱朕心焉僧朗頓首陛下龍飛統御百國天地融溢皇澤載賴善達高鑒惠濟黔首蕩平之期何憂不一陛下信向三寶思旨殊隆貧道習定味靜深山豈臨此位且領民戶興造靈剎所崇像福冥報有歸僧朗頓首頓首秦天子姚興書皇帝敬問太山朗和上勤神履道飛聲映世休問遠振常無已已朕京西夏思濟大猷今關未平事唯左右已命元戎剋寧伊洛冀因斯會東封巡省憑靈仗威須見指授今遣使者送金浮圖三級經一部寶臺一區庶望玄鑒照朕意焉與林法師書晉王洽洽稽首和南夫教之所由必暢物之所未悟物之所以通亦得之於師資雖玄宗冲緬妙旨幽深然所以會之者固亦簡而易矣是以致雖遠必假近言以明之理雖昧必借朗喻以徵之故夫始墜之旨可得之於千載將絶之趣可悟之於一朝今本無之談旨略例坦然每經明之可謂衆矣然造精之言誠難為允理詣其極通之未易豈可以通之不易因廣異同之說遂令空有之談紛然大殊後學遲疑莫知所擬今道行指歸通敘色空甚有清致然未詳經文為有明旨耶或得之於象外觸類而長之乎今衆經甚多或取譬不遠豈無一言昭然易喻古人有云聖人之言可能使人信之不可能是以徵之於文未知所釋今故咨其數事思聞嘉誨以啓其疑洽稽首和南南齊皇太子禮佛願疏沈休文維年月朔日弟子皇太子諱稽首和南十方諸佛一切賢聖夫至理可祈必憑誠於正覺極妙有感乃歸仰於真如然後取證現前獲驗茲日去歲皇帝暫虧御膳小廢乾行四海震遑百司戰竦諱歷劫多幸夙世善緣忝生王家叨守儲嗣臣子心地倍用焦迫禁門旦啓欣問竪之安寢城扉早闢訪膳夫之宰祇樹獨園伏膺下拜伽藍精舍繞足頂禮百神警衛萬福具臻曾不信宿聖躬和愈豈非三寶之私慈十號之法力既而天從心欲誠願克果今於崇正殿奉還法會千僧仍留百僧八關行道又度二士同日出家惟願藉此功德奉資皇帝陛下壽與南山共久年將北極俱長道懋農軒德高堯舜上界八萬之劫可期下方七百之祚未擬元良之位長守膝下之歡上嗣之所永保懷袖之愛以茲法田奉中宮皇后殿下福履攸善無思不屆天母之德厚載不能加任姒之盛坤儀寧足匹未及諸王妃主宮掖嬪房未來因緣過去眷屬並同茲辰預此慈善又普為積苦餓鬼受罪畜生三途八難六道十惡水陸蠢動山藪翾飛濕生化生有想無想皆藉今日慈悲咸簉浣濯人天攝受幽顯證明庶憑衆力共相津濟謹疏捨身願疏沈氏優婆塞沈君敬白十方三世諸佛本師釋迦如來安養阿彌陀世尊云云一切衆聖今日道俗諸大賢德夫形非定質衆緣所聚四微不同風大亦異析而離之本非一物燕肝楚膽未足為譬靜念求我無時可得而積此淪昏生生不已一念儻值曾未移時障習相蕩旋迷厥路橫指空呼名之為有豐己傷物日夜靡休蓄身外之財以充其欲攘非已之分用成其侈豈直溫肌歉腹若此而已哉至於積篋盈藏未嘗登體溢爼充庖既飫斯棄曾不知粟帛所從事非因己悠悠黔首同有其分離多共寡猶或未均我若有餘物何由足仁者之懷不應若此侵他之財世稱為盜盜之甚者孰過於斯幽顯推求無一或可君仰藉時來久乘休運玉粒晨炊華燭夜炳自此迄今歷年三十遂乃服冕榮國裂土承家潤盈身已慶流僕妾室非懸磬俸有兼金救寒止於重裘而笥委餘襲冬夜既蒙纍繭而櫝有嬴衾自斯已上侈長非一雖等彼豪其陋已甚方諸窶室所邁實多悟此非常事由諸佛有懷捨散宜光道場飢寒困苦為患乃切布滿州縣難悉經緣其當稱力因事一旦隨年頭目髓腦誠難輕慕虧已贍物未易頓行誓欲廣念深恩積微成著施路檀門冀或能踐以大梁天監之八年歲次玄枵日殷鳥度夾鍾紀月十八日在於新所創蔣陵皇宅請佛及僧髣佛祇樹息心上士凡一百人雖果謝菴園非香國而野粒山蔬可同屬懕兼捨身資服用百有一十七種微自捐撤以奉現前衆僧夫室家患苦刀爼非切剃除蕭散形質超然蠢彼群生咸有佛性不因剪削此路莫由緣業舛互世諦煩記變形改飾即事為難故開以八支導彼清信一日一夜同佛出家本弘外教事非僧法而世情乖舛同迷斯路招屈名僧置之虛室主人高臥取逸間堂呼為八關去之實遠雖有供施之緣而非斷漏之業約今謹自即朝至于明旦排遣俗纍一同善來分留上德勗成微志藉此輕因庶證來果功德之言非所敢及南齊南郡王捨身疏沈約弟子蕭王上白諸佛世尊道德僧衆夫色固無象觸必歸空三世若假八微終散雖復回天震地之威窮於寂滅齊冠楚組之麗靡救埃壤而嗜欲易繁每疚心術捨施難弘用迷假照弟子樹因曠劫嚮報茲生託景中璇聯華日釆玉組夙紆蕃麾早建蘭池紫燕之乘擾於外間黼帳翠帷之飾光於中寢徒以心源承滯情路未昭識謝兼忘理慚獨悟不能叶調五氣綏御六神霜暑或褰風露時舛是以敷襟上寶栖誠妙覺敬捨肌膚之外凡百一十八種當令經衛夙理府給時順萬祉雲翔百妖霧滌望北極而有恆瞻南山而同永又願宸居納祐則天均慶少陽分福儷日承休儲妃闡膺祥之符皇支廣惟祺之祚敬飾崇甍嚴置寶幄仰延息心旁旅清信勗茲弘誓證其幽疑庶可以感降禎和招對靈應玄塗匪昧要之無爽篇首標列有梁高依諸經行懺願文第六無其文於下悔罪篇中有梁陳帝依經懺願文應是千僧會願文弟子沈約上白十方諸佛十方諸大聖今日見前衆僧三界非有五陰皆無四倒十纏共相和合一切如電揮萬劫於俄頃丘井易淪終漂沈於苦岸迷塗遂遠弱喪忘歸區區七尺莫知其假耳目之外謂為空談靡依靡歸不信不受生靈一謝再得無期約所以撫心自惻臨踐非譬者也至聖凝寂無迹可尋緣應所感事惟拯物持鉢安行出彼祇樹不逾停午以福衆生芳塵餘法峨然未改約以往夏遘罹痾疾帝上哀矜深垂愍慮以月次徂暑日在丙寅仰會千僧於其私宅隆慈重施弗知所限既已奉祇洪德又思自罄家財一舉盈千力難私辦稍而後滿事或易充草堂約法師於所住山寺為營八集其一仰憑上定林寺祐法主今月二十九日第十會集百僧於所創田廬福不唐捐聞之經訓心路皎然又過於此凡有涓毫應證來業無巨無細咸歸聖主仰願十方共明此誓豈足少酬天眷蓋以微寄誠心云爾四月八日度人出家願文梁簡文弟子蕭綱以今日建齊設會功德因緣歸依十方盡虛空界一切諸佛歸依十方盡虛空界一切尊法歸依十方盡虛空界一切聖僧竊聞涅槃經言身如畫水隨畫隨合是身不淨九孔常流凡夫愚人常行味著愚癡羅剎止住其中又如瑞應經言沙門之為道也捨家妻子捐棄愛欲斷絶六情守戒無為其清淨得一心者則萬邪滅矣一心之道謂之羅漢聲色不能染榮位不能屈難動如地以免憂苦故知出恩愛獄薄俗為難善來比丘其福深重弟子以此因緣今日度人出家願一切六道四生常離愛欲永拔無明根削遣暗惑心修習波若慧足踐輕輪之光口說懸殊之辨被忍辱鎧秉智慧刀乘菩薩車坐如來座結纏披解頂相光明戒因清白後報尊重所有果業皆悉勝出受持法藏為佛真子一切道行皆悉能行一切大誓不休不息仰願十方盡虛空界一切諸佛仰願十方盡虛空界一切尊法仰願十方盡虛空界一切聖僧咸加證明又仰願十方盡虛空界一切諸天仰願十方盡虛空界一切諸仙仰願十方盡虛空界一切聰明正直守護一切善神又願今日現前幽顯大衆咸加證明今日誓願使弟子蕭綱得如所願滿菩提願一切衆生皆悉隨從得如所願願皆禮一拜八關齊制序梁簡文夫五宅易昏四流不泊業動心風情漂愛焰自非識達真空照靈珠於難曉神緣妙境蓄慈根於未化無以却此四魔登茲十善今列筵肅靖高宇間邃香吐六銖煙浮五色目睹金容耳餐玉韻無容使情緣異染形不蕭恭類倚於鴛宮同力於羊角宜制此心蛇祛斯醉象立制如左咸勉聽思謹條八關齊制如左睡眠籌至不覺罰禮二十拜擎香爐聽經三契一出不請刺罰禮十拜二出過三契經不還罰禮十拜三鄰座睡眠維那至而不語者罰禮十拜四鄰座睡眠私相容隱不語維那者罰禮十拜五維那不勤聽察有犯制者不即糾舉為衆座所發覺者維那罰禮二十拜六擎香爐聽經三契白黑維那更相糾察若有阿隱罰禮二十拜七聽經契終有不唱贊者罰禮十拜八請刺無次第罰禮十拜九請刺白黑刺有誤者罰禮十拜十為人作造寺疏梁簡文郢州某甲敬白竊以布金須達表精舍於給園影石仙人造伽藍於離越莫不事表區中心憑真外但四纏惑惱去善源而無滌五濁重繭非慧刃而安揮故以愍彼濕薪傷茲渧器今於郢州某山為十方僧建立招提寺縈負郊原面帶城雉枕倚巖吐納煙雲重門洞啓未創飛行之殿步櫩中宿猶寡密石之功嚴飾之理難階瓶鉢之資已罄道俗儻能微留善念薄獎勝緣則事等觀香義同錫乘昔人修檀捨手雨七寶前賢薄施掌檀雙金福有冥移言無多遜謹白謝敕賚納袈裟啓臣綱啓殿師吳苗奉宣敕旨垂賚鬱泥細納袈裟一緣分同妙葉界寫長塍拂石慚華裁金非重是日新染厥惟田服方使幽貞芳杜恥緝芙蓉仙客排雲羞裳飛羽穢食凡軀無明暗識明恩每重荷澤難勝不任銘戴之至謹奉啓事謝謹啓謝賚袈裟啓臣綱啓蒙賚鬱泥納袈裟一緣苟針秦縷因製緝而成文魯縞齊紈藉馨漿而受采初開篋笥更覩舍衛田疇不出戶庭坐視南山塍陌竊以三銖輕軟稱美服於淨居千金巨麗得受用於迦葉而湛恩特被萃此愚躬霜降授衣曲澤便及喜溢心崖如從空中所墜忽不自知更謂寶支所出朱四色事非離世鉤蘭兩葉殊澤實隆不任荷戴之至謹奉啓事謝聞謹啓謝敕賚袈裟啓臣綱啓宣傳左右俞景茂奉宣敕旨垂賚鬱泥直納九條袈裟一緣精同織縷巧均結毳邁彼良疇成斯妙服雖復貴比千金輕踰二兩無以匹此洪恩方斯殊賚臣臥疾纍旬未堪行踐不獲即被新染陪侍寶坊塵緣穢體愧荷相集不任慚悚之至謹啓事謝聞謹啓請為諸寺檀越疏梁簡文菩薩戒弟子蕭綱歸依十方盡虛空界一切諸佛歸依十方盡虛空界一切尊法歸依十方盡虛空界一切聖僧積習長夜輪轉覆灰沫劫易危煩流難拯不樹兩門豈修二翼常恐虛蕉染惑永結駛河愛藤懸網長垂苦岸敢承三寶覺悟之力於幽顯前發弘誓願今願為武當山太平寺并此鎮望楚白塔同安習善延明投陀上鳳林下鳳林廣嚴等寺皆盡形壽永為檀越雖七寶四事多謝往賢一念片言庶符般若方類不滅之燈終非起煙之密以此功德仰福皇帝春宮家國內外咸同此善乃至天龍八部六道四生普皆蒙福設無礙福會教梁蕭綸僚紀大士廣濟義非為己導引群生種種方便所以虛己樂靜表之內經確乎難拔著自外典又加獨往斯意足論隱不隔真乃為菩薩廬山東林寺禪房智表法師德稱僧傑實號人龍懷道守素多歷年所不為事屈不為時伸上下無常一相無相遂能捨彼耆闍來遊垢濁興言一面定交杵臼余以薄德謬臨大邦教義未聞貴賢總至昔綺季之出漢年樊許之興唐日茲乃聖主流慈天澤傍被異人間出復在此辰不勝舞蹈帝之恩普也剋今月十日於西賢寺設無礙會并致敬開士躬咨勝福下筵餐道凡厥民隸爰及庶士罔不率從咸皆請業上答乾慈永同彼岸外依事宣行答湘東王書梁簡文暮春美景風雲韶麗蘭葉堪把沂川可浴弟邵南寡訟時綴甘棠之陰冀州為政暫止褰襜之務唐景薦大言之賦安太述連環之辨盡遊玩之美致足樂耶吾春初臥疾極成委弊雖西山白鹿懼不能愈子豫赤丸尚憂未振高臥六安每思扁鵲之問靜然四屋念絶修都之香豈望文殊之來獨思吳客之辨屬以皇上慈被率土甘露聿宣鳴銀鼓於寶坊轉金輪於香地法雷驚夢慧日暉朗道俗輻湊遠邇畢集聽衆白黑日可兩三萬獨以疾障致隔聞道豈止楊濮有關外之傷周南起留滯之恨第十三日始侍法筵所以君長近還未堪執筆敬祖前邁裁欲勝衣每自念此愍然失慮江之永矣寤寐相思每得弟書輕痾遣疾尋別有信此無所伸與琰法師書梁簡文五翳消空韶光表節百華異色結綵成春道體何如恆清宜也對玩清虛既在風雲之表遊心入理差多定慧之樂弟子俗務紛糾勞倦特深眷然北嶺欽賢已積會遇之期庶必可孱有緣之儔事等飢渴佇望來儀一日三歲想思弘利益理當無爽指遣此信無述寸襟綱和南旦來雨氣殊有初寒攝衛已久轉得其力雖他方法界略息化緣祇洹之裏恆有語對眷佇之深無時不積久因倩師頻述方寸不知巧笑之僧頗為津及不耳前昨已來徵事義聚龍象畢同應供皆集慧炬開心甘露入頂聞之善謔特盡歡怡想味之懷轉復無極昔幼年經聞制旨受道日淺北面未深雖異禪那事同花水今段西下特蓄本心訪理質疑屬在明德不謂般若留難現疾未瘳問津無地歎恨何已伏承輿駕尋幸伽藍冀於此時得一覯止辨論青豆之房遣惑赤花之舍追往年之宿眷述即日之寸心此事此期必冀非爽指遣承問佇有還書綱白和南與劉智藏書梁元帝繹菩薩蕭法車置郵大士劉智藏侍者自林宗遄反玄度言歸以結元禮之心彌益真長之歎故以臨風望美對月懷賢有勞寤寐無忘興寢方今玄冥在節歲聿云遒日似青緹雲浮紅蘂清臺炭重北宮井溢想禪悅為娛稍符九次成誦之功轉探三密山間芳杜自有松竹之娛巖穴鳴琴非無薜蘿之致修德之暇差足樂也昔韓梅兩福求羊二仲鄭林騰名於憑翊周黨傳芳於大原或有百鎰可捐千金非貴松子為餐蒲根是服未有高蹈真如歸宗法海梵王四鶴集林籞而相鳴帝釋千馬經丘園而局步有一於此猶或稱奇兼而總之何其盛也故知南臨之水已類呂梁之川北眺之山彌同武安之嶺豈復還思漵浦尚想彊臺眷彼漢池載懷荒谷以此相求心可知矣僕久厭塵邦本懷人外加以服膺常住諷味了因彌用思齊每增求友常欲登却月之嶺蔭偃蓋之松挹璇玉之源解蓮華之劍藩維有限脫屣無由每坐向詡之床恆思管寧之榻夢匡山而太息想桓亭而延佇白雲間之蒼江不極未因抵掌我勞如何想無金玉數存抑亦弱水難航猶致書於青鳥派川弗遠佇芳音於赤玉鶴望還信以代萱蘇得志忘言此寧多述法車叩頭叩頭與約法師書沈約周中書風趣高奇志託夷遠真情素韻氷桂齊質自接釆同栖年逾一紀朝夕聯事靡日暫違每受沐言休逍遙寡務何嘗不北茨遊覽南居宴宿春朝聽鳥秋夜臨風匪設空言皆為實事音容滿目言笑在耳宿草既陳楸檟將合眷往懷人情不勝慟此生篤信精深甘此藿食至於歲時苞篚每見請求凡厥菜品必令以薦弟子輒靳而後與用為歡謔其事未遠其人已謝昔之諧調倏成悲緒去冬今歲人鬼見分石耳紫菜愴焉興想淚下不禁指遣恭送以充蔬僧一飯法師與周情期契闊非止恆交覽物存舊彌當楚切痛矣如何往矣奈何弟子沈約和南與印闍梨書梁劉之遴大喜稽首和南大喜精誠無感奄丁禍罰攀號永往五內屠鱠自咎自悼萬歿何補慈母臨終正念不亂繫想諸佛及本師至乎壽盡凡夫戀著母子恩深嬰此長別肝心破潰不能自任遺旨以三十兩上金奉別充道場功德九月二十八日奉營安厝終始永畢不可復希長號懊惱無心苟存伏度聞問理垂哀愍所希運心救拔必使亡靈遊於淨土不圖此啓臨紙崩絶大喜和南與雲僧正書梁王筠弟子孤子筠頓首稽首和南弟子釁結幽明備嬰荼蓼攀援崩踊肌髓糜潰尋繹煩冤肝腸寸斷號天叫地永隔精誠捨命捐軀終無補益思欲仰福廣為法事以申罔極之痛少寄迫慕之誠鑄像度僧仰遵法教建齊設會務依經典敷說大乘誘度群生其福不淺仰惟大正法師道心純淑至德凝深智苞空有照通真俗多聞不窮機辨無硋一代師匠四海推崇弟子宿植善因早蒙親眷情同骨肉義等金蘭外書所謂冥契神交內典則為善友知識敬藉微緣敢陳大願來歲夏中欲仰請講說弘法之情既無彼此眷愛之深特希降屈公私道俗要請既多故預咨聞必願允遂豈圖一旦忽有斯白臨紙崩衄厝言無次弟子孤子王筠頓首頓首稽首和南與長沙王別書梁王筠筠頓首頓首高秋凄爽體中何如願比勝約承入東禮拜用深傾仰昔藩后遨遊不無是事或龍舟水嬉或臨川送遠縱金飛斾泛此安流猶復見重良書以為盛德未有選日簡辰歸誠繫念尋法城之遊逗祇園之聚翹心贊歎無以譬說僕風疾增瘵蹇廢蓬門不獲執離彌深傾悶願敬勗白書不次王筠頓首頓首答雲法師書梁劉孝綽孝綽和南辱誨垂示敕旨所答劉太僕思效啓義窮深遠語兼巧便伏聞希有身心踊躍昔戈盾夾車備不虞於周后兵旗引駕防未然於漢君斯皆執心黃屋瑞無紺馬事極寰㝢之中理隔天人之外皇上自茲善覺降迹閻浮以住地之心行則天之化故能慈導三有仁濟萬物猶以法藥未周寶船不倦解劍却蓋躬詣道場瑞花承足人觀雕輦之盛金輪啓路物覩重英之飾顯實開權事均祇鷲本無四畏寧慮五怨思效遂膚引梁丘隨劍之說日磾觸瑟之辭何異回龍象於兔徑注江海於牛跡聖旨殷勤曲相誘喻豈直淨一人之垢衣將以破群生之暗室弟子世傳正見幼覩真言但惑網所縈塵勞自結微因宿植仰逢法教親陪寶座預餐香鉢復得俱聽一音共聞八解庶因小葉受潤大雲猥蒙開示深自慶幸不勝歡喜略附陳誠劉孝綽和南遼陽山寺願文盧思道齊興二十有三載區宇又安列聖重光百神受職天平地成禮諧樂暢劍戟云鑄江海無波皇帝體膺上哲運鍾下武以至德字黔首大明臨赤縣深仁俯漏惠化潛通榮鏡六幽昭蘇八表唐旌已立芻輿不遠而至殷網既開肖翹咸遂其所壇凝休氣渚幕榮光玄扈造符翠媯啓籙阿閣朝喧棘林夜靜西琯協律南鬯迎神衣魚操龜之俗懷音請吏反踵修股之渠膜拜空首四海懾然中外禔福尉候無警書軌大同猶以為負扆垂旒人世微業功成治定域中小道投心覺海束意玄門手執明珠頂受甘露調御天人不徇巖廊之重明行具足寧屑冕之尊十力四心東漸西被日月出矣風雨潤之屠門飽肆化成嚴淨之所蜉蝣蟪蛄網於仁壽之域參墟奧壤王迹所基密都是宅別館攸在襟帶遐長原陸爽秀高巖鬱起作鎮東偏峯羅群玉鷲頭之狀非美岫列三珠雞足之形可陋洞穴循風生和雅之曲圓珠積水流清妙之音于時玉燭調年金商在律職方具禮旋駕西巡六龍齊轡七萃按部雷動雲移凝鑾佇蹕乃建仁祠于彼勝地成之不日既麗且康昔周夜初明漢池云鑿事隔荒裔道若存亡哲王馭歷弘濟區有前聖後聖旦暮為期以此勝因仰為武成皇帝及清廟聖靈願西遇彌陀上征兜率雄視三界高臨四衢百年之神俯輕群后一音所導遠同佛日皇太后福踰姜水祉邁塗山壽比太陰業均厚載聖主齊明雨曜合德二儀受録錯於靈河開金簡於仙嶽龍官鳥紀未可匹其光大像天任地焉能喻其長久皇太子德茂元良道高上嗣牢籠啓誦孕育莊丕六宮眷屬諸王昆弟皆智慧莊嚴玉華松茂永侍披香長固磐石以茲博利被於萬品當使法界虛空生靈動植俱沐定水同蔭法雲斯誓或差無取正覺北齊武成帝以三臺宮為大興聖寺詔魏收門下皇居帝邑揆日瞻星仞雉有常几席斯在雖今古推移文質代變而成世作範義貴適時朕奄家四海作孚萬國當陽負扆深存庇氓濟下利物無忘懷抱昭仁訓儉不遺造次今臨嚮聽朝咸極崇廣宴息之所不乏溫華每謂為之者勞居之者逸至於離宮別館有時遊幸耳目所及聊可忘懷而乃千門洞啓萬柱周架上迫雲漢下臨雷雨巧極金銅麗殫珠璧眷然長想良非宿心三臺並列蕪穢自久天保之末經構甫興仍創棟宇規摹宏博有司過實匠人逞巧萌庶勞止縻費難量既非殿寢正所便為虛衛之地凝華生白經歷歲年不剪茅茨事頗逼下卑其宮室有可庶幾顧茲侈麗豈伊寧處自魏朝失政九域崩離人神無主實求明聖我太祖獻武皇帝握茲乾紀執斯地絡懸持日月嘯吒風雲糾忠貞以成務感靈徵而大造爰以克定之初躬圖道場之業神迹冥果理燭幽明朕嗣應寶祚永惟家祉仰祇先志尚竦玄門思展聿修之重念歸喜捨之大肌膚匪吝國城何寶期濟率土至於圓極可以三臺宮為大興聖寺此處極土木之壯窮丹素之妍奇怪備於刻削光華畢於圖彩顧使靈心盻饗神物奔會真覺惟寂有感必通化為淨土廣延德衆心若琉璃法輪常轉灑甘露於大千照慈燈於曠劫後周明帝修起寺詔制詔孝感通神瞻天罔極莫不布金而構祇洹流銀而成寶殿方知鹿苑可期鶴林無遠敢緣雅頌仰藉莊嚴欲使功侔天地興歌不日可令太師晉國公總監大陟岵大陟屺二寺營造隋文帝為太祖武元皇帝行幸四處立寺建碑詔李德林門下風樹弗靜隙影如流空切欲報之心徒有終身之慕伏惟太祖武元皇帝窮神盡性感穹昊之靈膺籙合圖開炎德之紀魏氏將謝躬事經綸周室勃興同心匡贊間關二代造我帝基猶夏禹之事唐虞晉宣之輔漢魏往者梁氏將滅親尋構禍蕭察稱兵擁衆據有襄陽將入魏朝狐疑未決先帝出師樊鄧飲馬漢濱彼感威懷連城頓顙隋郡安陸未即從風敵人騁輔車之援重城固金湯之守乃復練卒簡徒一舉而剋始於是日遂啓漢東蕭繹往在江陵後梁稱制外通表奏陰有異圖心迹之間未盡臣節王師薄伐帝旅推鋒誅厥放命繼其絶祀有齊未亡凶徒孔熾連山巨防艱危萬重晉水之陽是其心腹於是鳴執鉞假道北鄰皮服欽風煙隨霧集懸兵萬里直指參墟左縈右拂麻積草靡雖事未既功而英威大振齊人因以挫衄周武賴以成功尚想王業之勤遠惟風化之始率夷狄而制東夏用偏師而取南國豈徒湯征葛伯周伐崇侯而已哉積德纍功福流後嗣俾朕虛薄君臨區有追仰神猷事冥真寂降生下土權變不常用輪王之兵伸至人之意百戰百勝為行十善故以干戈之器已類香華玄黃之野久同淨國思欲崇樹寶剎經始伽藍增長福因微副幽旨昔夏因導水尚且銘山周曰巡遊有聞勒石帝王紀事由來尚矣其襄陽隨州江陵晉陽並宜立寺一所建碑頌德庶使莊嚴寶坊比虛空而不壞導揚茂實同天地而長久隋高祖於相州戰場立寺詔門下昔歲周道既衰群凶鼎沸鄴城之地實為禍始或驅逼良善或同惡相濟四海之內過半豺狼兆庶之廣咸憂吞噬朕出車練卒蕩滌妖醜誠有倒戈不無困戰將士奮發肆其威武如火燎毛始無遺燼于時朕在廊廟任當朝宰德慚動物民陷網羅空切罪己之誠唯增見辜之泣然兵者凶器戰實危機節義之徒輕生忘死干戈之下又聞徂落興言震悼日久逾深永念群生蹈兵刃之苦有懷至道興度脫之業物我同遇觀智俱愍思建福田神功祐助庶望死事之臣菩提增長悖逆之侶從暗入明並究苦空咸拔生死鯨鯢之觀化為微妙之臺龍蛇之野永作頗梨之鏡無邊有性盡入法門可於相州戰地建伽藍一所立碑紀事其營構制度置僧多少寺之名目有司詳議以聞隋煬帝行道度人天下敕大業三年正月二十八日菩薩戒弟子皇帝總持稽首和南十方一切諸佛十方一切尊法十方一切賢聖竊以妙靈不測感報之理遂通因果相資機應之徒無爽是以初心爰發振動波旬之宮一念所臻咫尺道場之地雖則聚沙蓋鮮實覆匱於耆山水滴已微乃濫觴於法海弟子階緣宿殖嗣膺寶命臨御區宇寧濟蒼生而德化弗弘刑罰未止萬方有罪實當憂責百姓不足用增塵纍夙夜戰兢如臨淵谷是以歸心種覺必冀慈愍謹於率土之內建立勝緣州別請僧七日行道仍總度一千人出家以此功德並為一切上及有頂下至無間蝖飛蠕動預稟識性無始惡業今生罪垢藉此善緣皆得清淨三塗地獄六趣怨親同至菩提一時作佛唐太宗於行陳所立七寺詔門下至人虛己忘彼我於胸襟釋教慈心均異同於平等是知上聖惻隱無隔萬方大悲弘濟義猶一子有隋失道九服沸騰朕親總元戎致茲明罰誓牧登陑曾無寧歲其有桀犬愚惑嬰此湯羅銜鬚義憤終于握節各殉所奉咸有可嘉日往月來逝川斯遠雖復項藉放命封樹紀於丘墳紀信捐生丹青著於圖像猶恐九泉之下尚淪鼎鑊八難之間永纏氷炭愀然疚懷用忘興寢思所以樹立福田濟其營魄可於建義已來交兵之處為義士凶徒隕身戎陳者各建寺剎招延勝侶望法鼓所振變炎火於青蓮清梵所聞易苦海於甘露所司宜量定處所并立寺名支配僧徒及修造院宇具為事條以聞稱朕矜愍之意破薛舉於豳州立昭仁寺破宋老生於台州立普濟寺破宋金剛於晉州立慈雲寺破劉武周於汾州立弘濟寺破王世充於邙山立昭覺寺破竇建德於鄭州立等慈寺破劉黑泰於洺州立昭福寺右七寺並官造又給家人車牛田莊并立碑頌德唐太宗為戰亡人設齊行道詔門下刑期無刑皇王之令典以戰止戰列聖之通規是以湯武干戈濟時靜亂豈其不愛黔首肆行誅戮禁暴戢兵蓋不獲已朕自隋未創義志存拯溺北征東伐所向平殄然黃鉞之下金鏃之端凡所傷殪難用勝紀雖復逆命亂常自貽殞絶惻隱之心追以愴恨生靈之重能不哀矜悄然疚懷無忘興寢且釋氏之教深尚慈仁禁戒之科殺害為重承言此理彌增悔懼今宜為自征討以來手所誅剪前後之數將近一千皆為建齊行道竭誠禮懺朕之所服衣物並充檀捨冀三途之難因斯解脫萬劫之苦藉此弘濟滅怨障之心趣菩提之道唐太宗度僧於天下詔門下三乘結轍濟度為先八正歸依慈悲為主流智慧之海膏潤群生翦煩惱之林津梁品物任真體道理叶至仁妙果勝因事符積善朕欽若金輪恭膺寶命至德之訓無遠不思大聖之規無幽不察欲使人免蓋纏家登仁壽冥緣顯應大庇含靈五福著於洪範三災終於世界比因喪亂僧徒減少華臺寶塔窺戶無人紺髮青蓮櫛風沐雨眷言雕毀良用憮然其天下諸州有寺之處宜令度人為僧尼總數以三千為限其州有大小地有華夷當處所度少多委有司量定務取精誠德業無問年之幼長其往因減省還俗及私度白首之徒若行業可稱通在取限必無人可取亦任其闕數若官人簡練不精宜録附殿失但戒行之本唯尚無為多有僧徒溺於流俗或假託神通妄傳妖怪或謬稱醫筮左道求財或造詣官曹囑致贓賄或鑽膚焚指駭俗驚愚並自貽伊戚動掛刑網有一於此大虧聖教朕情深護持必無寬捨已令依附內律參以金科具為條制務使法門清整所在官司宜加檢察其部內有違法僧不舉發者所司録狀聞奏庶善者必採惡者必斥伽藍淨土咸知法味菩提覺路絶諸意垢唐太宗斷賣佛像敕敕旨佛道形像事極尊嚴伎巧之家多有造鑄供養之人競來買贖品藻工拙揣量輕重買者不計因果止求賤得賣者本希利潤唯在價高罪纍特深福報俱盡違犯經教並宜禁約自今以後工匠皆不得預造佛道形像賣鬻其見成之像亦不得銷除各令分送寺觀令寺觀徒衆酬其價直仍仰所在州縣官司檢校敕到後十日內使盡與暹律師等書褚亮竊伏下風久揖高義有懷靡託於悒良深春暮清和道體休納弟子植生多幸早預法緣近於華嶽創立僧宇此山蘊蓄奇祕控接煙霞削峯纍仞靈泉百丈神仙以為勝地賢哲之所同歸結構雖淹禪誦猶寡厥導興廢弘之在人且棟梁三寶必資龍象之力羽儀四衆尤待鴛鷺之群法師等學洞經典譽宣真俗實宜共化蒼生升於彼岸且達人屈己存乎應物大德忘名唯在申教理必弘濟無隔遐邇仰願俯從微請降迹來儀則釋遠禪居遙蹤可擬王珣精舍清塵不沫是所願也是所願也造興聖寺詔貞觀三年門下昔丹陵啓聖華渚降祥叶德神居克隆鴻業朕丕承大寶奄宅域中遠藉郊禋之慶仰惟樞電之祉思園之禮既弘撫鏡之情徒切而永懷慈訓欲報無從靖言因果思憑冥福通義宮皇家舊宅制度弘敞以崇仁祠敬增靈祐宜捨為尼寺仍以興聖為名庶神道無方微申凱風之思主者施行為太穆皇后追福願文文帝手疏貞觀十六年五月御製願文致弘福寺曰聖哲之所尚者孝也仁仁之所愛者親也朕幼荷鞠育之恩長蒙撫養之訓蓼莪之念何日而忘罔極之情昊天匪報昔子路歎千鍾之無養虞丘嗟二親之不待方寸亂矣信可悲夫每痛一月之中再罹難疚興言永慕哀切深衷欲報靡因惟憑冥助敬以絹二百匹奉慈悲大道儻至誠有感冀銷過往之愆為善有因庶獲後緣之慶大周二教鍾銘皇帝製天和五年歲次攝提五月庚寅造鍾一口冶昆吾之石練若溪之銅郢匠鴻爐化茲神器雖時屬賓而調諧夷則故春秋外傳曰所以詠歌九則平民無二弘宣兩教同歸一揆金石冥符天人咸契九宮九地遙徹洞玄三千大千遠聞邊際銀閣應供延法侶而尋聲金闕降真候仙冠而聽響式傳萬古乃勒銘云實際遐曠通玄洞微化緣待業造理因機靈圖降采慧日垂暉金河霧集銀㵎雲飛其一九霄仙籙五嶽真文智炬遐照禪林普薰金鼓入夢瓊鍾徹雲音調冬立響召秋分其二二教並興雙鑾同振遠赴天霜遙虧地鎮陝河浮影漢溪傳韻聽響弘法聞聲起信其三波若無底重玄有門長開久暗永拔沈昏不求正覺莫會天尊唯令智海先度黎元其四大唐興善寺鍾銘皇帝道叶金輪示居黃屋覆燾萬方舟航三界欲使雲和之樂共法鼓而同宣雅頌之聲與梵音而俱遠乃命鳧氏範茲金錫響合風雷功侔造化騰驤猛虎負𧇀而將飛宛轉槃龍繞乘風而如動希聲旦發揵捶夕震莫不傾耳以證無生入神而登正覺圓海有竭福祚無窮方石易銷願力無盡京師西明寺鍾銘令製維大唐麟德二年歲纏星紀月次降婁二月癸酉朔八日庚辰皇太子奉為二聖於西明寺造銅鍾一口可一萬斤發漢水之寄珍採蜀山之祕寶虞棰練火晉曠飛爐帶龍𧇀而騰規應鯨桴而寫製聲流九地遐宣厚載之恩韻徹三天遠播曾旻之德寤群生於覺路警庶類於迷塗業擅香垣功齊塵劫式旌高躅敢勒貞金銘曰青祇薦祉黃離降精渦川育德瑤嶺飛英吹銅表性問寢登情興言淨業載啓香城七珍交鑄九乳圖形翔龍若動偃獸疑驚製陵周室規踰漢庭風飄旦響霜傳夜鳴仰延皇祚俯導蒼生聲騰億劫慶溢千齡廣弘明集悔罪篇第九謝敕為建涅槃懺啓梁簡文臣綱啓伏聞敕旨垂為臣於同泰寺瑞應殿建涅槃懺臣障雜多災身穢饒疾針艾湯液每黷天覽重蒙曲慈降斯大福冀惠雨微垂即滅身火梵風才起私得清涼無事非恩伏枕何答不任下情謹奉啓謝聞謹啓此無所謝也越敕六根懺文梁簡文今日此衆誠心懺悔六根障業眼識無明易頃朱紫一隨浮染則千紀莫歸雖復天肉異根法慧殊美故因見前境隨事起惡今願捨於肉眸俱瞬佛眼如決目王見淨名方丈之室多寶踊塔之瑞牟尼鷲山之光彌勒龍華之始常遊淨土永步天宮耳根暗鈍多種衆惡悅染絲歌聞勝法善音昏然欲睡聽鄭衛淫靡聳身側耳知勝善之事樂之者希淫靡之聲欣之者衆願捨此穢耳得彼天聰聞開塔管籥之聲彈指謦咳之唱諸佛所說悉皆總持香風淨土之聲寶樹鏗鏘之響於一念中恍然入悟鼻根過患彌復頑嚚耽染六蘭流連百和鬱金易著瞻蔔難排雖復一薰一蕕叶性難遣空中海上彌不自覺至如雕爐在彼翠霧飛煙識染相牽彌生織纍所以蝍蛆甘螮自謂馨香烏鴉嗜鼠不疑穢惡今願捨此中根得彼天受振裳屣步跨栴檀之逈林提囊拭鉢捧香積之寶飯長離穢濁永保清升舌根障重染惡尤深毒刺爭興惡蛇競起既貪五黃六禽之旨又甘九鼎八珍之味所以焚山破卵涸水枯鱗黿臛不斟有染指之過羊羹不及致入陳之苦雖復鴝䴈鹿胃猶不稱甘鳳肺龍胎更云不美雖羅鼎俎未必皆當在彼衆生於命已酷或復間朋亂友破俗傷真變紫奪朱反白為黑所以讒言三至曾母投杼端木一說越霸吳亡故知三寸之舌未易可掉駟馬既失於事難追願斷煩惑入清淨境既同阿難乞乳之譏又等淨名寂默之致餐禪悅之六味欽善法之三德形恭心到永趣菩提身根頑觸唯貪細軟質體塵礙不重戈矛莫不愛我輕他凌人傲物縱此裸蟲不羈醉象六塵四倒自此而生五蓋十纏因斯而致所以象菌清間遨遊於夏室重衾狐白溫煦於冬房結駟廣廈動靜必安蠲首翠樓去來有託所以三業之過出自機開四大假成豈有真我願捨此畫瓶得彼金色淨寶珠之法飾照琉璃之慧體長歸五分永等十身意識攀緣其罪山積險同夢幻譬若猴猿懸鏡高堂一念難靜走丸索上百慮先馳至如二十五有紛繞不息九十八使驚騖無已所以灰心滅智行拔於三乘風禪靈飲道高於六度今願斷此意根祛纍斯盡心當恬怕洞照無生一切衆罪悉滅俗門三界異途歸之真域懺悔已竟誠心作禮悔高慢文同上弟子蕭綱又重至心歸依三寶竊聞記稱弗傲表洙泗之遺文經云不慢驗踰闍之妙典故一遇恆神陵伽尚卒餘習上賓天帝淮南猶有誤辭亦有才曰隱淪調惟高俗猶足坐痹晉君立前齊主況復道隆三學法兼五衆如過前殿似出北門而不密室致恭遺弓接足敢藉勝緣願起弘誓從今日始乃至菩提於諸出家悉表虔敬方欲削除七慢折制六根賓頭下步庶無厥咎耆達棄車方思景慕幽顯大衆咸為證明懺悔文沈約弟子沈約稽首上白諸佛衆聖約自今生以前至于無始罪業參差固非詞象所算證昧往緣莫由證舉爰始成童有心嗜欲不識慈悲莫辨罪報以為毛群魪品事允庖厨無對之緣非惻隱所及晨銼暮爚亘月隨年嗛腹填虛非斯莫可兼曩昔蒙稚精靈靡達遨戲之間恣行夭暴蠢動飛沈罔非登俎儻相逢值橫加剿撲却數追念種彙實蕃遠憶相間難或詳盡又暑月寢臥蚊虻噆膚忿之于心應之于手歲所殲殞略盈萬計手因忿運命因手傾為殺之道事無不足迄至于今猶未頓免又嘗竭水而漁躬事網罭牽驅事卒歡娛賞會若斯等輩衆夥非一黨隸賓遊𮘧眚交互或盜人園實或攘人豢養弱性蒙心隨喜贊悅受分吞贓皎然不昧性愛墳典苟得忘廉取非其有卷將二百又綺語者衆源條繁廣假妄之愆雖免大過微觸細犯亦難備陳又追尋少年血氣方壯習纍所纏事難排壑淇水上宮誠無云幾分桃斷袖亦足稱多此實生死牢穽未易洗灌志有慘舒性所同稟遷怒過直有時或然厲色嚴聲無日可免又言謔行止曾不尋研觸過斯發動淪無記終朝紛擾薄暮不休來果昏頑將由此作前念甫謝後念復興尺波不息寸陰驟往愧悔攢心罔知云厝今於十方三世諸佛前見在衆僧大衆前誓心剋已追自悔責收遜前愆洗濯念慮校身諸失歸命天尊又尋七尺所本八微是構析而離之莫知其主雖造業者身身隨念滅而念念相生離續無已往所行惡造既由心行惡之時其心既染既染之心雖與念滅往之所染即成後緣若不本諸真諦以空滅有則染心之纍不卒可磨今者興此愧悔磨昔所染所染得除即空成性其性既空庶罪無所託布髮頂禮幽顯證成此念一成相續不斷日磨歲瑩生生不休迄至道場無復退轉又彼惡加我皆由我昔加人不滅此重緣則來惡彌遘當今斷絶永息來緣道無不在有來斯應庶𮒖今誠要之咸達群臣請隋陳武帝懺文江總文某位某甲稽首和南十方三世一切諸佛十方三世一切尊法十方三世一切賢聖見前大德僧皇帝某諱菩薩睿哲聰明廣淵齊聖心若虛空照窮波若發弘大誓荷負衆生神道會昌膺茲景業百王既季運屬艱難五嶽維塵六軍日動劬勞在念有切皇心既而深悟苦空極信無我寶臺華柱本非實録賊城樓櫓苦具茲多遂坐道場靜居禪室堅固善本具足檀那石壁山河珍車象馬頭目髓腦妻子國城鑾輅龍章翠帳玉機福德所感威惠所及莫不肅然大捨供養三尊便欲拂衣崆峒高步六合到林間而宴坐與釋種而同遊紫微虛宮黃屋曠位上靈聳動厚土怔惶弟子等身纏愛惑業構煩惱天生蒸民樹以司牧惵惵黔首非后罔戴豈容致尊居萬乘而申獨往之情應在帝王而為布衣之事且蠻夷猾夏寇賊姦宄燧人警職日照甘泉之火四郊多壘未肆樓船之威若使七聖雲迷窅然汾水之上八駿波若方在瑤池之濱則天下何依群臣莫奉宗社廟堂有廢彛則弟子不勝狼狽之切謹捨如干錢如干物仰嚫三寶大衆奉贖皇帝及諸王所捨悉還本位伏願十方三寶見前大德僧以慈悲力用無礙心坐道放光顯揚宣說歡喜和合超然降許當使皇帝望雲望日之姿與南山等固乃神乃聖之德與北極同尊中宮后妃之星金禎玉幹之戚窮積善之慶盡萬歲之歡玉鑾回鑣金門洞啓百辟翹首搢紳並列願塵勞與雲翳俱銷億兆與天地同泰慊慊丹愚敢以死請弟子某和南摩訶波若懺文梁高祖菩薩戒弟子皇帝稽首和南十方諸佛及無量尊法一切賢聖觀夫常樂我淨蓋真常之妙本無常苦空乃世相之纍法而苦樂殊見分別之路興真俗異名計著之情反顛倒我人之所彌見愚癡取捨有無之間轉成專附豈知妙道無相至理絶言實法唯一真如不二諸佛以慈悲之力開方便之門教之以遣蕩示之以冥滅百非俱棄四句皆亡然後無復塵勞解脫清淨但般若之說唯有五時而智慧之旨終歸一趣莫非第一義諦悉是無上法門弟子頗學空無深知虛假主領四海不以萬乘為尊攝受兆民彌覺萬機成纍每時丕顯嗟三有之洞然終日乾乾歎四生之俱溺常願以智慧燈照朗世間波若舟航濟渡凡識今謹於某處建如干僧如干日大品懺現前大衆至心敬禮惠命須菩提願諸衆生離染著相回向法喜安住禪悅同到香城共見寶臺般若識諸法之無相見自性之恆空無生法忍自然具足稽首敬禮常住三寶金剛波若懺文梁武帝菩薩戒弟子皇帝稽首和南十方諸佛無量尊法一切賢聖如來以四十年中所說般若本末次第略有五時大品小品枝條分散仁王天王宗源流別金剛道行隨義制名須真法身以人標題雖復前說後說應現不同至理至言其歸一揆莫非無相妙法悉是智慧深經以有取之既為殊失就無求也彌見深乖義異去來道非內外遣之又遣之不能得其真空之以空之未足明其妙真俗同棄本迹俱冥得之於心然後為法是以無言童子妙得不言之妙不說菩薩深見無說之深弟子習學空無修行智慧早窮尊道克己行法方欲以家形國自近及遠一念之善千里斯應一心之力萬國皆歡恆沙衆生皆為法侶微塵世界悉是道場今謹於某處建如干僧如干日金剛般若懺見前大衆至心敬禮釋迦牟尼佛金剛波若禮長老須菩提願諸佛菩薩以般若因緣同時集會哀憐萬品護念群生引入惠流同歸佛海得金剛之妙寶見金牒之深經頂戴奉持終不捨離逮得己利盡諸有結心得自在無復塵勞稽首敬禮常住三寶勝天王般若懺文陳宣帝菩薩戒弟子皇帝稽首十方諸佛無量尊法一切賢聖自鶴林滅迹鷲嶺凝神瓶寫總持遺文不墜傳燈流布法輪踰廣方軌弘宣既昭著於西域分鑣顯說亦漸移於東土而周朝徵應止見夜明漢帝感通不過宵夢香象所載虎觀寂而未聞龍宮所藏麟閣閴其無取山海為隔傳授蓋微華夷不同翻譯何幾天王所問止得經名金剛之經才見一品歷魏晉而未備經宋齊而恆闕我皇帝承家建國光前絶後道格天地德被幽微大啓慈悲廣開智慧施造化以仁壽濟蒼生於解脫異世界而承風殊剎土而響應真人間出法寶傳通粵以天嘉六年外國王子月婆首那來遊匡嶺慧解深妙靡測聖凡奉持勝天王般若經一部於彼翻譯表獻京師某校彼前名冥合符契總三乘之通教貫六度之淵海如開暗室以照優曇十方衆生若貧人之獲寶四部弟子等力士之得珠金牒寶印始茲辰而一啓智慧實法洎爾時而方具故知如來付囑必俟仁王般若興隆期於聖運弟子纂承洪緒思弘大業願此法門遍諸幽顯今謹於某處建如干僧如干日勝天王般若懺見前大衆至心敬禮本師釋迦如來禮般若波羅蜜禮勝天王願一切衆生勤求般若不避寒暑如薩陀波崙不愛身命如力進菩薩得般若之性相與般若而相應攝諸萬有住安隱地含靈有識悉獲歸依稽首敬禮常住三寶妙法蓮華經懺文陳文帝菩薩戒弟子皇帝稽首和南十方諸佛無量尊法一切賢聖竊以前佛後佛種種因緣已說當說各各方便莫非真語悉為妙法理無二極趣必同歸但因業因心稟萬類之識隨見隨著異群生之相品分有淺深覺悟有遲速法雨一味得之者參差法雷一音聞之者差別是以小乘頓教由此各名聲聞菩薩因斯分路至如鹿苑初說羊車小乘灰斷涅槃分段解脫以諸佛之善巧會衆庶之根機是曰半字未稱三點及夫會三歸一反本還源說大乘經名無量義滅化城於中路駕寶車於四衢帶裏明珠隱而還現髻中真寶於焉始得出寶塔於虛空踊菩薩於大地現希有事證微妙法最勝最尊難逢難值弟子以因地凡夫屬符負荷方欲憲章古昔用拯黎庶竊以羲皇結網深失大慈成湯解羅猶非法善揚旌丹水異道樹而降魔執玉塗山非寶坊之大集所以憑心七覺繫念四勤住菩薩乘顯無三之教學如來行開不二之門汲引群迷導示衆惑今謹於某處如干僧如干日法華懺見前大衆至心敬禮釋迦如來多寶世尊禮妙法華大乘經典禮普賢菩薩妙光法師願多寶如來從地涌出普賢菩薩乘象空來並入道場證明功德擊大法鼓轉妙法輪震動世間覺悟凡品令使盡空法界無復聲聞無邊衆生皆為菩薩總持性相同到無生稽首敬禮常住三寶金光明懺文陳文帝菩薩戒弟子皇帝稽首和南十方諸佛無量尊法一切賢聖尋夫靈鷲山間自有常住之相白鶴林處本無變易之法故知真解脫者誰辨去來實智慧者非有生滅而顛倒迷愚不曉三點之理無明覆蔽空有八十之疑於是四佛世尊百千菩薩俱會信相之室顯說釋迦之壽明稱歎之妙偈出懺悔之法音是曰法王微妙第一以種智為根本以功德為莊嚴能照諸天宮殿能與衆生快樂能銷變異惡星能除穀貴饑饉能遣怖畏能滅憂惱能却怨敵能愈疾病如法修行功德已甚弟子以茲寡昧纂承洪業常恐王領之宜不符政論御世之道有乖天律庶績未康黎民弗又方願歸依三寶憑藉冥空護念衆生扶助國土今謹於某處建若干僧如干日金光明懺見前大衆至心敬禮釋迦如來四佛世尊金光明經信相菩薩願諸菩薩久住世間諸天善神不離土境方便利益增廣福田映慈悲雲開智慧日作眼目道為衣止所成就菩提之道場安住不動之境國稽首敬禮常住三寶大通方廣懺文陳文帝菩薩戒弟子稽首和南三寶竊以諸佛剎土不可言說如來稱號無有限量或過去見在共取頗羅之姓或同時異世俱有釋迦之名或明王十億或燃燈三萬去來三界遍滿十方聞名者離塵受持者得道其為功德難用思議釋迦如來以無礙力遊娑羅之淨道止吉祥之福地寶池化生自踊說大通方廣出三寶名號譬如六天總歸一乘弟子用慈悲之心修平等之業常以萬邦有罪責自一人四生未安理為重任所以薰修在己日仄忘勞精進為心夜分未息菩薩行處皆願受持諸佛法門悉令如說欲使普天率土無復怖畏之塵蠕動蜎飛永得歸依之地今謹依經教於某處建如干僧如干日行方廣懺悔讀誦百遍右繞七匝塗香末香盡莊嚴之相正念正觀罄精懇之心見前大衆至心敬禮本師釋迦如來禮方廣經中所說三寶名字願諸佛菩薩尋聲訃響放淨光明照諸暗濁施清涼水滅茲渴愛登六度舟入三昧海總萬有而會真如齊三界而登實法稽首敬禮常住三寶虛空藏菩薩懺文陳文帝竊以菩薩之於衆生是大依止觀察性相隨機濟拔一人未度不證道果往古今來行願如一而虛空藏菩薩最為勝上為衆中之幢王為大明之尊主具諸佛之智慧得如來之祕密至如因夢見形隨緣示相一聞稱號水火不能焚溺一心稱名刀杖不能傷害壽命財産之願念而必諧色聲味觸之須求而皆遂身心疾惱憐愍療治牢獄怖畏方便解釋此蓋隨從世法安樂衆生及夫動神變相去香集之境放淨光明來閻浮之界入三昧定除煩惱熱說陀羅尼破惡業障五濁惡世一時清涼五根本罪並皆解脫此則世間之眼示涅槃之路弟子承如來之教稟諸佛之慈國被菩薩之功家行大士之業方願十方剎土悉有一乘十方衆生皆修十地今謹於某處建如干僧如干日虛空藏菩薩懺見前大衆至心敬禮本師釋迦文佛禮勝花敷藏如來禮陀羅尼神呪禮虛空藏菩薩願虛空藏菩薩尋聲應訃見神通力開智慧光以種種身遊諸國土度脫衆生不乖誓願稽首敬禮常住三寶方等陀羅尼齊懺文陳文帝竊以三世諸佛以誓願因緣十方如來以智慧方便縱無礙之辨開無盡之門法流派別宗源無限法本分散枝條不極非直摩訶般若獨有八萬四千至於陀羅尼門亦有九十二億處處宣說種種名稱功德無量威神不測至如婆藪之拔地獄波旬之發菩提花聚之獲神通雷音之脫掩蔽莫不因斯章句承茲業力亦有四部弟子十方衆生聞一句而發心聽一說而悟道故知一切諸法無非真妙弟子側身修行所學者菩提旰食夙興所行者濟度一心之力攝取衆生一念之頃遍諸法相如來種智皆願總持諸佛功德悉欲流布今謹於法典本之經教見前大衆至心敬禮釋迦牟尼佛禮陀羅尼章句禮雷音比丘禮華聚菩薩願承此功德調伏衆生滅三毒心破十惡業四百之煩惱自然清淨八萬四千塵勞一時解脫得神呪之力具法印之善入陀羅尼門觀諸佛境界獄火永盡無餘稽首敬禮常住三寶藥師齊懺文陳文帝竊以諸行無常悉為纍法萬有顛倒皆成苦本熱炎鏡像知變易之不停漂草爨矛見生滅之奔迅隨業風而入苦海逐報障而趣幽途去來三界未見可安之所輪回五道終無暫息之期藥師如來有大誓願接引萬物救護衆生導諸有之百川歸法流之一味亦能施與花林隨從世俗使得安樂令無怖畏至如八難九橫五濁三災水火盜賊疾疫飢饉怨家債主王法縣官憑陵之勢萬端虔殺之法千變悉能轉禍為福改危成安復有求富貴須祿位延壽命多子息生民之大欲世間之切要莫不隨心應念自然滿足故知諸佛方便事絶思量弟子司牧寡方庶績未又方憑藥師本願成就衆生今謹依經教於某處建如干僧如干日藥師齊懺現前大衆至心敬禮本師釋迦如來禮藥師如來慈悲廣覆不乖本願不棄世間興四等雲降六度雨滅生死火除煩惱箭十方世界若輪燈而明朗七百鬼神尋結縷而應訃障逐香然災無復有命隨幡續漸登常住遊甚深之法性入無等之正覺行願圓滿如藥師如來娑羅齊懺文陳文帝尋夫真解脫者本自不生實智慧者今亦無滅故知鶴林變色非變易之文鷲山常在實常住之法但世界不一應訃所以不窮衆生無邊方便所以無際隨念隨著種種法門因業因心各各示現或八十小劫端坐之相未移方八千年無餘之幾已及熙連河側晨朝之色忽明娑羅樹間中夜之聲便寂最後功德是日茲辰弟子有緣閻浮屬當重任愍群生之顛倒嗟庶類之愚迷常願造六度之舟濟之於彼岸駕一乘之傳驅之於中道今謹於太極殿設無礙大會百僧一夕娑羅大齊願法雨法雲清涼三界之火慧燈慧炬照朗百年之室常住二字人天共聞伊字三點凡聖並悟無勞迦葉之問不待須跋之疑一切種智而為根本無量功德以自莊嚴意樹開解脫之花身田含定慧之水居處吉祥之地枕藉福德之場與二氣而俱貞隨四時而納祐日月天子照合璧於大千星辰宮殿散連珠於百億慈悲輕雨與祥風而並飛菩提寶雲共飛煙而合來六合四海無復塵勞六道四生俱蒙清淨無礙會捨身懺文陳文帝為皇太后大捨寶位竊觀雅誥奧義皇王興在豫之言禮經令典聖人揚罪己之說故亡身濟物仁者之恆心克己利人君子之常德況復菩薩大士法本行處應訃三界攝受四生運無量之四心修平等之六度國城妻子僶俯哀荒承祖宗之大業扶曳喘息當天下之重任黎民弗乂庶績未熙御朽履氷無忘兢業又以世相泡影有為露電愛河奔迅欲海飛騰稟識同焚含靈共溺垂瑱憑玉還覺萬乘非尊當寧負扆翻以萬機成纍夕惕若厲思弘汲引每旦不顯奉為七廟聖靈奉為皇大后聖御奉為天龍鬼神幽冥空有三界四生五道六趣若色若想若怨若親若非怨親遍虛空滿法界窮過去盡未來無量名識一切種類平等大捨捨弟子自身及乘輿法服五服鑾輅六冕龍章玉几玄裘金輪紺馬珠交瓔珞寶飾莊嚴給用之所資待生平之所玩好並而檀那咸施三寶今謹於前殿設無礙大會奉行所願并諸功德具列于前願諸佛菩薩冥空幽顯俱到證明開智慧日映慈悲雲樹寶幢於大千擊法鼓於百億震動世界覺悟群生放三昧之淨光流一味之法雨引愚癡於火穽拔煩惱於棘林出輪轉河到無生岸唐太宗為戰亡人設齊行道詔唐太宗度僧於天下詔唐太宗斷賣佛像敕與暹律師等書褚亮唐太宗捨舊宅為寺詔唐太宗為穆后追福手疏周武帝二教鐘銘唐太宗大興善寺鍾銘唐東宮皇太子西明寺鍾銘廣弘明者言其弘護法網開明於有識也自上九篇隨時布現籌度理路其緣頗悉然於志之所之未備詳覩如不陳列頌聲何寄故次編之殷鑒遐邇且法王御㝢哥頌厥初梵王天主聲聞菩薩咸資偈贊用暢幽誠無經不有彰于視聽東夏王臣斯途不惑擬倫帝德國美無不稱焉所以寫送性情統歸總亂在于斯矣然晉宋已來諸集數百餘家信重佛門俱陳聲略至於捃拾百無一在且列數條用塵博觀唐廣弘明集統歸篇第十上淨業賦梁武帝少愛山水有懷丘壑身羈俗羅不獲遂志舛獨往之行乖任縱之心因爾登庸以從王事屬時多故世路屯蹇有事戎旅略無寧歲上政昏虐下竪姦亂君子道消小人道長御力應敕梅蟲兒茹法珍俞靈韻豐勇之如是等多輩志公所謂亂戴頭者也志公者是沙門寶志形服不定示見無方于時群小疑其神異乃羈之華林外閣公亦怒而言曰亂戴頭亂戴頭各執權軸人出號令威福自由生殺在口忠良被屠馘之害功臣受無辜之誅服色齊同分頭各驅皆稱帝主人云尊極用其詭詐疑亂衆心出入盤遊無忘昏曉屏除京邑不脫日夜屬纊者絶氣道傍子不遑哭臨月者行産路側母不及抱百姓懍懍如崩厥角長沙宣武王有大功於國禮報無報酷害奄及至於弟姪亦罹其禍遂復遣桓神與杜伯符等六七輕使以至雍州就諸軍師欲見謀害衆心不與故事無成後遣劉山陽灼然見取壯士貙虎器甲精鋭君親無校便欲朿身待戮此之橫暴出自群小畏壓溺三不弔況復姦竪乎若默然就死為天下笑俄而山陽至荊州為蕭頴胃所執即遣馬驛傳道至雍州乃赫然大號建牙竪旗四方同心如響應聲以齊永元二年正月發自襄陽義勇如雲舳艫翳漢竟陵太守曹宗馬軍主殷昌等各領騎步夾岸迎候波浪逆流亦四十里至朕所乘舫乃止有雙白魚跳入䑽前義等孟津事符冥應雲動天行雷震風馳郢城剋定江州降欵姑孰甲胄望風退散新亭李居士稽首歸降獨夫既除蒼生蘇息便欲歸志園林任情草澤下逼民心上畏天命事不獲已遂膺大寶如臨深淵如履薄氷猶欲避位以俟能者若其遜讓必復魚潰非直身死名辱亦負纍幽顯乃作詩曰日夜常思惟循環亦已窮終之或得離離之必不終負扆臨朝冕旒四海昧旦乾乾夕惕若厲朽索御六馬方此非譬世論者以朕方之湯武然朕不得以比湯武湯武亦不得以比朕湯武是聖人朕是凡人此不得以比湯武但湯武君臣義未絶而有南巢白旗之事朕君臣義已絶然後掃定獨夫為天下除患以是二途故不得相比朕布衣之時唯知禮義不知信向烹宰衆生以接賓客隨物肉食不識菜味及至南面富有天下遠方珍羞貢獻相繼海內異食莫不必至方丈滿前百味盈爼乃方食輟筯對案流泣恨不得以及溫清朝夕供養何心獨甘此膳因爾蔬食不噉魚肉雖自內行不使外知至於禮宴群臣肴膳按常菜食未習體過黃羸朝中斑斑始有知者謝朏孔彥穎等屢勸解素乃是忠至未達朕心朕又自念有天下本非宿志杜恕有云刳心擲地數片肉耳所賴明達君子亮其本心誰知我不貪天下唯當行人所不能行者令天下有以知我心復斷房室不與嬪侍同屋而處四十餘年矣于時四體小惡問上省師劉澄之姚菩提疾候所以劉澄之云澄之知是飲食過所致答劉澄之云我是布衣甘肥恣口劉澄之云官昔日食那得及今日食姚菩提含笑搖頭云唯菩提知官房室過多所以致爾于時久不食魚肉亦斷房室以其智非和緩術無扁華默然不言不復詰問猶令為治劉澄之處酒姚菩提處丸服之病逾增甚以其無所知故不復服因爾有疾常自為方不服醫藥亦四十餘年矣本非精進既不食衆生無復殺害障既不御內無復欲惡障除此二障意識稍明內外經書讀便解悟從是以來始知歸向禮云人生而靜天之性也感物而動性之欲也有動則心垢有靜則心淨外動既止內心亦明始自覺悟患纍無所由生也乃作淨業賦云爾觀人生之天性抱妙氣而清靜感外物以動欲心攀緣而成眚過恆發於外塵纍必由於前境若空谷之應聲似遊形之有影懷貪心而不厭縱內意而自騁目隨色而變易眼逐貌而轉移觀五色之玄黃玩七寶之陸離著華麗之窈窕耽冶容之逶迤在寢興而不捨亦日夜而忘疲如英梅之在摘若駿馬之帶羈類白日之麗天乃歷年之不虧觀耳識之愛聲亦如飛鳥之歸林既流連於絲竹亦繁會於五音經昏明而不絶歷四時而相尋或亂情而惑慮亦耳而堙心至如香氣馞起觸鼻發識晼晚追隨氤氳無極蘭麝夾飛如鳥二翼若渴飲毒如寒披棘舌之了味衆塵無有大苦鹹酸莫不甘口噉食衆生虐及飛走唯曰不足長夜飲酒悖亂明行罔慮幽咎身之受觸以自安怡美目清陽巧笑蛾眉細腰纖手弱骨豐肌附身芳潔觸體如脂狂心迷惑倒想自欺至如意識攀緣亂念無邊靡懷善想皆起惡筌如是六塵同障善道方紫奪朱如風靡草抱惑而生與之偕老隨逐無明莫非煩惱輪回火宅沈溺苦海長夜執固終不能改屯否相隨災異互起內懷邪信外縱淫祀排虛枉命實橫死妄生神祐以招福祉前輪折軸後車覆軌殃國禍家亡身絶祀初不內訟責躬反己皇天無親唯與善人外清眼境內淨心塵不染不取不愛不瞋如玉有潤如竹有筠如芙蓉之在池若芳蘭之生春淤泥不能污其體重昏不能覆其真霧露集而珠流光風動而生芬為善多而歲積明行動而日新常與德而相隨恆與道而為鄰見淨業之愛果以不殺而為因離欲惡而自修故無障於精神患纍已除障礙亦淨如久澄水如新磨鏡外照多象內見衆病既除客塵反還自性三途長乖八難永滅上善既修行善無缺清淨一道無有異轍唯有哲人乃能披襟如石投水莫逆於心心清冷其若氷志皎潔其如雪在纏纍其既除懷憂畏其亦滅與思愛而長違顧生死而永別覽當今之逸少想後來之英童懷荊玉而未剖藏神器而在躬修聖行其不已信善積而無窮永劫揚其美名萬代流於清風豈伏強而稱勇乃道勝而為雄孝思賦梁高祖太常卿劉之遴注文多不載想緣情生情緣想起物類相感故其然也每讀孝子傳未嘗不終軸輟書悲恨拊心嗚咽年未髫齓內失所恃餘喘跉𨂲媼相長齒過弱冠外失所怙限職荊蠻致闕晨昏江途遼敻家無指信髣佛行路先君體有不安晝則輟食夜則廢寢方寸煩亂容身無所便投列解職以遵歸路于時齊隨郡王子隆鎮撫陝西頻煩信命令停一夕明當早出江津送別心慮迫切不獲承命止得小船望星就路夜冒風浪不遑寧處途次定陵船又損壞于時門賓周仲連為鵲頭戌主借得一舸奔波兼行屢經危險僅而獲濟及至戾止已無逮及五內屠裂肝心破碎便欲歸身山下畢志墳陵長兄哀愍未許獨行續有北門狡虜寇邊朝庭以先君遺愛結民咸思在昔故舊部曲猶有數千武慶宗將領留防彼鎮時便有旨使扞壽春王事靡𭾑辭不獲免刺史崔慧景志懷翻覆遠招逋逃多聚姦俠大猾凶醜莫不雲集至如彭盆韓元孫等不可稱數倍道電邁奄至淮淝凶徒疑駭相引離散臺軍主徐玄慶房伯玉等欲襲取慧景乃固禁之方得止息是歲齊明作相疑論未決密馳表疏勸徵慧景折簡而召必不違拒即重遣還以安其心姦渠既出㳂邊無虞旬朔之間慧景反鎮即便解甲以歸京師因爾驅馳不獲停息數鍾百六時會雲雷撥亂反政遂膺四海念子路見於孔丘曰由事二親之時常食藜藿之食為親負米百里之外親歿之後南遊於楚從車百乘積粟萬鍾纍茵而坐列鼎而食願食藜藿之食為親負米不可復得每感斯言雖存若亡父母之恩云何可報慈如河海孝若涓塵今日為天下主而不及供養譬猶荒年而有七寶飢不可食寒不可衣永慕長號何解悲思乃於鍾山下建大愛敬寺於青溪側造大智度寺以表罔極之情達追遠之心不能遺蓼莪之哀復於宮內起至敬殿竭工匠之巧盡世俗之奇水石周流芳樹雜沓限以國事亦復不能得朝夕侍食唯有朔望親奉饋奠雖復得薦珍羞而無所瞻仰內心崩潰如焚如灼情切於中事形於言乃作孝思賦云爾感四氣之變易見萬物之化成受天和而異命稟地德而齊榮察蟭螟於蚊眉觀蜫鵬於北溟俱含識而異見同有色而殊形雖萬類之衆多獨在人而最靈禮義別於飛走言語異於鸚猩念過隙之鯈忽悲逝川之不停踐霜露而悽愴懷燧穀而涕零掩此哀而不去亦靡日而弗思仲由念枯魚而永慕丘吾感風樹而長悲雖一至而捨生奉二親而何期思因情生情因思起導情源以流澍引思心而無已既懷憂以終身亦銜恤而沒齒常間居以永念觸拊膺而自傷徒升岵而靡瞻空陟屺其何望涕縱橫以交流血沸涌而沾裳覽地義以自咎懼滅性之乖方仰太極以長懷乃告哀於昊蒼冀皇天之有感何報施之茫茫曉百碎於魏闕夜萬斷於中腸心與心而相續思與思而未央晨孤坐而縈結夕獨處而回遑氣塞哀其似噎念積心其若狂至如獻歲發暉春日載陽木散百華草列衆芳對樂時而無歡乃觸目而感傷朱明啓節白日朝臨木低甘果樹接清陰不娛悅於懷抱但罔極而纏心蒹葭蒼蒼白露為霜涼氣入衣凄風動裳心無回而自切情不觸而獨傷若乃寒氷已結寒條已折林飛黃落山積白雪旅雁鳴而哀哀朔風鼓而颲颲目觸事而破碎心隨感而斷絶無一息而緩念與四時而長切年揮忽而莫反時瞬睒其如電想慈顏之在昔哀不可而重見痛生育之靡答顧報復而無片悲與恨其俱興涕雜血其如霰燕青春而差池鴻素秋而翱翔去來候於節物飛鳴應於陰陽何在我而不爾與二氣而乖張常茹酷而輪回歷日夜而不忘既視丹而成緑亦見白而為黃擾性情以翻覆汩神慮而迷荒想鳴鶴而魂斷聽孤雛而心死慟終天而無怙號畢世而靡恃觀休屠之日磾豈教義之所及見甘泉之畫像每下拜而垂泣忽心動而不安遽入侍於帝室值何羅之作難乃檢之以投瑟超王臣之稱首冠誠勇而無匹士行己之多方見石他之有權身雖死而名揚乃忠孝而兩全顧丁蘭其何人家河內之野王時舞象而方及始成童而親亡刻木母以供事常朝夕而在傍劉鎮就養而不暇常遠汲而力寡苦節感於幽靈醴泉生於竈下顧長沙之臨湘有古初之道始時父歿而未葬遇鄰火之卒起乃伏棺而長號雨暴至而火死又何琦其亦然獨柩屋而全止至如王祥黃雀入帳隗通橫石特起盛彥之開母目邢渠之生父齒覽斯事而衆多亦難得而具紀靈蛇銜珠以酬德慈烏反哺以報親在蟲鳥其尚爾況三才之令人治本歸於三大生民窮於五孝置天地而德盈橫四海而不撓履斯道而不行吁孔門其何教遊七山寺賦梁宣帝此山川之寥廓時天高而氣靜路間曠而清華地幽栖而特挺窮浙左之標絶極㝢中之勝境承興序而陟涉聊盤桓而騰騁盡登臨之雅致悅喧囂之暫屏因茲連鑣結駟並幰方舟萬騎齊列千楫爭浮皆東南之俊異並禹穴之琳球差池集侶容與携儔巷無服馬路寡遺輈窮周章而歷覽盡娛玩而遨遊爾乃傍林橫出輕舠上泝歷秦王之舊陌緣越池之昔路望塗山而斜繞徑南湖而回渡連天台之華嶺引若耶之長注乍泛漾而瞻望或凌峯而一顧於是歷樂林而南上升法華而望西有磕磕之奔㵎復亹亹之長溪既皎潔而如鏡且見底而無泥途嶮峭而巉絶路登陟而如梯既攀藤而挽葛亦資伴而相提窮羊腸之詰屈極馬嶺之高低霧昏昏而漫漫風䫻䫻而凄凄瞻洪川其如帶望巨海其如圭執玉帛於茲地會諸矦而計稽想疏河之茂葉憶大骨之惛迷傳盛美於斯嶽播遺範於氓黎既乃闞往賢之舊跡美高尚之餘風踐逵草之蕪沒撥蓁芿之彌蒙名嶽峨而峙立峻谷杳而虛冲春林縹而皆碧秋沼淨其如空既連綿而相接兼隱軫而無窮信英奇之攸止實翔集之所崇傍高巒而建剎亦帶壟而成宮神靈更其盻蠁仙聖互其交通巖氛霏而起霧樹布濩而抽叢嘉卉生其前後善草植其西東瞻朱扉之赫奕望寶殿之玲瓏擬大林之精舍等重閣之講堂既爽塏之禪宇亦顯敞之華房跨曲㵎而為室繞紆岊而修牆夕雲生於窗牖朝日照於簷梁諒隙曲而成麗蓋照景而生光流清梵之婉轉響桴磬之鏘鏘構造精密華麗無方清流四繞吐溜悠長邐迤闈閣峻絶階隍水碓侔於金谷飛樓似於建章其徒衆則乍遊乍處或賢或聖並有志於頭陀俱勤心於苦行競假寐而誦習咸夙興而虔敬識苦空之迅流惜朝陰之奔競潛深窟而學通隱間蕪而修正或燒體而為功或灰身而入定熏名香之氛氳咸飛錫而相映或振麈而高談或間居而坐聽禪衆疑於漆木智士同於懸鏡既釋教之興華乃法輪之宣盛寺既憑山而構造山亦因寺而有七蓋雲瑞之所臻亦奇士之所出産龍劍之遺溪遊鹿機之餘術謝鳳來而容與鄭風反而蕭瑟既清㵎之漣漪亦飛流之湧溢奇樹蓊而成林珍果榮而非一植山海之雙榴種丹盧之兩橘梅花皎而似霜黃甘朏其如日或曄曄而夏開也離離而冬實山多寶玩地出瓊珍金玉生其陽玞石出其陰神𥸡嵒嵒而獨立仙的皎皎而孤臨孰知歲之豐儉覩玄白而皆諶刻石記於嬴德披圖悟於禹心懸崖百刃擢𠏉千尋岧嶢兮闊達𡻱峗兮嶔崟樹修聳而巖峻泉流激而水深仰瞻增其隱隱側眺覩其沈沈眇然兮無際邈爾兮無邊遠山崔嵬而間出近樹巃嵸而相牽巖將頽而未墮峯入漢而猶懸望蟬聯而蔽日視敞恍而連天有石帆之異狀擬瀑布之飛泉實逢巖而聚霧乃觸石而成煙既嵯峨而蔭映亦嶢屼而阡綿既遠控於江海兼近接於村田反闞城邑傍眺市𮤪稱神州之鎮嶺實天下之名川至若蓬萊遊於聖迹巫岫表於神仙衡陽聞於夏貢嵩嶽重於周篇曾何比麗詎此同妍復有標奇神井萬載澄渟汲之不竭添之不盈雖頻撓而不濁徒屢攪而終清涉隆冬而溫燠經歊暑而冷冷異成都之飛火寧疏勒之表誠匹醴泉之蠲疾同淄水之鑒形亦有孤潭道士焦里夫人獨居味道寂絶朋賓餐霞永日靜坐千春衢無行跡路産荊榛既勤劬而向道亦蕭灑而忘塵或逍遙而諷詠或擁膝而長吟同董生之垂讖學梁子之明針將松喬而共侶與嚴衛而相親其林藪彌密羽族爭歸猿連臂而下飲鳥比翼而群飛鴻鵠集而相映白鷳皛而生輝拂霜毛之奕奕鼓素翮之霏霏兼有奇禽猛獸偃息溪圻虎懷仁而不害熊隱木而生肥巨象數刃雄蛇十圍麀鹿易附狎兔俱依同彭鏗之仙室異海鳥之知機藥卉叢生消痾駐老地出長齡墟多壽考似南山之溪谷匹井中之埋寶送劉五耆何殊四皓復有牛膝雞腸雀頭燕草甘菊辛夷苦參酸棗紫苑赤箭黃精白天門地骨肉芝石腦神農是嘗仙經是造白兔服而通靈鹿皮餌而得道其果則有木瓜木棗楊桃楊梅朱橘冬茂黃𦿁秋開楂梨並壯柿奈爭瓌枳椇列植而為藪懸鉤觸草而徘徊林檎侔於萍實甘棠擬於帝臺紅莓櫻薁車李胡頽緑棎冬獻紫芋秋來半夏成圃春就群栽枇杷梨豆椎栗兼該或炫炫之丹實或靡靡之青荄禦疾風而彌艷中嚴霜而不摧既蓊鬱之梧桐亦檀欒之修竹篠箭亂其形類筋桂異其品族映檐牖而交加繞房廊而郁育抽葉陰於清泉結根攢於幽谷靈木之所自生瑞鳥之所栖宿實散賞之佳地信開心而醒目至如涼秋九月百卉飄零氣淒淒而恆徑風颯颯而常生愁蟬哂於南壟塞鳥吟於北庭蟋蟀哀嘶而遠聞孤𤟤呌嘯以騰聲寒雁嗈嗈而夜響鵾雞啁哳而悲鳴增逸民之放曠動遊士之滯情咸有志於獨往俱栖心於濯纓信達人之良會蓋可申其遊矚故孝先往而成真慶緒經而離俗憑怪石而為枕因滄浪而洗足蓋往賢之所同亦先儒之高學余宿昔之心期常有懷於遐邈屢徘徊於閬圃頻留連於名嶽念家國之隆恩緩獨往之遺躅欲抽簪而未從聊寄美於斯曲宿山寺賦梁王錫脂車秣駟薄暮來遊入界道而遼朗息祇樹而淹留惟基構之所處實顯敞而高居延曾軒之迢遞屬廣廡之踟蹰差繡栭而反宇列緹柱而承隅爾乃陟飛階於峻岐登步櫩於絶頂既中天而升降亦攀雲而遊騁宇陰陰而恬曠階肅肅而虛靜朗華鍾之妙音曜光燈之清影其房則開窗木末浮柱山叢引含光之澄月納自遠之輕風因明兮目極憑逈兮望通平原兮無際連山兮不窮識生煙於岫裏眄列樹於巖中樹凌危而秀色煙出遠而浮空情超遙於原野心放曠於簾籠夜悠悠而何其露穰穰而漸落玩一葉之流螢聆九野之鳴鶴盥泉兮藉芳杜入谷兮佩滋蘭靜嘯兮疏煩想獨往兮恣遊盤信一枝之易息豈萬物之能干就薄帷而安寢乃高枕而星闌鹿苑賦高允啓重基於朔土系軒轅之洪裔武承天以作主熙大明以御世灑靈液以滂流扇仁風以遐被踵姬文而築苑苞山澤以開制殖群物以充務蠲四民之常稅暨我皇之繼統誕天縱之明睿追鹿野之在昔興三轉之高義振幽宗於已永曠千載而有寄於是命匠選工刊茲西嶺注誠端思仰模神影庶真容之髣佛耀金暉之煥炳即靈崖以構宇竦百尋而直上絙飛梁於浮柱列荷華於綺井圖之以萬形綴之以清永若祇洹之瞪對孰道場之塗逈嗟神功之所建超終古而秀出實靈祇之協贊故存貞而保吉鑿仙窟以居禪闢重階以通述澄清氣於高軒佇流芳於王室茂花樹以芬敷涌醴泉之洋溢祈龍宮以降雨侔膏液於星畢若乃研道之倫行業貞簡慕德懷風杖策來踐守應真之重禁味三藏之淵典或步林以經行或寂坐而端宴會衆善以並臻排五難而俱遣道欲隱而彌彰名欲毀而逾顯伊皇輿之所幸每垂心於華囿樂在茲之間敞作離宮以營築因爽塏以崇居抗平原之高陸恬仁智之所懷眷山水以肆目玩藻林以遊思絶鷹犬之馳逐眷耆年以廣德縱生生以延福惠愛內隆金聲外發功濟普天善不自伐尚咨賢以問道詢芻蕘以補闕盡敬恭於靈寺遵晦望而致謁奉清戒以畢日兼六時而宵月何精誠之至到良九劫之可越咨聖王之遠圖豈循常以明教希縉雲之上升羡頂生之高蹈思離塵以邁俗涉玄門之幽奧禪儲宮以正位受大上之尊號既存亡而御有亦執靜以鎮躁覩天規於今日尋先哲之遺誥悟二乾之重蔭審明離之並照下寧濟於兆民上剋光於七廟一萬國以從風總群生而為導正南面以無為永措心於冲妙夫道化之難期幸微躬之遭遇逢扶桑之初開遘長夜之始曙顧衰年以懷傷惟負忝以危懼敢布心以陳誠效鄙言以自著大乘賦李顒大乘者蓋如來之道場也故緣覺聲聞謂之小乘言法駕之通馳如舟車之致遠也夫合抱興於豪末九層作於壘土從淺以高大理妙在於不有迹麁由乎不無舉有以希無則無無以暢忘無以統有則有有以通無無以暢則乘斯小矣有有以通則乘斯大矣夫總福祐之會者莫尚於法身宣一切之知者莫貴乎如來故神稟靈照以觀三達之權思周深妙以入四持之門知色之空任而不敗起滅無崖終始無際寄於宇宙之中而心苞乎二象之外目察於芥子之細而識鑒乎須彌之大美哉淵乎其源固不量也嗟歎不足遂作賦曰建大乘之靈駕兮震法鼓之雷音除行蓋之欲疑兮餐微妙以悅心滿覺意之如海兮演波若之淵深平八道之坦場兮遊總持之苑林定禪思於三昧兮滅色想於五陰執抵羅之引弓兮操如意之喻琴破衆網之將裂兮剗貪垢而絶淫如泡沫之暫結兮焉巧風之足欽成明行而善逝兮積功勳以迄今收薩云之空義兮運十力而魔禽開止觀之光焰兮消邪見之沈吟閉必固之垣牆兮同影響之難尋詳玄賦仙城山釋慧命惟一實之淵曠嗟萬相之繁雜真俗異而體同凡聖分而道合承師友之遺訓藉經論之垂芳罄塵庸之小織請興言於大方何群類之蠢蠢處法界之茫茫性窮幽而彌曉理至寂而逾彰既非空而非有又若存而若亡談祕密於慈氏歡窅冥於伯陽湛一虛而致極總萬有以為綱雖即事而易迷亦至近而難識非名言之所顯豈情智而能測口欲辨而詞喪心將緣而慮息故雖一音遍告之能三轉窮微之力莫不停八梵於寂泊之門輟四辨於恬惔之域尋其涯也豁乎無際眇乎無窮源乎無始極乎無終解惑以之齊貫染淨於此俱融該空有而閴寂括宇宙以通同論其用也一而能多靜而能亂挺萬類之殊形吐群情之別觀結五住之盤根起十纏之羈絆隨迷悟而通塞逐昏明而集散四流因之漂蕩六道以之悠漫三賢十聖曖以聯綿二智五眼曄而暉渙渾升沈而共壑派違順以分岐體無非而不是用無相而不為若純金不隔於環釧等積水不憚於漣漪故令名用喧雜集起紛馳事若萬軫殊轍理則千輪共規觀無礙於緣起信難思於物性猶寶殿之垂珠若瑤臺之懸鏡彼此異而相入紅紫分而交映法無定於心境人靡隔於凡聖物不滯於自他事莫擁於邪正何巨細之殊越遂參互而容持鄰虛含大千之界剎那總三世之時懼斯言之少信借帝網以除疑蓋普眠而能矚豈惑識以知之覿九會之玄文覽萬聖之貽則眷常啼於東市慕善財於南國歷多城而進解訪衆師而遣惑始承命於文殊終歸宗於妙德雖遊形於法界未動足於祇園歎一生之似虐嗟五熱之非昏握手入和修之舍彈指開阿逸之門聞理音之常韻覩極聖之恆存三九於茲絶聽二七自此亡魂斯甚深之境界亦何易而詳論悼稟識之多迷慨群生之少慧保一異之四邪起斷常之雙計怖夢虎於長眠玩空花於久翳縈結纏而未解任漂流而莫濟背七覺而逾昏染六欲而方滯何理通而志隔既法是而情非忽伶竮而獨往久逃逝而亡歸埋積寶於窮舍瘞明珠於弊衣抱一真而不識縈萬惱以歔欷嗟余生於季俗惑己纏而命局藉五部之流輝蒙四依之眷録陟講肆以開愚託禪林而遣欲猴著鎖而停躁蛇入筒而改曲涉曠海以戒舟曉重幽以慧燭絶諍論於封想息是非於妄情創斂緣於有覺終寂慮於無生顯真宗之實相達世用之虛名道莫遺於始行暗弗拒於初明擬六賊其方潰冀十軍之可平辭曰昏雲聚還散心河濁更清性海無增減行月有虧盈疑兔足之致淺懼鴻毛之見輕為山託於始簣庶崑崙之可成玄圃園講賦蕭子雲曰天監之十七屬儲德之方宣惟玉帛之光盛信昌符之在焉於是上照天下漏泉輪囷之氣吐烟日月之景揚員乃聖武之龍飛載為家於天下思承規於景數遂長發而明社若重光於有周似二英於皇夏方前星而列曜播洪鍾於胤雅去茲永福來即東朝文物是紀聲明是昭發玄章於粉繢靡青緌於翠翹鑾納那而垂藻笳和鳴以承簫載錫其光令問令望察情幄帳讓齒虞庠性與天道言為圭璋詩史遙集禮易翱翔義華洛水文麗清漳昔七覺之吐華高人天而為長道西被乎日用法東流而未朗故授神莂於文昌寄寶船於明兩異昔談而同世亦千年而影響聞填填之法雷見慧雲之初爽真如之軌既接發揮之功已躡開金泥剖玉牒削蒸栗之簡採蘿樹之葉石室靈篇南宮神篋所以一音不已而待規重短疊者矣惟至人之講道必山林之間曠彼奈園與杏壇深淨名與素王模清遊之浩漾擬樂賢之隆壯睿情窅然是焉供帳乃高談玄圃之苑張樂宣猷之上觀夫靈圃要妙總禁林之叫窱稟輦道之三星躔離宮之六曜寫溟浚沼方華作峭其山則峛崺貏豸硱磳誳詭坂墀嶻𡾲夏含霜雪下則溪泓澄虹螮降升上則青霄丹氣雲霞鬱蒸金華琳碧燭銀碝石藻玉摛白丹瑕流赤周以玉樹灌叢紫桂香楓篔簹含人桃支育蟲妙草的皪靈果垂長卿寒翠簡子秋紅崖戴雲而吐雨木鳴條而起風中有蘭渚華池淥流濎濘激水推移彌望杳溟倒飛閣之嵯峨漾釣臺而浮逈張翠帷於鴻船泛羽旒於雀艇鳥則杉雞繡質木客錦章戴勝吐綬𪈌𪆊歐香璧龜紫鱉鸊鷉鴛鴦風鳴日思廣浮長內則錢荇菱華𣢺欿散葩硉矹巨石隤陀碧砂離篩比目纍綺紅蝦漂青綸之蓑折蕩碧組之鬖䯯銅龜受水而獨涌石鯨吐浪而戴華所以藉園籞之壯觀將髣像於毗耶於是清宮廣闢宿設宵張華燈熠耀火樹散芒斂閃六尺籠叢九光頴若流金之出沙嶼粲若列宿之動天潢朝曭朗而戒旦雲依霏而卷簇輕輦西園齊宮北囿仗衛濟濟僧徒肅肅法鼓朗而振音衆香馝而流馥亦有百獸𭾢𭾢𭿙𭿙雲車九層芝駕四鹿吳姬楚艷胡笳燕筑常從名倡戲馬踏鞠巡少陽渡紫復繞崇賢瞰承祿揚散華之飄颻響清梵於林木燈王歸而贈筵香積來而獻熟似衆聖之乘空若能仁之在目既而俄軒有睟肆筵授几高殿肅而神嚴微言欣而奏理煥嘉語於丹青得親承於音旨智周物而為心情研機而盡諦言超超而出象理亹亹而踰繫類吳兩娛心之談未足云晉儲真假之理豈能逮史臣乃載筆撰功請事其職賦金相歌玉式世既聞甘露之言民已登仁壽之域矣將奉瑤宮之陪雲樓之軾福穰穰委如山長莫長永無極夢賦釋真觀昨夜眠中意識潛通類莊生之覩蝴蝶如孔氏之見周公雖夢想之虛僞亦心事而冥同爾乃見一奇賓傲岸驚人無名無姓如鬼如神姿容間雅服玩光新入門高揖詣席誇陳余乃問曰夫邪不干正惡不亂善清濁異流升沈各踐吾身披法鎧心遊妙典六賊稍降四蛇方遣大乘已駕小魔宜剪君是何人欲來何辨客乃對曰久承名行未遑修敬常深注仰每軫翹詠忽覩光儀良有嘉慶欲申咨請願垂高命夫人生假借一期如擲倏紅電之驚天迅白駒之過隙豈不及年時之壯美取生平之歡適或走名驥於長阡或駕飛輪於廣陌坐西園而召友敞南齊而對客出野外而摐金入閨中而撫石或復合樽促坐傳觴舉白重之以笑歌申之以燔炙至如學富門昌德重名揚江東獨步日下無雙心為義窟身是智囊雕金往漢佩玉遊梁高車駟馬桂戶蘭房烈燕姬而滿側奏秦女而盈堂聞弦管之寥亮聽絲竹之鏗鏘何則一生之快樂亦千載而流芳豈能栖栖獨處傍無笑語剃髮除鬚違親背主形容憔悴衣裳藍縷既闕田蠶復無商估等碎繒之屢結似破襖之千補至如玉露朝團金風夜寒老冉冉而行至歲忽忽而將闌床空帳冷覆薄眠單絶子孫於後胤罷賓從而來歡欲以斯而為道亦何得道之量難余乃欣然而笑略陳心要徐而答曰省來說之嬌張遂引誘於邪方欲以井蛙共海鯤而論大爝火與日月而爭光無異蟭蟟之比鵬翼㟝嶁之匹崑岡爾既昏眠於生死亦耽染於玄黃唯知酣酒嗜欲峻宇雕牆豈識多財之被害寧信懷璧而為殃佳味爽口美食爛腸貪淫致患渴愛成狂人生易盡物理無常朝歌暮哭向在今亡欣歡暫有憂畏延長且世間紛壤竟無間賞萬苦競來百憂爭往妻子翻為桎梏親愛更如羅網私里恆弊巑屼王事徒勞鞅掌榮華有同水沫富貴實如山響然自沈淪倒惑恆懷磣毒不孝不慈無道無德胸襟𢤱戾心府蠶賊自大嬌奢志能苛剋不行仁義誰論典則無趣殺傷非理貪忒見利爭往臨財苟得失位失名亡家亡國命繩溘斷身城倒匐業掣其頭鬼穿其肋氷池向踐火山方冒忍痛自知銜悲誰惻爾乃刀林擁聳劍嶺嵯峨爐飛猛焰鑊湧驚波楞層鐵網𦾯簇灰河凡諸苦難次第經過頭逢鋸解骨被磨磨舉身星散合體滂沱一朝鍾此萬恨如何若夫正法弘深妙理難尋非生非滅非色非心隨機往赴逐應便臨內宣萬德外啓八音威降醉象影攝驚禽形如滿月色似融金遂令尼揵脫屣梵志抽簪然而出家之為道也則蕭散優游無欲無求不臣天子不敬王侯似無瑕之璧如不繫之舟聲樂不能動軒冕不能留無為無欲何懼何憂戒忍雙集禪慧兼修天人師範豪庶依投若夫為學日益為道日損損之則道業踰高益之則學功踰遠故形將俗人而永隔心與世情而懸反所服唯是布衣所餐未曾再飯從師則千里命駕慕法則六時精懇濯慮於八解之池娛神於七淨之苑至如道安道立慧遠慧持赤鬚法主青眼律師弘經辨論講易談詩開神悅耳折滯去疑並皆揚名後代擅步當時或與秦王而共輦乍將晉帝而同幃遂使桓玄再拜而弗暇郗超千斛而無辭爾乃行因已正方響餘慶四梵爭邀六天俱聘封畿顯敞國土華淨寶樹瓊枝金蓮玉柄風含梵響泉流雅詠池皎若銀地平如鏡妙香紛馥名花交映近感樂神遠歸常命若夫六度修成十地圓明靈智既湛種覺斯盈寂遼虛皎潔澄清質非質礙之質名非名相之名水火衝天而不懼雷霆震地而不驚窮天下之至妙誰能與之抗行於是前來君子聞斯語已合掌曲躬斂眉彈指魂飛氣讋神茹情否踧踖無顏逡巡敬起自陳孤陋未知臧鄙追用感傷實懷慚恥今日奉教謹從命矣傷愛子賦江淹江艽字胤卿僕之第二子也生而神俊必為美器惜哉遘閔涉歲而卒悲至躑躅乃為此文惟秋色之皓皓心結縎兮悲起曾憫憐之憯悽痛掌珠之愛子形惸惸而外弛心切切而內圮日月可銷兮悼不滅金石可鑠兮念何已緬吾祖之赫羲帝高陽之玄胄惜衰宗之淪沒恐余人之弗構覬三靈之降福竚弱子之擢秀酷奈何兮胤卿郯逢天兮不祐爾誕質於青春攝提貞乎孟陬謂比芳於古烈望齊英於前修遰高行之美迹鬯盛業之清猷白露奄被此百草爾同凋於梧楸憶朱明之在節顧岐嶷之可貴睨爐帳而多怡瞻戶牖而有慰奚在今之寂漠失音容之髣佛姊日中而下泣兄嗟季而飲淚感木石而變哀激左右而殞欷奪懷袖之深愛爾母氏之麗人屑丹泣於下壤傃殷憂於上旻視往端而劈標踐遺緒而苦辛就深悼而誰弭歸來命兮何陳我過幸於時私爰守官於江潯悲薄暮而增甚思纁黃而不禁月接日而為光霞合雲而成陰霧籠籠而帶樹月蒼蒼而架林嗟奈何兮弱子我百艱兮是尋驗纖帶之夜緩察葆鬢之朝侵惟人生之在世恆歡寡而戚饒雖十紀之空名豈百齡之能要迅朱光之映夜甚白露之凝朝指茲譬而取免排此理以自銷然則生之樂兮親與愛內與外兮長與稚傷弱子之冥冥獨幽泉兮而永祕余無愆於蒼祇亦何惌於厚地信釋氏之靈果歸三世之遠致願同升於淨剎與塵習兮永棄無為論吾曾回向正覺歸依福田友人勸吾任吾志不改故注無為論焉有奕葉公子者聯蟬七代冠組相望服多素紈黼衣繡裳負長劍而耿耿佩鳴玉而鏘鏘時遊稷下或客於梁聞英雄而豹變聽利害以龍驤乃動朱履而馳寶馬振玉勒而曜金羈之無為先生之門曰先生智德光融嵩華無得以方其峻道義清遠溟海不足以喻其深無學不窺無事不達容儀間靜言笑溫雅至如釋迦三藏之典李君道德之書宣尼六藝之文百氏兼該之術靡不詳其津要而採托沖玄煥乎若覩於鏡中炳乎若明於掌內余聞天地之大德曰生何以聚人曰財是故老𣆀以為柱史莊周以為園吏東方持戟而不倦尼父執鞭而不恥實萬古之師範一時之高士先生嘉遁卷迹養德不仕乃列子之所待非通天下之至理雖江海以為榮實縉紳之所鄙先生攸爾而笑而應之曰富之與貴誰不欲哉乃運而不通也夫忠孝者國家之急務也申生伍員不得志也懷道抱德玄風之所尚楊雄東方其職未高也其大學者不過儒墨亦栖栖遑遑多有不遂也子所引之士者情雖欲之志不行也憂喜不移其情故可為道者也過此已往焉足言哉吾聞大人降迹廣樹慈悲破生死之樊籠登涅槃之彼岸闡三乘以誘物去一相以歸真有智者不見其去來有心者莫知其終始使得湛然常住永絶殊塗無變無遷長祛百慮恬然養神以安志為業故使自天祐之吉無不利舒卷隨取進退自然遁逸無悶幽居永貞亦何榮乎亦何鄙乎子其得之吾何失之塵內方外於是乎著公子恧然而有慚德逡巡而退伐魔詔并序元魏懿法師慰勞魔書檄魔文魔王報檄破魔露布平魔露布文伐魔詔元魏懿法師夫生在三界恆為四魔所嬈沈淪生死遍在六趣若一得人身及聞經法譬見優曇喻值浮孔尋惟聖教實開心目懿身處下流元悕彼岸直因生有惡此漏身心去志恭徒然無補略因愚管憑剿四魔昔在年幼嘗作破魔露布文雖鄙拙頗為好事者所傳自遷都之後寓在洛陽忽於故塔之中得此本文時遇值今國都法師尚在金剛波若寺講勝鬘經輒以呈示得法師學涉內外甚好文彩乃更披經卷賜示魔事兼得擬符時釋道安檄魔文共尋玩之復竭愚淺修改舊文更作平魔赦重薦法師更無嫌也但安公檄文直推天魔凡為世患經列有四且天魔權變非浮情所測煩惱陰死為患實深輒更起伐魔詔慰勞文冠之於初是以前後不同文頗繁重冀信心君子兩得行之輒并編安法師檄文為次合為一卷伐魔詔門下僞魔逋誅于茲曠劫鷹跱四山狼顧五道心頑縱毒常懷返噬固守一隅擁隔聲教自大通已降爰暨賢劫雖百王繼踵千聖相尋威懷百途獎導千計猶不能遏彼邪心息此異見得使貪競相緣瞋癡互舉常結四生終歸六趣眷言斯瘼實用傷懷今原燎方邇浸潤有漸無宜自寬以致顛覆可簡將練卒隨機拯撲勿使蒼生懷豫復之歎主者告下時速施行臣信相等言奉被詔書如左臣聞見機者則承風以先附守迷者必威加而後降是以舜舞干戚有苗自縛於王庭目連援弓則金地相薗之日故能斬伏心王塞靜樓觀身被忍鎧手挈浮囊棄所保之貨賄設禪悅之名肴宴彼奇將集此雄勇志有所規則無往不摧心之所向則無思不服四魔區區焉足以規慮哉但今聚結未散事須平蕩輒依分處星言宿駕謹重申聞請可付外施行謹啓慰勞魔書告三界五道有識群生等夫羲和迭駕盲者尚迷其光雷霆震響聾者猶惑其聽雖照屬理均而稟受道異致令法音擁於殊聞慈光蔽於異見昏痼相仍長迷永夜劫石有殫此緣無竭故我高祖愍此橫流心存拯溺體韞殊光口含異響開宏基於未前搆玄覺於有始故一闡洪猷則巨犉競馳再擇道教則羊鹿服御證無生於胸襟揖寂滅於懷抱但年德推移心存靜定爰命皇儲紹隆大業先帝藉此洪資纂我前緒積德三大纍功塵劫心變冥機遊神赴會身固舟囊陵波拯接出沒任情權旨自在故能超彼九劫降此四天跨據一方威攝萬國八十年中刑措不用但時不我與聖上遷化教迹道殊人懷異念卿等或是日種輪王世跨四域或是月性高良忠貞不二享三界之名宦保一時之榮祿但爵命難恆時有否泰或因憍慢而喪家或由貪殘而失國故令後胤波流奄然忘返遵彼邪原泛此欲海而使天魔承釁作患於上方煩惱因茲侵淫於下國或縈中蔭於未生或馳五衰以告老終疲升降長勤往沒幕府因機傑起英略超群緯文經武體真練俗承百王之洪規稟萬代之遺則履道居彼龍象扣此津門方當馳光上下候騎八維總括群邪羅絡萬有籠三界於一身抗百綱於無外摧拔須彌翻波巨海顛倒宇宙回易日月使人天倒懸水陸燋沸然復塞其必我之心開其子來之路扇清風於荼炭布同愛於無間平蕩三途攝茲四有威以動之福以綏之撮爾小醜焉足以語哉卿等既為所誤沈淪日久宜藉此時機早建良圖夫時難得而易失機尚速而後悔若得時也則福祿競臻如失機也則敗捷爭及故竇融享爵事歸於先覺公孫嬰戮取敗於後機此皆往事之高鑒當今之軌轍且智者處危以謀安愚者臨成以致敗成敗安危在於時機非降自天抑亦人謀今三車竚駕寶藏初開懸重爵以俟功設天官以命哲正是大士縱橫之秋智勇獻功之日與卿等同發遐原枝流異土追惟在昔猶或依依言念四魔不覺撫劍故先遣白書略陳成敗曾改迷徒尋光赴命相與齊轡道場比肩輪下咨稟未聞受教君子友朋好合不亦善乎無宜大安斯趣盤桓遊逸恐此生滅相尋有無繼作若三毒一馳則義無怨親四凶互出則夭壽俱剪雖欲保全其可得哉今善身已建六軍啓途出彼火宅尋討未服梟斬之期非旦即夕幸體往意時作出計勿懷猶豫濫嬰斯禍臨路遣書匆匆無盡檄魔文彌天釋道安頓首魔將軍輪下相與雖復玄徒殊津人天一統宗師雖與三界大同每規良集申其曩積然標榜未宣所以致隔今法王御世九服思順靈網方申紘綱彌布大通有期高會在近不任翹想並申預意釋道安頓首夫時有通塞否終則泰千聖相尋萬師迭襲昔我高祖本元天王體化應符龍飛初域杖權形以割萬邦奮慧柯以伏六合咸蕩四邪掃清三有方當抗宏綱於八區絙靈網於宇宙夷靜七荒寧一九土但冥宗不弔真容凝靜重明寢輝虛舟覆浪故令蛇蟻煩興梟鏡競起翳染真徒塵惑清衆虐被蒼生毒流萬劫懷道有清異心同忿我法王體運應期理物上籍高貴下託群心秉玄機以籠三千握聖徒而隆大業雲起四宮鸞翔天竺降神迦夷為法城塹撫育黎元善安卿士匠導群賢慰喻有疾嚴慧柯於胸中被神鉀於身外愍十八之無辜哀三空之路絶志匡大業情必平難百域千邦高伏風化承君久抱惑心重迷自覆深執愚懷固守為見狼踞欲天梟鳴神闕畔換疆埸抗拒靈節謂天位可登洪規可改攬茲二三遠為歎息何者大通統世則群方影從而僞癡天魔不遵正節忓忤聖聽塵撓神心領卒塞虛奇形萬變精鉀曜曦霜戈拂日靈鼓競𪔖響衝方外高步陸亮自謂強威而王師一奮群邪殄喪魔衆革心望風內附況君單將僥然一介土無方尋衆不成旅而欲背理違常陵墟華邑篡奪靈權勝常取信以僞忝真可不謬矣于今釋迦統世道隆初劫妙化堂堂神羅遠御智士雍雍玄算蓋世武夫龍超捉䩙千隊協略應真奇謀超拔故命使持節前鋒大將軍閻浮都督歸義侯薩陀波崙獨稟天姿義陳玄覺神高須彌猛志籠世善武經文忠著皇闕領衆四十萬億揚鑣首路子故命使持節威遠大將軍四天都督忉利公導師曇無竭武勝群標文超隨夏宏謀絶塵心栖夢表每憂時忘身志必匡世領衆百億虎眄須彌故命使持節征魔大將軍六天都督兜率王解脫月妙思虛玄高步塵表略並童真功侔九地悼愍三塗忿君縱害援劍慷慨龍回思奮領衆五百萬億鸞鳴天衢故命使持節通微將軍七天都督四禪王金剛藏朗志虛玄金顏遐矚恩殊九錫力傾山海左顧則濛泛飛波右眄乃扶桑落曜德無不施威無不伏領衆七百萬億雲回天門故命使持節鎮城將軍九天都督十地大王維摩詰奇算不思法柯達震體合神姿權像萬變呼吸則九服雲崩叱咤則十方風靡威被下愚無辜酸楚領衆九百億飲馬靈津故命使持節鑒復大將軍十九天都督十住大王文殊師利承胄遐元形暉三耀身自金剛神高體大應適千途玄算萬計群動感於一身衆慮靜於一念深抱慈悲情兼四攝領衆塵沙翱翔斯土故命使持節匡教大將軍十九天都督録魔諸軍事群邪校尉中千王觀世音智略淵深慧剛遐網明達六通朗鑒三固或託跡群邪耀奇鋒起或權形二九息彼塗炭揮手則鐵圍摧巖噓氣則浮雲頽崿能為十方作不請之益領衆不思風吟虎嘯故命使持節撫化大將軍十方三界大都督補處王大慈氏妙質從容天姿標朗體踰金剛心籠塵表猛志衝天慧柯遠奮無生轉於胸中權智應於事外志有所規無往不就威恩雙行真俗並說領衆八百萬億嚴駕待命勇士之徒充盈大千金剛之士彌塞八極咸思助征席卷六合乘諸度之寶軒守八正之修路跨六通之良馬捉虛宗之神轡彎四禪之良弓放權慧之利箭鳴驥桓桓輕步矯矯撫劍飛戈長吟命敵而將軍纍世重光匡濟帝業歷奉聖庭曾無有闕貴即道師身子五百幽鑒天命秉受王化聖上開襟皆授名爵封賞列土功侔舊臣聲蓋萬域而君何心橫生異見偃蹇邊荒頑顧常位毒害勃於蒼生災禍流於永劫可不哀哉可不謬哉君昔因時荒為物所惑狂迷君心投僞外竄百行一愆賢達尚失久謂君攬智返愚歸罪象魏束身抽簪同遊群俊以道自娛榮名終始仍執愚守惑偷安邪位託癡山以自高恃見林以遊思耽六欲之穢塵玩邪迷以娛性建憍慢之高幢列無明之凶陳闊步長塗輕弄神器盜篡天宮抗拒日月恐不異舉手欲障三光掊土擬填於四海打鼓與雷爭音把火共電競耀雖擬心虛標事難就矣然將軍殖德玄津原承彌遠暉華暐然群下矚目望貴之基易登由來之功可惜可改往修來翻然歸順謝過朱門與道齊好家國並存君臣俱顯取名獲安曉目達觀眷屬晏然可不美歟大師剋舉萬方矯電手提法蠡齊撫慧劍道柯輝耀於前驅靈鼓振音於後隊神鍾一扣則十方傾覆海浪飛波則原陸湯沸當爾之時須彌籠為微塵天地回為一粟無動安於左襟妙樂握於右掌神力若斯豈可當哉然我法王體大仁慈未欲便襲權停諸軍暫頓靈轡臨路遣書庶回迷駕君可早定良圖面縛歸闕委命王庭逍遙間境上方宰任非君而誰夫聖人上智識機明責勉禍窮而知返君子所美此乃轉福之高秋取功之良節昔夏桀無道殷王致伐商紂首亂周武建師此則古今之常軌將軍之明誡相與雖復形乖於當年風流於道味人天踦嶇何足致隔想便霍然隨書投命所以切痛其辭委曲往久者不欲令芳蘭夏雕翠柯摧頴深思至言善從良計勿使君身傾匡三概勿使六天鞠生禾䅎迅目仰眺助情暢然臨紙多懷文不表意釋道安頓首魔主報檄大夢國長夜郡未覺縣寱語里六自在主他化皇帝報檄於高座大將軍南閻浮提道綏撫大使佛尚書安法師節下音耗自遠喜同暫接尋覽句味良用欣然方見大國之臣禮義高矣承將軍虛心豁達密行淵玄襟帶山河牢籠宇宙慮深宗廟憂及生民秀氣千尋真心萬仞諒疾風之徑草也亂世之忠臣也冀道遇則鄰彼我非隔俯從人事聊此報章昔周室既衰六國鼎沸漢朝運滅三分天下或外夷侵叛毒被中原或內禍潛作殃及良善應期鵲起達時豹變有之自古豈止今日惟蒼生亹積上天降禍釋迦皇帝奄然登遐哀纏臣妾悲浹率土皇太子彌勒養德心宮滿月停山深叢隱藥數鍾百六之世代虧九五之君諸侯姦猾猜忌相處一十八部教軌參差九十六道樽爼回互狼噬海濱梟鳴山曲左不記言右不記事國憲朝典與霜露而雕零天璽帝璧同氷消而葉散臣怨民怒衆叛親離逃逝無歸伶𨂲長往竊謂數屬太平沐浴朝化時逢亂世濟難干戈蓋乃通人之權變也謹率義兵發憤忘食並登山拉虎臨河斬龍緯武經文輕身重義社稷是所不圖也天位非所傾望也直以心城無主邪戲塵勞沓𣵻欲流將心源而共遠忽恍大夢與永夜而俱長還因假寐弔民伐罪先遣聚沫大將軍黃玄矦率空華之卒策陽炎之馬即乾城之隅結浮雲之陳戈甲昱爍弓戟參差鋒刃未交服兵先敗次命澗響大將軍絲竹公領宮商之衆據傳聲之谷隨聞隨剪次命百和大將軍蘭麝伯領馨香之旅乘風抒陳千里無雲次命六味大將軍領肥美之卒為面門都督守滄溟之口吞噬無遺次命七觸大將軍領細滑之衆戰鼓才擊身城瓦解五軍前討百戰恆捷自天是祐罄無不宜朕慮未窮巢穴躬行問罪戎衣既整出自空窟發淵泉之智動山嶽之威承妄想之兵數盈兆載並潛神識海隱影心山命將元帥案劍城旅徵兵士卒擎刀結陳排空塞逈煙飛霧集莫不雄氣衝天吐妄雲於真際高風駭地驚塵浪於性海擊道品官軍霜夜抒籜一心既沒還源彌遠六愛已然宅火逾盛縱橫剪掠腹背羅討六奇三略先蘊胸襟百步千榮本無橫陳遂雲消霧卷吾道興焉於是分官置職行我風化敕無廉驃騎虎踞貪山性澀將軍龍蟠慳海瞻恤之士水陸無寄敕繫地郎將置陰陽之府情塵駙馬觀伉儷之兵愛水暫流身城被漬欲火才發天廟遭燒繕性將軍已從焚溺敕咆勃校尉弓劍隨身鴆毒鷹揚戈戟在手嚴毅士卒警固賄城使平忿將軍銷聲剷跡敕正勤御史且停監察隨眠武侯安撫朝猷放蕩無明縱恣有待使精進一馬罷行四勤之路迦留二箭不射三空之門勇猛將軍風煙歇滅敕覺觀大司馬置府初禪邪思惟都尉列陳三有心原未靜頻被風波禪枝欲茂再遭霜雪安靜將軍埋身亂境敕我見行高鎮陀那之嶺惑山萬刃疑戍百重討返還迷問津天路使觀身實相申如羊角緣家妄業密若魚鱗故毒動狂子酒醒醉客覆真金藏隱肥膩草博通將軍兀然如醉斯則率土之賓皆吾民也今十軍意氣五將英雄乘機發立成國宗廟朕俯仰即位臨軒御宇纂承王業握圖受命困弱之輪無際足擬金輪心與駿䭿有餘聊充紺馬衣冠無二車書已一方扇長風於火宅粉高車於門外解釋甲胄與民更始將軍士卒並亡智力俱喪路窮箭盡棄馬焚舟螳螂舉臂良可愍也良可恥也盜跖率卒侵暴諸侯孔丘置陳流汗反府即將軍之明誡也皇太子彌勒代邸龍飛朕汗馬歸朝銜罪庭闕將軍見徵未敢聞命也情深筆短不能多白冀歸高君子相期於言外焉波旬頓首死罪破魔露布文廣緣將軍流蕩校尉都督六根諸軍事新除惡建善王臣心賑惠將軍善散子都督廣濟諸軍事監軍臣施繕性將軍剋欲界都督攝志諸軍事司馬臣戒平忿將軍蕩恚侯都督洪裕諸軍事司空公臣忍勇猛將軍勤習伯都督六度諸軍事行臺臣進安靜將軍志念都尉都督觀纍諸軍事攝散侯臣禪博通將軍周物大夫都督調達諸軍事監照王臣智行言謹案臣聞治靜泰平凶徒有時以興化清去殺逆黨因之而作是以文命引狩於九圍遇死魔於嵞山頂生騰輪於六合值貪賊於忉利故使身滅知威魂散閩越淪蕩他鄉退失尊位良由內挾姦邪外樹塵軌賞差信功罰乖臣惡故也自世宗釋迦文皇帝晏駕固林倏餘千載太子慈氏阿逸多有事兜率未遑紹襲法城暫空梵輪無主塵域外叛沙州弗貢遂使三界風驚六天烽起邪徒詭說翻成異俗僞自在天主賊王波旬稟質昏猜體襲邪氣我慢在心愛結盈慮矯奪惠命竊弄神器放縱欲界窺𨵦皇境且其政教陵替內外相違姊妹同姦千子二志三女邪蕩邀我上宮姿態未施自貽伊耋又波旬玩習小道頗有才辨愎諫飾非好是奰怒不用順子之言專從佞臣之計伺國間隙乘亹來侵僞結使大將諸煩惱等因聖道消運鍾八百光音無間十纏斯作遂陳欲兵於愛海策疑馬於高原控轡於二見之域馳騁於無明之境值聖則卷跡高栖遇惡則泄惡中區負險重關觀時而設或志求榮利假寐權門或含忿威衆專行毒害意氣稜層固守方等憍慢邊隅未識正朔方復假遣七使傳車三障詭宣六條以致殊俗愚者承教而濯纓智人棄之而㵎飲畜卒俟前儲烽候進僞四天大都督五陰魔等置宅於無始之原卜居於有形之裏浮游於苦海之中放逸於火宅之畔竊號躬身假署六府偷榮瞬息耽樂時顏元首未幾徒役無算飢兵妬卒流川遍野怖士愁人亘山滿谷同惡相求緝結一方異類群聚岨兵三界僞署行臺有生死賊王觀兵五道置卒三塗在生逆命處老作寇五衰告期四生應世擁塞泉原杜絶飄焰業力咆𠷺率危脆以先馳三毒趦趄挾群有而長逝安忍無親禍連九族威怒互行戮及忠孝方乃忽聖誣賢欺真枉正陷穽黎元羅絡凡庶妄計苦空以為己有驟驚之勢謂固同金石者也以正月三十日黃昏時有一人姓善字知識從道場來告云賊去此不遠宜急剪撲不爾當為大患臣聞此語未悉敬信單駕羊車轉軍化城深修塹柵自備而已賊方於後夜遣一使來多貢珍異求結和好臣知此賊勢若泡焰智計莫出意性狂勃難可親近弗與之言抱恨而去方多設詭械欲來侵逼即以月七日向晨出方便門頓解脫處馳信郵以深入徵群迷以出海纂集三昧以致一塹冀蕩除五陰式清諸有賊方恃固一川拒抗皇威其水彌漫廣深難際又值旋嵐傾勃雹霰瀉澍擊浪揚波海神竟涌七等雜類或飛或沈夜叉守塗羅剎據津流瞽流聾覆沒善財其欲淜泳鮮不沈溺又臨圻阻涘大築城壘壁立隍濬險閣唯有一門四垂幽谷一人執戈萬夫攝思四果怯憚辟支戰栗遂集衆唱識規望進擊驟度能僉曰或可即勒軍士為渡水故備取諸草木編以為筏附令抱踏橫波直進臣等手案浮囊泝流而往固護無非遂登彼岸部分將士修備兵車齊心戮力驅馳往撲即遣安靜將軍領觀纍之卒據散亂之原又使平忿將軍率洪裕之兵塞怒谷之口復令賑惠將軍引廣濟之衆截慳貪之路更勒博通將軍整洞達之士守狂癡之徑督師羅張四面交侵積戰告捷不月而三行臺恐衆邂逅不得競進乃催厲六軍置阿惟越地而餘燼遊魂偷安他化驅率犬羊欲來拒戰乃假虎兕以為威招熊羆而自衛異首別面之徒吐風火而待發擔山戴樹之類方蟻聚以齊衡希進皇家膺符受命啓土塵劫疊聖重光享祚無窮先帝鼎湖之日顧命殷勤專令文德以來不許戰爭而致幕府受詔之初依敕而行略設六奇斷截而已但狂竪侜張猶敢逆節雖遣貝多曉喻都無悛心乃更命將大權徵兵十萬嘗未浹辰大弘淨土資無畏以嚴身兼衆妙而獨拔龍蟠道樹虎視娑婆十號一宣則四八應期言教暫設則二九雲集遂擊討鼓而出三空建慈幢以臨八難講武大千曜威萬域神戈暫指則魔徒失膽惠劍一揮則群邪俱斃現道身而斬死魔因般若以戮煩惱摧波旬於不動之林滅五陰於計性之境然後蹙巢守穴到不到處巡伏隱身者唯一人而已遠處膏肓非勇力攻及也遂乃竄生死於寂滅之原流老病於常樂之境排三障於六通之衢投七使於薩婆之域元凶既梟首徒黨伏誅自餘從者並不追問諸有誠心先欵者悉令解甲去鋒編戶民例授以遠號私之樂土為拔五箭并以善醫療除垢病施惠湯藥于時業風息吹六塵弗起祥雲四舒靈禽翥翼引八部而自誤嚴四七以守衛垂拱間堂無為而已大覺天王等好尚風軌志存拔擢援昔舊謨殷勤諫諍辭不獲免默許所奏爾乃開甘露門出八正道千輻雲回來儀鹿苑四天獻器於高掌二商薦肴於初請故緣行録勳則陳如先封真諦開賞則耶舍繼襲或朋類蒙榮或兄弟感澤邑不肖於初果表有德於十地依准古禮巡省方嶽振旅六城治兵八國理怨於三天之上問罪於九地之下徵英傑於十方會萬國於鷲嶽華荒剋臻異士勇出於是啓寶藏以賑貧窮出三車以給諸子撫納黔黎寧堵復業乃身安一乘心固槃溪據林眄水宣揚皇澤依恆說逸召集未賓仁風匝宇道光遐照四面交通化流無別聽訟於中路之域決判於寶山之所無量之威遠震城嶽無礙之智洞徹山河故土無二統車書一軌日月重光天地清朗六萬之衆解長圍以從正十仙之徒棄大河以就祑不動之賢不遠千里意樂之哲應感而至工人率簞食於尸城捷獸奉壺漿於長源內外剋清表裏咸泰實由道音四敷餘波東訓主上至心群僚深敬稟承神規殄茲凶醜豈臣智力所能剋感也冀憑此一勳漸望更進方事前計凱旋未日並露布以聞臣等死罪死罪平魔赦文門下首區同源因派異緒窪隆代興信背千途故智勝標宗歷塵劫而上三登明啓教經九中而未一況乃邪徒僞見賀刺犢於自然之原結賊妄根御形色於顛倒之境以茲偏師抗衡中道眷言二三良用憮然自先帝升遐寶歷無主淳風漸虧靈教異設僞魔乘間充斥神邑假變真容妄談空有驅役四生周還六趣畔換欲天狼戾愛地毒被邊荒虐流華夏雖獫狁之侵宗周凶奴之陵炎漢未為喻也朕以神昧主自幼齒參玄弱冠從政班名於大通之年驅驟於賢劫之下荷百億之重任忝三界之特尊人天樂推無所與讓遂陟靈壇受茲封禪顧惟多闕有慚庶政明發孜孜不遑啓處常恨封境未清正教無一致使群生沈淪魔境每一撫念用廢寢食遂命將徵兵以清時難上藉三昧之士下憑六度之師控清方夏大龕荒服故六軍雷動則三有雲消慈施電馳則四凶面縛降附若塵生擒萬計唯波旬一人單馬奔迸百道截羅組繫不久且令五道告清寰外咸一思與天下同茲福慶可大赦天下與同更始改像教之號為即真之歲自二月八日昧爽已前繫罔見徒悉皆原放若為四魔所悟浮游三界犯十惡五逆毀經壞像三世所作一切衆罪能改過自新者不問往愆若亡命欲山挾藏姦器百劫不自首者伏罪如初其殺父害君傷兄蒸母隨時投竄以息後犯其闡提一人不在赦書擯罪遙責神速可乘意驛遍告十方主者施行即真元年二月八日中書令補處王臣逸多宣臣文殊等言奉被詔書如右臣聞毀忠謗善經千葉而不無邪臣逆子歷百代而常有是以三監流言伏罪於明時五百背道甘誅於聖世故王威必震慶當於周邦改教暫加福歸於露鼓伏惟陛下慈兼百王智齊千聖秉瑞靈津握圖玄化出沒動於大千馳騁應於群有服微形以引愚迷吼法音以振聾俗至乃刎身志道釘體求經析骸質禽委命降獸捨塵劫之危軀收一生之妙質龍潛四天利見閻浮輕彼七寶重此一乘撤玩深宮減膳河側去寶冠於苦林貿法衣於獵士故能駕御四禪時乘六度殄服群邪易於返掌三界無熾然之警四生絶沈溺之憂方復情存解網志尚宥愆十八來蘇萬國幸甚謹重申聞請可付外施行謹啓即真元年二月八日侍中臣文殊師利侍中臣薩陀波崙黃門臣師子吼黃門臣舍利弗黃門臣須菩提平心露布文擬唯識道行軍府謹奏平心露布事擬使持節儀同三司領十二住大將軍唯識道行軍元帥上柱國晉國公臣般若等言臣聞四魔放命歷代以之為鯁五住遊魂含識因其致患是以三明聖智十力雄尊莫不屢動偏師頻行薄伐伏惟陛下乘大慈而啓運應冥感而赴期奄宅神區光臨法海述前王之令典演衆妙於圓音考列聖之玄謀會群生於淨國三千剎土共稟威靈百億類洲同遵聲教唯有僞心主阿黎耶識擅假名器叨竊生民跨有乾城綿歷年祀逐窮迷於夢境長夜不歸縱極亂於空花終年如醉推攀緣為蕃屏之任引戲論為帷幄之臣陷溺黎元干擾鋒鏑陛下應真理物調俗御民念此鯨鯢愍斯塗炭遂詔臣揚旌色野問罪心庭臣敢效庸虛稟承奇略去四月十六日軍次心境即以其夜初更與賊相見臣於是潛機密會玄契冥馳集戈船於六度之津命戎車於一乘之轍屯營三月揚清梵以申威列陳九旬擊鳴鍾而作氣阿黎耶識固重昏而莫曉執窮計而不移譬螳螂之拒輪等蜂䘍之含毒乃遣僞恆行大將軍阿陀那識率無明之子弟恃無賴之胸襟據守乾城與臣抗敵又遣僞自性大都督迦毗羅仙僞執此大將軍迦旃延子招引烏合聚結蟻徒搖蕩邊陲激揚聲勢臣遂分布諸將指麾籌策遣擬使持節拔塵大將軍領四念處諸軍事率道品縣開國公臣求知擬使持節寧境大將軍領八正道諸軍事通真縣開國公臣如實知部勒驍雄星流電轉從方便諸道靜緣邊之界臣求知等尋名討義躡影追蹤乍橫行於密室之間或轉戰於鄰虛之隙事窮理絶域盡途殫冥宗所以氷消數論於斯瓦解迦毗羅等知大乘之有在識玄統之所歸各將羸卒數千咸來請命臣哀其晚悟許以自新即令慈悲觀道士畢無緣隨便安養僞諫議大夫郅諦懷逸群之思負出世之奇將全國以效忠返危身之被繫臣以此月十五日夜挾中軍之勇氣乘外敵之離心手抗干戈躬先士卒爰命擬使持節兜率大將軍娑婆道招慰大使上柱國翅頭末開國公臣阿逸多擬使持節閻浮大將軍天竺大都督天竺諸軍事上柱國富婁沙開國公臣婆藪槃豆並以道邁三空神遊四辨使其招揚勝負曉喻是非又遣擬使持節平等大將軍兼行軍長史上柱國清涼縣開國公臣正念擬使持節遍滿大將軍兼行軍司馬上柱國常樂縣開國公真如與臣表裏玄同更相應接于斯時也邊秋氣爽塞月光寒旌旗共雲漢齊高鋒鍔與霜天比淨披弘誓駕圓通超兩觀而爭前排千門而並入雖生死無際一念覩其濱涯塵勞有儔須臾見其崩潰僞丞相陳顯僞僕射慮思無計求生闔門自縊僞司空師子鎧僞司隸達磨多羅各擁餘師自嬰深壘狐疑競起猜詐萌生忍顛危而不見扶遂淪亡而莫能濟阿陀那與其僞主外無強援內寡深謀師旅困窮城池陷露君臣失色進退無依銜璧叩頭輿𭣋待罪臣即梟陀那之首釋郅諦之囚廢彼昏王立其賢嗣方使宗禋不絶永為茅土之君世德相承恆修職貢之禮於是氛祲開蕩若和氣之泮春氷醜穢殲夷似涼風之卷秋籜六根超絶不開亭障之虞三界寂寥無復風塵之警斯乃威光遠被士衆齊心豈臣微劣所能致此不勝慶快之至謹遣厚德府別將臣隰重知奉露布馳驛以聞
