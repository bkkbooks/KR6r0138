front:
  text: 廣弘明集悔罪篇序終南山釋氏夫福曰富饒罪稱摧折富則近生四趣厚報榮祿滿於目前遠則三聖勝相資用豐於群有至於罪也返此殊途良由沈重貪瞋能獲果登苦楚所以罪業綿亘勞歷聖凡凡惟罪聚不足討論綸網正行事該小學致使須斯二果尚弊於怒癡羅漢漏盡猶遭於碎體是知無始故業逐分段而追徵有為積障望變易而回道自古正聖開喻滋彰時張四惑三三九品欲使隨念翦朴豈得縱以燎原然以煩惱增繁難為禁制勃起忽忘早樹根基過結已成追悔無己但以諸佛大慈善權方便啓疏往咎導引精靈因立悔罪之儀布以自新之道既往難復覆水之喻可知來過易救補浣之方須列遂有普賢藥上之侶分衢而廣斯塵道安慧遠之儔命駕而行茲術至於矦王宰伯咸仰宗科清信士女無虧誡約昔南齊司徒竟陵王制布薩法淨行儀其類備詳如別所顯今以紙墨易繁略列數四開明悔過之宗轄焉
