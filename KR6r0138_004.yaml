body:
  text: 大唐西明寺沙門釋道宣撰歸正篇第一之四捨事李老道法詔梁武梁高祖武皇帝年三十四登位在政四十九年雖億兆務殷而卷不釋手內經外典罔不厝懷皆為訓解數千餘卷而儉約自節羅綺不緣寢處虛間晝夜無怠致有布被莞席草屨葛巾初臨大寶即備斯事日惟一食永絶辛羶自有帝王罕能及此舊事老子宗尚符圖窮討根源有同妄作帝乃躬運神筆下詔捨道文曰維天鑒三年四月八日梁國皇帝蘭陵蕭衍稽首和南十方諸佛十方尊法十方聖僧伏見經云發菩提心者即是佛心其餘諸善不得為喻能使衆生出三界之苦門入無為之勝路故如來漏盡智凝成覺至道通機德圓取聖發慧炬以照迷鏡法流以澄垢啓瑞迹於天中爍靈儀於像外度群迷於欲海引含識於涅槃登常樂之高山出愛河之深際言乖四句語絶百非應迹娑婆王宮誕相步三界而為尊普大千而流照但以機心淺薄好生厭怠遂乃湛説圓常亦復潛輝鶴樹闍王滅罪婆藪除殃若不逢遇大聖法王誰能救接在迹雖隱其道無虧弟子經遲迷荒耽事老子歷葉相承染此邪法習因善發棄迷知返今捨舊醫歸憑正覺願使未來生世童男出家廣弘經教化度含識同共成佛寧在正法中長淪惡道不樂依老子教暫得生天涉大乘心離二乘念正願諸佛證明菩薩攝受弟子蕭衍和南于時帝與道俗二萬人於重雲殿重閣上手書此文發菩提心至四月十一日又敕門下大經中説道有九十六種惟佛一道是於正道其餘九十五種名為邪道朕捨邪外道以事正內諸佛如來若有公卿能入此誓者各可發菩提心老子周公孔子等雖是如來弟子而化迹既邪止是世間之善不能革凡成聖其公卿百官侯王宗族宜反偽就真捨邪入正故經教成實論云若事外道心重佛法心輕即是邪見若心一等是無記性不當善惡若事佛心強老子心弱者乃是清信言清信者清是表裏俱淨垢穢惑纍皆盡信是信正不信邪故言清信佛弟子其餘諸信皆是邪見不得稱清信也門下速施行至四月十七日侍中安前將軍丹陽尹邵陵王上啓云臣綸聞如來嚴相巍巍架于有頂微妙色身蕩蕩顯乎無際假金輪而啓物託銀粟以應凡砥波若之利刀收涅槃之妙果泛生死之苦海濟常樂於彼岸故能降慈悲雲垂甘露雨七處八會教化之義不窮四諦五時利益之方無盡並𣲙清日盛霧豁雲除爝火翳光塵熱自靜可謂入俗化於蒙底出世冥此真如使稠林邪徑之人景法門而無倦渴愛聾瞽之士慕探賾而知回道樹始於迦維德音盛于京洛恆星不見周鑒娠徵滿月圓姿漢感宵夢五法用傳萬德方兆華俗潛啓競扇高風資此三明照迷途之失憑茲七覺拔長夜之苦屬值皇帝菩薩應天御物負扆臨民含光宇宙照清海表垂無礙辨以接黎庶以本願力攝受衆生故能隨方逗藥示權顯因崇一乘之旨廣十地之基是以萬邦回向俱稟正識幽顯靈祇皆蒙誘濟人興等覺之願物起菩提之心莫不翹勤歸宗之境悅懌還源之趣共保慈悲俱修忍辱所謂覆護饒益橋梁津濟者矣道既光被民亦化之於是應真飛錫騰虛接影破邪外道堅持正國伽藍精舍寶剎相望講會傳經德音盈耳臣昔未達理源稟承外道如欲須甘果翻種苦栽欲除渴乏反趣醎水今啓迷方粗知歸向受菩薩大戒戒節身心捨老子之邪風入法流之真教伏願天慈曲垂矜許謹啓至四月十八日中書舍人臣任孝恭宣敕云能改迷入正可謂是宿植勝因宜加勇猛也廢李老道法詔北齊高祖文宣皇帝昔金陵道士陸修靜者道門之望在宋齊兩代祖述三張弘衍二葛郗張之士封門受籙遂妄加穿鑿廣制齊儀縻費極繁意在王者遵奉會梁祖啓運下詔捨道修靜不勝其憤遂與門人及邊境亡命叛入北齊又傾散金玉贈諸貴遊託以襟期冀興道法帝惑之也於天保六年九月乃下敕召諸沙門與道士學達者十人親自對校于時道士祝諸沙門衣鉢或飛或轉祝諸梁木或橫或竪沙門曾不學方術默無一對士女擁鬧貴賤移心並以靜徒為勝也諸道士等雀躍騰倚魚睨雲漢高談自矜誇衒道術仍又唱言曰神通權設抑挫強禦沙門現一我當現二今薄示小術並辭退屈事亦可見帝命上統法師與靜角試上統曰方術小伎俗儒恥之況出家人也雖然天命令拒豈得無言可令最下坐僧對之即往尋覓有僧佛俊一名曇顯者不知何人遊行無定飲噉同俗時有放言標悟宏遠上統知其深量私與之交于時名僧盛集顯居末坐酣酒大醉昂兀而坐有司不敢召之以事告於上統上曰道士祭酒常道所行止是飲酒道人可共言耳可扶輿將來於是合衆皆憚而怯上統威權不敢有諫乃兩人扶顯令上高座既上便立而含笑曰我飲酒大醉耳中有所聞云沙門現一我當現二此言虛實道士曰有實顯即翹一足而立云我已現一卿可現二各無對之顯曰向祝諸衣物飛揚者我故開門試卿術耳命取稠禪師衣鉢祝之諸道士一時奮發共呪一無動搖帝敕取衣乃至十人牽舉不動顯乃令以衣置諸梁木又令祝之都無一驗道士等相顧無賴猶以言辨自高乃曰佛家自號為內內則小也謂我道家為外外則大也顯應聲曰若然則天子處內定小百官處外定大矣靜與其屬緘口無言帝目驗藏否便下詔曰法門不二真宗在一求之正路寂泊為本祭酒道者世中假妄俗人未悟仍有祇崇麴糵是味清虛焉在瞿脯斯甜慈悲永隔上異仁祠下乖祭典皆宜禁絶不復遵事頒勒遠近咸使知聞其道士歸伏者並付昭玄大統上法師度聽出家未發心者可令染剃爾日斬首者非一自謂神仙者可上三爵臺令其投身飛逝皆碎尸塗地偽妄斯絶致使齊境國無兩信迄于周時隋初漸開其術至今東川此宗微末無足抗言帝諱洋即元魏丞相高歡之第二子也嫡兄澄急慢為奴所害洋襲其位代為相國魏曆將窮洋築壇於南郊筮遇大橫大吉漢文之卦也乃鑄金像一瀉而成魏收為禪文魏帝署之即受其禪為大齊也凡所行履不測其愚智委政僕射楊遵彥帝大起佛寺僧尼溢滿諸州冬夏供施行道不絶時稠禪師針帝曰檀越羅剎察治國臨水自見帝從之覩群羅剎在後於是遂不食肉禁鷹鷂去官漁屠辛葷悉除不得入市帝恆坐禪竟日不出禮佛行繞其疾如風受戒於昭玄大統法上面掩地令上履髮而授焉先是帝在晉陽使人騎駝敕曰向寺取經函使問所在帝曰任駝出城及出奄如夢至一山山半有佛寺群沙彌遙曰高洋馲駝來便引見一老僧拜之曰高洋作天子何如曰聖明曰爾來何為曰取經函僧曰洋在寺懶讀經令北行東頭與之使者反命初帝至谷口木井佛寺有捨身癡人不解語忽謂帝曰我去爾後來是夜癡人死帝尋崩於晉陽通極論隨沙門釋彥琮原夫隱顯二途不可定榮辱真俗兩端孰能刊同異所以大隱則朝市匪喧高蹈則山水無悶空非色外天地自同指馬名不義裏肝膽可如楚越或語或默良踰語默之方或有或無信絶有無之界若夫雲鴻振羽孔雀謝其遠飛淨名現疾比丘憚其高辨發心即是出家何關落髮棄俗方稱入法豈要抽簪此即染淨之門權實而莫曉倚伏之理吉凶而未悟遂使莊生宗齊一之論釋子説會三之旨大矣哉諒為深遠實難鉤致竊聞陰陽合而萬物成醎淡和而八珍美何廢四時恆序五味猶別以此言之豈真俗之混淆隱顯之云異或有寡聞淺識則欲智陵周孔微庸薄宦便將位比帝王強自大以立身謂一人而已矣不信有因果遂言無佛法輕毀泥越踐蔑沙門愚襲腐儒戲招冥禍或有始除俗服狀如德冠天人才挂僧名意似聲高海域傲然尊處許為極聖豈知十纏猶障三學靡聞不隨機而接物竟抱愚而自守悲夫二子殊途一何踳駁高懷達士孰可然哉冀欲解紛挫鋭假設旗鼓雖復俱有抑揚終以道為宗致其猶五色綺錯近須彌而會同萬像森羅依虛空而總集歸根自紜紜之物吞谷實茫茫之海斯誠光贊於佛道述獎於玄門庶令無我無邪允謙允敬式貽後進論之云爾有梵行先生者高屏塵俗獨栖丘英明逸九天之上志氣籠八宏之表藉茅枕石落髮灰心糞衣殊羊續之袍繩床異管寧之榻自隱淪西嶽數十年矣確乎不拔淡然無為每而歎曰窮則獨善其身達則兼濟天下但蒼生擾擾縶以愛羅不可自致清升坐觀塗炭復須棄置林藪分衛人間於是屈迹暫遊方踐京邑次於灞上有行樂公子者控龍媒於㳅水飛鶴蓋於浮雲繡衣侯服薰風合氣玉勒金鞍爭光日定知擲果之愛是屬潘生割袖之寵已迷漢帝接軫城隅陪曹王之席連鏕池側追山公之賞道逢先生怪而問曰先生貌若燕趙之士髮如吳越之賓容色似困陳蔡衣製不關楚魯徐行低視細語嚬眉瓦鉢恆持異顏回之瓢器錫音乍振殊原憲之䔧杖此地未之覩我嘗所不聞敢問先生何方而至先生靜默良久徐而對曰觀子馳騁於名利荒昏於色聲戴天猶不測其高履地尚不知其厚吾聞坎井之內本無吞舟之鱗榆枋之間詎有垂雲之翼吾非子之徒與其可識乎試當為子言之幸子暫留高聽吾師也德本深搆樹自三祇之初妙果獨高成於百劫之末總法界而為智竟虛空以作身寧惟氣稟二儀道周萬物而已斯故身無不在量極規矩之外智無不為用絶思議之表不可以人事測豈得以處所論將啓愚夫之視聽須示真人之影迹其猶谷風之隨嘯虎慶雲之逐騰龍感應相招抑惟常理於是降神兜率之宮垂像迦毗之域氏曰瞿曇種稱剎利俗名悉達道字能仁乃白淨王之太子也家世則輪王迭襲門風則聖道相因地中三千既殊於雒邑國朝八萬有踰於鷲嶺宗親籍甚孰可詳焉暨吾師生也坤形六動方行七步五淨雨花滿國二龍灑水遍空神瑞畢臻吉徵總萃觀諸百代曾未之有然復孕異堯軒産殊禹契至如黑帝入夢之兆白光滿室之徵徒曰嘉祥詎可擬議身邊則金色一丈眉間則白毫五尺開萬字於胸前躡千輪於足下大略以言三十有二非可以龍顏虎鼻八采雙瞳方我妙色校其升降者也雖復呂公之相高帝世謂知人若譬私陀之視吾師未可同日於是崇業大寶正位少陽甲觀洞開龍樓逈建至如多才多藝允文允武非關師保自因天骨或於太子池臨泛之辰博望苑馳聘之際力格香象氣冠神功試論姬發曹丕莫之與擬漢盈夏啓寧足涉言父王宿衛甚嚴喻視彌篤九重禁闥聲聞則四十里三時密殿姬麗則二萬人然以道性恬凝志願沖固雖居三惑之境不改一心之節歷王城之四門哀老病之三苦乃自嗟曰人生若此在世何堪脫屣尋真其於斯矣于時桃則新花落雨青春始仲月則半輪低閣永夜方深觀妓直之似橫尸悟宮闈之如敗冢天王捧白馬而踰城給使持寶冠而詣闕雖復秦世蕭史周時子晉許由洗耳於箕山莊周曳尾於濮水方茲去俗何其蔑如是以仙林始抽簪之地禪河起苦行之迹沐金流之淨水遊道場之吉樹食假獻糜座因施草於是十力智圓六通神足魔兵席卷大業剋成獨稱為佛是吾師也法輪則奈國初轉僧侶則憍陳始度至於迦葉兄弟目連朋友西域之大勢東方之遍吉二十八天之主一十六國之王莫不服道而傾心餐風而合掌於是他化宮裏乃弘十地耆闍山上方會三乘善吉談無得之宗淨名顯不言之旨伏十仙之外道制六群之比丘胸前則吐納江河掌內則搖蕩山谷論劫則方石屢盡辨數則微塵可窮斯乃三界之大師萬古之獨步吾自庸才談何以盡縱使周公之制禮作樂孔子之述易刊詩豫賜之言語商偃之文學爰及左元放葛孝先河上公柱下史並驅之於方內何足道哉自我含靈福盡法王斯逝遂使北首提河春秋有八十矣應身粒碎流血何追爭決最後之疑競奉臨終之供嗚呼智炬消慈雲滅長夜諸子誠可悲夫於是瞻相好於香檀記筌蹄於貝葉三藏受持四依補處而我師風無墜於斯乎但世道紛華群情矯薄人代今古暨于像運既當徂北稍復東漸所以金人夢劉莊之寢摩騰佇蔡愔之勸遺教之流漢地創發此焉迄今五百餘年矣自後康僧會竺法維佛圖澄鳩摩什繼踵來儀盛宣方等遂使道生道安之侶慧嚴慧觀之徒並能銷聲挂冠翕然歸向緇門繁熾焉可勝道吾少長山東尚素王之雅業晚遊關右慕黃老之玄言俱是未越苦河猶淪火宅可久可大其惟佛教也歟遂乃希前代之清塵仰群英之遠迹歸斯正道拔自沈泥本號離欲之逸民摧邪之大將吾之儔黨其謂此乎公子蹙頞而言曰觀先生之辨雖可談天然其所説何太虛誕竊尋佛本啓化之辰當我宗周之運自云娑婆總攝靡所不歸或復光照無際聲振有頂或復八部雲臻十方輻湊計天竺去我十萬里餘俱在須彌之南並是閻浮之內那忽此間士庶無至佛所如來亦何獨簡不賜餘光弗生我秦漢靡載我墳籍詳此二三疑惑逾甚僕聞貞不絶俗隱不違親所以和光於塵裏披蓮於火內至若束帶垂纓無妨修德留鬚長鬢足可間居且道本虛通觸無不是何棄於冠籫專在於錫鉢竊以不傷遺體始著孝心莫非王臣終從朝命今既赭衣髠髮未詳其罪不仕天子無乃自高敢咨先生請當辨析先生曰吾聞大音不入於俚耳其驗茲乎猶欲以寸管窺天小螺量海而我法門出敻非吾子之能極吾且仰憑神力更為言之吾師化道含弘靈鈞遠被但衆生緣薄自為限礙耳何關佛威之不大聖澤之無均其猶日月垂像麗天雷霆發音動地而簡於聾瞽豈光微聲小者哉然佛遊舍衛有餘二紀三億之家猶不聞見何怪邊地十萬里乎竊以周孔之生本惟華夏之邑夷狄不信其理何耶至於東方朔之升天淮南王之入籙然乘鸞排霧世有其人欲不長於神仙猶密之而弗載寧解味吾師之道術書之於惇史乎況值秦皇焚典經籍不全何容守此局文遂無大見然有或彼正真甘茲隨俗未悟身之非潔豈達命也無常服玩則數重不止慳貪則一毛難落屑屑頑民可悲之甚吾已無保於形骸誰有營於好鬢髮既剪我心自伏衣惟壞色愛情何起所以五綴而持想六時而繫念蕭然物外是曰逆流竊聞夏禹疏川則有勞手足墨翟利物則不吝頂踵殺身以成仁餓死而存義此並有違於大孝然猶盛美於群書況吾養性栖玄立身行道方欲廣濟六趣高希萬德豈學子拘之於小節顧在膚髮之間哉扇逐榮名餘事從北面之朝也其若效淺祿微唯勞諾走功高無暇位極常懼危溢不安千仞棄珠一何賤寶但火內之蓮非吾所發染而不染何爾能知公子曰先生強誇華以飾非護牆茨而不掃請聽逆耳之篤論略條其弊也四焉僕聞玉樹不林於蒹葭威鳳不群於燕雀先生道雖微妙門人獨何庸猥或形陋族微或類卑神暗無三端可以參多士無十畝可以為匹夫墮王事之不間恥私門之弗立寄逃役於佛寺之內才容身於法服之下見人不能敘寒溫讀經不解正音義空知高心於百姓背禮於二親非所以自榮其弊一也僕聞采椽土階之儉唐堯之所以字民瓊室玉臺之盛商辛之所以敗俗況如來行惟少欲德本大悲只應宴坐於冢間經行於樹下何宜飾九層之剎建七寶之臺不愍作者之勞不慚居者之逸非所以自約其弊二也僕聞無自伐功老聃之極教不讚己德惟佛之格言勞謙則君子終吉剋讓則聖人上美必若內德充盛自然外響馳應賓侶坐致揄揚豈況佛心澄靜亡諸得失之咎如何獨許世尊之號不欲推人然彼群經莫二之宗各談第一之稱自生牟楯將何以通非所以自遜其弊三也僕聞情存兩寶心慎四知方曰通人之雅懷廉士之高節或散之於宗族或棄之於山水況玄道清淨反俗沙門而復縱無厭之求貪有為之利勸俗人則令不留髓腦論嚫施則便無讓分毫或勝貴經過或上客至止不將虛心而接待先陳出手之倍數此乃有識之同疾海內之共知非所以自廉其弊四也僕直言雖苦可為藥石惟先生高見覽以詳之先生曰吾子不笑何謂道耶子但好其所以同寧知其所以異徒欲圮毀未損金剛吾道弘邃豈可輕矣吾聞萬機斯總聖皇所以稱大百川是納巨所以為深王則不聯於細民海則無遺於小水況吾師大道曠無不濟有心盡攝未簡怨親自當品戒德之小大混族類之高下故有除糞庸人翻涉不生之位應書貴士倒墜無間之獄內祕難識外相孰知子何自擅為銓衡吾未相許為水鏡若但以貌取人失之遠矣遂使叔向伏蔑之語長者悟沙彌之説且復窮通有運否泰無恆或始榮而後辱或初微而後盛異轍紛輪可略言也至如立錐無地非慕堯舜之德餘圖不紹豈傳湯武之聖詎知吞并六國其先好馬牧人約法三章則惟亡命亭長樊灌起販屠之肆伊呂出厨釣之間歷代因循高門相襲遂為四海強族五陵貴氏冠冕陵雲風流蓋世暨若朝陽晞露羡皂隸之難留宿草負霜混螻蟻之莫別是知用與不用虎鼠何常尋末窮本人倫一概那忽輕以乘軒蔑茲甕牖雖復才方周旦亦何足觀嘗試言之朝市虛煩身心空弊智者同棄賢人共鄙但覺斯懷之可入所以避地而歸來吾則厭來苦而知昨非子便耽往欲而惑今是寧自安貧樂道少賤多能奚用太廟之犧牛竪子之烹雁吾今素質自居默念無雜不假導於仁義豈亂想於繁華固亦騎遺牝牡自忘寢膳詎守寒溫之小才音義之薄技修心可以報德何局定省之儀弘化可以接引寧止俯仰之事此吾所謂一勝也吾師空間樂處不惟聚落輕微矜納豈獨珠瓔是以栖形五山遊神三住或受童土或餐馬麥讚淨心之小施譏雜相之多捨庶令藉此而建善根因茲而表誠信斯自束修大體供養恆式豈佛身之欲須乃含生之達志但以凡俗難悟憍嫉未除競獻名寶利收多福所以玉槃高剎掩日聳於半天繡桷飛甍連雲被於宇內爭名好尚善將焉在著相寡識遂及乎斯雖乖至真之理足感榮華之樂生民惟此為功如來亦何抑説此吾所謂二勝也吾聞談無價之奇寶冀欲拯貧讚不死之神香只將愈疾但衆生信邪巫之狂藥捨正覺之甘露困毒已深懷迷自久吾師之出世也本許救濟為功知我者希無容緘默使物識真以回向何是非而自取若夫二佛不並於世兩日不共於天厥號無等庶弘至教非如君子之小聖事謙讓之風者已然至理同歸逐情異説是經稱最各應宜聞此吾所謂三勝也吾聞不趍四民之利莫致百送之金但大患未亡有待須養吾稱乞士則受之以知足子名施主則傾之以國城何容責我之貪非不自揣己之慳蔽是驗分財相得獨應管鮑乎吾聞天王武庫出給尚不由臣下況吾師福物與寧獨任凡僧本雖四輩而來今屬三寶而用為道興供義乖行福既為十方常住非曰私擬諸己自專則法律不許請衆則和合無由子何德以能消吾何情而敢擅只懼我之同咎豈欲貪利者哉竊以粒重七斤投水則煙火騰沸飯餘一鉢與人則群類充滿佛猶無吝於飢犬寧有惜於人焉是知輒用固以招愆回施許而獲益真是衆生之薄福判非吾師之褊心至如餓鬼不覩川流病人不覺美味罪關於餓病豈流味之無也竊聞功臣事主粟帛不次而酬勳明王責躬蒼旻不言而效德子不能自慨之無感專謗吾師之不惠持此叨餮何以為人至若鄭侯傾産於交遊田君布心於賓客空規豪蕩之聲勢詎擬福田而攉揚此吾所謂四勝也吾雖言不足而理有餘子但驚所未聞惑於不見吾之所説子可悟矣公子曰先生雖高談自雪終類守株所論報應何其悠眇僕聞開闢混元分剖清濁薄淳異稟愚聖派流至如首足之方圓翔潛之鱗羽命分修短身名寵辱莫非自然之造化詎是宿業之能為竊見景行不虧夭身世而嬰𮂁狂勃無禮竟天年而享福遭隨若斯因果何驗且氣息則聚生散死形神則上歸下沈萬事寥廓百年已矣何處天宮誰為地獄庸人之所信達士未之言先生猶惑繫風請更量也先生曰公子辨士哉見何膚淺所談不踰百世所歷無越八荒詎能曉果報之終期察因緣之本際不可局凡六識罔聖三明者也吾聞播植百穀非獨水土之功陶鑄四生詎正陰陽之力既有根於種類亦無離於集起竊見或體合夫妻子孫不孕或身非鰥寡男女莫均至於螢飛蟬化蜂巢蟻卵非構兩精之産豈從二藏之任若但稟之於乾坤人亦奚賴於父母一須委運慈孝何歸是知因自參差果方環互支分三報星羅萬品或今身而速受或來世而晚成此理必然亦何而朽竊以賞罰不濫王者之明法罪福無舛業道之大功政治則五刑罰祿位賞幽祇則三塗罪人天福目前可以為監誡豈伊吾之構虛論哉子未陷囹圄誰信有廷尉不遊岱宗便謂無鬼府但善惡積成則殃慶有餘被之茂典爾所未悉至如疏勒涌泉之應大江橫石之感羊公白玉郭巨黃金驄標鮑宣之馬珠降噲參之鶴爰及宣王之崩於杜伯襄公之懼於彭生白起甘死之徵李廣不侯之驗陸抗殃則遺後郭恩禍則止身斯甚昭著孰言冥沓雖有知無知六經不説然祭神祭鬼三代攸傳必也死而寂寥何求存以仁行無宜棄儒墨之小教失幽明之大理子可惜良才太甚愚僻早須歸悔體我真言公子曰先生雖懸河逸辨猶有所蔽僕聞天生蒸民剛柔為匹所以變化形器含養氣靈婚姻則自古洪規嫁娶則列代恆禮罪應不關於子胤道亦無礙於妻妾遂使善惠許賣花之約妙光納施珠之信衆香六萬尚曰法師毗耶二千猶名大士何獨曠茲仇偶擁此情性亢龍有悔其欲如之品物何以生佛種誰因續此先生之一蔽也僕聞猛獸為暴民之業毒蟲含傷物之性所以順氣則秋獮除害則夏苗天道之常何罪而畏至於牛豕充犧羔雁備禮運屬厨人之手體葬嘉賓之腹本天所生非此焉用然復鳥殘自死班聽內律如何闕養形命空作土塵此先生之二蔽也僕聞天列箕星地安泉郡酒之為物其來尚久銷愁適性獨可茲乎所以嵇阮七賢興情於斗石之量勛華兩聖盛德於鍾壺之飲管則藉此而談玄于則因茲而斷獄聞諸往哲未嘗不宴但自持之於禮何用阻衆獨清此先生之三蔽也僕聞八政著民天之食五味資道器之身降茲呼吸風霞餌飲芝露敢為生類罔不由之自可飽食用心無廢於道業何假持齋倦力有乏於勤修此先生之四蔽也先生若改斯蔽僕亦慕焉先生曰吾聞剛強難化固當爾耳子之蔽乎自不知其蔽吾之通也子豈識其通由此觀之未可與言道也竊以鄙言無遜尚避至親邪行不仁猶慚先達然其男則才離繈褓羡雙飛以求娶女則僅辭乳哺怨空房而感情苟貪小樂公行世禮積習生常混然誰怪此而無恥尤類鶉鵲勿將群小之制婚敢非高尚之敦雅且婚者昏也事寄昏成明非昌顯之裁範諒是庸鄙之危行獨有展禽柳下之操可以厲淫夫彭祖獨臥之術可以養和性斯固播之於良書美之於方策況乃吾師之成教也弘淨行之宗經豈復順彼邪風嬰茲欲網將出六天之表猶無携妓妾既超四空之外焉可挾妻孥惟有二果白衣繫業通許一床居士精而難混但品物之生自有緣託何必待我之相配方嗣於吾師獨不聞同一化生士無女業咸屏四大法喜資形所謂一通也吾聞生死去來本同步蠖顯晦上下無異循環業之所運人畜何準是以衛姬蜀帝之徒牛哀伯奇之類狐為美女狸作書生抑亦事歸難思豈易詳也竊以持戒無畏鬼龍含德不懼蜂蠆怖鴿投影猛虎越江我善則報之以明珠人惡則應之以毒氣諒由息之生殺豈禽獸惟害物耶雖復飛走別形惜身莫異輪回無始誰非所親恕己為喻亦何不忍詎可宰有生之血肉充無用之肌膚至若死而歸土物我同致所以黃不食黿孔猶覆醯況吾仁慈之隱惻孰甘美於肥鮮但五律漸開雙林永制此吾所謂二通也吾聞酒池牛飲著乎在昔雖百六數窮亦亂國斯起三十五失抑有由之但今身酩酊是焉可驗來生幽暗將復何已至如文舉之鐏不空玄石之眠難悟蓋惟耽酒之狂客曷可以論至道哉但使深酣則過多微宴則愆薄欲言飲而無災未之有也往賢之所嚴誡良以此乎縱不關物命亦無宜舉酌此吾所謂三通也吾聞戒自禁心齋唯齊志可謂入道之初行教民之本法但支立而已身亦何知若縱情嗜欲終為難滿所以節限二時足充四大覺翳螳之附後見野狼之對前危亡之期既切渴乏之情遂緩自欣道勝而肥何嗟食短而倦竊以帝王之祠宗廟夫子之請伯陽猶須絶味辛葷清居齋室況吾欲亡身而訪道寧復留心於美膳者哉此吾所謂四通也莫謂子所不能謂吾為蔽吾之所辨幸子擇以從之公子於是接足叩頭百體皆汗魂飛膽喪五色無主既如蹈虎復似見龍恍焉若狂莫知所對先生摩頂勞曰吾惟愍物子何怖耶公子稍乃自安泣而對曰僕本生下邑無聞大覺之名稟性疏野翻踵外邪之見不遇先生幾將禍矣比承下風之末精義入神仰恃大慈追收前失請容剃落受業於先生之門也先生曰子悟迷知返善矣哉辨惑篇第二俗之惑者大略有二初惑佛為幻偽善誘人心二惑因果沈冥保重身世且佛名大覺照極機初審性欲之多方練病藥之權道故能俯現金姿垂丈六之偉質流光遍燭通大千而闡化致使受其道者獲證塵砂內傾十使之纏外蕩八魔之弊故能履水火而無礙攝龍鬼而怡神三明六通暢靈襟之妙術四辨八解演被物之康衢其道顯然差難備敘至於李叟稱道才闡二篇名位周之史臣門學周之一吏生於厲鄉死於槐里莊生可為實録秦佚誠非妄論而史遷褒之乃云西遁流砂漢景信之方開東夏道學爾後宗緒漸布終淪滯於神州絶智守雌全未聞於寰海蒙俗信度飾詐揚真乃造老子化胡等經比擬佛法四果十地劫數周循結土為人觀音侍老黃書度命赤章厭祝斯言孟浪無足可稱方欲陵佛而誇法僧矯俗而為尊極通鑒遠識者自絶生常瑣學迷津者或同墜溺且道德二篇涓子所説伯陽為尹而傳是則述而不作至於四果以下全非道流斯乃後學門人廣開衢術言輒引類翻纍本宗故神仙傳云無識道士妄傳老子代代為國師者濫也葛洪可謂生知之士千載之一遇也諸餘碌碌等駕齊驅佛經無敘於李聃道書多涉於釋訓人流慕上古諺之常言惡居下徒今俗之行事所以隨有相狀無不擬儀道本氣也無像可圖今則擬佛金姿峙列天堂地獄連寫施行五戒十善曾無異迹終是才用薄弱不能自立宗科竊經盜義倚傍稱道至如楊雄太玄迢然居異抱朴論道邈爾開權莊惠之流可為名作南華近出亦足命家豈若上皇之元密取漢徹之號剖生左腋用比能仁之儀斯途衆矣具如後顯又俗惑三際之業時輕四趣之報人死極於此生生亦莫知何至由斯淪滯出竟無緣若不統敘長迷逾遠深嫌繁委何得略之又序曰夫解惑之生存乎博見義舉傳聞暗託信為難辨舟師故四不壞淨位居入流之始一正定聚方稱涉正之域餘則初染輕毛隨風揚扇不退漆木雖磨不磷是以辨惑履正開於悟達之機宅形安道必據稽明之德自法流震旦信毀相陵多由臆斷師心統決三際必然之事乃謂寓言六道昭彰之形言為虛指夫以輪回生死隨業往還依念念而賦身逐劫劫而傳識所以濠上英華著方生之論柱下睿哲稱其鬼不神可謂長時有盡生涯不窮禹父既化黃能漢王變為蒼犬彭生豕見事顯齊公元伯纓垂名高漢史斯途衆矣難備書紳無識之倫妄生推託便言三后在天勸誘之高軌陳祭鬼饗孝道之權猷斯則乖人倫之典謨越天常之行事詭經亂俗不足言之若夫繫述遊魂之談經敘故身之務昭穆有序祖尊重親追遠慎終由來之同仰踐霜興感列代之彝倫安有捐擲所生專存諸己橫陳無鬼之論自許有身之術前集已論今重昌顯固須讎校名理尋討經論卷部五千咸經目閲義通八藏妙識宗歸若斯博詣事絶回惑竊以六因四緣乘善惡而成業四生六道紹升沈之果報茲道坦然非學不達豈可信凡庸之臆度排大聖之明略哉況復列十度之仁舟濟大心於苦海分四諦之階級導小智之邪山三學以統兩乘四輪而摧八難梗概若此無由惑之又以寺塔崇華糜費於財事僧徒供施叨濫於福田過犯滋彰譏嫌時俗通污佛法咸被湮埋故周魏二武生本幽都赫連兩君胤惟玁狁鄉非仁義之域性絶陶甄之心擅行殲殄誠無足怪今疏括列代編而次之庶或迷沒披而取悟序之云爾廣弘明集辨惑篇第二之一辨道論魏曹植夫神仙之書道家之言乃云傅説上為辰尾宿歲星降為東方朔淮南王安誅於淮南而謂之獲道輕舉鉤弋死於雲陽而謂之尸逝柩空其為虛妄甚矣哉中興篤論之士有桓君山者其所著述多善劉子駿嘗問人言誠能仰嗜欲闔耳目可不衰竭乎時庭中有一老榆君山指而謂曰此樹無情欲可忍無耳目可闔然猶枯稿腐朽而子駿乃言可不衰竭非談也君山援榆喻之未是也何者余前為王莽典樂大夫樂記云文帝得魏文侯樂人竇公年百八十兩目盲帝奇而問之何所施行對曰臣年十三而失明父母哀其不及事教臣鼓琴臣不能導引不知壽得何力君山論之曰頗得少盲專一內視精不外鑒之助也先難子駿以內視無益退論竇公便以不鑒證之吾未見其定論也君山又曰方士有董仲君者繫獄陽死數日目陷蟲出死而復生然後竟死生之必死君子所達夫何喻乎夫至神不過天地不能使蟄蟲夏遊震雷冬發時變則物動氣移而事應彼仲君者乃能藏其氣尸其體爛其膚出其蟲無乃大怪乎世有方士吾王悉所招致甘陵有甘始廬江有左慈陽城有郤儉始能行氣導引慈曉房中之術儉善辟穀悉號三百歲本所以集之於魏國者誠恐斯人之徒接姦詭以欺衆行妖慝以惑人故聚而禁之甘始者老而有少容自餘術士咸共歸之然始詞繁寡實頗竊有怪言若遭秦始皇漢武帝則復徐福欒大之徒矣桀紂殊世而齊惡姦人異代而等偽乃如此耶又世虛然有仙人之説仙人者黨猱猿之屬與世人得道化為仙人乎夫雀入海為蛤雉入海為蜃當其徘徊其翼差池其羽猶自識也忽然自投神化體變乃更與黿鱉為群豈復自識翔林薄巢垣屋之娛乎而顧為匹夫所惘納虛妄之詞信眩惑之説隆禮以招弗臣傾産以供虛求散王爵以榮之清間館以居之經年纍稔終無一效或歿於沙丘或崩乎五柞臨時雖誅其身滅其族紛然足為天下笑矣然壽命長短骨體強劣各有人焉善養者終之勞擾者半之虛用者夭之其斯之謂歟植字子建魏武帝第四子也初封東阿郡王終後諡為陳思王也幼含圭璋十歲能屬文下筆便成初無所改世間術藝無不畢善邯鄲淳見而駭服稱為天人也植每讀佛經輒流連嗟玩以為至道宗極也遂製轉讀七聲升降曲折之響故世之諷誦咸憲章焉嘗遊魚山聞空中梵天之贊乃摹而傳于後則備見梁法苑集然統括道源精究仙録詐妄尤甚故著論以詳云聖賢同軌老聃非大賢論晉孫盛安國頃獲間居復申所詠仰先哲之玄微考大賢之靈衢詳觀風流究覽行止高下之辨殆可髣佛夫大聖乘時故迹浪於所因大賢次微故與大聖而舒卷所因不同故有揖讓與干戈迹乖次微道亞故行藏之軌莫異亦有龍虎之從風雲形聲之會影響理固自然非召之也是故箕文同兆元吉於虎兕之吻顏孔俱否逍遙於匡陳之間唐堯則天稷偰翼其化湯武革命伊呂贊其功由斯以言用舍影響之論惟我與爾之談豈不信哉何者大賢庶幾觀象知器觀象知器豫籠吉凶豫籠吉凶是以運形斯同御治因應對接群方終保元吉窮通滯礙其揆一也但欽聖樂易有待而享欽冥而不能冥悅寂而不能寂以此為優劣耳至於中賢第三之人去聖有間故冥體之道未盡自然運用自不得玄同然希古存勝高想頓足仰慕淳風專詠至虛故有栖峙林壑若巢許之倫者言行抗轡如老彭之徒者亦非故然理自然也夫形躁好靜質柔愛剛瀆所常習愒所希聞世俗之常也是以見偏抗之辭不復尋因應之適覩矯誑之論不復悟過直之失耳案老子之作與聖教同者是代大匠斫駢拇枝指之喻其詭乎聖教者是遠救世之宜違明道若昧之義也六經何常闕虛靜之訓謙沖之誨哉孔子曰述而不作信而好古竊比於我老彭尋斯旨也則老彭之道以籠罩乎聖教之內矣且指説二事而不非實言也何以明之聖人淵寂何不好哉又三皇五帝不下靡不制作是故易象經墳爛然炳著棟宇衣裳與時而興安在述而不作乎故易曰聖人作而萬物覩斯言之證蓋指説老彭之德有以髣佛類己形迹之處所耳亦猶匿怨而友其人左丘明恥之丘亦恥之豈若於吾言無所不説相體之至也且顏孔不以導養為事而老彭養之孔顏同乎斯人而老彭異之凡斯數者非不亞聖之迹而又其書往往矛眉粗列如左大雅搢紳幸祛其弊盛又不達老聃輕舉之旨為欲著訓戎狄宣導殊俗乎若欲明宣導殊類則左袵非玄化之所孤遊非嘉遁之舉諸夏陵遲敷訓所先聖人之教自近及遠未有輈張避險如此之遊也若懼禍避地則聖門可隱商朝魯邦有無如者矣苟得其道則遊刃有餘觸地元吉何違天心於戎貊如不能然者得無庶於朝隱而祈仙之徒乎昔裴逸民作崇有貴無二論時談者或以為不虛達勝之道者或以為矯時流遁者余以為尚無既失之矣崇有亦未為得也道之為物惟恍與忽因應無方惟變所適值澄淳之時則司契垂拱遇萬動之化則形體勃興是以洞鑒雖同有無之教異陳聖致雖一而稱謂之名殊目唐虞不希結繩湯武不擬揖讓夫豈異哉時運故也而伯陽以執古之道以御今之有逸民欲執今之有以絶古之風吾故以為彼二子者不達圓化之道各矜其一方者耳老子疑問反訊晉孫盛道經云故常無欲以觀其妙故常有欲以觀其徼此兩者同出而異名同謂之玄玄之又玄衆妙之門舊説及王弼解妙謂始徼謂終也夫觀始要終覩妙知著達人之鑒也既以欲澄神昭其妙始則自斯以已宜悉鎮之何以復須有欲得其終乎宜有欲俱出妙門同謂之玄若然以往復何獨貴於無欲乎天下皆知美之為美斯惡已皆知善之為善斯不善已盛以為夫美惡之名生乎美惡之實道德淳美則有善名頑嚚聾昧則有惡聲故易曰惡不積不足以滅身又曰美在其中暢於四支而發於事業又曰韶盡美矣未盡善也然則大美大善天下皆知之何得云斯惡乎若虛美非美為善非善所美過美所善違中若此皆世教所疾聖王奮誠天下亦自知之於斯談不尚賢使民不爭不貴難得之貨使人不盜常使民無知無欲使知者不敢為又曰絶學無憂唯之與阿相去幾何善之與惡相去何若下章云善人不善人之師不善人善人之資不貴其師不愛其資雖知大迷盛以為民苟無欲亦何所師於師哉既相師資非學如何不善師善非尚賢如何貴愛既存則美惡不得不彰非相去何若之謂又下章云人之所教我亦以教人吾言甚易知而天下莫能知又曰吾將以為教父原斯談也未為絶學所云絶者堯孔之學耶堯孔之學隨時設教老氏之言一其所尚隨時設教所以道通百代一其所尚不得不滯於適變此又暗弊所未能通者也道沖而用之又不盈和其光同其塵盛以為老聃可謂知道非體道者也昔陶唐之蒞天下也無日解哉則維昭任衆師錫匹夫則馺然授禪豈非沖而用之光塵同彼哉伯陽則不然既處濁位復遠導西戎行止則昌狂其迹著書則矯誑其言和光同塵固若是乎余固以為知道體道則未也道經云三者不可致詰混然為一繩繩兮不可名復歸於無物無物之象是謂忽恍下章云道之為物惟恍與忽忽兮恍兮其中有象恍兮忽兮其中有物此二章或言無物或言有物先有所不宜者也執古之道以御今之有上章執者失之為者敗之而復云執古之道以御今之有或執或否得無陷矛盾之論乎絶聖棄智民利百倍孫盛曰夫有仁聖必有仁聖之德迹此而不崇則陶訓焉融仁義不尚則孝慈道喪老氏既云絶聖而每章輒稱聖人既稱聖人則迹焉能得絶若所欲絶者絶堯舜周孔之迹則所稱聖者為是何聖之迹乎即如其言聖人有宜滅其迹者有宜稱其迹者稱滅不同吾誰適從絶仁棄義民復孝慈若如此談仁義不絶則不孝不慈矣復云居善地與善仁不審與善仁之仁是向所云欲絶者非耶如其是也則不宜復稱述矣如其非也則未詳二仁之義一仁宜絶一仁宜明此又所未達也若謂不聖之聖不仁之仁則教所誅不假高唱矣退至莊周云聖人不死大盜不止又曰田常竊仁義以取齊國夫天地陶鑄善惡兼育各稟自然理不相關梟鴆縱毒不假學於鸞鳳豺虎肆害不借術於麒麟此皆天質自然不須外物者也何至凶頑之人獨當假仁義以濟其姦乎若乃冒頓殺父鄭伯盜鄶豈復先假孝道獲其終害乎而莊李掊擊殺根毀駁正訓何異疾盜賊而銷鑄干戈覩食噎而絶棄嘉穀乎後之談者雖曲為其義辨而釋之莫不艱屯於殺聖困躓於忘親也知我者希則我貴矣上章云聖人之在天下也百姓皆注其耳目師資貴愛必彰萬物如斯則知之者安得希哉知希者何必貴哉即己之身見貴九服何得背實抗言云貴由知希哉斯蓋欲抑動恆俗故發此過言耳聖教則不然中和其詞以理訓導故曰在家必聞在邦必聞也是聞必達也不見善而無悶潛龍之德人不知而不慍君子之道衆好之必察焉衆惡之必察焉既不以知多為顯亦不以知少為貴誨誘綽綽理中自然何與老聃之言同日而語其優劣哉禮者忠信之薄而亂之首前識者道之華而愚之始是以大丈夫處其厚不處其薄處其實不處其華也孫盛曰老聃足知聖人禮樂非玄勝之具不獲已而制作耳而故毀之何哉是故屏撥禮學以全其任自然之論豈不知叔末不復得返自然之道直欲申己好之懷然則不免情於所悅非注心救物者也非惟不救乃獎其弊矣或問莊老所以故發此唱蓋與聖教相為表裏其於陶物明訓其歸一也盛以為不然夫聖人之道廣大悉備矣猶日月懸天有何不照者哉老氏之言皆效於六經矣寧復有所愆之俟佐助於聃周乎即莊周所謂日月出矣而爝火不息者至於虛誑譎怪僥詭之言尚拘滯於一方而橫稱不經之奇詞也王侯得一以為天下貞貞正也下章云孰知其極其無正正復為奇善復為妖尋此二章或云天下正或言無正既云善人不善人師而復云為妖天下之善一也而或師或妖天下之正道一也而云正復為奇斯反鄙見所未能通也盛字安國仕晉為給事中祕書監少遊涉墳素而以史籍為懷故曰賢聖玄邈得諸言表而仁愛自我陶染庶物漸漬之功莫過乎經史著晉陽春秋三十餘卷評老氏中賢之流故知為尹述書乃祖承有據嵇子云老子就涓子學九仙之術尋乎導養斯言有徵至於聖也則不云學故語曰生知者上學知者次王何所位典達鴻猷故班固序人九等之例孔丘等為上上類例皆是聖李耳等為中上類例皆是賢聖有至聖亞聖賢有大賢中賢並以神機有利鈍故智用有漸頓也盛敘老非大賢取其間放自牧不能兼濟於天下坐觀周衰遁於西裔行及秦壤死於扶風葬於槐里非遁天之仙信矣均聖論齊沈約休文自天地權輿民生攸始遐哉眇邈無得而言焉無得而言因有可言之象至於大虛之空曠無始之杳茫豈唯言象莫窺良以心慮事絶及天地蕞爾來宅其中毫端之泛巨海方斯非譬然則有此天地以來猶一念也我之所久莫過軒犧而天地之在彼太虛猶軒羲之在彼天地齷齪之徒惟謂赫胥為遠何其鎖鎖為念之局耶世之有佛莫知其始前佛後佛其道不異法身湛然各由應感感之所召跨大千而咫尺緣苟未應雖踐迹而弗覩娑婆南界是曰閻浮蔥嶺以西經塗密邇緣運未開自與理隔何以言之夏殷以前書傳簡寡周室受命經典備存象寄狄鞮隨方受職重譯入貢總括要荒而八蠻五狄莫不愚鄙文字靡識訓義不通咸納贄王府登樂清廟西國密塗厥路非遠雖葉書橫字胡華不同而深義妙理於焉自出唐虞三代不容未有事獨西限道未東流豈非區區中國緣應未啓求其會歸尋其旨要寧與四夷之樂同日而語乎非為姬公所遺蓋由斯法宜隱故也炎昊之世未火未粒肉食皮衣仁惻之事弗萌懷抱非肉非皮死亡立至雖復大聖殷勤思存救免而身命是資理難頓奪實宜導之以漸稍啓其源故燧人火化變腥為熟腥熟既變蓋佛教之萌兆也何者變腥為熟其事漸難積此漸難可以成著迄乎神農復垂汲引嘉穀肇播民用粒食嗛腹充虛非肉可飽則全命減殺於事彌多自此以降矜護日廣春搜免其懷孕夏苗取其害穀秋獮冬狩所害誠多頓去之難已備前説周孔二聖宗條稍廣見其生不忍其死聞其聲不食其肉草木斬伐有時麛卵不得妄犯漁不竭澤佃不燎原釣而不網弋不射宿肉食蠶衣皆須耆齒牛羊犬豕無故不殺此則戒有五支又開其一也逮乎酣醟于酒淫迷乎色詭妄於人攘濫自己外典所禁無待釋教四者犯人人為含靈之首一者害獸獸為生品之末上聖開宗宜有次第亦由佛戒殺人為業最重也內聖外聖義均理一而蔽理之徒封著外教以為烹羊豢豕理固宜然或者又云若如釋氏之書咸有緣報之業則禹湯文武並受刳剔周公孔子俱入鼎鑊是何迷於見道若斯之篤耶試尋斯證可以有悟矣華陽先生難鎮軍均聖論山民陶隱居仰咨論云前佛後佛其道不異周室受命象寄狄鞮隨方受職西國密塗厥路非遠唐虞三代不容未有事獨西限道未東流非為姬公所遺蓋由斯法宜隱燧人火粒變腥為熟蓋佛教之萌兆周孔二聖宗條稍廣見生不忍其死聞聲不食其肉草木斬伐有時麛卵不得妄犯又戒有五支四者犯人人為含靈之首一者害獸獸為生品之末內聖外聖義均理一咨曰謹案佛經一佛之興動踰纍劫未審前佛後佛相去宜幾釋迦之現近在莊王唐虞夏殷何必已有周公不言恐由未出非關宜隱育王造塔始敬王之世既閻浮有四則東國不容都無夫子自以華禮興教何宜乃説夷法故歎中國失禮求之四夷亦良有別意且四夷之樂裁出要荒之際投諸四裔亦密邇危羽之野禹迹所至不及河源越裳白雉尚稱重譯則天竺罽賓久與上國殊絶衰周以後時或有聞故鄒子以為赤縣於宇內止是九中之一耳漢初長安乃有浮圖而經像眇昧張騫雖將命大夏甘英遠屆安息猶弗能宣譯風教闡揚斯法必其發夢帝庭乃稍就興顯此則似如時致通閡非關運有起伏也若必以緣應有會則昔之淳厚群生何辜今之澆薄群生何幸假使斯法本以救澆者夫為罪莫過於殺肉食之時殺孰甚焉而方俟火粒甫為教萌於大慈神力不有所躓乎若粳糧未播殺事難息未審前時過去諸佛復以何法為教此教之萌起在何佛兼四戒犯人為報乍輕一殺害獸受對更重首輕末重亦為未達夫立人之道曰仁與義周孔所云聞聲不食斬伐有時者蓋欲大明仁義之道於鳥獸草木尚曰其然況在乎人而可悖虐非謂內惕寡方意在緣報覩迹或似論情頓乖不審於內外兩聖其事可得是均以不此中參差難用頓悟謹備以咨洗願具啓諸蔽難云釋迦之現近在莊王唐虞夏殷何必已有周公不言恐由未出非關宜隱育王造塔始敬王之世閻浮有四則東國不容都無答曰釋迦出世年月不可得知佛經既無年歷注記此法又未東流何以得知是周莊之時不過以春秋魯莊七年四月辛卯恆星不見為據三代年既不同不知外國用何曆法何因知魯莊之四月是外國之四月乎若外國用周正耶則四月辛卯長曆惟是五日了非八日若用殷正耶周之四月殷之三月用夏正耶周之四月夏之二月都不與佛家四月八日同也若以魯之四月為證則日月參差不可為定若不以此為證則佛生年月無證可尋且釋迦初誕唯空中自明不云星辰不見也瑞相又有日月星辰停住不行又云明星出時墮地方行七步初無星辰不現之語與春秋恆星不現意趣永乖若育王造塔是敬王之世閻浮有四此道已流東國者敬王以來至於六國記注繁密曾無一概育王立塔非敬王之時又分明也以此而推則釋迦之興不容在近周世公旦之情何得未有難云夫子自以華禮興教何宜乃説夷法故歎中國失禮求之四夷亦良有別意答曰弘教次第前論己詳不復重辨難云四夷之樂裁出要荒之際投諸四裔亦密邇危羽之野禹迹所至不及河源越裳白雉尚稱重譯則天竺罽賓久與上國殊絶衰周以後時或有聞故鄒子以為赤縣於宇內止是九州中之一耳漢初長安乃有浮圖而經像眇昧張騫雖將命大夏甘英遠屆安息猶弗能宣譯風教必其發夢遆庭乃稍興顯此則似時有通礙非關運有起伏也答曰本以西域路近而大法不被此蓋由緣應未發非謂其塗為遠也其路既近而此法永不東流若非緣應未至何以致此及後東被皆由緣應宜發通礙各有其時前論已盡也難曰若必以緣應有會則昔之淳厚群生何辜今之澆薄群生何幸假使斯法本以救澆者夫為罪莫過於殺肉食之時殺孰甚焉而方俟火粒甫為教萌於大慈神力不有所躓乎若粳糧未播殺事難息未審前時過去諸佛復以何法為教此教之萌起在何佛兼四戒犯人為報乍輕一殺害獸受對更重首輕末重亦為未達夫立人之道曰仁與義周孔所云聞聲不食斬伐以時者蓋欲大明仁義之道於鳥獸草木尚曰其然況在乎人而可悖虐非謂內惕寡方意在緣報覩迹或似論情頓乖不審於內外兩聖其事可得是均以不此中參差難用頓悟謹備以咨洗願具啓諸蔽答曰民資肉食而火粒未啓便令不肉教豈得行前論言之已具不復重釋衆生緣果所遭各有期會當昔佛教未被是其惡業盛時後之聞法是其善業萌時善惡各有其時何關淳厚之與澆薄五支之戒各有輕重非殺戒偏重四支並輕且五業雖異而互相發起犯人之戒人重故先出犯獸之戒獸輕故後被訓記之道次第宜然周公孔子漸弘仁惻前論已詳請息重辨若必以釋教乖方域之理外此自一家之學所不敢言
